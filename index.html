            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    var texts = [
                        "How to use this site:",
                        "1. Create account to track progress.",
                        "2. Choose a 'Pathway'",
                        "3. Practice curriculum consistently.",
                        "4. Apply what you learn to a personal project.",
                        "5. Build a FOSS portfolio and build a career."
                    ];
                    var lines = [
                        document.getElementById('intro-line-0'),
                        document.getElementById('intro-line-1'),
                        document.getElementById('intro-line-2'),
                        document.getElementById('intro-line-3'),
                        document.getElementById('intro-line-4'),
                        document.getElementById('intro-line-5')
                    ];
                    var charDelay = 50;
                    var lineDelay = 800;
                    var holdTime = 1500;
                    var fadeTime = 500;
                    var penguinFadeTime = 2000;
                    var currentLine = 0;
                    var currentChar = 0;

                    function typeLine() {
                        if (currentLine >= lines.length) {
                            setTimeout(showPenguin, holdTime);
                            return;
                        }
                        var text = texts[currentLine];
                        if (currentChar < text.length) {
                            lines[currentLine].textContent += text.charAt(currentChar);
                            currentChar++;
                            setTimeout(typeLine, charDelay);
                        } else {
                            currentLine++;
                            currentChar = 0;
                            setTimeout(typeLine, lineDelay);
                        }
                    }

                    function fadeLines() {
                        var i = 0;
                        function fadeNext() {
                            if (i >= lines.length) {
                                setTimeout(showPenguin, fadeTime);
                                return;
                            }
                            lines[i].style.transition = 'opacity ' + (fadeTime/1000) + 's';
                            lines[i].style.opacity = '0';
                            i++;
                            setTimeout(fadeNext, holdTime);
                        }
                        fadeNext();
                    }

                    function showPenguin() {
                        localStorage.setItem('penguinLoaded', 'true');
                        var introContainer = document.getElementById('intro-container');
                        var penguinContainer = document.getElementById('penguin-container');
                        var homeContent = document.getElementById('home-content');
                        
                        introContainer.style.transition = 'opacity ' + (fadeTime/1000) + 's';
                        introContainer.style.opacity = '0';
                        
                        setTimeout(function() {
                            introContainer.style.display = 'none';
                            penguinContainer.style.display = 'block';
                            penguinContainer.style.opacity = '0';
                            
                            var img = new Image();
                            img.onload = function() {
                                penguinContainer.style.transition = 'opacity ' + (penguinFadeTime/1000) + 's';
                                penguinContainer.style.opacity = '1';
                                homeContent.style.display = 'block';
                                document.getElementById('site-footer').style.display = 'block';
                            };
                            img.onerror = function() {
                                penguinContainer.style.transition = 'opacity ' + (penguinFadeTime/1000) + 's';
                                penguinContainer.style.opacity = '1';
                                homeContent.style.display = 'block';
                                document.getElementById('site-footer').style.display = 'block';
                            };
                            img.src = 'machete_penguin.png';
                            img.style.display = 'none';
                            penguinContainer.appendChild(img);
                        }, fadeTime);
                    }

                    var penguinLoaded = localStorage.getItem('penguinLoaded') === 'true';

                    function skipToPenguin() {
                        var introContainer = document.getElementById('intro-container');
                        introContainer.style.display = 'none';
                        showPenguin();
                    }

                    if (penguinLoaded) {
                        setTimeout(skipToPenguin, 500);
                    } else {
                        setTimeout(function() {
                            typeLine();
                            setTimeout(fadeLines, texts.length * lineDelay + texts[texts.length-1].length * charDelay + holdTime);
                        }, 500);
                    }
                });
            </script>

    <div id="loginModal" class="auth-modal">
        <div class="auth-box">
            <button class="close-auth" onclick="closeLoginModal()">×</button>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="showAuthTab('register')">Register</button>
            </div>
            <div id="loginError" class="auth-error"></div>
            <div id="loginSuccess" class="auth-success"></div>
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" placeholder="Email" required style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--charcoal);font-family:'IBM Plex Mono',monospace;background:var(--white);color:var(--black);">
                <input type="password" id="loginPassword" placeholder="Password" required style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--charcoal);font-family:'IBM Plex Mono',monospace;background:var(--white);color:var(--black);">
                <button type="submit" style="width:100%;padding:12px;background:var(--black);color:var(--white);border:none;font-family:'IBM Plex Mono',monospace;cursor:pointer;">Login</button>
            </form>
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <input type="email" id="registerEmail" placeholder="Email" required style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--charcoal);font-family:'IBM Plex Mono',monospace;background:var(--white);color:var(--black);">
                <input type="password" id="registerPassword" placeholder="Password" required style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--charcoal);font-family:'IBM Plex Mono',monospace;background:var(--white);color:var(--black);">
                <input type="password" id="registerConfirm" placeholder="Confirm Password" required style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--charcoal);font-family:'IBM Plex Mono',monospace;background:var(--white);color:var(--black);">
                <button type="submit" style="width:100%;padding:12px;background:var(--black);color:var(--white);border:none;font-family:'IBM Plex Mono',monospace;cursor:pointer;">Register</button>
            </form>
        </div>
    </div>

    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); showAuthTab('login'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); document.getElementById('loginError').classList.remove('show'); document.getElementById('loginSuccess').classList.remove('show'); }
        document.getElementById('loginBtn').addEventListener('click', openLoginModal);
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                const response = await fetch('api/auth.php', { method: 'POST', body: formData, credentials: 'include' });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => { window.location.href = 'account.html'; }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) { errorDiv.textContent = 'Connection error'; errorDiv.classList.add('show'); }
        }
        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            if (password !== confirm) { errorDiv.textContent = 'Passwords do not match'; errorDiv.classList.add('show'); return; }
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                const response = await fetch('api/auth.php', { method: 'POST', body: formData, credentials: 'include' });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => { window.location.href = 'account.html'; }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) { errorDiv.textContent = 'Connection error'; errorDiv.classList.add('show'); }
        }
        if (window.location.hash === '#login') { openLoginModal(); }

        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const resultsContainer = document.getElementById('results');
            
            function clearSearch() {
                searchInput.value = '';
                resultsContainer.style.display = 'none';
            }
            
            window.addEventListener('pageshow', clearSearch);
            window.addEventListener('beforeunload', clearSearch);
            
            function renderResults(matches, query) {
                resultsContainer.innerHTML = '';
                if (matches.length === 0) { 
                    resultsContainer.innerHTML = '<p style="text-align: center; color: var(--charcoal); font-family: IBM Plex Mono, monospace;">No results found for "' + query + '"</p>';
                    resultsContainer.style.display = 'block';
                    return; 
                }
                
                const header = document.createElement('p');
                header.style.cssText = 'font-family: IBM Plex Mono, monospace; font-size: 0.9rem; color: var(--charcoal); margin-bottom: 16px; text-align: center;';
                header.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' for "' + query + '"';
                resultsContainer.appendChild(header);
                
                matches.forEach(function(item) {
                    const a = document.createElement('a');
                    a.href = item.href;
                    a.className = 'search-link';
                    a.style.cssText = 'display: block; padding: 16px; border: 1px solid var(--charcoal); margin-bottom: 8px; color: var(--black); text-decoration: none; font-family: IBM Plex Mono, monospace; transition: background 0.2s;';
                    a.textContent = item.text;
                    a.addEventListener('mouseenter', function() { this.style.background = 'var(--light-gray)'; });
                    a.addEventListener('mouseleave', function() { this.style.background = 'transparent'; });
                    resultsContainer.appendChild(a);
                });
                resultsContainer.style.display = 'block';
            }
            
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase().trim();
                if (query.length > 0) {
                    const matches = searchData.filter(function(item) {
                        return item.text.toLowerCase().includes(query);
                    });
                    renderResults(matches, query);
                } else {
                    resultsContainer.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
