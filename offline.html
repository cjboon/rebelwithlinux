<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Rebel With Linux</title>
    <link rel="stylesheet" href="fonts.css">
    <style>
        :root {
            --ivory: #FFFFF0;
            --black: #0A0A0A;
            --white: #FFFFFF;
        }
        [data-theme="dark"] {
            --ivory: #1a1a1a;
            --white: #2a2a2a;
            --black: #e0e0e0;
        }
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--ivory);
            color: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 32px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        p {
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        button {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry - some of our content is available offline!</p>
    <p>Check back when you're back online, or try navigating to a page you've already visited.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <script src="nav.js" defer></script>
</body>
</html>
