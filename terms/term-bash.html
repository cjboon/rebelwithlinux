        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        
        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) {
                    userId = data.email;
                    userTheme = data.theme || 'dark';
                    return true;
                }
            } catch (e) {
                console.log('Not logged in');
            }
            return false;
        }
        
        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=bash');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const maxLesson = Math.max(...data.map(p => p.lesson_id));
                        return maxLesson;
                    }
                }
            } catch (e) {
                console.log('Could not load progress');
            }
            return null;
        }
        
        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        course: 'bash',
                        lesson_id: level,
                        completed: true,
                        quiz_score: 0
                    })
                });
            } catch (e) {
                console.log('Could not save progress');
            }
        }
        
        function addBashLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'bash-error-line' : 'bash-output-line';
            line.textContent = text;
            bashOutput.appendChild(line);
            bashOutput.scrollTop = bashOutput.scrollHeight;
        }
        
        function clearBashOutput() {
            bashOutput.innerHTML = '';
        }
        
        async function runBashCode(cmd) {
            addBashLine('$ ' + cmd);
            
            try {
                const response = await fetch('/cgi-bin/bash_exec.py', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'code=' + encodeURIComponent(cmd)
                });
                
                const data = await response.json();
                
                if (data.error) {
                    addBashLine(data.output, 'error');
                } else {
                    if (data.output) {
                        data.output.split('\n').forEach(line => addBashLine(line));
                    } else {
                        addBashLine('(no output)', 'output');
                    }
                }
            } catch (e) {
                addBashLine('Error: ' + e.message, 'error');
            }
        }

        let levels;
        
        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = 'output-line ' + className;
            line.textContent = text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function showCharacterMessage(text, showName = true) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        if (showName) {
                            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        } else {
                            line.innerHTML = '<span class="character-name">' + character.name + '</span> ' + currentText;
                        }
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function addUserInput(text) {
            const line = document.createElement('div');
            line.className = 'output-line user-input';
            line.textContent = '> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function checkAnswer(userAnswer) {
            const level = levels[currentLevel];
            let isCorrect = false;
            
            if (level.type === 'exact') {
                isCorrect = userAnswer.trim() === level.answer;
            } else if (level.type === 'starts') {
                isCorrect = userAnswer.trim().startsWith(level.answer);
            }
            
            return isCorrect;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('  Level ' + level.id + ': ' + level.title, 'lesson-number');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(level.intro);
            addLine('');
            
            const contentLine = document.createElement('div');
            contentLine.className = 'output-line command-output';
            contentLine.textContent = level.content;
            history.appendChild(contentLine);
            output.scrollTop = output.scrollHeight;
            
            addLine('');
            await showCharacterMessage("Go ahead, kid - try typing the code! " + level.hint, false);
            
            updateBreadcrumb();
        }
        
        async function showSuccess() {
            const level = levels[currentLevel];
            
            addLine('');
            await showCharacterMessage(level.success);
            
            addLine('');
            const encour = document.createElement('div');
            encour.className = 'output-line encouragement';
            encour.textContent = '⚓ ' + character.getEncouragement() + ' ⚓';
            history.appendChild(encour);
            
            addLine('');
        }
        
        async function startGame() {
            history.innerHTML = '';
            clearBashOutput();
            currentLevel = 0;
            
            const isLoggedIn = await checkLogin();
            if (isLoggedIn) {
                savedLevel = await loadProgress();
                // Apply server theme if logged in
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            
            addLine('');
            addLine('╔═══════════════════════════════════════╗', 'lesson-number');
            addLine('║   BASH TUTOR with Captain Bash        ║', 'lesson-number');
            addLine('╚═══════════════════════════════════════╝', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(character.greeting);
            
            addLine('');
            addLine('Choose yer path, kid:', 'lesson-number');
            addLine('');
            
            const menu1 = document.createElement('div');
            menu1.className = 'output-line choice';
            menu1.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Start with the basics (lessons 1-12)';
            history.appendChild(menu1);
            
            const menu2 = document.createElement('div');
            menu2.className = 'output-line choice';
            menu2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - For those who know the basics (lessons 13-24)';
            history.appendChild(menu2);
            
            const menu3 = document.createElement('div');
            menu3.className = 'output-line choice';
            menu3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Advanced bash (lessons 25-36)';
            history.appendChild(menu3);
            
            const menu4 = document.createElement('div');
            menu4.className = 'output-line choice';
            menu4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menu4);
            
            const menu5 = document.createElement('div');
            menu5.className = 'output-line choice';
            menu5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menu5);
            
            const menu6 = document.createElement('div');
            menu6.className = 'output-line choice';
            menu6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menu6);
            
            output.scrollTop = output.scrollHeight;
            addLine('');
            addCharacterMessage("Click on a choice or type --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit!");
        }
        
        async function startTrack(trackName) {
            track = trackName;
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                if (savedLevel > 0 && savedLevel <= 12) {
                    currentLevel = savedLevel - 1;
                }
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                if (savedLevel > 12 && savedLevel <= 24) {
                    currentLevel = savedLevel - 13;
                }
            } else {
                levels = expertLevels;
                if (savedLevel > 24 && savedLevel <= 36) {
                    currentLevel = savedLevel - 25;
                }
            }
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            if (trackName === 'beginner') {
                if (currentLevel > 0) {
                    addCharacterMessage("Welcome back, matey! I see ye've been here before. Let's continue yer adventure from level " + (currentLevel + 1) + "!");
                } else {
                    addCharacterMessage("Excellent choice! We're starting from scratch - perfect for beginners! I'll be right here with ye the whole way. Let's begin yer bash adventure!");
                }
                addLine('');
                if (currentLevel === 0) {
                    addCharacterMessage("First, let's learn how to print things. In bash, we use echo to output text to the screen.");
                }
            } else if (trackName === 'intermediate') {
                addCharacterMessage("Welcome back, kid! Ye've got the basics down - now let's take it to the next level! We'll dive into arithmetic, arrays, functions, and more!");
                addLine('');
                addCharacterMessage("Let's start with arithmetic - bash can do math!");
            } else {
                addCharacterMessage("Welcome to EXPERT mode, kid! Ye've mastered the fundamentals - now let's learn the advanced techniques that true bash ninjas use!");
                addLine('');
                addCharacterMessage("Let's start with named pipes - one of bash's most powerful features!");
            }
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await showLevel();
        }
        
        function addCharacterMessage(text) {
            const line = document.createElement('div');
            line.className = 'output-line';
            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function updateBreadcrumb() {
            breadcrumb.innerHTML = '<span class="breadcrumb-item" data-cmd="--start">--start</span> > Level ' + (currentLevel + 1);
        }
        
        async function handleCommand(cmd) {
            cmd = cmd.trim();
            if (!cmd) return;
            
            addUserInput(cmd);
            
            // Run bash code in the bottom pane
            await runBashCode(cmd);
            
            if (cmd === '--start' || cmd === '--restart') {
                startGame();
                return;
            }
            
            if (cmd === '--beginner') {
                await startTrack('beginner');
                return;
            }
            
            if (cmd === '--intermediate') {
                await startTrack('intermediate');
                return;
            }
            
            if (cmd === '--expert') {
                await startTrack('expert');
                return;
            }
            
            if (cmd === '--fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
                return;
            }
            
            if (cmd === '--darkmode') {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = newTheme === 'dark';
                // Save to server if logged in
                if (userId) {
                    try {
                        await fetch('/api/auth.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'action=updateTheme&theme=' + newTheme,
                            credentials: 'include'
                        });
                    } catch (e) {}
                }
                addCharacterMessage("Theme switched to " + newTheme + " mode!");
                return;
            }
            
            if (cmd === '--exit') {
                window.location.href = '../index.html';
                return;
            }
            
            if (cmd === '--help') {
                addCharacterMessage("Type --start to return to the main menu!");
                addCharacterMessage("Type --beginner for beginner lessons (1-12)");
                addCharacterMessage("Type --intermediate for intermediate lessons (13-24)");
                addCharacterMessage("Type --expert for expert lessons (25-36)");
                addCharacterMessage("Type --fullscreen to toggle fullscreen mode");
                addCharacterMessage("Type --darkmode to toggle dark/light mode");
                addCharacterMessage("Type --exit to go back to homepage");
                addCharacterMessage("Type --level to see yer current level");
                addCharacterMessage("Type --hint if ye're stuck");
                return;
            }
            
            if (cmd === '--level') {
                addLine('Current level: ' + (currentLevel + 1) + ' - ' + levels[currentLevel].title);
                return;
            }
            
            if (cmd === '--skip') {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    if (track === 'beginner') {
                        addCharacterMessage("Ye finished all the beginner levels! Type --intermediate to continue yer journey!");
                    } else if (track === 'intermediate') {
                        addCharacterMessage("Ye finished all the intermediate levels! Type --expert to continue to master level!");
                    } else {
                        addCharacterMessage("Ye finished all the expert levels! Yer a bash legend now! Type --beginner to start over!");
                    }
                    return;
                }
                showLevel();
                return;
            }
            
            if (cmd === '--hint') {
                addCharacterMessage("No worries, kid! The hint be: " + levels[currentLevel].hint);
                return;
            }
            
            if (checkAnswer(cmd)) {
                await showSuccess();
                currentLevel++;
                
                // Save progress to account if logged in
                let totalLevel = currentLevel;
                if (track === 'intermediate') totalLevel = currentLevel + 12;
                if (track === 'expert') totalLevel = currentLevel + 24;
                saveProgress(totalLevel);
                
                if (currentLevel >= levels.length) {
                    addLine('');
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    if (track === 'beginner') {
                        addCharacterMessage("CONGRATULATIONS, KID! Ye did it! Ye completed all 12 beginner levels! I'm so incredibly proud of ye! Type --intermediate to continue yer journey, or --start to sail again!");
                    } else if (track === 'intermediate') {
                        addCharacterMessage("CAPTAIN! Ye did it! Ye completed all 12 intermediate levels! Type --expert to continue to master level, or --start to sail again!");
                    } else {
                        addCharacterMessage("LEGEND! Ye did it! Ye completed all 12 expert levels! Yer a bash master now! I'm SO incredibly proud of ye! Type --beginner to start over, or keep practicing!");
                    }
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    addLine('');
                } else {
                    setTimeout(() => showLevel(), 1500);
                }
            } else {
                addCharacterMessage("Hmm, that ain't quite right, kid. Try again! Remember - just type what I showed ye. Ye've got this!");
            }
        }
        
        input.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            }
        });
        
        // Mobile run button
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            });
        }
        
        document.querySelectorAll('.breadcrumb-item').forEach(el => {
            el.addEventListener('click', function() {
                const cmd = this.getAttribute('data-cmd');
                handleCommand(cmd);
            });
        });
        
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        startGame();
    </script>
