<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta http-equiv="onion-location" content="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion/terms/term-docker.html" />
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var theme = saved || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script src="../theme.js"></script>
    <meta charset="UTF-8">
    <meta name="author" content="cjboon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Tutor - Rebel with Linux</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #1a1a1a; color: #cccccc; font-family: 'Courier New', monospace; font-size: 15px; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .terminal-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .left-pane { border-right: 2px solid #444444; }
        .terminal-header { background: #333333; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #666666; }
        .dot-yellow { background: #888888; }
        .dot-green { background: #aaaaaa; }
        .terminal-title { margin-left: 1rem; color: #cccccc; font-size: 0.85rem; }
        .pane-label { background: #333333; padding: 0.5rem 1rem; color: #cccccc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-area { flex: 1; display: flex; flex-direction: column; padding: 1rem; background: #1a1a1a; }
        .input-label { color: #aaaaaa; margin-bottom: 0.5rem; font-size: 0.9rem; }
        #command-input { flex: 1; width: 100%; background: transparent; border: none; color: #cccccc; font-family: 'Courier New', monospace; font-size: 15px; resize: none; outline: none; }
        .hint { color: #666666; font-size: 0.75rem; margin-top: 0.5rem; }
        .docker-output-area { flex: 1; border-top: 2px solid #444444; padding: 0.5rem; background: #222222; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; min-height: 100px; }
        .docker-output-line { color: #aaaaaa; margin-bottom: 0.25rem; white-space: pre-wrap; }
        .docker-error-line { color: #cc6666; margin-bottom: 0.25rem; }
        .docker-success-line { color: #b5bd68; margin-bottom: 0.25rem; }
        .terminal-pane.right-pane { flex: 1; }
        .output-area { flex: 1; padding: 1rem; overflow-y: auto; background: #1e1e1e; }
        .message { margin-bottom: 1rem; line-height: 1.5; }
        .message .speaker { color: #f0c674; font-weight: bold; margin-bottom: 0.25rem; }
        .message .text { color: #b5bd68; }
        .message .text.fail { color: #cc6666; }
        .message .text.hint { color: #81a2be; font-style: italic; }
        .message .text.success { color: #b5bd68; }
        .level-title { color: #f0c674; font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; background: #2d2d2d; border-left: 3px solid #f0c674; }
        /* Light mode overrides */
        [data-theme="light"] body { background: #f5f5f5; color: #1a1a1a; }
        [data-theme="light"] .terminal-header { background: #e0e0e0; }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: #1a1a1a; }
        [data-theme="light"] .pane-label { background: #e0e0e0; }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .docker-output-area { background: #ffffff; color: #1a1a1a; }
        [data-theme="light"] .docker-output-area { background: #f5f5f5; border-top-color: #cccccc; }
        [data-theme="light"] #command-input { color: #1a1a1a; }
        [data-theme="light"] .input-label { color: #444444; }
        [data-theme="light"] .left-pane { border-right: 2px solid #cccccc; }
        [data-theme="light"] .hint { color: #666666; }
        [data-theme="light"] .docker-output-line { color: #333333; }
        [data-theme="light"] .message .speaker { color: #b58900; }
        [data-theme="light"] .message .text { color: #859900; }
        [data-theme="light"] .message .text.fail { color: #dc322f; }
        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: #eee8d5; color: #b58900; border-left-color: #b58900; }
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .terminal-pane { flex: none; height: 50vh; }
            .right-pane { border-bottom: 2px solid #444444; }
            .left-pane { border-right: none; border-top: 2px solid #444444; }
            body { font-size: 14px; }
            .terminal-header { padding: 8px; }
            .terminal-title { font-size: 12px; }
            textarea { min-height: 60px !important; font-size: 14px !important; }
            .mobile-run-btn { display: block !important; }
        }
        .mobile-run-btn { display: none; background: #2d5016; color: #98c379; border: none; padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">Docker Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type docker command:</div>
                <textarea id="command-input" placeholder="docker run hello-world" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="docker-output-area" id="docker-output">
                <div class="docker-output-line" style="color: #586e75;">Docker output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const dockerOutput = document.getElementById('docker-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=docker');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'docker', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addDockerLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'docker-error-line' : type === 'success' ? 'docker-success-line' : 'docker-output-line';
            line.textContent = text;
            dockerOutput.appendChild(line);
            dockerOutput.scrollTop = dockerOutput.scrollHeight;
        }
        
        function clearDockerOutput() { dockerOutput.innerHTML = ''; }
        
        function runDocker(cmd) {
            addDockerLine('$ ' + cmd);
            
            const responses = {
                "docker run": "Unable to find image 'hello-world:latest' locally\nlatest: Pulling from library/hello-world\ndocker.io/library/hello-world:latest\nStatus: Downloaded newer image for hello-world:latest",
                "docker ps": "CONTAINER ID   IMAGE          COMMAND   CREATED   STATUS   PORTS   NAMES",
                "docker ps -a": "CONTAINER ID   IMAGE          COMMAND    CREATED    STATUS    PORTS   NAMES\n1a2b3c4d5e6f   nginx          \"/entrypoint.sh\"   2 hours ago   Up 2 hours   80/tcp   web",
                "docker images": "REPOSITORY   TAG       IMAGE ID       CREATED       SIZE\nnginx         latest    a6bd71f48f68   2 weeks ago   187MB",
                "docker pull": "latest: Pulling from library/alpine\ndocker.io/library/alpine:latest\nStatus: Image is up to date for alpine:latest",
                "docker build": "Sending build context to Docker daemon  2.048kB\nStep 1/2 : FROM alpine:latest\n ---> be4d7ee7f2a6\nStep 2/2 : CMD echo Hello",
                "docker exec": "root@container:/# ls\nbin  etc  home  lib  media  mnt  proc  root  sys  tmp  usr  var",
                "-it": "Attaching to container...",
                "-d": "Container started in detached mode",
                "-p 8080:80": "Port 8080 mapped to container port 80",
                "-v": "Volume mounted successfully",
                "-e": "Environment variable set",
                "--name": "Container named successfully",
                "docker stop": "Stopping container...",
                "docker rm": "Container removed",
                "docker rmi": "Image removed",
                "docker logs": "Logs retrieved for container",
                "docker network": "Network operations",
                "docker-compose": "docker-compose version 2.0.0"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addDockerLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('docker')) {
                    addDockerLine('Command executed');
                    matched = true;
                } else {
                    addDockerLine('Try: docker run hello-world', 'error');
                }
            }
        }
        
        const character = {
            name: "Docker Dave",
            greeting: "Howdy! I'm Docker Dave - your container companion! Docker packages applications with their dependencies into containers - portable, isolated environments. Build once, run anywhere! Let's containerize everything!",
            encourage: ["Excellent!", "Container created!", "You're a DevOps hero!", "Keep containerizing!", "Ship it!", "Brilliant!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Hello Docker", intro: "Welcome! Let's start with the basics. docker run pulls an image and creates a container.", content: "Run hello-world:\ndocker run hello-world", hint: "Type: docker run hello-world", answer: "docker run", success: "Container created! Docker pulled the image automatically. That's the power of Docker - sharing pre-built images!", type: "contains" },
            { id: 2, title: "List Containers", intro: "docker ps shows running containers. Use -a to see ALL containers including stopped ones.", content: "Show all containers:\ndocker ps -a", hint: "Type: docker ps -a", answer: "docker ps -a", success: "All containers shown! -a means 'all'. Stopped containers remain on disk until you remove them!", type: "contains" },
            { id: 3, title: "List Images", intro: "docker images shows downloaded images on your system.", content: "List images:\ndocker images", hint: "Type: docker images", answer: "docker images", success: "Images listed! Each image has REPOSITORY, TAG, and SIZE. Tags are versions - latest is default!", type: "contains" },
            { id: 4, title: "Pull an Image", intro: "docker pull downloads an image without running it.", content: "Pull alpine:\ndocker pull alpine", hint: "Type: docker pull alpine", answer: "docker pull", success: "Alpine downloaded! Alpine is a tiny Linux distro - great for small containers!", type: "contains" },
            { id: 5, title: "Run Interactively", intro: "Use -it for interactive terminal access to a container.", content: "Run alpine interactively:\ndocker run -it alpine sh", hint: "Type: docker run -it alpine", answer: "docker run -it", success: "Interactive shell! -i (interactive) + -t (terminal). Now you're IN the container!", type: "contains" },
            { id: 6, title: "Detached Mode", intro: "Use -d to run containers in the background (detached).", content: "Run nginx detached:\ndocker run -d nginx", hint: "Type: docker run -d", answer: "docker run -d", success: "Nginx running in background! Use docker ps to check it's running!", type: "contains" },
            { id: 7, title: "Port Mapping", intro: "Containers are isolated. Use -p host:container to expose ports.", content: "Map port 8080 to 80:\ndocker run -d -p 8080:80 nginx", hint: "Type: -p 8080:80", answer: "-p 8080:80", success: "Port mapped! Now localhost:8080 goes to container port 80. Access your app from the host!", type: "contains" },
            { id: 8, title: "Name Your Container", intro: "Containers get random names. Use --name to give them meaningful names.", content: "Name your container:\ndocker run -d --name web nginx", hint: "Type: --name web", answer: "--name", success: "Named container! Naming makes management easier - docker stop web is cleaner than docker stop my_cool_container!", type: "contains" },
            { id: 9, title: "Environment Variables", intro: "Use -e to pass environment variables into the container.", content: "Set env var:\ndocker run -e APP_ENV=production alpine sh", hint: "Type: -e APP_ENV", answer: "-e", success: "Env var passed! Many images use env vars for configuration - databases, APIs, secrets!", type: "contains" },
            { id: 10, title: "View Logs", intro: "docker logs shows the output from a container.", content: "View container logs:\ndocker logs web", hint: "Type: docker logs", answer: "docker logs", success: "Logs retrieved! Essential for debugging - what did your app print? What went wrong?", type: "contains" },
            { id: 11, title: "Stop and Start", intro: "Stop a running container, then start it again.", content: "Stop and start:\ndocker stop web && docker start web", hint: "Type: docker stop", answer: "docker stop", success: "Container stopped! docker start restarts it. Containers persist until removed!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Run a named, detached nginx with port mapping!", content: "Challenge:\ndocker run -d --name site -p 8080:80 nginx", hint: "Type: docker run -d --name", answer: "docker run -d --name", success: "BEGINNER COMPLETE! You can: run, list, pull, name containers, map ports, view logs! Docker hero!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Remove Containers", intro: "INTERMEDIATE! docker rm removes containers. Use -f to force remove running ones.", content: "Remove container:\ndocker rm -f web", hint: "Type: docker rm -f", answer: "docker rm", success: "Container removed! -f forces removal even if running. Always clean up unused containers!", type: "contains" },
            { id: 2, title: "Remove Images", intro: "docker rmi removes images. docker system prune cleans everything unused.", content: "Remove image:\ndocker rmi nginx", hint: "Type: docker rmi", answer: "docker rmi", success: "Image removed! Free up disk space with docker system prune -a for even more!", type: "contains" },
            { id: 3, title: "Execute in Container", intro: "docker exec runs commands in a running container.", content: "Execute shell in container:\ndocker exec -it web sh", hint: "Type: docker exec -it", answer: "docker exec", success: "Shell in container! You can exec into any running container - debugging made easy!", type: "contains" },
            { id: 4, title: "Copy Files", intro: "docker cp copies files between host and container.", content: "Copy to container:\ndocker cp index.html web:/usr/share/nginx/html/", hint: "Type: docker cp", answer: "docker cp", success: "File copied! docker cp web:/path/to/file . copies FROM container TO host!", type: "contains" },
            { id: 5, title: "Inspect Container", intro: "docker inspect shows detailed JSON info about a container.", content: "Inspect container:\ndocker inspect web", hint: "Type: docker inspect", answer: "docker inspect", success: "Full details! IP address, mounts, env vars, network settings - everything about the container!", type: "contains" },
            { id: 6, title: "Container Stats", intro: "docker stats shows real-time CPU/memory usage of containers.", content: "View stats:\ndocker stats", hint: "Type: docker stats", answer: "docker stats", success: "Live stats! See which containers are using the most resources. Essential for monitoring!", type: "contains" },
            { id: 7, title: "Build an Image", intro: "docker build creates an image from a Dockerfile.", content: "Build image:\ndocker build -t myapp .", hint: "Type: docker build -t", answer: "docker build", success: "Image built! -t tags it with a name. The Dockerfile defines what goes in your image!", type: "contains" },
            { id: 8, title: "Volume Mounts", intro: "Use -v to mount host directories into the container for persistence.", content: "Mount volume:\ndocker run -v /data:/data alpine sh", hint: "Type: -v /data:/data", answer: "-v", success: "Volume mounted! Host /data maps to container /data. Data persists after container removal!", type: "contains" },
            { id: 9, title: "Network Create", intro: "docker network creates isolated networks for containers.", content: "Create network:\ndocker network create mynet", hint: "Type: docker network create", answer: "docker network create", success: "Network created! Containers on the same network can communicate by name!", type: "contains" },
            { id: 10, title: "Connect to Network", intro: "Connect containers to networks for inter-container communication.", content: "Run on network:\ndocker run --network mynet -d nginx", hint: "Type: --network", answer: "--network", success: "On the network! Containers can now reach each other by name - like a private LAN!", type: "contains" },
            { id: 11, title: "Docker Compose Intro", intro: "docker-compose manages multi-container applications with a YAML file.", content: "Compose up:\ndocker-compose up -d", hint: "Type: docker-compose up", answer: "docker-compose", success: "Composed! One command starts everything defined in docker-compose.yml!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Create a network, run containers on it, and verify connectivity!", content: "Challenge:\ndocker network create net && docker run --network net --name app -d alpine sh", hint: "Type: docker network create", answer: "docker network create", success: "INTERMEDIATE COMPLETE! You master: rm/rmi, exec, cp, inspect, stats, build, volumes, networks, compose! Docker MASTER! Type --expert when ready for advanced orchestration!", type: "starts" }
        ];
        
        const expertLevels = [
            { id: 25, title: "Dockerfile Best Practices", intro: "EXPERT MODE! Learn to write efficient, secure Dockerfiles!", content: "Multi-stage build:\nFROM golang:1.21 AS builder\nWORKDIR /src\nCOPY . .\nRUN go build -o app\n\nFROM alpine\nCOPY --from=builder /src/app /app\nCMD /app", hint: "Type: FROM golang AS builder", answer: "FROM golang AS builder", success: "Multi-stage build! Build in golang, copy binary to small alpine. Smaller final image!", type: "contains" },
            { id: 26, title: "Healthchecks in Dockerfile", intro: "HEALTHCHECK tells Docker how to test if your container is healthy!", content: "Add healthcheck:\nHEALTHCHECK --interval=30s --timeout=3s CMD curl -f http://localhost/ || exit 1", hint: "Type: HEALTHCHECK", answer: "HEALTHCHECK", success: "Healthcheck added! Docker pings your app every 30s. Essential for production!", type: "contains" },
            { id: 27, title: "Resource Limits", intro: "Limit CPU and memory for containers with docker run options!", content: "Set resource limits:\ndocker run -d --name limited -m 512m --cpus 0.5 nginx", hint: "Type: -m 512m --cpus", answer: "-m 512m --cpus", success: "Resources limited! 512MB RAM, 0.5 CPU. Prevents containers from hogging resources!", type: "contains" },
            { id: 28, title: "Docker Secrets", intro: "Docker Swarm secrets securely store sensitive data!", content: "Create secret:\necho \"mypassword\" | docker secret create db_pass -", hint: "Type: docker secret create", answer: "docker secret create", success: "Secret created! Secrets are encrypted at rest and in transit. Safer than env vars!", type: "contains" },
            { id: 29, title: "Docker Config", intro: "Docker Config for non-sensitive configuration!", content: "Create config:\ndocker config create nginx.conf nginx.conf", hint: "Type: docker config create", answer: "docker config create", success: "Config created! Similar to secrets but for config files. Decrypted at runtime!", type: "contains" },
            { id: 30, title: "Docker Stack Deploy", intro: "Deploy entire stack with docker stack deploy!", content: "Deploy stack:\ndocker stack deploy -c docker-compose.yml myapp", hint: "Type: docker stack deploy", answer: "docker stack deploy", success: "Stack deployed! docker stack manages services, secrets, configs all at once!", type: "contains" },
            { id: 31, title: "Docker Service Scaling", intro: "Scale services up/down with docker service scale!", content: "Scale service:\ndocker service scale myapp_web=5", hint: "Type: docker service scale", answer: "docker service scale", success: "Service scaled! 5 replicas now running. Swarm distributes across nodes!", type: "contains" },
            { id: 32, title: "Docker System Prune", intro: "Clean up unused Docker resources with docker system prune!", content: "Prune everything:\ndocker system prune -a --volumes", hint: "Type: docker system prune", answer: "docker system prune", success: "Clean slate! -a removes all images, --volumes removes volumes too. Free up disk space!", type: "contains" },
            { id: 33, title: "Docker History", intro: "See how an image was built with docker history!", content: "View image layers:\ndocker history nginx:latest", hint: "Type: docker history", answer: "docker history", success: "Layers shown! See each layer size and creation. Optimize your Dockerfiles!", type: "contains" },
            { id: 34, title: "Docker Inspect", intro: "Deep dive into container/image details with docker inspect!", content: "Inspect container:\ndocker inspect --format='{{.NetworkSettings.IPAddress}}' web", hint: "Type: docker inspect --format", answer: "docker inspect --format", success: "Specific field! --format templates extract exactly what you need. No more grepping JSON!", type: "contains" },
            { id: 35, title: "Docker Events", intro: "Monitor Docker events in real-time!", content: "Watch events:\ndocker events --filter 'type=container'", hint: "Type: docker events", answer: "docker events", success: "Events streaming! See create, start, stop, die in real-time. Debugging essential!", type: "contains" },
            { id: 36, title: "Expert Finale - Master Containerizer", intro: "You've mastered Docker! Let's combine everything - multi-stage, secrets, scaling!", content: "Ultimate challenge:\ndocker build -t myapp . && docker run -d -p 8080:80 --health-cmd='curl localhost' --memory=256m --cpus=0.5 myapp", hint: "Type: docker build -t", answer: "docker build -t", success: "EXPERT COMPLETE! Multi-stage builds, healthchecks, resource limits, Compose! You're a TRUE Docker captain! Docker Dave is impressed - go forth and containerize the world!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! Docker levels complete! You're a container master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: run, ps, images, pull, ports. I'll make you a container hero!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: rm/rmi, exec, networks, volumes, build, compose!"); }
            else if (trackName === 'expert') { levels = expertLevels; await showMessage(character.name, "Welcome to EXPERT mode! Multi-stage builds, secrets, healthchecks, Swarm! Time to become a container captain!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearDockerOutput();
                runDocker(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearDockerOutput();
                runDocker(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: run, ps, images, ports (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: rm, exec, networks, volumes (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Master: multi-stage, secrets, Swarm (lessons 25-36)';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv5);
            
            const menuDiv6 = document.createElement('div');
            menuDiv6.className = 'output-line choice';
            menuDiv6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv6);
            
            await showMessage(character.name, "Type --beginner, --intermediate, or --expert to start! Or click the options above. Use --fullscreen, --darkmode, or --exit anytime!", '', true);
        }
        init();
    </script>
