        [data-theme="light"] .message .text.hint { color: #268bd2; }

<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">HTML Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type HTML tag:</div>
                <textarea id="command-input" placeholder="<h1>" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="html-output-area" id="html-output">
                <div class="html-output-line" style="color: #586e75;">HTML preview will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const htmlOutput = document.getElementById('html-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=html');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'html', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addHtmlLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'html-error-line' : 'html-output-line';
            line.textContent = text;
            htmlOutput.appendChild(line);
            htmlOutput.scrollTop = htmlOutput.scrollHeight;
        }
        
        function clearHtmlOutput() { htmlOutput.innerHTML = ''; }
        
        function runHtml(cmd) {
            addHtmlLine('$ ' + cmd);
            
            const responses = {
                '<h1>': '[Preview] Heading 1 text',
                '<h2>': '[Preview] Heading 2 text',
                '<h3>': '[Preview] Heading 3 text',
                '<p>': '[Preview] Paragraph text',
                '<div>': '[Preview] Div block',
                '<span>': '[Preview] Span inline',
                '<a href': '[Preview] Link element',
                '<img': '[Preview] Image element',
                '<ul>': '[Preview] Unordered list',
                '<ol>': '[Preview] Ordered list',
                '<li>': '[Preview] List item',
                '<table>': '[Preview] Table element',
                '<form>': '[Preview] Form element',
                '<input': '[Preview] Input field',
                '<button>': '[Preview] Button element',
                '<br>': '[Preview] Line break',
                '<hr>': '[Preview] Horizontal rule',
                '<strong>': '[Preview] Bold text',
                '<em>': '[Preview] Italic text'
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addHtmlLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.startsWith('<') && cmd.endsWith('>')) {
                    addHtmlLine('[Preview] HTML element rendered');
                    matched = true;
                } else {
                    addHtmlLine('HTML tags start with < and end with >', 'error');
                }
            }
        }
        
        const character = {
            name: "HTML Hannah",
            greeting: "Hey! I'm HTML Hannah - web structure specialist! HTML is the skeleton of every webpage. Learn to build structured documents with tags, elements, and attributes. Let's create some markup!",
            encourage: ["Perfect markup!", "Tag team champion!", "Semantic structure!", "Web builder!", "DOM ready!", "Markup master!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Document Structure", intro: "Welcome! Every HTML page starts with a doctype and html tag. Let's build your first page!", content: "Start a page:\n<!DOCTYPE html>\n<html>\n</html>", hint: "Type: <html>", answer: "<html>", success: "HTML document started! Everything goes between <html> and </html>", type: "contains" },
            { id: 2, title: "Head Section", intro: "The <head> contains meta info - title, links, scripts. Not visible content!", content: "Add head section:\n<head>\n<title>My Page</title>\n</head>", hint: "Type: <head>", answer: "<head>", success: "Head section added! Meta info lives here - invisible but essential!", type: "contains" },
            { id: 3, title: "Page Title", intro: "The <title> tag sets the browser tab text. Important for SEO!", content: "Add page title:\n<title>My Website</title>", hint: "Type: <title>", answer: "<title>", success: "Title added! This appears in browser tabs and search results!", type: "contains" },
            { id: 4, title: "Body Section", intro: "The <body> is where visible content goes. Everything users see is here!", content: "Add body:\n<body>\nHello World\n</body>", hint: "Type: <body>", answer: "<body>", success: "Body section! All visible content lives here - text, images, videos!", type: "contains" },
            { id: 5, title: "Headings h1-h6", intro: "Headings organize content. <h1> is most important - usually the page title!", content: "Add main heading:\n<h1>Welcome</h1>", hint: "Type: <h1>", answer: "<h1>", success: "Heading 1! Use only one per page for main title - search engines love this!", type: "contains" },
            { id: 6, title: "Paragraphs", intro: "<p> creates paragraphs. Browser adds margin between them automatically!", content: "Add paragraph:\n<p>This is a paragraph.</p>", hint: "Type: <p>", answer: "<p>", success: "Paragraph created! Browsers auto-space between paragraphs!", type: "contains" },
            { id: 7, title: "Line Breaks", intro: "<br> creates a line break without starting a new paragraph!", content: "Add line break:\nLine one<br>\nLine two", hint: "Type: <br>", answer: "<br>", success: "Line break! <br> is self-closing - no </br> needed!", type: "contains" },
            { id: 8, title: "Bold Text", intro: "<strong> makes text bold - indicates importance!", content: "Bold important text:\n<strong>Warning!</strong>", hint: "Type: <strong>", answer: "<strong>", success: "Bold! <strong> also conveys meaning to screen readers!", type: "contains" },
            { id: 9, title: "Italic Text", intro: "<em> makes text italic - indicates emphasis!", content: "Italic emphasis:\n<em>Important point</em>", hint: "Type: <em>", answer: "<em>", success: "Italic! <em> adds emphasis that screen readers note!", type: "contains" },
            { id: 10, title: "Unordered Lists", intro: "<ul> creates bulleted lists. Each item is wrapped in <li>", content: "Create list:\n<ul>\n<li>Item 1</li>\n<li>Item 2</li>\n</ul>", hint: "Type: <ul>", answer: "<ul>", success: "Unordered list! <ul> for bullets, <ol> for numbers!", type: "contains" },
            { id: 11, title: "Links", intro: "<a> creates links. href attribute specifies the destination!", content: "Add a link:\n<a href=\"https://example.com\">Click me</a>", hint: "Type: <a href=", answer: "<a href=", success: "Link created! href is the most important link attribute!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Build a page with heading, paragraph, and link!", content: "Complete page:\n<h1>My Page</h1>\n<p>Welcome!</p>\n<a href=\"#\">Learn more</a>", hint: "Type: <h1>", answer: "<h1>", success: "BEGINNER COMPLETE! You master: html, head, body, h1, p, a! Web pages are YOUR canvas!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Images", intro: "INTERMEDIATE! <img> displays images. It's self-closing with src and alt attributes!", content: "Add image:\n<img src=\"photo.jpg\" alt=\"My photo\">", hint: "Type: <img", answer: "<img", success: "Image added! Always include alt - it's essential for accessibility!", type: "contains" },
            { id: 2, title: "Divs", intro: "<div> is a block-level container for grouping content!", content: "Group content:\n<div>\n<h2>Section</h2>\n<p>Content</p>\n</div>", hint: "Type: <div>", answer: "<div>", success: "Div created! Great for organizing layout sections!", type: "contains" },
            { id: 3, title: "Spans", intro: "<span> is inline container - styles part of text without breaking flow!", content: "Style inline:\n<p>Hello <span class=\"highlight\">World</span></p>", hint: "Type: <span>", answer: "<span>", success: "Span used! Inline container for styling within text!", type: "contains" },
            { id: 4, title: "Horizontal Rules", intro: "<hr> creates a horizontal line - great for separating content!", content: "Add separator:\n<section>\nContent\n<hr>\nMore content\n</section>", hint: "Type: <hr>", answer: "<hr>", success: "Horizontal rule! Self-closing tag for visual separation!", type: "contains" },
            { id: 5, title: "Ordered Lists", intro: "<ol> creates numbered lists instead of bullets!", content: "Numbered list:\n<ol>\n<li>First</li>\n<li>Second</li>\n</ol>", hint: "Type: <ol>", answer: "<ol>", success: "Ordered list! Numbers instead of bullets - great for steps!", type: "contains" },
            { id: 6, title: "Tables", intro: "<table> creates tabular data. Rows (<tr>) contain cells (<td>)!", content: "Create table:\n<table>\n<tr><td>Cell 1</td><td>Cell 2</td></tr>\n</table>", hint: "Type: <table>", answer: "<table>", success: "Table created! Great for data - not for layout!", type: "contains" },
            { id: 7, title: "Forms", intro: "<form> wraps input elements. action specifies where to send data!", content: "Create form:\n<form action=\"/submit\">\n<input name=\"email\">\n<button>Send</button>\n</form>", hint: "Type: <form>", answer: "<form>", success: "Form created! action is where data goes, method is how!", type: "contains" },
            { id: 8, title: "Input Fields", intro: "<input> creates form controls. type attribute changes behavior!", content: "Text input:\n<input type=\"text\" name=\"username\">", hint: "Type: <input", answer: "<input", success: "Input added! types: text, email, password, number, and more!", type: "contains" },
            { id: 9, title: "Buttons", intro: "<button> creates clickable buttons. More styling options than input type=button!", content: "Add button:\n<button type=\"submit\">Submit</button>", hint: "Type: <button>", answer: "<button>", success: "Button created! button type defaults to submit inside forms!", type: "contains" },
            { id: 10, title: "Semantic Header", intro: "<header> is semantic - describes content meaning to browsers!", content: "Add header:\n<header>\n<h1>Site Title</h1>\n</header>", hint: "Type: <header>", answer: "<header>", success: "Semantic header! header, nav, main, footer - describe your content!", type: "contains" },
            { id: 11, title: "Semantic Footer", intro: "    <footer id="site-footer" style="text-align: center; padding: 0 24px 12px;">
        <div style="font-size: 1.2rem; margin-bottom: 20px;">www.rebelwithlinux.com</div>
        <div style="margin-bottom: 8px;">
            <a href="../site-map.html" style="color: var(--black);">Site Map</a>
            <span style="color: var(--charcoal);"> | </span>
            <a href="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion" style="color: var(--black);">Onion Site</a>
            <span style="color: var(--charcoal);"> | </span>
            <a href="https://github.com/cjboon/rebelwithlinux" style="color: var(--black);">GitHub</a>
        </div>
    </footer>

    <div id="footer-links" style="text-align: center; padding: 0 24px 12px;">
        <a href="../about.html" style="color: var(--black);">About</a>
        <span style="color: var(--charcoal);"> | </span>
        <a href="../contact.html" style="color: var(--black);">Contact</a>
        <span style="color: var(--charcoal);"> | </span>
        <a href="../stats.html" style="color: var(--black);">Stats</a>
    </div>
", hint: "Type: <footer>", answer: "<footer>", success: "Footer added! Semantic tags help SEO and accessibility!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Build a page with image, form, and semantic structure!", content: "Complete page:\n<header><h1>Contact</h1></header>\n<form><input><button></form>\n<footer><p>&copy; 2024</p></footer>", hint: "Type: <header>", answer: "<header>", success: "INTERMEDIATE COMPLETE! You master: img, div, span, tables, forms, semantic HTML! BUILD THE WEB!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            textDiv.textContent = text;
            div.appendChild(textDiv);
            
            output.scrollTop = output.scrollHeight;
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! HTML levels complete! You're a markup master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: html, head, body, h1, p, links, lists. I'll make you a markup pro!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: img, forms, tables, semantic HTML!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                await showMessage(character.name, "Press Ctrl+Enter to run. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearHtmlOutput();
                runHtml(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearHtmlOutput();
                runHtml(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: html, head, body, headings, links (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: images, forms, tables, semantic (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit", '', true);
        }
        init();
    </script>
