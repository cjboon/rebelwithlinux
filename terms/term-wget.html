    <script>
        const input = document.getElementById('command-input');

        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=wget');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'wget', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addWgetLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'wget-error-line' : type === 'success' ? 'wget-success-line' : 'wget-output-line';
            line.textContent = text;
            wgetOutput.appendChild(line);
            wgetOutput.scrollTop = wgetOutput.scrollHeight;
        }
        
        function clearWgetOutput() { wgetOutput.innerHTML = ''; }
        
        function runWget(cmd) {
            addWgetLine('$ ' + cmd);
            
            const responses = {
                "wget https://": "--2024-01-15 10:00:00--  https://example.com/file.zip\nResolving example.com... 93.184.216.34\nConnecting to example.com|93.184.216.34|:443... connected.\nHTTP request sent, awaiting response... 200 OK\nLength: 1048576 (1.0M) [application/zip]\nSaving to: 'file.zip'\n\nfile.zip          100%[=========>]  1.00M  2.3MB/s    in 0.4s\n\n2024-01-15 10:00:01 (2.3 MB/s) - 'file.zip' saved [1048576/1048576]",

                "-v": "--2024-01-15 10:00:00--  https://example.com/file.zip\nLength: 1048576 (1.0M) [application/zip]\nSaving to: 'file.zip'\n\nfile.zip          100%[=========>]  1.00M  2.3MB/s    in 0.4s\n\n2024-01-15 10:00:01 - 'file.zip' saved [1048576/1048576]",

                "-U": "--2024-01-15 10:00:00--  https://example.com/\nUsing 'Custom-Agent/1.0' as User-Agent",
                "--no-check-certificate": "WARNING: cannot verify example.com certificate",
                "--secure-protocol": "Using TLSv1.2",
                "-r": "Downloading recursive - following links",
                "-l 1": "Maximum recursion depth 1",
                "--level=1": "Maximum recursion depth 1",
                "-k": "Links converted: 12 links changed",
                "--convert-links": "Links in downloaded files converted",
                "-p": "Downloading prerequisite files\nConverted links in 12 files",
                "-E": "Downloaded 'page.html' renamed to 'page.html'",
                "-H": "Span hosts - redirecting to other domains",
                "-D": "Accepted domains: example.com,example.org",
                "--accept": "Accepting: *.zip, *.tar.gz",
                "--reject": "Rejecting: *.jpg, *.png",
                "-i file.txt": "Reading URLs from file.txt\n--2024-01-15 10:00:00--  https://example.com/file1.zip",
                "--input-file": "Reading URLs from file",
                "-F": "Input is an HTML file - processing links",
                "--force-html": "Forcing HTML parsing of input",
                "-N": "Timestamping: comparison with server",
                "--timestamping": "Server file newer - not downloading",
                "-nc": "File 'file.zip' already there; not retrieving",
                "--no-clobber": "File already exist - skipping",
                "-np": "No parent - staying in directory",
                "-nH": "No host directories created",
                "--cut-dirs": "Removing 2 directories",
                "-nd": "No directory - all files flat"

            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addWgetLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('wget')) {
                    addWgetLine('--2024-01-15 10:00:00--  https://example.com/\nSaving to: "index.html"\n\nindex.html         100%[=========>]   4.2KB   1.2MB/s   in 0.003s\n\n2024-01-15 10:00:00 - "index.html" saved [1234/1234]');
                    matched = true;
                } else {
                    addWgetLine('Try: wget https://example.com/file.zip', 'error');
                }
            }
        }

            { id: 3, title: "Quiet Mode", intro: "-q runs wget quietly - no output unless errors.", content: "Quiet download:\nwget -q https://example.com/file.zip", hint: "Type: wget -q", answer: "wget -q", success: "Quiet! No output unless something goes wrong. Good for scripts!", type: "contains" },
            { id: 4, title: "Verbose Output", intro: "-v shows detailed download information.", content: "Verbose download:\nwget -v https://example.com/file.zip", hint: "Type: wget -v", answer: "wget -v", success: "Verbose output! Shows connection details, sizes, speeds!", type: "contains" },
            { id: 5, title: "Log to File", intro: "-o logs output to a file instead of console.", content: "Log to file:\nwget -o download.log https://example.com/file.zip", hint: "Type: wget -o", answer: "wget -o", success: "Logged! -o captures all wget output to a log file. Great for debugging!", type: "contains" },
            { id: 6, title: "Resume Download", intro: "-c continues an interrupted download from where it left off.", content: "Resume download:\nwget -c https://example.com/large-file.zip", hint: "Type: wget -c", answer: "wget -c", success: "Resumed! -c continues partial downloads. No re-downloading the whole file!", type: "contains" },

            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! wget levels complete! You're a download master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: basic download, -O, -o, -c, -b. I'll make you a fetch pro!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: recursive, -k, -p, -np, --accept!"); }
            else if (trackName === 'expert') { levels = expertLevels; await showMessage(character.name, "Welcome to EXPERT mode! Authentication, cookies, TLS, APIs! Time to become a true web fetching master!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearWgetOutput();
                runWget(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearWgetOutput();
                runWget(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: download, -O, -o, -c (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: recursive, -k, -p, --accept (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Master: auth, cookies, TLS, APIs (lessons 25-36)';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv5);
            
            const menuDiv6 = document.createElement('div');
            menuDiv6.className = 'output-line choice';
            menuDiv6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv6);
            
            await showMessage(character.name, "Type --beginner, --intermediate, or --expert to start! Or click the options above. Use --fullscreen, --darkmode, or --exit anytime!", '', true);
        }
        init();
    </script>
