        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) {
                    userId = data.email;
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=foss');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        return Math.max(...data.map(p => p.lesson_id));
                    }
                }
            } catch (e) {}
            return null;
        }
        
        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'foss', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addBashLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'bash-error-line' : 'bash-output-line';
            line.textContent = text;
            bashOutput.appendChild(line);
            bashOutput.scrollTop = bashOutput.scrollHeight;
        }
        
        function clearBashOutput() {
            bashOutput.innerHTML = '';
        }
        
        async function runBashCode(cmd) {
            addBashLine('$ ' + cmd);
            try {
                const response = await fetch('/cgi-bin/bash_exec.py', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'code=' + encodeURIComponent(cmd)
                });
                const data = await response.json();
                if (data.error) {
                    addBashLine(data.output, 'error');
                } else {
                    if (data.output) {
                        data.output.split('\n').forEach(line => addBashLine(line));
                    } else {
                        addBashLine('(no output)', 'output');
                    }
                }
            } catch (e) {
                addBashLine('Error: ' + e.message, 'error');
            }
        }

        function showMessage(text, type = 'text', delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const msg = document.createElement('div');
                    msg.className = 'message';
                    if (type === 'title') {
                        msg.innerHTML = '<div class="level-title">' + text + '</div>';
                    } else if (type === 'speaker') {
                        msg.innerHTML = '<div class="speaker">' + character.name + ':</div><div class="text ' + type + '">' + text + '</div>';
                    } else {
                        msg.innerHTML = '<div class="text ' + type + '">' + text + '</div>';
                    }
                    output.appendChild(msg);
                    output.scrollTop = output.scrollHeight;
                    resolve();
                }, delay);
            });
        }
        
        function showIntro(level, isExpert = false) {
            const levelsArray = isExpert ? intermediateLevels : beginnerLevels;
            const levelData = levelsArray[level];
            history.innerHTML = '';
            output.innerHTML = '';
            clearBashOutput();
            
            showMessage(levelData.title, 'title');
            showMessage(levelData.intro, 'text', 200);
            setTimeout(() => {
                showMessage(levelData.content, 'hint', 400);
                showMessage("Hint: " + levelData.hint, 'hint', 600);
            }, 800);
        }
        
        function showCompletion(isExpert = false) {
            history.innerHTML = '';
            showMessage("🎉 Congratulations! 🎉", 'title');
            showMessage("You've completed the " + (isExpert ? "intermediate" : "beginner") + " FOSS course!", 'success', 200);
            showMessage("Remember: FOSS is about collaboration. Share your knowledge, contribute to projects, and help others learn! Together we build better software.", 'text', 500);
            showMessage("Thank you for learning with me! " + character.getEncouragement(), 'speaker', 800);
        }
        
        function checkAnswer(userAnswer, correctAnswer, type) {
            if (type === 'contains') {
                return userAnswer.toLowerCase().includes(correctAnswer.toLowerCase());
            }
            return userAnswer.toLowerCase().trim() === correctAnswer.toLowerCase().trim();
        }
        
        async function nextLevel() {
            currentLevel++;
            const levels = currentLevel < beginnerLevels.length ? beginnerLevels : intermediateLevels;
            const isExpert = currentLevel >= beginnerLevels.length;
            const adjustedLevel = isExpert ? currentLevel - beginnerLevels.length : currentLevel;
            
            if (adjustedLevel >= levels.length) {
                if (!isExpert && beginnerLevels.length < beginnerLevels.length + intermediateLevels.length) {
                    currentLevel = beginnerLevels.length;
                    showIntro(0, true);
                } else {
                    showCompletion(isExpert);
                }
                return;
            }
            showIntro(adjustedLevel, isExpert);
        }
        
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { currentLevel = 0; showIntro(0, false); input.value = ''; return; }
                if (userAnswer === '--intermediate') { currentLevel = beginnerLevels.length; showIntro(0, true); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const isExpert = currentLevel >= beginnerLevels.length;
                const levels = isExpert ? intermediateLevels : beginnerLevels;
                const adjustedLevel = isExpert ? currentLevel - beginnerLevels.length : currentLevel;
                const level = levels[adjustedLevel];
                
                await showMessage(userAnswer, 'text');
                input.value = '';
                
                if (checkAnswer(userAnswer, level.answer, level.type)) {
                    await showMessage(level.success, 'success', 300);
                    await showMessage(character.getEncouragement(), 'speaker', 300);
                    await saveProgress(level.id);
                    setTimeout(nextLevel, 1500);
                } else {
                    await showMessage("Not quite! " + level.hint, 'hint', 300);
                }
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { currentLevel = 0; showIntro(0, false); input.value = ''; return; }
                if (userAnswer === '--intermediate') { currentLevel = beginnerLevels.length; showIntro(0, true); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const isExpert = currentLevel >= beginnerLevels.length;
                const levels = isExpert ? intermediateLevels : beginnerLevels;
                const adjustedLevel = isExpert ? currentLevel - beginnerLevels.length : currentLevel;
                const level = levels[adjustedLevel];
                
                await showMessage(userAnswer, 'text');
                input.value = '';
                
                if (checkAnswer(userAnswer, level.answer, level.type)) {
                    await showMessage(level.success, 'success', 300);
                    await showMessage(character.getEncouragement(), 'speaker', 300);
                    await saveProgress(level.id);
                    setTimeout(nextLevel, 1500);
                } else {
                    await showMessage("Not quite! " + level.hint, 'hint', 300);
                }
            });
        }
        
        async function init() {
            await checkLogin();
            const saved = await loadProgress();
            if (saved) {
                currentLevel = saved;
            }
            
            showMessage(character.greeting, 'text');
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="currentLevel = 0; showIntro(0, false);">--beginner</span> - Basics: git, licensing, community tools (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="currentLevel = beginnerLevels.length; showIntro(0, true);">--intermediate</span> - Advanced: GitHub, issues, releases (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            setTimeout(() => {
                showMessage("--beginner or --intermediate to start", 'hint', 500);
            }, 1000);
            
            showMessage("Type --beginner to start beginner course or --intermediate for intermediate!", 'speaker', 1500);
        }
        
        init();
    </script>
