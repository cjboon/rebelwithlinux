<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .terminal-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .left-pane { border-right: 2px solid var(--term-border); }
        .terminal-header { background: var(--term-header-bg); padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--term-dot-red); }
        .dot-yellow { background: var(--term-dot-yellow); }
        .dot-green { background: var(--term-dot-green); }
        .terminal-title { margin-left: 1rem; color: var(--term-text); font-size: 0.85rem; }
        .pane-label { background: var(--term-header-bg); padding: 0.5rem 1rem; color: var(--term-text); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-area { flex: 1; display: flex; flex-direction: column; padding: 1rem; background: var(--term-bg); }
        .input-label { color: var(--term-text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
        #command-input { flex: 1; width: 100%; background: transparent; border: none; color: var(--term-text); font-family: 'Courier New', monospace; font-size: 15px; resize: none; outline: none; }
        .hint { color: var(--term-text-muted); font-size: 0.75rem; margin-top: 0.5rem; }
        .find-output-area { flex: 1; border-top: 2px solid var(--term-border); padding: 0.5rem; background: var(--term-input-bg); overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; min-height: 100px; }
        .find-output-line { color: var(--term-text-muted); margin-bottom: 0.25rem; white-space: pre-wrap; }
        .find-error-line { color: #cc6666; margin-bottom: 0.25rem; }
        .terminal-pane.right-pane { flex: 1; }
        .output-area { flex: 1; padding: 1rem; overflow-y: auto; background: var(--term-bg); }
        .message { margin-bottom: 1rem; line-height: 1.5; }
        .message .speaker { color: #f0c674; font-weight: bold; margin-bottom: 0.25rem; }
        .message .text { color: #b5bd68; }
        .message .text.fail { color: #cc6666; }
        .message .text.hint { color: #81a2be; font-style: italic; }
        .message .text.success { color: #b5bd68; }
        .level-title { color: #f0c674; font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; background: var(--term-bg); border-left: 3px solid var(--term-accent, #f0c674); }
        /* Light mode overrides */
        [data-theme="light"] body { background: var(--term-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] .terminal-header { background: var(--term-header-bg-light); }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: var(--term-text-dark); }
        [data-theme="light"] .pane-label { background: var(--term-header-bg-light); }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .find-output-area { background: var(--term-input-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] .find-output-area { background: var(--term-bg-light); border-top-color: var(--term-text); }
        [data-theme="light"] #command-input { color: var(--term-text-dark); }
        [data-theme="light"] .input-label { color: var(--term-text-muted); }
        [data-theme="light"] .left-pane { border-right: 2px solid var(--term-border-light); }
        [data-theme="light"] .hint { color: var(--term-text-muted); }
        [data-theme="light"] .find-output-line { color: var(--term-text-dark); }
        [data-theme="light"] .message .speaker { color: #b58900; }
        [data-theme="light"] .message .text { color: #859900; }
        [data-theme="light"] .message .text.fail { color: #dc322f; }
        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: var(--term-bg-light); color: #b58900; border-left-color: #b58900; }
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .terminal-pane { flex: none; height: 50vh; }

<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">Find Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type find command:</div>
                <textarea id="command-input" placeholder="find . -name" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="find-output-area" id="find-output">
                <div class="find-output-line" style="color: #586e75;">Find output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const findOutput = document.getElementById('find-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=find');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'find', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addFindLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'find-error-line' : 'find-output-line';
            line.textContent = text;
            findOutput.appendChild(line);
            findOutput.scrollTop = findOutput.scrollHeight;
        }
        
        function clearFindOutput() { findOutput.innerHTML = ''; }
        
        function runFind(cmd) {
            addFindLine('$ ' + cmd);
            
            const responses = {
                "find . -name": "./documents/report.txt\n./photos/vacation.jpg\n./backup/important.zip",
                "find / -name": "/etc/passwd\n/etc/hosts\n/var/log/syslog",
                "find . -type f": "./file1.txt\n./file2.conf",
                "find . -type d": "./documents\n./photos\n./backup",
                "-name \"*.txt\"": "Found 47 .txt files",
                "-name \"*.conf\"": "Found 12 .conf files",
                "-mtime": "./backup/old.zip (modified 7 days ago)",
                "-size": "./video/large.mp4 (2.1G)",
                "-perm": "./secret.txt (permissions: 600)",
                "-user": "./owned.txt (owned by: admin)",
                "-exec": "Executing command on each result...",
                "-delete": "Deleted 3 matching files",
                "-path": "./some/path/to/file.txt",
                "-regex": "./match/pattern.txt",
                "-maxdepth": "Search limited to specified depth",
                "-mindepth": "Starting search at specified depth",
                "-empty": "Found 5 empty files",
                "-newer": "./newer.txt (modified after reference)",
                "-type l": "./symlink -> /some/file",
                "-type f -name \"*.log\"": "./server.log\n./error.log"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addFindLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('find')) {
                    addFindLine('./found/file.txt');
                    matched = true;
                } else {
                    addFindLine('Try: find . -name "*.txt"', 'error');
                }
            }
        }
        
        const character = {
            name: "Find Fiona",
            greeting: "Hey there! I'm Find Fiona - your file-finding expert! find is how you locate files on your Linux system. No more clicking through folders - with find, you search by name, type, size, date, permissions, and more! Let's become filesystem detectives!",
            encourage: ["Excellent!", "File found!", "You're a detective!", "Keep searching!", "System ninja!", "Brilliant!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Basic Find", intro: "Welcome! find searches for files. Basic syntax: find [path] [options].", content: "Search current directory:\nfind . -name \"*.txt\"", hint: "Type: find . -name", answer: "find . -name", success: "Found .txt files! . means current directory. -name matches filenames with glob patterns!", type: "contains" },
            { id: 2, title: "Search by Name", intro: "The -name option searches by filename. Use * for wildcards!", content: "Find all .conf files:\nfind /etc -name \"*.conf\"", hint: "Type: -name \"*.conf\"", answer: "-name \"*.conf\"", success: "Found .conf files in /etc! * matches anything. Wildcards are powerful!", type: "contains" },
            { id: 3, title: "Find Files Only", intro: "Use -type f to find only regular files, not directories.", content: "Find only files:\nfind . -type f -name \"*.log\"", hint: "Type: -type f", answer: "-type f", success: "Only files returned! -type f means regular files. -type d for directories!", type: "contains" },
            { id: 4, title: "Find Directories", intro: "Use -type d to find only directories.", content: "Find only directories:\nfind /var -type d -name \"log*\"", hint: "Type: -type d", answer: "-type d", success: "Found directories! Great for locating folders like /var/log!", type: "contains" },
            { id: 5, title: "Case-Insensitive Name", intro: "Use -iname for case-insensitive name matching.", content: "Find case-insensitive:\nfind . -iname \"README*\"", hint: "Type: -iname", answer: "-iname", success: "Matched README, readme, ReadMe! -iname ignores case - super useful!", type: "contains" },
            { id: 6, title: "Search by Size", intro: "The -size option finds files by size. Use + for greater than, - for less than.", content: "Find files larger than 100M:\nfind . -size +100M", hint: "Type: -size +100M", answer: "-size", success: "Found large files! +100M means over 100MB. -50k for under 50KB!", type: "contains" },
            { id: 7, title: "Search by Time", intro: "-mtime finds files by modification time. -mtime -1 means modified in last day.", content: "Find files modified today:\nfind . -mtime -1", hint: "Type: -mtime -1", answer: "-mtime", success: "Found today's files! -1 is last 24 hours. -7 is last week!", type: "contains" },
            { id: 8, title: "Search by Permissions", intro: "-perm finds files by their permission settings.", content: "Find world-writable files:\nfind . -perm -o=w", hint: "Type: -perm", answer: "-perm", success: "Found writable files! -o=w means 'other writable'. Security audit essential!", type: "contains" },
            { id: 9, title: "Search by Owner", intro: "-user finds files owned by a specific user.", content: "Find user's files:\nfind /home -user alice", hint: "Type: -user", answer: "-user", success: "Found Alice's files! Useful for auditing and cleanup!", type: "contains" },
            { id: 10, title: "Limit Depth", intro: "-maxdepth limits how deep find searches in the directory tree.", content: "Limit search depth:\nfind . -maxdepth 2 -name \"*.txt\"", hint: "Type: -maxdepth 2", answer: "-maxdepth", success: "Search limited to 2 levels! -maxdepth 1 is current dir only!", type: "contains" },
            { id: 11, title: "Combine Options with AND", intro: "You can combine multiple options. find uses AND by default.", content: "Combine conditions:\nfind . -type f -name \"*.log\" -mtime -7", hint: "Type: -type f -name", answer: "-type f -name", success: "Combined! Files (-type f) named .log modified this week. AND logic!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Find large log files modified recently!", content: "Challenge:\nfind . -type f -name \"*.log\" -size +1M -mtime -7", hint: "Type: find . -type f -name", answer: "find . -type f -name", success: "BEGINNER COMPLETE! You can: find by name, type, size, time, permissions! You're a filesystem detective!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "OR Logic with -o", intro: "INTERMEDIATE! Use -o for OR logic in your searches.", content: "Find by extension OR:\nfind . -name \"*.txt\" -o -name \"*.log\"", hint: "Type: -o", answer: "-o", success: "Matched both types! -o means OR. Essential for flexible searches!", type: "contains" },
            { id: 2, title: "NOT Logic with !", intro: "Use ! to negate a condition - find files NOT matching.", content: "Exclude .bak files:\nfind . ! -name \"*.bak\"", hint: "Type: ! -name", answer: "!", success: "Excluded .bak! ! negates any condition. Powerful exclusion!", type: "contains" },
            { id: 3, title: "Execute on Results", intro: "-exec runs a command on each result. {} is the filename placeholder.", content: "List file details:\nfind . -name \"*.txt\" -exec ls -la {} \\;", hint: "Type: -exec", answer: "-exec", success: "Listed each .txt! {} is replaced by each filename. \\; ends -exec!", type: "contains" },
            { id: 4, title: "Execute with +", intro: "-exec with + is more efficient - batches filenames together.", content: "Batch delete:\nfind . -name \"*.tmp\" -exec rm {} +", hint: "Type: -exec rm {} +", answer: "-exec rm {}", success: "Batch removal! + is faster than \\; - runs rm with multiple files!", type: "contains" },
            { id: 5, title: "Find Empty Files", intro: "-empty finds files that are empty (0 bytes) or directories with no contents.", content: "Find empty files:\nfind . -empty", hint: "Type: -empty", answer: "-empty", success: "Found empty items! Great for cleanup - find and delete junk!", type: "contains" },
            { id: 6, title: "Find Symlinks", intro: "-type l finds symbolic links.", content: "Find symlinks:\nfind /usr -type l", hint: "Type: -type l", answer: "-type l", success: "Found symlinks! -type l means symbolic link. Where do they point?", type: "contains" },
            { id: 7, title: "Newer Than Reference", intro: "-newer finds files modified after a reference file.", content: "Find files newer than file.txt:\nfind . -newer file.txt", hint: "Type: -newer", answer: "-newer", success: "Found newer files! Perfect for 'what changed after my last backup'!", type: "contains" },
            { id: 8, title: "Find by Links", intro: "-links counts hard links. -links +1 finds files with multiple links.", content: "Find hard-linked files:\nfind . -links +1", hint: "Type: -links +1", answer: "-links", success: "Found hard-linked files! +1 means more than 1 link!", type: "contains" },
            { id: 9, title: "Find SUID Files", intro: "SUID files let programs run as root. Important for security!", content: "Find SUID files:\nfind / -perm /4000", hint: "Type: -perm /4000", answer: "-perm", success: "Found SUID files! Security critical - know which files have extra privileges!", type: "contains" },
            { id: 10, title: "Delete Matching Files", intro: "-delete removes matching files directly. Be careful!", content: "Delete .tmp files:\nfind . -name \"*.tmp\" -delete", hint: "Type: -delete", answer: "-delete", success: "Deleted! -delete is direct and fast. No confirmation - use with -exec rm {} \\; for safety!", type: "contains" },
            { id: 11, title: "Print0 for Safe Handling", intro: "-print0 handles filenames with spaces/newlines safely. Use with xargs -0.", content: "Safe handling:\nfind . -name \"*.txt\" -print0 | xargs -0 ls -la", hint: "Type: -print0", answer: "-print0", success: "Safe parsing! -print0 uses null chars - handles any filename!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Find and securely delete all temp files older than 7 days!", content: "Challenge:\nfind /tmp -name \"*.tmp\" -mtime +7 -exec rm -f {} \\;", hint: "Type: -mtime +7 -exec", answer: "-mtime +7 -exec", success: "INTERMEDIATE COMPLETE! You master: OR/AND/NOT, -exec, -delete, -newer, security! You're a FIND MASTER! Type --expert when ready for advanced techniques!", type: "starts" }
        ];
        
        const expertLevels = [
            { id: 25, title: "-printf Formatting", intro: "EXPERT MODE! -printf gives you custom output formatting with escape sequences!", content: "Custom output format:\nfind . -type f -printf '%p %s %T+\\n'", hint: "Type: -printf", answer: "-printf", success: "Custom format! %p=filename, %s=size, %T+=mod time. No external commands needed!", type: "contains" },
            { id: 26, title: "-ok Interactive Exec", intro: "-ok is like -exec but asks for confirmation before each command!", content: "Interactive delete:\nfind . -name \"*.bak\" -ok rm {} \\;", hint: "Type: -ok rm", answer: "-ok", success: "Confirmation asked! -ok prompts y/n before each action. Safer than -exec for destructive ops!", type: "contains" },
            { id: 27, title: "-prune Exclude Directories", intro: "-prune prevents find from descending into matched directories!", content: "Exclude .git:\nfind . -path './.git' -prune -o -type f -print", hint: "Type: -prune", answer: "-prune", success: "Directory excluded! -prune stops recursion into matched dirs. Essential for skipping .git, node_modules!", type: "contains" },
            { id: 28, title: "-regex vs -name", intro: "-regex matches the whole path with regex, not just filename like -name!", content: "Regex match:\nfind . -regex '.*\\.\\(txt\\|md\\)$'", hint: "Type: -regex", answer: "-regex", success: "Path regex! -regex matches full path, not just basename. Must match entire path with Emacs regex by default!", type: "contains" },
            { id: 29, title: "-delete Safety", intro: "-delete is built-in and safer than -exec rm. It automatically handles symlinks correctly!", content: "Safe delete:\nfind . -name \"*.tmp\" -delete", hint: "Type: -delete", answer: "-delete", success: "Safe delete! -delete is atomic and safer than -exec rm. Always verifies before deleting!", type: "contains" },
            { id: 30, title: "-empty Advanced", intro: "-empty matches empty files AND empty directories!", content: "Find empty dirs:\nfind . -type d -empty", hint: "Type: -type d -empty", answer: "-type d -empty", success: "Empty dirs found! -empty matches both empty files and directories. Great for cleanup!", type: "contains" },
            { id: 31, title: "Find by Inode", intro: "Files can have multiple hard links - same inode, different names!", content: "Find by inode:\nfind . -inum 123456", hint: "Type: -inum", answer: "-inum", success: "By inode! Same inode = hard links. Find all hard links to a file using -inum!", type: "contains" },
            { id: 32, title: "-flags for BSD Systems", intro: "-flags works on BSD/macOS to find files with specific filesystem flags!", content: "Find immutable files:\nfind . -flags +uappnd", hint: "Type: -flags", answer: "-flags", success: "BSD flags! +uappnd = user immutable flag. macOS-specific but powerful on those systems!", type: "contains" },
            { id: 33, title: "Complex Boolean Logic", intro: "Combine -a (AND), -o (OR), ! (NOT) with parentheses for complex queries!", content: "Complex query:\nfind . \\( -name \"*.log\" -a -mtime +7 \\) -o \\( -name \"*.tmp\" \\)", hint: "Type: \\( -name", answer: "\\( -name", success: "Boolean logic! \\( \\) groups conditions. -a is AND, -o is OR, ! is NOT. Powerful filtering!", type: "contains" },
            { id: 34, title: "Scripting with -print0 and readarray", intro: "Safely handle all filenames including spaces and newlines with -print0!", content: "Safe script handling:\nfind . -print0 | while IFS= read -r -d '' file; do echo \"$file\"; done", hint: "Type: -print0", answer: "-print0", success: "Null-delimited! -print0 + read -d '' handles ANY filename safely. Critical for scripts!", type: "contains" },
            { id: 35, title: "Find and Archive", intro: "Combine find with tar to create targeted archives of specific files!", content: "Find and tar:\nfind documents/ -name \"*.pdf\" -print0 | tar --null -cvf docs.tar -T -", hint: "Type: find . -print0 | tar", answer: "-print0 | tar", success: "Archive created! --null -T - reads null-delimited filenames from find. Perfect backup combo!", type: "contains" },
            { id: 36, title: "Expert Finale - Master Detective", intro: "You've mastered find! Let's combine everything - printf, prune, regex, scripting!", content: "Ultimate find:\nfind . \\( -path './.git' -o -path './node_modules' \\) -prune -o -type f -regex '.*\\.\\(js\\|ts\\)$' -printf '%p\\n' | xargs wc -l", hint: "Type: find . \\( -path", answer: "find . \\( -path", success: "EXPERT COMPLETE! You've mastered -printf, -prune, -regex, -ok, scripting! You're a TRUE filesystem detective! Find Fiona is incredibly proud - go forth and locate anything!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! Find levels complete! You're a filesystem detective!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: search by name, type, size, time. I'll make you a filesystem detective!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: exec, delete, OR/NOT logic, security finds!"); }
            else if (trackName === 'expert') { levels = expertLevels; await showMessage(character.name, "Welcome to EXPERT mode! -printf, -prune, -regex, scripting! Time to become a true filesystem detective!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearFindOutput();
                runFind(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearFindOutput();
                runFind(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: name, type, size, time (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: exec, delete, logic (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Master: printf, prune, regex (lessons 25-36)';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv5);
            
            const menuDiv6 = document.createElement('div');
            menuDiv6.className = 'output-line choice';
            menuDiv6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv6);
            
            await showMessage(character.name, "Type --beginner, --intermediate, or --expert to start! Or click the options above. Use --fullscreen, --darkmode, or --exit anytime!", '', true);
        }
        init();
    </script>
