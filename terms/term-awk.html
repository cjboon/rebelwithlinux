    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Light mode overrides */
        [data-theme="light"] body { background: #f5f5f5; color: #1a1a1a; }

        [data-theme="light"] .awk-output-area { background: #f5f5f5; border-top-color: #cccccc; }
        [data-theme="light"] #command-input { color: #1a1a1a; }
        [data-theme="light"] .input-label { color: #444444; }

        [data-theme="light"] .hint { color: #666666; }
        [data-theme="light"] .awk-output-line { color: #333333; }
        [data-theme="light"] .message .speaker { color: #1a1a1a; }
        [data-theme="light"] .message .text { color: #333333; }

        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: #eee8d5; color: #b58900; border-left-color: #b58900; }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {

<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">awk Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type awk command:</div>
                <textarea id="command-input" placeholder="echo 'data' | awk '{print $1}'" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="awk-output-area" id="awk-output">
                <div class="awk-output-line" style="color: #586e75;">awk output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const awkOutput = document.getElementById('awk-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=awk');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'awk', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addAwkLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'awk-error-line' : 'awk-output-line';
            line.textContent = text;
            awkOutput.appendChild(line);
            awkOutput.scrollTop = awkOutput.scrollHeight;
        }
        
        function clearAwkOutput() { awkOutput.innerHTML = ''; }
        
        function runAwk(cmd) {
            addAwkLine('$ ' + cmd);
            
            const responses = {
                "print $1": "Alice",
                "print $2": "30",
                "print": "Alice 30 NYC",
                "{print $1}": "Alice",
                "{print $1,$2}": "Alice 30",
                "NR==1": "Name Age City",
                "print NR": "5",
                "END": "Total: 5 lines",
                "FS=": "Field separator set",
                "OFS=": "Output separator set",
                "BEGIN": "awk started",
                "/Alice/": "Alice 30 NYC",
                "length>4": "Alice",
                "$1 ~ /A/": "Alice",
                "-F": "Set field separator"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addAwkLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('awk')) {
                    addAwkLine('(awk processed the data)');
                } else {
                    addAwkLine('Try: echo "Alice 30" | awk \'{print $1}\'', 'error');
                }
            }
        }
        
        const character = {
            name: "awk Andy",
            greeting: "Greetings! I'm awk Andy - master of text processing! awk is a powerful language for pattern scanning and processing. Perfect for logs, CSV, and data extraction!",
            encourage: ["Excellent!", "Text master!", "You're a pro!", "Keep processing!", "Data ninja!", "Brilliant!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Print a Field", intro: "Welcome! awk processes text line by line. $1 is the first field, $2 the second.", content: "Print first field:\necho 'Alice 30 NYC' | awk '{print $1}'", hint: "Type: {print $1}", answer: "print $1", success: "You got 'Alice'! $1 is first field, $2 second, $0 is entire line. This is the foundation!", type: "contains" },
            { id: 2, title: "Multiple Fields", intro: "Print multiple fields separated by comma or space.", content: "Print first two fields:\necho 'Alice 30 NYC' | awk '{print $1, $2}'", hint: "Type: {print $1, $2}", answer: "print $1,", success: "Alice 30! Comma adds OFS (default space). Concatenate with no separator!", type: "contains" },
            { id: 3, title: "Print All", intro: "$0 is the entire line. Print it to see everything.", content: "Print entire line:\necho 'Alice 30 NYC' | awk '{print}'", hint: "Type: {print}", answer: "{print}", success: "The whole line! Without arguments, print prints $0. Simple and useful!", type: "contains" },
            { id: 4, title: "Field Separator", intro: "Use -F to set input field separator. Common: space, colon, comma.", content: "Split by colon:\necho 'name:Alice' | awk -F: '{print $2}'", hint: "Type: -F: {print $2}", answer: "-F:", success: "Alice! -F sets FS (field separator). Use -v FS=':' inside for same effect!", type: "contains" },
            { id: 5, title: "Line Numbers", intro: "NR is the record number (line number). FNR is per-file line number.", content: "Print line numbers:\necho -e 'line1\\nline2' | awk '{print NR, $0}'", hint: "Type: {print NR, $0}", answer: "NR", success: "Numbered! NR counts all lines, FNR resets per file. Essential for processing!", type: "contains" },
            { id: 6, title: "Print with Text", intro: "Add literal text in your print statement.", content: "Add text:\necho 'Alice' | awk '{print \"Hello,\" $1}'", hint: "Type: {print \"Hello,\" $1}", answer: "print", success: "Hello, Alice! Text in quotes stays literal. Mix fields and text freely!", type: "contains" },
            { id: 7, title: "BEGIN Block", intro: "BEGIN runs before processing. Great for headers and setup.", content: "Print header:\necho 'data' | awk 'BEGIN{print \"Name\"}'", hint: "Type: BEGIN{print", answer: "BEGIN", success: "Name header! BEGIN for headers, END for footers. Setup and teardown!", type: "contains" },
            { id: 8, title: "END Block", intro: "END runs after all processing. Great for summaries.", content: "Print footer:\necho -e '1\\n2\\n3' | awk 'END{print \"Total\"}'", hint: "Type: END{print", answer: "END", success: "Total! Use END for summaries, counts, totals. Powerful for reporting!", type: "contains" },
            { id: 9, title: "Sum Values", intro: "Accumulate values in a variable.", content: "Sum values:\necho -e '10\\n20\\n30' | awk '{sum+=$1} END{print sum}'", hint: "Type: {sum+=$1}", answer: "sum+=", success: "60! Just like programming. Add, subtract, any math in awk!", type: "contains" },
            { id: 10, title: "Count Lines", intro: "NR gives total count in END.", content: "Count lines:\necho -e 'a\\nb\\nc' | awk 'END{print NR}'", hint: "Type: END{print NR}", answer: "NR}", success: "3 lines! NR in END gives you the count. Simple line counter!", type: "contains" },
            { id: 11, title: "Multiple Commands", intro: "Separate commands with semicolon or newlines.", content: "Two commands:\necho 'Alice' | awk '{print $1; print \"done\"}'", hint: "Type: {print $1;", answer: ";", success: "Alice and done! Chain commands with ; or newlines. Program in the shell!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Combine fields, numbers, and print.", content: "Format output:\necho '100 200' | awk '{print \"Total:\" $1+$2}'", hint: "Type: {print", answer: "print", success: "BEGINNER COMPLETE! You can: extract fields, sum, count, format. awk is YOURS!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Pattern Matching", intro: "INTERMEDIATE! Use /pattern/ to match lines.", content: "Match lines with Alice:\necho -e 'Alice\\nBob' | awk '/Alice/'", hint: "Type: /Alice/", answer: "/Alice/", success: "Matched! /pattern/ filters lines. Regex support built in!", type: "contains" },
            { id: 2, title: "Field Comparison", intro: "Compare fields with >, <, ==, !=.", content: "Filter by age:\necho -e '25\\n15' | awk '$1 > 18'", hint: "Type: $1 > 18", answer: "$1 >", success: "25! Compare any field. Use || for OR, && for AND. Powerful filtering!", type: "contains" },
            { id: 3, title: "Regex Fields", intro: "Match fields with ~ (match) or !~ (not match).", content: "Match field regex:\necho 'ABC123' | awk '$1 ~ /[A-Z]+/'", hint: "Type: $1 ~", answer: "~", success: "Matched! ~ for match, !~ for no match. Regex on specific fields!", type: "contains" },
            { id: 4, title: " Ternary Operator", intro: "Use condition ? true : false for inline logic.", content: "Adult or minor:\necho '25' | awk '{print ($1 >= 18) ? \"adult\" : \"minor\"}'", hint: "Type: ?", answer: "?", success: "adult! Inline if-else. Clean way to add logic to prints!", type: "contains" },
            { id: 5, title: "Built-in Variables", intro: "FS, OFS, RS, ORS, NR, NF are built-in.", content: "Number of fields:\necho 'a b c d' | awk '{print NF}'", hint: "Type: {print NF}", answer: "NF", success: "4! NF is number of fields. FS input sep, OFS output sep. All built-in!", type: "contains" },
            { id: 6, title: "Range Patterns", intro: "Use start,end patterns to match ranges.", content: "Lines 2-4:\necho -e '1\\n2\\n3\\n4\\n5' | awk 'NR==2,NR==4'", hint: "Type: NR==2,NR==4", answer: "NR==2", success: "2,3,4! Comma separates range. Start,end patterns for sections!", type: "contains" },
            { id: 7, title: "Split Function", intro: "split() divides string into array.", content: "Split by comma:\necho 'a,b,c' | awk '{split($0,a,\",\"); print a[1]}'", hint: "Type: split", answer: "split", success: "a! split(str,arr,sep) creates array. Process CSV easily!", type: "contains" },
            { id: 8, title: "Gsub Function", intro: "gsub() does global substitution.", content: "Replace all:\necho 'foo bar foo' | awk '{gsub(/foo/, \"bar\"); print}'", hint: "Type: gsub", answer: "gsub", success: "bar bar bar! gsub is global sub. sub() replaces first. sed-like power!", type: "contains" },
            { id: 9, title: "Index and Length", intro: "index() finds position, length() gets string length.", content: "String length:\necho 'hello' | awk '{print length}'", hint: "Type: length", answer: "length", success: "5! length() gets string length. index(str,sub) finds position!", type: "contains" },
            { id: 10, title: "Substr Function", intro: "substr() extracts part of string.", content: "Get substring:\necho 'hello' | awk '{print substr($0,2,3)}'", hint: "Type: substr", answer: "substr", success: "ell! substr(str,start,len). Start at 1! Great for parsing fixed-width data!", type: "contains" },
            { id: 11, title: "Custom Functions", intro: "Define functions with function name() { }", content: "Function:\necho '5' | awk 'function double(x){return x*2} {print double($1)}'", hint: "Type: function", answer: "function", success: "10! Define once, use anywhere. Complex processing made simple!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Use patterns, conditions, and functions.", content: "Complex processing:\necho '50' | awk '$1 > 25 {print \"high\"} $1 <= 25 {print \"low\"}'", hint: "Type: $1 >", answer: "$1 >", success: "INTERMEDIATE COMPLETE! You command: patterns, fields, functions, arrays! You're an awk MASTER!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! awk levels complete! You're a text processing ninja!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: fields, print, math. I'll make you an awk master!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Patterns, functions, arrays - awk's power features!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'action=updateTheme&theme=' + newTheme,
                        credentials: 'include'
                    });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') {
                    startTrack('beginner');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--intermediate') {
                    startTrack('intermediate');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--fullscreen') {
                    toggleFullscreen();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--darkmode') {
                    toggleDarkMode();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--exit') {
                    window.location.href = '../index.html';
                    return;
                }
                
                await showMessage(character.name, "Press Ctrl+Enter to run AWK commands. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearAwkOutput();
                runAwk(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearAwkOutput();
                runAwk(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
