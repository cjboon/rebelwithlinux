    <style>

        .input-label { color: #aaaaaa; margin-bottom: 0.5rem; font-size: 0.9rem; }

        .hint { color: #666666; font-size: 0.75rem; margin-top: 0.5rem; }

        .message .text { color: #b5bd68; }

        .message .text.hint { color: #81a2be; font-style: italic; }
        .message .text.success { color: #b5bd68; }
        .level-title { color: #f0c674; font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; background: #2d2d2d; border-left: 3px solid #f0c674; }
        [data-theme="light"] body { background: #f5f5f5; color: #1a1a1a; }
        [data-theme="light"] .terminal-header { background: #e0e0e0; }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: #1a1a1a; }
        [data-theme="light"] .pane-label { background: #e0e0e0; }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .cron-output-area { background: #ffffff; color: #1a1a1a; }
        [data-theme="light"] .cron-output-area { background: #f5f5f5; border-top-color: #cccccc; }
        [data-theme="light"] #command-input { color: #1a1a1a; }
        [data-theme="light"] .input-label { color: #444444; }
        [data-theme="light"] .left-pane { border-right: 2px solid #cccccc; }
        [data-theme="light"] .hint { color: #666666; }
        [data-theme="light"] .cron-output-line { color: #333333; }
        [data-theme="light"] .message .speaker { color: #b58900; }
        [data-theme="light"] .message .text { color: #859900; }
        [data-theme="light"] .message .text.fail { color: #dc322f; }
        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: #eee8d5; color: #b58900; border-left-color: #b58900; }
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .terminal-pane { flex: none; height: 50vh; }
            .right-pane { border-bottom: 2px solid #444444; }
            .left-pane { border-right: none; border-top: 2px solid #444444; }
            body { font-size: 14px; }
            .terminal-header { padding: 8px; }
            .terminal-title { font-size: 12px; }
            textarea { min-height: 60px !important; font-size: 14px !important; }
            .mobile-run-btn { display: block !important; }
        }
        .mobile-run-btn { display: none; background: #2d5016; color: #98c379; border: none; padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 4px; }

</head>
<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">cron Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type cron command:</div>
                <textarea id="command-input" placeholder="crontab -e" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="cron-output-area" id="cron-output">
                <div class="cron-output-line" style="color: #586e75;">cron output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const cronOutput = document.getElementById('cron-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=cron');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'cron', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addCronLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'cron-error-line' : type === 'success' ? 'cron-success-line' : 'cron-output-line';
            line.textContent = text;
            cronOutput.appendChild(line);
            cronOutput.scrollTop = cronOutput.scrollHeight;
        }
        
        function clearCronOutput() { cronOutput.innerHTML = ''; }
        
        function runCron(cmd) {
            addCronLine('$ ' + cmd);
            
            const responses = {
                "crontab -e": "crontab: installing new crontab",
                "crontab -l": "0 5 * * * /backup.sh\n30 3 * * 0 /weekly-maintenance.sh",
                "crontab -r": "crontab: removing crontab",
                "* * * * *": "Running every minute",
                "0 * * * *": "Running every hour",
                "0 0 * * *": "Running daily at midnight",
                "0 0 * * 0": "Running weekly on Sunday",
                "0 0 1 * *": "Running monthly on 1st",
                "*/5 * * * *": "Running every 5 minutes",
                "0 */2 * * *": "Running every 2 hours",
                "@reboot": "Running at reboot",
                "@hourly": "Running every hour",
                "@daily": "Running daily at midnight",
                "@weekly": "Running weekly on Sunday",
                "@monthly": "Running monthly on 1st",
                "crontab -u": "crontab for user specified",
                "service cron status": "cron is running",
                "systemctl status cron": "cron.service - Regular background program processing daemon",
                "tail -f /var/log/syslog": "Jan 15 10:00:00 server CRON[1234]: (user) CMD (/backup.sh)"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addCronLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('cron') || cmd.toLowerCase().includes('crontab')) {
                    addCronLine('Command processed');
                    matched = true;
                } else {
                    addCronLine('Try: crontab -e', 'error');
                }
            }
        }
        
        const character = {
            name: "Cron Charlie",
            greeting: "Hey! I'm Cron Charlie - task scheduler extraordinaire! cron runs tasks automatically at specified times. Backups, cleanup, reports - cron handles it all! Let's schedule like a pro!",
            encourage: ["Excellent!", "Scheduled!", "You're an automation hero!", "Keep scheduling!", "Tasks automated!", "Brilliant!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Crontab Format", intro: "Welcome! cron uses this format: minute hour day month weekday command.", content: "Show crontab:\ncrontab -l", hint: "Type: crontab -l", answer: "crontab -l", success: "Listed! Crontab shows your scheduled tasks. Each line is: minute hour day month weekday command!", type: "contains" },
            { id: 2, title: "Edit Crontab", intro: "crontab -e opens your crontab for editing.", content: "Edit crontab:\ncrontab -e", hint: "Type: crontab -e", answer: "crontab -e", success: "Editor opened! Add your cron jobs, one per line. Save and exit to install!", type: "contains" },
            { id: 3, title: "Every Minute", intro: "* means 'every'. * * * * * runs every minute.", content: "Every minute:\n* * * * * /check.sh", hint: "Type: * * * * *", answer: "* * * * *", success: "Every minute! The five stars are: minute, hour, day, month, weekday. * = every!", type: "contains" },
            { id: 4, title: "Every Hour", intro: "0 * * * * runs at minute 0 of every hour.", content: "Every hour:\n0 * * * * /hourly-task.sh", hint: "Type: 0 * * * *", answer: "0 * * * *", success: "Hourly! Minute 0, every hour. At 1:00, 2:00, 3:00...", type: "contains" },
            { id: 5, title: "Daily at Midnight", intro: "0 0 * * * runs at midnight every day.", content: "Daily midnight:\n0 0 * * * /daily-backup.sh", hint: "Type: 0 0 * * *", answer: "0 0 * * *", success: "Daily at midnight! 0=minute 0, 0=hour 0 (midnight), *, *, * = every day!", type: "contains" },
            { id: 6, title: "Weekly Sunday", intro: "0 0 * * 0 runs at midnight every Sunday.", content: "Weekly Sunday:\n0 0 * * 0 /weekly-cleanup.sh", hint: "Type: 0 0 * * 0", answer: "0 0 * * 0", success: "Weekly! Weekday 0=Sunday. 1=Monday, 2=Tuesday... 6=Saturday!", type: "contains" },
            { id: 7, title: "Monthly on 1st", intro: "0 0 1 * * runs at midnight on the 1st of every month.", content: "Monthly 1st:\n0 0 1 * * /monthly-report.sh", hint: "Type: 0 0 1 * *", answer: "0 0 1 * *", success: "Monthly! Day 1 of every month at midnight. Perfect for monthly tasks!", type: "contains" },
            { id: 8, title: "Every 5 Minutes", intro: "*/5 means 'every 5'. */5 * * * * runs every 5 minutes.", content: "Every 5 minutes:\n*/5 * * * * /check-service.sh", hint: "Type: */5 * * * *", answer: "*/5 * * * *", success: "Every 5 minutes! */n means 'every n'. */10 = every 10, */15 = every 15!", type: "contains" },
            { id: 9, title: "Multiple Times", intro: "30 3,15 * * * runs at 3:30 and 15:30 every day.", content: "Twice daily:\n30 3,15 * * * /backup.sh", hint: "Type: 30 3,15", answer: "3,15", success: "Twice a day! Use commas for multiple times. 3,15 means 3:30 and 15:30!", type: "contains" },
            { id: 10, title: "Range of Hours", intro: "0 9-17 * * * runs every hour from 9am to 5pm.", content: "Business hours:\n0 9-17 * * 1-5 /report.sh", hint: "Type: 9-17", answer: "9-17", success: "Business hours! 9-17 = 9am to 5pm. Combined with 1-5 for weekdays only!", type: "contains" },
            { id: 11, title: "Special Strings", intro: "cron has shortcuts: @reboot, @hourly, @daily, @weekly, @monthly.", content: "At reboot:\n@reboot /startup-script.sh", hint: "Type: @reboot", answer: "@reboot", success: "At reboot! @reboot runs once when system starts. Great for init tasks!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Schedule a task every 15 minutes during business hours!", content: "Challenge:\n*/15 9-17 * * 1-5 /status-check.sh", hint: "Type: */15 9-17", answer: "*/15 9-17", success: "BEGINNER COMPLETE! You master: minute/hour/day/month/weekday, */n, ranges! Scheduler pro!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Environment Variables", intro: "INTERMEDIATE! Set PATH or other vars at top of crontab.", content: "Set PATH:\nPATH=/usr/local/bin:/usr/bin:/bin\n0 * * * * /check.sh", hint: "Type: PATH=", answer: "PATH=", success: "PATH set! Cron has minimal PATH. Set your own for reliable execution!", type: "contains" },
            { id: 2, title: "MAILTO Variable", intro: "MAILTO sets where cron emails are sent. Empty MAILTO disables email.", content: "Disable email:\nMAILTO=\"\"\n0 * * * * /silent-task.sh", hint: "Type: MAILTO=", answer: "MAILTO=", success: "Email disabled! Empty MAILTO stops cron emails. Output goes to syslog instead!", type: "contains" },
            { id: 3, title: "Redirect Output", intro: "Redirect stdout and stderr to log files.", content: "Log output:\n0 * * * * /task.sh >> /var/log/task.log 2>&1", hint: "Type: >>", answer: ">>", success: "Logged! >> appends stdout, 2>&1 redirects stderr to stdout. Capture everything!", type: "contains" },
            { id: 4, title: "System Cron vs User", intro: "System crons are in /etc/cron.d/ or /etc/crontab. User crons via crontab -e.", content: "System crontab:\ncat /etc/crontab", hint: "Type: /etc/crontab", answer: "/etc/crontab", success: "System crontab! Different format - has user field. /etc/cron.d/ for custom system jobs!", type: "contains" },
            { id: 5, title: "Cron Directories", intro: "/etc/cron.hourly, daily, weekly, monthly run scripts in these dirs.", content: "Daily scripts:\nls /etc/cron.daily/", hint: "Type: /etc/cron.daily/", answer: "/etc/cron.daily/", success: "Daily scripts! Place executable scripts in /etc/cron.daily/ - run once/day automatically!", type: "contains" },
            { id: 6, title: "Remove Crontab", intro: "crontab -r removes your entire crontab. Careful!", content: "Remove crontab:\ncrontab -r", hint: "Type: crontab -r", answer: "crontab -r", success: "Removed! -r is dangerous - no confirmation. Use -ri to prompt!", type: "contains" },
            { id: 7, title: "Other User's Crontab", intro: "crontab -u username works with other users' crontabs.", content: "User crontab:\ncrontab -u www-data -l", hint: "Type: crontab -u", answer: "crontab -u", success: "User crontab! -u views another user's crontab. Need sudo for edit!", type: "contains" },
            { id: 8, title: "Cron Security", intro: " /etc/cron.allow and /etc/cron.deny control who can use cron.", content: "Check cron.allow:\ncat /etc/cron.allow", hint: "Type: /etc/cron.allow", answer: "/etc/cron.allow", success: "Cron access control! Allow/deny files manage who schedules cron jobs!", type: "contains" },
            { id: 9, title: "Watch Cron Logs", intro: "Check /var/log/syslog or use grep to see cron executions.", content: "Watch cron:\ntail -f /var/log/syslog | grep CRON", hint: "Type: grep CRON", answer: "grep CRON", success: "Cron logs! See when jobs ran, what user, what command. Debugging essential!", type: "contains" },
            { id: 10, title: "Anacron for Non-Running Systems", intro: "anacron runs missed jobs if system was off. For laptops/desktops.", content: "Anacron schedule:\ncat /etc/anacrontab", hint: "Type: /etc/anacrontab", answer: "/etc/anacrontab", success: "Anacron! anacron handles jobs missed during shutdown. Daily/weekly/monthly with delay!", type: "contains" },
            { id: 11, title: "Step Values", intro: "Use */n for every nth value. Can combine with ranges.", content: "Every 2 hours:\n0 */2 * * * /check.sh", hint: "Type: */2", answer: "*/2 *", success: "Every 2 hours! */2 in hour field = 'every 2 hours'. Works in any field!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Schedule daily backup at 3am with logging, disable email!", content: "Challenge:\nMAILTO=\"\"\n0 3 * * * /backup.sh >> /var/log/backup.log 2>&1", hint: "Type: MAILTO=", answer: "MAILTO=", success: "INTERMEDIATE COMPLETE! You master: env vars, MAILTO, logging, anacron, security! cron MASTER!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! cron levels complete! You're a scheduling master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: format, */n, ranges. I'll make you a scheduling pro!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: MAILTO, logging, anacron, security!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearCronOutput();
                runCron(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearCronOutput();
                runCron(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: format, */n, ranges (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: MAILTO, logging, anacron (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
