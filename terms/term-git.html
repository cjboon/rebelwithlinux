    <script>
    
        
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');

        const bashOutput = document.getElementById('bash-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) {
                    userId = data.email;
                    userTheme = data.theme || 'dark';
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=git');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        return Math.max(...data.map(p => p.lesson_id));
                    }
                }
            } catch (e) {}
            return null;
        }
        
        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'git', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addBashLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'bash-error-line' : 'bash-output-line';
            line.textContent = text;
            bashOutput.appendChild(line);
            bashOutput.scrollTop = bashOutput.scrollHeight;
        }
        
        function clearBashOutput() {
            bashOutput.innerHTML = '';
        }
        
        async function runBashCode(cmd) {
            addBashLine('$ ' + cmd);
            
            try {
                const response = await fetch('/cgi-bin/bash_exec.py', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'code=' + encodeURIComponent(cmd)
                });
                
                const data = await response.json();
                
                if (data.error) {
                    addBashLine(data.output, 'error');
                } else {
                    if (data.output) {
                        data.output.split('\n').forEach(line => addBashLine(line));
                    } else {
                        addBashLine('(no output)', 'output');
                    }
                }
            } catch (e) {
                addBashLine('Error: ' + e.message, 'error');
            }
        }

            if (trackName === 'beginner') {
                levels = beginnerLevels;

            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                await showMessage(character.name, "Welcome back! You've got the basics - now let's dive into remote repos, merging, and collaboration!");
            }
            
            currentLevel = 0;
            showLevel();

        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'action=updateTheme&theme=' + newTheme,
                        credentials: 'include'
                    });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        async function showMessage(speaker, text, className = '', allowHtml = false) {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);

            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            
            if (level.type === 'exact') {
                return user === answer;
            } else if (level.type === 'contains') {
                return user.includes(answer);
            } else if (level.type === 'starts') {
                return user.startsWith(answer);
            }
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            // Save progress
            saveProgress(currentLevel);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "Congratulations! You've completed all levels! You're now a Git version control warrior. Go forth and collaborate!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') {
                    startTrack('beginner');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--intermediate') {
                    startTrack('intermediate');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--fullscreen') {
                    toggleFullscreen();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--darkmode') {
                    toggleDarkMode();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--exit') {
                    window.location.href = '../index.html';
                    return;
                }
                
                await showMessage(character.name, "Press Ctrl+Enter to run Git commands. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearBashOutput();
                await runBashCode(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite right. " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearBashOutput();
                await runBashCode(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite right. " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        // Initialize - check login and load progress
        (async function init() {
            await checkLogin();
            if (userId) {
                savedLevel = await loadProgress();
                if (savedLevel > 0 && savedLevel <= levels.length) {
                    currentLevel = savedLevel - 1;
                }
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Learn the basics (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Remote repos, merging, collaboration (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit", '', true);
        })();
    </script>
