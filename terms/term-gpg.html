    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #1a1a1a; color: #cccccc; font-family: 'Courier New', monospace; font-size: 15px; }

        .left-pane { border-right: 2px solid #444444; }
        .terminal-header { background: #333333; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; }

        .dot-red { background: #666666; }
        .dot-yellow { background: #888888; }
        .dot-green { background: #aaaaaa; }
        .terminal-title { margin-left: 1rem; color: #cccccc; font-size: 0.85rem; }
        .pane-label { background: #333333; padding: 0.5rem 1rem; color: #cccccc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-area { flex: 1; display: flex; flex-direction: column; padding: 1rem; background: #1a1a1a; }
        .input-label { color: #aaaaaa; margin-bottom: 0.5rem; font-size: 0.9rem; }
        #command-input { flex: 1; width: 100%; background: transparent; border: none; color: #cccccc; font-family: 'Courier New', monospace; font-size: 15px; resize: none; outline: none; }
        .hint { color: #666666; font-size: 0.75rem; margin-top: 0.5rem; }
        .gpg-output-area { flex: 1; border-top: 2px solid #444444; padding: 0.5rem; background: #222222; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; min-height: 100px; }
        .gpg-output-line { color: #aaaaaa; margin-bottom: 0.25rem; white-space: pre-wrap; }

        .gpg-success-line { color: #b5bd68; margin-bottom: 0.25rem; }
        .terminal-pane.right-pane { flex: 1; }
        .output-area { flex: 1; padding: 1rem; overflow-y: auto; background: #1e1e1e; }

        .message .text.hint { color: #81a2be; font-style: italic; }
        .message .text.success { color: #b5bd68; }
        .level-title { color: #f0c674; font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; background: #2d2d2d; border-left: 3px solid #f0c674; }
        [data-theme="light"] body { background: #f5f5f5; color: #1a1a1a; }
        [data-theme="light"] .terminal-header { background: #e0e0e0; }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: #1a1a1a; }
        [data-theme="light"] .pane-label { background: #e0e0e0; }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .gpg-output-area { background: #ffffff; color: #1a1a1a; }
        [data-theme="light"] .gpg-output-area { background: #f5f5f5; border-top-color: #cccccc; }
        [data-theme="light"] #command-input { color: #1a1a1a; }
        [data-theme="light"] .input-label { color: #444444; }
        [data-theme="light"] .left-pane { border-right: 2px solid #cccccc; }
        [data-theme="light"] .hint { color: #666666; }
        [data-theme="light"] .gpg-output-line { color: #333333; }
        [data-theme="light"] .message .speaker { color: #b58900; }
        [data-theme="light"] .message .text { color: #859900; }
        [data-theme="light"] .message .text.fail { color: #dc322f; }
        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: #eee8d5; color: #b58900; border-left-color: #b58900; }
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .terminal-pane { flex: none; height: 50vh; }
            .right-pane { border-bottom: 2px solid #444444; }
            .left-pane { border-right: none; border-top: 2px solid #444444; }
            body { font-size: 14px; }
            .terminal-header { padding: 8px; }
            .terminal-title { font-size: 12px; }
            textarea { min-height: 60px !important; font-size: 14px !important; }
            .mobile-run-btn { display: block !important; }
        }
        .mobile-run-btn { display: none; background: #2d5016; color: #98c379; border: none; padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 4px; }
        .command-output { color: #81a2be; cursor: pointer; }
        .command-output:hover { color: #f0c674; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">GPG Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type gpg command:</div>
                <textarea id="command-input" placeholder="gpg --gen-key" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="gpg-output-area" id="gpg-output">
                <div class="gpg-output-line" style="color: #586e75;">gpg output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const gpgOutput = document.getElementById('gpg-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=gpg');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'gpg', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addGpgLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'gpg-error-line' : type === 'success' ? 'gpg-success-line' : 'gpg-output-line';
            line.textContent = text;
            gpgOutput.appendChild(line);
            gpgOutput.scrollTop = gpgOutput.scrollHeight;
        }
        
        function clearGpgOutput() { gpgOutput.innerHTML = ''; }
        
        function runGpg(cmd) {
            addGpgLine('$ ' + cmd);
            
            const responses = {
                "gpg --gen-key": "gpg: keyring `/home/user/.gnupg/pubring.gpg' created\ngpg: key 1234ABCD marked as ultimately trusted\npublic and secret key created and signed.",
                "gpg --full-generate-key": "gpg: keyring `/home/user/.gnupg/pubring.gpg' created\nPlease select what kind of key you want:\n   (1) RSA and RSA (default)\n   (2) DSA and ElGamal\n   (3) DSA (sign only)\n   (4) RSA (sign only)\nYour selection? ",
                "gpg --list-keys": "pub   rsa2048 2024-01-15 [SC]\n      ABCD1234ABCD1234ABCD1234ABCD1234ABCD\nuid           [ultimate] Alice <alice@example.com>\nsub   rsa2048 2024-01-15 [E]",
                "gpg --list-secret-keys": "sec   rsa2048 2024-01-15 [SC]\n      ABCD1234ABCD1234ABCD1234ABCD1234ABCD\nuid           [ultimate] Alice <alice@example.com>\nssb   rsa2048 2024-01-15 [E]",
                "gpg --armor --export": "-----BEGIN PGP PUBLIC KEY BLOCK-----\n\nmQINBFi0abcBEADK...\n-----END PGP PUBLIC KEY BLOCK-----",
                "gpg --armor --export-secret-keys": "-----BEGIN PGP PRIVATE KEY BLOCK-----\n\nlQHYBFi0abcBEADK...\n-----END PGP PRIVATE KEY BLOCK-----",
                "gpg --import": "gpg: key ABCD1234: public key imported\ngpg: Total number processed: 1",
                "gpg --encrypt": "gpg: encrypted with RSA algorithm\nUse \"gpg -d file.gpg\" to decrypt.",
                "gpg --sign": "gpg: signature made using RSA algorithm\ngpg: Good signature from \"Alice <alice@example.com>\"",
                "gpg --verify": "gpg: Good signature from \"Alice <alice@example.com>\"",
                "gpg --decrypt": "gpg: encrypted with RSA algorithm\ngpg: original file name: secret.txt\nHello World!",
                "gpg --delete-keys": "gpg: deleting key ABCD1234 from public keyring\n Really delete? (y/N) ",
                "gpg --delete-secret-keys": "gpg: deleting secret key ABCD1234 from secret keyring\n Really delete? (y/N) ",
                "gpg --edit-key": "gpg: key ABCD1234\npub  rsa2048/ABCD1234\n     created: 2024-01-15  expires: never\nsub  rsa2048/EFGH5678\n     created: 2024-01-15  expires: never\n",
                "gpg --recv-keys": "gpg: key ABCD1234: public key \"Alice <alice@example.com>\" imported",
                "gpg --send-keys": "gpg: sending key ABCD1234 to hkps://keyserver.ubuntu.com",
                "gpg -e": "gpg: encrypted with RSA algorithm",
                "gpg -d": "gpg: encrypted with RSA algorithm\ngpg: original file name: secret.txt",
                "gpg -s": "gpg: signature made using RSA algorithm",
                "gpg -b": "gpg: signature created in 'file.txt.sig'",
                "--armor": "ASCII-armored output (instead of binary)",
                "--output": "Write output to specified file",
                "-e -r": "Encrypt for recipient",
                "--recipient": "Encrypt for specified user"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addGpgLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('gpg')) {
                    addGpgLine('Command executed (simulated)');
                    matched = true;
                } else {
                    addGpgLine('Try: gpg --list-keys', 'error');
                }
            }
        }
        
        const character = {
            name: "GPG Gary",
            greeting: "Hey! I'm GPG Gary - encryption champion! GPG is GNU Privacy Guard - the gold standard for file encryption and digital signatures. Protect your communications, verify identities, and embrace privacy! Let's encrypt!",
            encourage: ["Perfect encryption!", "Key master!", "Privacy protector!", "Signature verified!", "Decryption success!", "Secure as it gets!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "List Your Keys", intro: "Welcome! Let's start by listing your GPG keys. --list-keys shows public keys.", content: "List public keys:\ngpg --list-keys", hint: "Type: gpg --list-keys", answer: "gpg --list-keys", success: "Keys listed! You can see key IDs, algorithms, creation dates, and user IDs!", type: "contains" },
            { id: 2, title: "List Secret Keys", intro: "--list-secret-keys (or --list-secret-keys) shows your private keys. Guard these carefully!", content: "List secret keys:\ngpg --list-secret-keys", hint: "Type: gpg --list-secret-keys", answer: "gpg --list-secret-keys", success: "Secret keys shown! These are your private keys - never share them!", type: "contains" },
            { id: 3, title: "Generate a Key Pair", intro: "--gen-key creates a new key pair. For simulation, we use pre-set keys.", content: "Generate key pair:\ngpg --gen-key", hint: "Type: gpg --gen-key", answer: "gpg --gen-key", success: "Key generated! In production, you'd choose: key type (RSA), size (2048/4096), expiry, and your identity!", type: "contains" },
            { id: 4, title: "ASCII Armor Output", intro: "--armor (or -a) outputs keys in ASCII text format - safe for pasting in email!", content: "Export ASCII key:\ngpg --armor --export alice@example.com", hint: "Type: --armor --export", answer: "--armor --export", success: "ASCII format! Now you can paste this in emails, forums, or text files!", type: "contains" },
            { id: 5, title: "Export a Public Key", intro: "--export outputs your public key. Share this with anyone who needs to send you encrypted messages!", content: "Export your public key:\ngpg --armor --export alice@example.com", hint: "Type: gpg --armor --export", answer: "--export", success: "Public key exported! Others can import this to send you encrypted messages!", type: "contains" },
            { id: 6, title: "Import a Public Key", intro: "--import adds someone else's public key to your keyring.", content: "Import a public key:\ngpg --import bob-public.asc", hint: "Type: gpg --import", answer: "gpg --import", success: "Key imported! Now you can encrypt messages to Bob!", type: "contains" },
            { id: 7, title: "Encrypt a File", intro: "--encrypt (-e) encrypts a file. Use --recipient (-r) to specify who can decrypt.", content: "Encrypt for Bob:\ngpg --encrypt --recipient bob@example.com secret.txt", hint: "Type: gpg --encrypt --recipient", answer: "gpg --encrypt", success: "File encrypted! Only Bob (with his private key) can decrypt this!", type: "contains" },
            { id: 8, title: "Short Encrypt Syntax", intro: "-e -r can be combined. Or use -e -r bob@example.com shorthand!", content: "Quick encrypt:\ngpg -e -r bob@example.com secret.txt", hint: "Type: gpg -e -r", answer: "gpg -e -r", success: "Shorthand works! -e = --encrypt, -r = --recipient. Same result!", type: "contains" },
            { id: 9, title: "Decrypt a File", intro: "--decrypt (-d) decrypts a file you received. Outputs to stdout or --output file.", content: "Decrypt file:\ngpg --decrypt secret.gpg", hint: "Type: gpg --decrypt", answer: "gpg --decrypt", success: "Decrypted! The original content is revealed. Only your private key can do this!", type: "contains" },
            { id: 10, title: "Decrypt to File", intro: "--output (or -o) saves decrypted content to a file instead of showing it.", content: "Decrypt to file:\ngpg --decrypt --output secret.txt secret.gpg", hint: "Type: --output", answer: "--output", success: "Decrypted to file! Use -o as shorthand: gpg -d -o secret.txt secret.gpg", type: "contains" },
            { id: 11, title: "Sign a File", intro: "--sign (-s) creates a digital signature. Proves you authored the file!", content: "Sign a file:\ngpg --sign document.txt", hint: "Type: gpg --sign", answer: "gpg --sign", success: "File signed! Recipients can verify it came from you using your public key!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Import a key, encrypt a message, and verify it!", content: "Challenge:\ngpg --import bob.asc && gpg -e -r bob@example.com hello.txt", hint: "Type: gpg -e -r", answer: "gpg -e -r", success: "BEGINNER COMPLETE! You master: list keys, import/export, encrypt, decrypt, sign! Encryption hero!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Detached Signature", intro: "INTERMEDIATE! --detach-sign (-b) creates a separate .sig file. Original file stays unchanged!", content: "Create detached signature:\ngpg --detach-sign document.txt", hint: "Type: gpg --detach-sign", answer: "gpg --detach-sign", success: "Signature file created! .sig file proves authenticity without modifying original!", type: "contains" },
            { id: 2, title: "Verify Detached Signature", intro: "--verify checks a detached .sig signature file.", content: "Verify signature:\ngpg --verify document.txt.sig document.txt", hint: "Type: gpg --verify", answer: "gpg --verify", success: "Signature verified! If it shows 'Good signature' - document is authentic!", type: "contains" },
            { id: 3, title: "Cleartext Signature", intro: "--cleartext-sign creates a signature that's readable as text. Includes the content!", content: "Cleartext sign:\ngpg --cleartext-sign document.txt", hint: "Type: gpg --cleartext-sign", answer: "gpg --cleartext-sign", success: "Cleartext signature! The file contains both content and signature - readable but verifiable!", type: "contains" },
            { id: 4, title: "Symmetric Encryption", intro: "--symmetric (-c) encrypts with a password. No key pair needed!", content: "Password encrypt:\ngpg --symmetric secret.txt", hint: "Type: gpg --symmetric", answer: "gpg --symmetric", success: "Password encryption! Share the password securely through a different channel!", type: "contains" },
            { id: 5, title: "Keyserver Operations", intro: "--keyserver specifies where to send/receive keys. --send-keys and --recv-keys manage remote keys!", content: "Search keyserver:\ngpg --keyserver keyserver.ubuntu.com --search-keys \"Alice\"", hint: "Type: --keyserver", answer: "--keyserver", success: "Keyserver search! Find and import keys from public key servers!", type: "contains" },
            { id: 6, title: "Receive Keys from Server", intro: "--recv-keys imports a key by ID from a keyserver.", content: "Receive key:\ngpg --recv-keys ABCD1234", hint: "Type: gpg --recv-keys", answer: "gpg --recv-keys", success: "Key received! Imported from keyserver. Verify the fingerprint to trust it!", type: "contains" },
            { id: 7, title: "Send Keys to Server", intro: "--send-keys publishes your public key to a keyserver.", content: "Send key to server:\ngpg --send-keys --keyserver keyserver.ubuntu.com ABCD1234", hint: "Type: --send-keys", answer: "--send-keys", success: "Key sent! Now anyone can find and import your public key!", type: "contains" },
            { id: 8, title: "Refresh Keys", intro: "--refresh-keys updates all imported keys from keyserver. Gets new signatures/revocations!", content: "Refresh all keys:\ngpg --refresh-keys", hint: "Type: gpg --refresh-keys", answer: "gpg --refresh-keys", success: "Keys refreshed! Updated from keyserver. Know if any keys were revoked!", type: "contains" },
            { id: 9, title: "Edit Keys Interactively", intro: "--edit-key opens interactive mode to manage key trust, add signatures, set expiration!", content: "Edit key trust:\ngpg --edit-key alice@example.com", hint: "Type: gpg --edit-key", answer: "gpg --edit-key", success: "Interactive mode! In real gpg: 'trust' to set trust level, 'sign' to sign a key!", type: "contains" },
            { id: 10, title: "Delete Keys", intro: "--delete-keys removes a public key. --delete-secret-keys removes private keys.", content: "Delete public key:\ngpg --delete-keys alice@example.com", hint: "Type: --delete-keys", answer: "--delete-keys", success: "Key deleted! Remember: delete secret key first if both exist!", type: "contains" },
            { id: 11, title: "Key Fingerprint", intro: "--fingerprint shows the unique fingerprint of a key. Verify this out-of-band!", content: "Show fingerprint:\ngpg --fingerprint alice@example.com", hint: "Type: --fingerprint", answer: "--fingerprint", success: "Fingerprint shown! Compare this visually/calls to verify key authenticity!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Generate, sign, verify, and export your key!", content: "Challenge:\ngpg --gen-key && gpg --sign doc.txt && gpg --armor --export > pub.asc", hint: "Type: gpg --armor --export", answer: "gpg --armor --export", success: "INTERMEDIATE COMPLETE! You master: detached sigs, keyserver ops, edit trust, delete keys, fingerprints! GPG MASTER!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! GPG levels complete! You're an encryption master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: list keys, import/export, encrypt, decrypt, sign. I'll make you a privacy pro!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: detached sigs, keyserver ops, edit trust, fingerprints!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                await showMessage(character.name, "Press Ctrl+Enter to run gpg commands. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearGpgOutput();
                runGpg(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearGpgOutput();
                runGpg(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: list keys, import/export, encrypt, decrypt, sign (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: detached sigs, keyserver ops, edit trust (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit", '', true);
        }
        init();
    </script>
