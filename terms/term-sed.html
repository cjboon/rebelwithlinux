            try {

                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));

            } catch (e) {}
            return null;

        function addSedLine(text, type = 'output') {

        function runSedCode(cmd) {
            addSedLine('$ echo "' + testData.line1 + '" | ' + cmd);
            
            const inputText = testData.line1;
            let result = inputText;
            let error = null;
            
            try {
                const match = cmd.match(/sed\s+['"]s\/([^\/]*)\/([^\/]*)\/(['"]?)(g?)(I?)/);
                if (match) {
                    const pattern = match[1];
                    const replacement = match[2];
                    const hasG = match[4] === 'g';
                    const hasI = match[5] === 'I';
                    
                    let flags = '';
                    if (hasI) flags += 'i';
                    if (hasG) flags += 'g';
                    
                    const regex = new RegExp(pattern, flags);
                    if (hasG) {
                        result = inputText.replace(regex, replacement);
                    } else {
                        result = inputText.replace(regex, replacement);
                    }
                } else if (cmd.includes("'d'") || cmd.includes('/d')) {
                    const delMatch = cmd.match(/sed\s+['"]\/([^\/]+)\/d['"]/);
                    if (delMatch) {
                        const pattern = new RegExp(delMatch[1], 'g');
                        result = inputText.replace(pattern, '');
                    }
                } else {
                    result = "(Sed commands supported: s/pattern/replacement/, /pattern/d)";
                }
                
                result.split('\n').forEach(line => addSedLine(line));
            } catch (e) {
                addSedLine('Error: ' + e.message, 'error');
            }
        }

        async function showCharacterMessage(text, showName = true) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        if (showName) {
                            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        } else {
                            line.innerHTML = '<span class="character-name">' + character.name + '</span> ' + currentText;
                        }
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

            addLine('');
            
            await showCharacterMessage(level.intro);
            addLine('');
            
            const contentLine = document.createElement('div');
            contentLine.className = 'output-line command-output';
            contentLine.textContent = level.content;
            history.appendChild(contentLine);
            output.scrollTop = output.scrollHeight;
            
            addLine('');
            await showCharacterMessage("Cast your spell! " + level.hint, false);
            addLine('');
        }
        
        async function showSuccess() {
            const level = levels[currentLevel];
            
            addLine('');
            await showCharacterMessage(level.success);
            
            addLine('');
            const encour = document.createElement('div');
            encour.className = 'output-line encouragement';
            encour.textContent = '✨ ' + character.getEncouragement() + ' ✨';
            history.appendChild(encour);
            
            addLine('');
        }
        
        async function startGame() {
            history.innerHTML = '';
            clearSedOutput();
            currentLevel = 0;
            
            addLine('');
            addLine('╔═══════════════════════════════════════╗', 'lesson-number');
            addLine('║    SED TUTOR with Sed the Wizard     ║', 'lesson-number');
            addLine('╚═══════════════════════════════════════╝', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(character.greeting);
            
            addLine('');
            addLine('Choose your path, apprentice:', 'lesson-number');
            addLine('');
            
            const menu1 = document.createElement('div');
            menu1.className = 'output-line choice';
            menu1.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Start with the basics (lessons 1-12)';
            history.appendChild(menu1);
            
            const menu2 = document.createElement('div');
            menu2.className = 'output-line choice';
            menu2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced sed (lessons 13-24)';
            history.appendChild(menu2);
            
            const menu3 = document.createElement('div');
            menu3.className = 'output-line choice';
            menu3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menu3);
            
            const menu4 = document.createElement('div');
            menu4.className = 'output-line choice';
            menu4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menu4);
            
            const menu5 = document.createElement('div');
            menu5.className = 'output-line choice';
            menu5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menu5);
            
            addLine('');
            addCharacterMessage("Click on a choice or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit!");
            addLine('');
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                addCharacterMessage("Excellent! We'll start from the very beginning. I'll teach you the fundamental spells of text transformation!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                addCharacterMessage("Welcome back! You've mastered the basics - now let's dive into addresses, patterns, capture groups, and the hold space!");
            }
            
            currentLevel = 0;
            addLine('');
            showLevel();
        }
        
        function addCharacterMessage(text) {
            const line = document.createElement('div');
            line.className = 'output-line';
            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function handleCommand(cmd) {
            cmd = cmd.trim();
            if (!cmd) return;
            
            addUserInput(cmd);
            
            runSedCode(cmd);
            
            if (cmd === '--start' || cmd === '--restart') {
                startGame();
                return;
            }
            
            if (cmd === '--beginner') {
                await startTrack('beginner');
                return;
            }
            
            if (cmd === '--intermediate') {
                await startTrack('intermediate');
                return;
            }
            
            if (cmd === '--fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
                return;
            }
            
            if (cmd === '--darkmode') {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                if (userId) {
                    try {
                        await fetch('/api/auth.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'action=updateTheme&theme=' + newTheme,
                            credentials: 'include'
                        });
                    } catch (e) {}
                }
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = newTheme === 'dark';
                addCharacterMessage("Theme switched to " + newTheme + " mode!");
                return;
            }
            
            if (cmd === '--exit') {
                window.location.href = '../index.html';
                return;
            }
            
            if (cmd === '--help') {
                addCharacterMessage("Type --start to return to the main menu!");
                addCharacterMessage("Type --beginner for beginner lessons (1-12)");
                addCharacterMessage("Type --intermediate for intermediate lessons (13-24)");
                addCharacterMessage("Type --fullscreen to toggle fullscreen mode");
                addCharacterMessage("Type --darkmode to toggle dark/light mode");
                addCharacterMessage("Type --exit to go back to homepage");
                addCharacterMessage("Type --level to see your current level");
                addCharacterMessage("Type --hint if you're stuck");
                return;
            }
            
            if (cmd === '--level') {
                addLine('Current level: ' + (currentLevel + 1) + ' - ' + levels[currentLevel].title);
                return;
            }
            
            if (cmd === '--skip') {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    addCharacterMessage("You finished all the levels! You're a sed wizard now! Type --start to practice again!");
                    return;
                }
                showLevel();
                return;
            }
            
            if (cmd === '--hint') {
                addCharacterMessage("No worries! The hint is: " + levels[currentLevel].hint);
                return;
            }
            
            if (checkAnswer(cmd)) {
                await showSuccess();
                saveProgress(currentLevel + 2);
                currentLevel++;
                
                if (currentLevel >= levels.length) {
                    addLine('');
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    if (levels === beginnerLevels) {
                        addCharacterMessage("CONGRATULATIONS! You completed all 12 beginner sed lessons! You're a true text transformation wizard! Type --intermediate to continue your journey!");
                    } else if (levels === intermediateLevels) {
                        addCharacterMessage("CONGRATULATIONS! You completed all 12 intermediate sed lessons! You've mastered addresses, patterns, capture groups, and the hold space! The power of sed is yours! Type --beginner to start over!");
                    }
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    addLine('');
                } else {
                    setTimeout(() => showLevel(), 1500);
                }
            } else {
                addCharacterMessage("Hmm, that's not quite right. Try again! Remember the format: sed 's/pattern/replacement/' - you've got this!");
            }
        }
        
        input.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            });
        }
        
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            startGame();
        }
        init();
    </script>
</body>
</html>
