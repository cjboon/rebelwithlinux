        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;

            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=sql');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

            } catch (e) {}
        }
        
        function addSQLLine(text, isTable = false) {
            if (isTable && Array.isArray(text)) {
                const table = document.createElement('table');
                table.className = 'sql-table';
                
                if (text.length > 0) {
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    Object.keys(text[0]).forEach(key => {
                        const th = document.createElement('th');
                        th.textContent = key;
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
                    table.appendChild(thead);
                    
                    const tbody = document.createElement('tbody');
                    text.forEach(row => {
                        const tr = document.createElement('tr');
                        Object.values(row).forEach(val => {
                            const td = document.createElement('td');
                            td.textContent = val;
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                }
                sqlOutput.appendChild(table);
            } else {
                const line = document.createElement('div');
                line.className = 'sql-output-line';
                line.textContent = text;
                sqlOutput.appendChild(line);
            }
            sqlOutput.scrollTop = sqlOutput.scrollHeight;
        }
        
        function clearSQLOutput() {
            sqlOutput.innerHTML = '';
        }
        
        function runSQLCode(cmd) {
            addSQLLine('> ' + cmd);
            
            const upperCmd = cmd.toUpperCase().trim();
            
            if (upperCmd.includes('DROP') || upperCmd.includes('DELETE') || upperCmd.includes('UPDATE') || upperCmd.includes('INSERT') || upperCmd.includes('ALTER') || upperCmd.includes('CREATE') && !upperCmd.includes('SELECT')) {
                addSQLLine('Error: Only SELECT queries are allowed in this safe learning environment.', 'error');
                return;
            }
            
            if (!upperCmd.startsWith('SELECT')) {
                addSQLLine('Error: Only SELECT queries are allowed. Try: SELECT * FROM table', 'error');
                return;
            }
            
            try {
                const result = alasql(cmd);
                if (Array.isArray(result) && result.length > 0) {
                    addSQLLine(result, true);
                } else if (Array.isArray(result) && result.length === 0) {
                    addSQLLine('Empty result set (0 rows)', 'output');
                } else if (result !== undefined) {
                    addSQLLine(JSON.stringify(result), 'output');
                } else {
                    addSQLLine('Query executed successfully.', 'output');
                }
            } catch (e) {
                addSQLLine('SQL Error: ' + e.message, 'error');
            }
        }

                hint: "Type: SELECT name FROM users WHERE role = 'admin' UNION",
                answer: "SELECT name FROM users WHERE role = 'admin' UNION",
                success: "Got both admins and moderators in one result! UNION removes duplicates. Use UNION ALL to keep all rows including duplicates. Very powerful!",

            },
            {
                id: 26,
                title: "UNION ALL",
                intro: "UNION ALL keeps all rows, including duplicates. Sometimes you need EVERY row from both queries!",
                content: "Use UNION ALL:\nSELECT role FROM users UNION ALL SELECT category FROM products",
                hint: "Type: SELECT role FROM users UNION ALL",
                answer: "SELECT role FROM users UNION ALL",
                success: "This shows roles and categories together - all 11 rows! Great for combining different types of data from different tables!",
                type: "starts"
            },
            {
                id: 27,
                title: "EXCEPT and INTERSECT",
                intro: "EXCEPT returns rows in the first query that aren't in the second. INTERSECT returns rows common to both.",
                content: "Find products never ordered:\nSELECT p.name FROM products p EXCEPT SELECT p.name FROM products p JOIN orders o ON p.id = o.product_id",
                hint: "Type: SELECT p.name FROM products p EXCEPT",
                answer: "SELECT p.name FROM products p EXCEPT",
                success: "This shows products that were never ordered! INTERSECT would show products that WERE ordered. These set operations are super useful!",

            {

                intro: "CASE is like if/else for SQL. Add conditional logic to your queries!",
                content: "Use CASE for categories:\nSELECT name, CASE WHEN price > 500 THEN 'expensive' WHEN price > 100 THEN 'moderate' ELSE 'cheap' END AS price_range FROM products",
                hint: "Type: SELECT name, CASE WHEN price > 500",
                answer: "SELECT name, CASE WHEN price > 500",
                success: "Brilliant! CASE lets you create custom categories. WHEN conditions are checked in order. ELSE is optional but recommended!",
                type: "starts"
            },
            {
                id: 29,
                title: "COALESCE",
                intro: "COALESCE returns the first non-null value from a list. Perfect for handling missing data!",
                content: "Use COALESCE:\nSELECT name, COALESCE(email, 'No email') AS contact FROM users",
                hint: "Type: SELECT name, COALESCE(email,",
                answer: "SELECT name, COALESCE(email,",
                success: "Users without emails now show 'No email'! COALESCE takes any number of arguments and returns the first non-null one. Essential for data cleaning!",
                type: "starts"
            },
            {
                id: 30,
                title: "NULLIF",
                intro: "NULLIF returns NULL if two values are equal, otherwise returns the first value. Useful for preventing division by zero!",

                hint: "Type: SELECT 10 / NULLIF(0, 0)",
                answer: "SELECT 10 / NULLIF(0, 0)",
                success: "Instead of error, we got NULL! NULLIF(0,0) returns NULL because both args are equal. Prevents division by zero elegantly!",

            {
                id: 31,
                title: "Correlated Subqueries",
                intro: "A correlated subquery references the outer query. It runs once for each row - powerful but can be slow.",
                content: "Find users with more than average orders:\nSELECT * WHERE (SELECT COUNT FROM users u(*) FROM orders o WHERE o.user_id = u.id) > (SELECT AVG(cnt) FROM (SELECT COUNT(*) cnt FROM orders GROUP BY user_id))",

                answer: "SELECT * FROM users u WHERE",

            {
                id: 32,
                title: "Window Functions - OVER()",
                intro: "Window functions let you perform calculations across rows without grouping. They operate over a 'window' of data!",
                content: "Use ROW_NUMBER:\nSELECT name, price, ROW_NUMBER() OVER (ORDER BY price DESC) AS rnk FROM products",
                hint: "Type: SELECT name, price, ROW_NUMBER() OVER",
                answer: "SELECT name, price, ROW_NUMBER() OVER",

                title: "Window Functions - RANK and DENSE_RANK",
                intro: "RANK and DENSE_RANK assign ranks with handling for ties. They work differently for duplicate values!",
                content: "Compare ranking functions:\nSELECT name, price, RANK() OVER (ORDER BY price DESC) AS rank, DENSE_RANK() OVER (ORDER BY price DESC) AS dense_rank FROM products",

                answer: "SELECT name, price, RANK() OVER",
                success: "RANK skips numbers after ties (1,1,3), DENSE_RANK doesn't (1,1,2). Perfect for leaderboards and rankings!",

                id: 34,
                title: "LATERAL JOIN",
                intro: "LATERAL lets subqueries reference columns from preceding tables. Like a correlated subquery but as a JOIN!",
                content: "Use LATERAL:\nSELECT u.name, o.order_total FROM users u, LATERAL (SELECT order_total FROM orders WHERE user_id = u.id LIMIT 1) o",

                answer: "SELECT u.name, o.order_total FROM users u",

            {
                id: 35,
                title: "Recursive CTEs",
                intro: "Recursive CTEs can reference themselves! Used for hierarchical data like org charts or tree structures.",
                content: "Create recursive CTE:\nWITH RECURSIVE cnt(x) AS (SELECT 1 UNION ALL SELECT x+1 FROM cnt WHERE x < 5) SELECT * FROM cnt",
                hint: "Type: WITH RECURSIVE cnt(x) AS",
                answer: "WITH RECURSIVE cnt(x) AS",
                success: "It counts from 1 to 5! Recursive CTEs are powerful for trees, hierarchies, and walking data structures!",

            },
            {
                id: 36,
                title: "Expert Finale",
                intro: "Darling, you've come SO far! Let's combine EVERYTHING - window functions, CTEs, CASE, and subqueries!",
                content: "The ultimate query:\nWITH ranked AS (SELECT u.name, o.order_total, ROW_NUMBER() OVER (PARTITION BY u.id ORDER BY o.order_total DESC) AS rn FROM users u JOIN orders o ON u.id = o.user_id) SELECT name, order_total FROM ranked WHERE rn = 1 ORDER BY order_total DESC",
                hint: "Type: WITH ranked AS",
                answer: "WITH ranked AS",
                success: "DARLING! You did it! You combined CTEs, JOINs, window functions, subqueries, PARTITION BY, and ORDER BY! SQL MASTER! I'm SO incredibly proud! Expert level COMPLETE! You've mastered the art of database querying! Keep practicing and you'll amaze everyone!",
                type: "starts"
            }
        ];
        
        let levels = beginnerLevels;
        
        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = 'output-line ' + className;
            line.textContent = text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function showCharacterMessage(text, showName = true) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        if (showName) {
                            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        } else {
                            line.innerHTML = '<span class="character-name">' + character.name + '</span> ' + currentText;
                        }
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function addUserInput(text) {
            const line = document.createElement('div');
            line.className = 'output-line user-input';
            line.textContent = '> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function checkAnswer(userAnswer) {
            const level = levels[currentLevel];
            let isCorrect = false;
            
            if (level.type === 'exact') {
                isCorrect = userAnswer.trim().toUpperCase() === level.answer.toUpperCase();
            } else if (level.type === 'starts') {
                isCorrect = userAnswer.trim().toUpperCase().startsWith(level.answer.toUpperCase());
            }
            
            return isCorrect;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('  Level ' + level.id + ': ' + level.title, 'lesson-number');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(level.intro);
            addLine('');
            
            const contentLine = document.createElement('div');
            contentLine.className = 'output-line command-output';
            contentLine.textContent = level.content;
            history.appendChild(contentLine);
            output.scrollTop = output.scrollHeight;
            
            addLine('');
            await showCharacterMessage("Go ahead, honey - try typing the query! " + level.hint, false);
            addLine('');
        }
        
        async function showSuccess() {
            const level = levels[currentLevel];
            
            addLine('');
            await showCharacterMessage(level.success);
            
            addLine('');
            const encour = document.createElement('div');
            encour.className = 'output-line encouragement';
            encour.textContent = '💾 ' + character.getEncouragement() + ' 💾';
            history.appendChild(encour);
            
            addLine('');
        }
        
        async function startGame() {
            history.innerHTML = '';
            clearSQLOutput();
            currentLevel = 0;
            
            addLine('');
            addLine('╔═══════════════════════════════════════╗', 'lesson-number');
            addLine('║     SQL TUTOR with SQL Sally         ║', 'lesson-number');
            addLine('╚═══════════════════════════════════════╝', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(character.greeting);
            
            addLine('');
            addLine('Choose your path, dear:', 'lesson-number');
            addLine('');
            
            const menu1 = document.createElement('div');
            menu1.className = 'output-line choice';
            menu1.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Start with the basics (lessons 1-12)';
            history.appendChild(menu1);
            
            const menu2 = document.createElement('div');
            menu2.className = 'output-line choice';
            menu2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - For those who know the basics (lessons 13-24)';
            history.appendChild(menu2);
            
            const menu3 = document.createElement('div');
            menu3.className = 'output-line choice';
            menu3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menu3);
            
            const menu4 = document.createElement('div');
            menu4.className = 'output-line choice';
            menu4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menu4);
            
            const menu5 = document.createElement('div');
            menu5.className = 'output-line choice';
            menu5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menu5);
            
            addLine('');
            addCharacterMessage("Click on a choice or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit!");
            addLine('');
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                addCharacterMessage("Wonderful! We're starting from scratch - perfect for beginners! Let's begin your SQL adventure!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                addCharacterMessage("Welcome back! You've got the basics down - now let's take it to the next level! We'll cover aliases, JOINs, subqueries, and more!");
            }
            
            currentLevel = 0;
            addLine('');
            showLevel();
        }
        
        function addCharacterMessage(text) {
            const line = document.createElement('div');
            line.className = 'output-line';
            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function handleCommand(cmd) {
            cmd = cmd.trim();
            if (!cmd) return;
            
            addUserInput(cmd);
            
            runSQLCode(cmd);
            
            if (cmd.toLowerCase() === '--start' || cmd.toLowerCase() === '--restart') {
                startGame();
                return;
            }
            
            if (cmd.toLowerCase() === '--beginner') {
                await startTrack('beginner');
                return;
            }
            
            if (cmd.toLowerCase() === '--intermediate') {
                await startTrack('intermediate');
                return;
            }
            
            if (cmd.toLowerCase() === '--fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
                return;
            }
            
            if (cmd.toLowerCase() === '--darkmode') {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                if (userId) {
                    try {
                        await fetch('/api/auth.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'action=updateTheme&theme=' + newTheme,
                            credentials: 'include'
                        });
                    } catch (e) {}
                }
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = newTheme === 'dark';
                addCharacterMessage("Theme switched to " + newTheme + " mode!");
                return;
            }
            
            if (cmd.toLowerCase() === '--exit') {
                window.location.href = '../index.html';
                return;
            }
            
            if (cmd.toLowerCase() === '--help') {
                addCharacterMessage("Type --start to return to the main menu!");
                addCharacterMessage("Type --beginner for beginner lessons (1-12)");
                addCharacterMessage("Type --intermediate for intermediate lessons (13-24)");
                addCharacterMessage("Type --fullscreen to toggle fullscreen mode");
                addCharacterMessage("Type --darkmode to toggle dark/light mode");
                addCharacterMessage("Type --exit to go back to homepage");
                addCharacterMessage("Type --level to see your current level");
                addCharacterMessage("Type --hint if you're stuck");
                return;
            }
            
            if (cmd.toLowerCase() === '--tables') {
                addCharacterMessage("We have three tables: users, products, and orders.");
                addCharacterMessage("users: id, name, email, role");
                addCharacterMessage("products: id, name, price, category");
                addCharacterMessage("orders: id, user_id, product_id, quantity, order_total");
                return;
            }
            
            if (cmd.toLowerCase() === '--level') {
                addLine('Current level: ' + (currentLevel + 1) + ' - ' + levels[currentLevel].title);
                return;
            }
            
            if (cmd.toLowerCase() === '--skip') {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    addCharacterMessage("You finished all the levels! You're a SQL star! Type --start to go again!");
                    return;
                }
                showLevel();
                return;
            }
            
            if (cmd.toLowerCase() === '--hint') {
                addCharacterMessage("No worries, dear! The hint is: " + levels[currentLevel].hint);
                return;
            }
            
            if (checkAnswer(cmd)) {
                await showSuccess();
                saveProgress(currentLevel + 2);
                currentLevel++;
                
                if (currentLevel >= levels.length) {
                    addLine('');
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    if (levels === beginnerLevels) {
                        addCharacterMessage("CONGRATULATIONS, SWEETHEART! You completed all 12 beginner SQL lessons! I'm so incredibly proud of you! Type --intermediate to continue your journey!");
                    } else if (levels === intermediateLevels) {
                        addCharacterMessage("CONGRATULATIONS, DARLING! You completed all 12 intermediate SQL lessons! You're a SQL superstar! Type --beginner to start over!");
                    }
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    addLine('');
                } else {
                    setTimeout(() => showLevel(), 1500);
                }
            } else {
                addCharacterMessage("Hmm, that's not quite right, dear. Try again! Remember - just type what I showed you. You've got this!");
            }
        }
        
        input.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            });
        }
        
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            startGame();
        }
        init();
    </script>
</body>
