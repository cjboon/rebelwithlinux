<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">df/du Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type df/du command:</div>
                <textarea id="command-input" placeholder="df -h" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Run Command</button>
                <div class="hint">Press Ctrl+Enter to run</div>
            </div>
            <div class="df-output-area" id="df-output">
                <div class="df-output-line" style="color: #586e75;">df/du output will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const dfOutput = document.getElementById('df-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=df');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'df', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addDfLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'df-error-line' : type === 'success' ? 'df-success-line' : 'df-output-line';
            line.textContent = text;
            dfOutput.appendChild(line);
            dfOutput.scrollTop = dfOutput.scrollHeight;
        }
        
        function clearDfOutput() { dfOutput.innerHTML = ''; }
        
        function runDf(cmd) {
            addDfLine('$ ' + cmd);
            
            const responses = {
                "df -h": "Filesystem      Size  Used Avail Use% Mounted on\n/dev/sda1       100G   45G   55G  45% /\ntmpfs           2.0G  1.2M  2.0G   1% /dev\n/dev/sdb1       500G  234G  266G  47% /data",
                "df -a": "Filesystem      Size  Used Avail Use% Mounted on\nproc               0     0     0   -  /proc\nsysfs              0     0     0   -  /sys\n/dev/sda1       100G   45G   55G  45% /",
                "df -T": "Filesystem     Type  Size  Used Avail Use% Mounted on\n/dev/sda1      ext4  100G   45G   55G  45% /\ntmpfs          tmpfs  2.0G  1.2M  2.0G   1% /dev",
                "df -i": "Filesystem      Inodes IUsed IFree IUse% Mounted on\n/dev/sda1     6553600  234567 6319033   4% /",
                "df -h /home": "Filesystem      Size  Used Avail Use% Mounted on\n/dev/sda2       200G   156G   44G  78% /home",
                "du -h": "4.0K    ./.cache\n156M    ./downloads\n2.3G    ./projects",
                "du -sh": "2.5G    /home",
                "du -sh *": "2.3G    projects\n156M    downloads\n45M     documents",
                "du -h --max-depth=1": "4.0K    ./.cache\n156M    ./downloads\n2.3G    ./projects",
                "du -ah": "4.0K    ./.bashrc\n2.3G    ./projects/main.zip\n156M    ./downloads/video.mp4",
                "du -sm": "2500    /home",
                "du -s * | sort -rn": "2500    /home\n 500    /var\n 200    /etc",
                "du -h /var/log": "4.0K    /var/log/syslog\n45M     /var/log",
                "du --exclude='*.log'": "1.2G    /var",
                "ncdu": "Interactive disk usage analyzer (not available in this tutorial)",
                "df -k": "Filesystem      1K-blocks   Used Available Use% Mounted on\n/dev/sda1      104857600  47185920  56871680  45% /",
                "df -m": "Filesystem      1M-blocks   Used Available Use% Mounted on\n/dev/sda1      102400      46080      56320  45% /",
                "df -P": "/dev/sda1 100G 45G 55G 45% /",
                "du -c": "2500    total",
                "du -d 1": "2.3G    ./projects\n156M    ./downloads"
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addDfLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.toLowerCase().includes('df') || cmd.toLowerCase().includes('du')) {
                    addDfLine('Command executed');
                    matched = true;
                } else {
                    addDfLine('Try: df -h', 'error');
                }
            }
        }
        
        const character = {
            name: "Disk Detective Daisy",
            greeting: "Hey! I'm Disk Detective Daisy - disk usage expert! df shows filesystem space, du shows directory sizes. When disk is full, I'm the detective who finds the space hogs! Let's investigate!",
            encourage: ["Excellent!", "Space found!", "You're a disk detective!", "Keep investigating!", "Storage managed!", "Brilliant!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "df Basic Usage", intro: "Welcome! df shows disk space usage for filesystems.", content: "Check disk space:\ndf", hint: "Type: df", answer: "df", success: "Filesystems shown! See Filesystem, Size, Used, Avail, Use%, Mounted on!", type: "contains" },
            { id: 2, title: "Human Readable -h", intro: "df -h shows sizes in human-readable format (K, M, G).", content: "Human readable:\ndf -h", hint: "Type: df -h", answer: "df -h", success: "Easy to read! -h shows 100G instead of 104857600 blocks. Always use -h!", type: "contains" },
            { id: 3, title: "df Filesystem Type -T", intro: "df -T shows the filesystem type (ext4, xfs, tmpfs).", content: "Show filesystem type:\ndf -T", hint: "Type: df -T", answer: "df -T", success: "Type shown! ext4, xfs, tmpfs, vfat - each has different features!", type: "contains" },
            { id: 4, title: "df Inodes -i", intro: "df -i shows inode usage. Inodes store file metadata - can run out even with space!", content: "Check inodes:\ndf -i", hint: "Type: df -i", answer: "df -i", success: "Inodes shown! IFree shows available inodes. Can fill up with millions of tiny files!", type: "contains" },
            { id: 5, title: "df Specific Mount", intro: "df -h /home shows only the filesystem containing /home.", content: "Check /home:\ndf -h /home", hint: "Type: df -h /home", answer: "df -h /home", success: "/home filesystem shown! Useful for specific partitions!", type: "contains" },
            { id: 6, title: "du Basic Usage", intro: "du shows directory space usage. Without args, shows current directory.", content: "Check directory size:\ndu", hint: "Type: du", answer: "du", success: "Directory sizes shown! Lists all subdirectories recursively!", type: "contains" },
            { id: 7, title: "du Human Readable", intro: "du -h shows sizes in human-readable format.", content: "Human readable:\ndu -h", hint: "Type: du -h", answer: "du -h", success: "Easy to read! Shows sizes like 2.3G, 156M, 4.0K!", type: "contains" },
            { id: 8, title: "du Summary Only -s", intro: "du -sh shows only the TOTAL for a directory (summary).", content: "Total size:\ndu -sh /home", hint: "Type: du -sh /home", answer: "du -sh", success: "Total shown! -s is summary, -h is human. Together: du -sh!", type: "contains" },
            { id: 9, title: "du All Files -a", intro: "du -ah shows all files AND directories, not just dirs.", content: "All files:\ndu -ah | head", hint: "Type: du -ah", answer: "du -ah", success: "All files shown! du -ah shows every file size recursively!", type: "contains" },
            { id: 10, title: "du Max Depth -d", intro: "du -d 1 (or --max-depth=1) limits to N levels deep.", content: "One level deep:\ndu -d 1 -h", hint: "Type: du -d 1", answer: "du -d", success: "One level! -d 1 shows only immediate subdirs. Good overview!", type: "contains" },
            { id: 11, title: "du Sort by Size", intro: "du -s * | sort -rn sorts by size, largest first.", content: "Sorted by size:\ndu -sh * | sort -rn", hint: "Type: sort -rn", answer: "sort -rn", success: "Largest first! Piping to sort -rn shows biggest items at top!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "Final challenge! Find total size of /var and check its filesystem space!", content: "Challenge:\ndu -sh /var && df -h /var", hint: "Type: du -sh /var", answer: "du -sh /var", success: "BEGINNER COMPLETE! You master: df -h/-T/-i, du -h/-s/-a/-d! Disk detective pro!", type: "starts" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "df Block Size -k/-m", intro: "INTERMEDIATE! df -k shows blocks in KB, df -m in MB.", content: "KB blocks:\ndf -k", hint: "Type: df -k", answer: "df -k", success: "KB blocks! -k = 1K blocks, -m = 1M blocks. Control precision!", type: "contains" },
            { id: 2, title: "df All Filesystems -a", intro: "df -a shows all filesystems including pseudo ones like proc.", content: "All filesystems:\ndf -a", hint: "Type: df -a", answer: "df -a", success: "All shown! Includes proc, sysfs, tmpfs - the full picture!", type: "contains" },
            { id: 3, title: "du Exclude Pattern", intro: "du --exclude='*.log' excludes files matching pattern.", content: "Exclude logs:\ndu -sh --exclude='*.log' /var", hint: "Type: --exclude='*.log'", answer: "--exclude=", success: "Excluded! Useful to find what's eating space excluding known ignore files!", type: "contains" },
            { id: 4, title: "du Count Only -c", intro: "du -c adds a total line showing grand total.", content: "With total:\ndu -shc *", hint: "Type: du -c", answer: "du -c", success: "Total added! -c adds 'total' line. Grand total of everything!", type: "contains" },
            { id: 5, title: "du Megabytes -m", intro: "du -m shows sizes in megabytes (like df -m).", content: "MB sizes:\ndu -m | head", hint: "Type: du -m", answer: "du -m", success: "MB precision! -m rounds to MB. Good for moderate-sized directories!", type: "contains" },
            { id: 6, title: "df Output Format -P", intro: "df -P uses single-line output (POSIX format) - good for parsing.", content: "POSIX format:\ndf -P", hint: "Type: df -P", answer: "df -P", success: "Single line! -P prevents line wrapping. Essential for scripts!", type: "contains" },
            { id: 7, title: "Find Large Files", intro: "Combine find with du to find files over a certain size.", content: "Find large files:\nfind /home -type f -size +100M -exec du -h {} \\;", hint: "Type: find -size", answer: "find -size", success: "Large files found! find -size +100M finds files over 100MB!", type: "contains" },
            { id: 8, title: "du Top 10 Biggest", intro: "du -sm * | sort -rn | head -10 shows top 10 biggest subdirs in MB.", content: "Top 10 biggest:\ndu -sm * | sort -rn | head -10", hint: "Type: | head -10", answer: "head -10", success: "Top 10! Sort by size (-rn), take first 10. Quick space hogs identification!", type: "contains" },
            { id: 9, title: "ncdu Interactive", intro: "ncdu is an interactive ncurses-based du - great for exploration!", content: "Try ncdu:\nncdu /home", hint: "Type: ncdu", answer: "ncdu", success: "Interactive! ncdu is an interactive analyzer. Arrow keys to navigate, d to delete!", type: "contains" },
            { id: 10, title: "Filesystem UUIDs", intro: "lsblk -f shows filesystems with UUIDs - useful for fstab.", content: "List filesystems:\nlsblk -f", hint: "Type: lsblk -f", answer: "lsblk -f", success: "UUIDs shown! Mount by UUID instead of /dev/sda1 - more reliable!", type: "contains" },
            { id: 11, title: "Disk Space Alert", intro: "df -h | awk '$5 > 80 {print \"Alert: \" $1 \" is \" $5 \" full\"}'", content: "Alert script:\ndf -h | awk '$5 > 80 {print $1 \" is \" $5 \" full\"}'", hint: "Type: awk '$5 >", answer: "awk '$5 >", success: "Alert created! awk checks usage column and alerts when over 80%. Sysadmin essential!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Final challenge! Find top 5 space hogs in /home, then check if /home is over 80%!", content: "Challenge:\ndu -sm /home/* | sort -rn | head -5 && df -h /home", hint: "Type: du -sm /home/*", answer: "du -sm /home/*", success: "INTERMEDIATE COMPLETE! You master: exclude, lsblk, awk alerts, ncdu! Disk MASTER!", type: "starts" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! Disk usage levels complete! You're a disk detective master!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: df -h, du -h/-s. I'll make you a disk detective!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: exclude, awk alerts, ncdu!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                await showMessage(character.name, "Press Ctrl+Enter to run df commands. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearDfOutput();
                runDf(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearDfOutput();
                runDf(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: df -h, du -h/-s (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Advanced: exclude, awk alerts, ncdu (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Type --beginner or --intermediate to start! Click options or use --fullscreen, --darkmode, --exit anytime!");
        }
        init();
    </script>
</body>
</html>
