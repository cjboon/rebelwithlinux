<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--term-bg); color: var(--term-text); font-family: 'Courier New', monospace; font-size: 15px; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .terminal-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .left-pane { border-right: 2px solid var(--term-border); }
        .terminal-header { background: var(--term-header-bg); padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--term-dot-red); }
        .dot-yellow { background: var(--term-dot-yellow); }
        .dot-green { background: var(--term-dot-green); }
        .terminal-title { margin-left: 1rem; color: var(--term-text); font-size: 0.85rem; }
        .pane-label { background: var(--term-header-bg); padding: 0.5rem 1rem; color: var(--term-text); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-area { flex: 1; display: flex; flex-direction: column; padding: 1rem; background: var(--term-bg); }
        .input-label { color: var(--term-text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
        #command-input { flex: 1; width: 100%; background: transparent; border: none; color: var(--term-text); font-family: 'Courier New', monospace; font-size: 15px; resize: none; outline: none; }
        .hint { color: var(--term-text-muted); font-size: 0.75rem; margin-top: 0.5rem; }
        .css-output-area { flex: 1; border-top: 2px solid var(--term-border); padding: 0.5rem; background: var(--term-input-bg); overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; min-height: 100px; }
        .css-output-line { color: var(--term-text-muted); margin-bottom: 0.25rem; white-space: pre-wrap; }
        .css-error-line { color: #cc6666; margin-bottom: 0.25rem; }
        .css-success-line { color: #b5bd68; margin-bottom: 0.25rem; }
        .css-preview { background: #fff; color: #333; padding: 8px; border-radius: 4px; margin-top: 8px; }
        .terminal-pane.right-pane { flex: 1; }
        .output-area { flex: 1; padding: 1rem; overflow-y: auto; background: var(--term-bg); }
        .message { margin-bottom: 1rem; line-height: 1.5; }
        .message .speaker { color: #f0c674; font-weight: bold; margin-bottom: 0.25rem; }
        .message .text { color: #b5bd68; }
        .message .text.fail { color: #cc6666; }
        .message .text.hint { color: #81a2be; font-style: italic; }
        .message .text.success { color: #b5bd68; }
        .level-title { color: #f0c674; font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; background: var(--term-bg); border-left: 3px solid var(--term-accent, #f0c674); }
        [data-theme="light"] body { background: var(--term-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] .terminal-header { background: var(--term-header-bg-light); }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: var(--term-text-dark); }
        [data-theme="light"] .pane-label { background: var(--term-header-bg-light); }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .css-output-area { background: var(--term-input-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] .css-output-area { background: var(--term-bg-light); border-top-color: var(--term-text); }
        [data-theme="light"] #command-input { color: var(--term-text-dark); }
        [data-theme="light"] .input-label { color: var(--term-text-muted); }
        [data-theme="light"] .left-pane { border-right: 2px solid var(--term-border-light); }
        [data-theme="light"] .hint { color: var(--term-text-muted); }
        [data-theme="light"] .css-output-line { color: var(--term-text-dark); }
        [data-theme="light"] .message .speaker { color: #b58900; }
        [data-theme="light"] .message .text { color: #859900; }
        [data-theme="light"] .message .text.fail { color: #dc322f; }
        [data-theme="light"] .message .text.hint { color: #268bd2; }
        [data-theme="light"] .level-title { background: var(--term-bg-light); color: #b58900; border-left-color: #b58900; }
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .terminal-pane { flex: none; height: 50vh; }
            .right-pane { border-bottom: 2px solid var(--term-border); }
            .left-pane { border-right: none; border-top: 2px solid var(--term-border); }
            body { font-size: 14px; }
            .terminal-header { padding: 8px; }
            .terminal-title { font-size: 12px; }
            textarea { min-height: 60px !important; font-size: 14px !important; }
            .mobile-run-btn { display: block !important; }
        }
        .mobile-run-btn { display: none; background: #2d5016; color: #98c379; border: none; padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; margin-top: 10px; width: 100%; border-radius: 4px; }

<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>

                <span class="terminal-title">CSS Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type CSS property or rule:</div>

            </div>

    <script>
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const cssOutput = document.getElementById('css-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=css');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'css', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addCssLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'css-error-line' : type === 'success' ? 'css-success-line' : 'css-output-line';
            line.textContent = text;
            cssOutput.appendChild(line);
            cssOutput.scrollTop = cssOutput.scrollHeight;
        }
        
        function clearCssOutput() { cssOutput.innerHTML = ''; }
        
        function runCss(cmd) {
            addCssLine('$ ' + cmd);
            
            const cssResponses = {
                'color:': '[Preview] Text color applied',
                'background-color:': '[Preview] Background color applied',
                'font-size:': '[Preview] Font size changed',
                'font-weight:': '[Preview] Font weight changed',
                'text-align:': '[Preview] Text alignment changed',
                'margin:': '[Preview] Margin spacing applied',
                'padding:': '[Preview] Padding spacing applied',
                'border:': '[Preview] Border applied',
                'display:': '[Preview] Display type changed',
                'flex': '[Preview] Flexbox layout applied',
                'grid': '[Preview] Grid layout applied',
                'position:': '[Preview] Position changed',
                'width:': '[Preview] Width changed',
                'height:': '[Preview] Height changed',
                'opacity:': '[Preview] Opacity changed',
                'transform:': '[Preview] Transform applied',
                'transition:': '[Preview] Transition applied',
                'animation:': '[Preview] Animation applied',
                'box-shadow:': '[Preview] Box shadow applied',
                'border-radius:': '[Preview] Border radius applied'
            };
            
            let matched = false;
            for (const [key, value] of Object.entries(cssResponses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addCssLine(value, 'success');
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                if (cmd.includes(':')) {
                    addCssLine('[Preview] CSS rule applied', 'success');
                    matched = true;
                } else if (cmd.startsWith('.') || cmd.startsWith('#') || cmd.startsWith('@')) {
                    addCssLine('[Preview] CSS selector recognized', 'success');
                    matched = true;
                } else {
                    addCssLine('CSS needs a property and value: property: value;', 'error');
                }
            }
        }
        
        const character = {
            name: "CSS Sarah",
            greeting: "Hey there! I'm CSS Sarah - I make websites beautiful! CSS is how we style HTML - colors, layouts, animations, everything that makes sites look amazing. Let's make some gorgeous styles together!",
            encourage: ["Looking stylish!", "You're a natural designer!", "Beautiful work!", "Style icon!", "Gorgeous!", "You're crushing it!"],
            getEncouragement: function() { return this.encourage[Math.floor(Math.random() * this.encourage.length)]; }
        };
        
        const beginnerLevels = [
            { id: 1, title: "Color Property", intro: "Let's start with the basics! The color property changes text color. We use color names, hex codes, or RGB values!", content: "Change text color to red:\ncolor: red;", hint: "Type: color: red;", answer: "color:", success: "Red text! You can use 'red', '#ff0000', or 'rgb(255,0,0)' - all mean red!", type: "contains" },
            { id: 2, title: "Background Color", intro: "background-color changes the background! Let's make some pop!", content: "Add a blue background:\nbackground-color: blue;", hint: "Type: background-color: blue;", answer: "background-color:", success: "Blue background! Great for making content stand out!", type: "contains" },
            { id: 3, title: "Font Size", intro: "font-size controls text size! We use px, em, rem, or percentages!", content: "Make text 24 pixels:\nfont-size: 24px;", hint: "Type: font-size: 24px;", answer: "font-size:", success: "24px text! px is absolute, em/rem are relative to parent. Responsive design often uses rem!", type: "contains" },
            { id: 4, title: "Font Weight", intro: "font-weight makes text bold or light. Use keywords or numbers!", content: "Make text bold:\nfont-weight: bold;", hint: "Type: font-weight: bold;", answer: "font-weight:", success: "Bold text! Numbers like 100-900 work too, or 'lighter'/'bolder'!", type: "contains" },
            { id: 5, title: "Text Align", intro: "text-align positions text horizontally - left, center, right, or justify!", content: "Center the text:\ntext-align: center;", hint: "Type: text-align: center;", answer: "text-align:", success: "Centered text! Essential for headings and paragraphs!", type: "contains" },
            { id: 6, title: "Margin", intro: "margin adds space OUTSIDE an element - like a force field around it!", content: "Add 20px margin around:\nmargin: 20px;", hint: "Type: margin: 20px;", answer: "margin:", success: "Spacing applied! margin: top right bottom left works too, or individual: margin-top, margin-right, etc!", type: "contains" },
            { id: 7, title: "Padding", intro: "padding adds space INSIDE an element - between content and border!", content: "Add 15px padding:\npadding: 15px;", hint: "Type: padding: 15px;", answer: "padding:", success: "Padding added! Margin is outside, padding is inside. Together they control spacing!", type: "contains" },
            { id: 8, title: "Border", intro: "border combines width, style, and color! Let's add some edge!", content: "Add a solid black border:\nborder: 2px solid black;", hint: "Type: border: 2px solid black;", answer: "border:", success: "Border added! border-width border-style border-color. Style can be solid, dashed, dotted!", type: "contains" },
            { id: 9, title: "Border Radius", intro: "border-radius makes corners rounded! Circles and soft edges!", content: "Round the corners:\nborder-radius: 10px;", hint: "Type: border-radius: 10px;", answer: "border-radius:", success: "Rounded corners! 50% makes a circle. Great for buttons and cards!", type: "contains" },
            { id: 10, title: "Width", intro: "width controls element width! Essential for layouts!", content: "Set width to 300px:\nwidth: 300px;", hint: "Type: width: 300px;", answer: "width:", success: "300px wide! Use max-width for responsive designs - prevents stretching on big screens!", type: "contains" },
            { id: 11, title: "Height", intro: "height controls element height! Often auto is better though!", content: "Set height to 200px:\nheight: 200px;", hint: "Type: height: 200px;", answer: "height:", success: "200px tall! height: auto is often better - lets content determine height naturally!", type: "contains" },
            { id: 12, title: "Beginner Finale", intro: "You've got the basics! Let's put color, spacing, and borders together!", content: "Style a button:\nbackground-color: blue;\ncolor: white;\npadding: 10px 20px;\nborder-radius: 5px;", hint: "Type: background-color:", answer: "background-color:", success: "BEGINNER COMPLETE! You mastered color, background, font-size, margin, padding, border! You're making beautiful styles!", type: "contains" }
        ];
        
        const intermediateLevels = [
            { id: 1, title: "Display Flex", intro: "Welcome to intermediate! flexbox is amazing for layouts! display: flex starts the magic!", content: "Create a flex container:\ndisplay: flex;", hint: "Type: display: flex;", answer: "display: flex", success: "Flex container created! flex-direction, justify-content, align-items become available!", type: "contains" },
            { id: 2, title: "Flex Direction", intro: "flex-direction sets the main axis - row or column!", content: "Stack items vertically:\nflex-direction: column;", hint: "Type: flex-direction: column;", answer: "flex-direction:", success: "Items stack! row is default (horizontal), column is vertical!", type: "contains" },
            { id: 3, title: "Justify Content", intro: "justify-content aligns items along the MAIN axis!", content: "Center items:\njustify-content: center;", hint: "Type: justify-content: center;", answer: "justify-content:", success: "Items centered! Other values: flex-start, flex-end, space-between, space-around!", type: "contains" },
            { id: 4, title: "Align Items", intro: "align-items aligns items along the CROSS axis!", content: "Center items vertically:\nalign-items: center;", hint: "Type: align-items: center;", answer: "align-items:", success: "Vertical centering! Together with justify-content you can center anything!", type: "contains" },
            { id: 5, title: "Gap", intro: "gap adds space between flex items - no more margin hacks!", content: "Add 20px gap:\ngap: 20px;", hint: "Type: gap: 20px;", answer: "gap:", success: "Gap applied! Works in flexbox and grid. row-gap and column-gap for individual control!", type: "contains" },
            { id: 6, title: "Flex Wrap", intro: "flex-wrap lets items wrap to new lines when they run out of space!", content: "Allow wrapping:\nflex-wrap: wrap;", hint: "Type: flex-wrap: wrap;", answer: "flex-wrap:", success: "Wrapping enabled! Without this, flex items shrink. With it, they flow to next line!", type: "contains" },
            { id: 7, title: "Position Relative", intro: "position: relative makes an element positioned relative to itself!", content: "Position relatively:\nposition: relative;", hint: "Type: position: relative;", answer: "position: relative", success: "Relative positioning set! Now you can use top, right, bottom, left to offset it!", type: "contains" },
            { id: 8, title: "Position Absolute", intro: "position: absolute positions relative to the nearest positioned ancestor!", content: "Position absolutely:\nposition: absolute;", hint: "Type: position: absolute;", answer: "position: absolute", success: "Absolute positioning! Parent must be relative/absolute for predictable behavior!", type: "contains" },
            { id: 9, title: "Z-Index", intro: "z-index controls which element is on top! Higher = more on top!", content: "Bring to front:\nz-index: 10;", hint: "Type: z-index: 10;", answer: "z-index:", success: "z-index set! Only works on positioned elements (relative, absolute, fixed, sticky)!", type: "contains" },
            { id: 10, title: "Opacity", intro: "opacity controls transparency - 1 is solid, 0 is invisible!", content: "Make semi-transparent:\nopacity: 0.5;", hint: "Type: opacity: 0.5;", answer: "opacity:", success: "50% opacity! Great for hover effects or backgrounds!", type: "contains" },
            { id: 11, title: "Box Shadow", intro: "box-shadow adds shadow effects! depth and dimension!", content: "Add a shadow:\nbox-shadow: 0 4px 6px rgba(0,0,0,0.1);", hint: "Type: box-shadow: 0 4px 6px rgba(0,0,0,0.1);", answer: "box-shadow:", success: "Shadow applied! offset-x offset-y blur spread color - adds depth to elements!", type: "contains" },
            { id: 12, title: "Intermediate Finale", intro: "Intermediate complete! Flexbox, positioning, shadows - you're building real layouts!", content: "Card with shadow and flex:\ndisplay: flex;\nalign-items: center;\nbox-shadow: 0 2px 8px rgba(0,0,0,0.15);", hint: "Type: display: flex;", answer: "display: flex", success: "INTERMEDIATE COMPLETE! You can now build modern layouts with flexbox and add depth with shadows!", type: "contains" }
        ];
        
        const expertLevels = [
            { id: 1, title: "CSS Grid", intro: "Welcome to expert! CSS Grid is a two-dimensional layout system!", content: "Create a grid container:\ndisplay: grid;", hint: "Type: display: grid;", answer: "display: grid", success: "Grid container created! Grid is powerful for complex layouts - rows AND columns!", type: "contains" },
            { id: 2, title: "Grid Template Columns", intro: "grid-template-columns defines column sizes!", content: "Three equal columns:\ngrid-template-columns: 1fr 1fr 1fr;", hint: "Type: grid-template-columns: 1fr 1fr 1fr;", answer: "grid-template-columns:", success: "3 equal columns! fr = fraction of available space. repeat(3, 1fr) does same thing!", type: "contains" },
            { id: 3, title: "Grid Gap", intro: "gap works in grid too - spacing between rows and columns!", content: "Add 20px gap:\ngap: 20px;", hint: "Type: gap: 20px;", answer: "gap:", success: "Grid gap set! row-gap and column-gap for separate control!", type: "contains" },
            { id: 4, title: "Grid Column Start/End", intro: "grid-column controls how items span columns!", content: "Span 2 columns:\ngrid-column: 1 / 3;", hint: "Type: grid-column: 1 / 3;", answer: "grid-column:", success: "Item spans 2 columns! span keyword also works: grid-column: span 2", type: "contains" },
            { id: 5, title: "Transition", intro: "transitions smoothly animate property changes!", content: "Add hover transition:\ntransition: all 0.3s ease;", hint: "Type: transition: all 0.3s ease;", answer: "transition:", success: "Transition added! property duration timing-function - smooth hover effects!", type: "contains" },
            { id: 6, title: "Transform Scale", intro: "transform can scale, rotate, move elements!", content: "Scale up on hover:\ntransform: scale(1.1);", hint: "Type: transform: scale(1.1);", answer: "transform:", success: "Scale transform! scale(1.1) is 110%. Combine with :hover for effects!", type: "contains" },
            { id: 7, title: "CSS Variables", intro: "CSS variables let you reuse values throughout your stylesheet!", content: "Define a variable:\n--primary-color: blue;\ncolor: var(--primary-color);", hint: "Type: --primary-color:", answer: "--", success: "CSS variable created! --name: value, then var(--name) to use. Change once, update everywhere!", type: "starts" },
            { id: 8, title: "Media Queries", intro: "Media queries make designs responsive to screen size!", content: "Mobile styles:\n@media (max-width: 768px) {\n  .container { flex-direction: column; }\n}", hint: "Type: @media (max-width: 768px) {", answer: "@media", success: "Media query added! Styles inside only apply when condition is met!", type: "contains" },
            { id: 9, title: "Pseudo-class :hover", intro: ":hover adds styles when mouse is over an element!", content: "Hover effect:\nbutton:hover {\n  background-color: darkblue;\n}", hint: "Type: button:hover {", answer: ":hover", success: "Hover styles added! Other pseudo-classes: :focus, :active, :nth-child()!", type: "contains" },
            { id: 10, title: "Flex Grow & Shrink", intro: "flex-grow and flex-shrink control how items grow/shrink in flex container!", content: "Allow growing:\nflex-grow: 1;", hint: "Type: flex-grow: 1;", answer: "flex-grow:", success: "Flex grow enabled! flex: 1 means grow=same, shrink=same, basis=0. Takes remaining space!", type: "contains" },
            { id: 11, title: "Position Fixed", intro: "position: fixed locks element relative to viewport!", content: "Fix to viewport:\nposition: fixed;\ntop: 0;\nright: 0;", hint: "Type: position: fixed;", answer: "position: fixed", success: "Fixed positioning! Stays in place while scrolling. Great for sticky headers!", type: "contains" },
            { id: 12, title: "Expert Finale", intro: "Expert complete! Grid, transitions, variables, media queries - you're a CSS master!", content: "Responsive card grid:\ndisplay: grid;\ngrid-template-columns: repeat(auto-fit, minmax(250px, 1fr));\ngap: 20px;", hint: "Type: display: grid;", answer: "display: grid", success: "EXPERT COMPLETE! auto-fit + minmax = responsive grid without media queries! You're a CSS wizard!", type: "contains" }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') return user === answer;
            else if (level.type === 'contains') return user.includes(answer);
            else if (level.type === 'starts') return user.startsWith(answer);
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! CSS levels complete! You're a style superstar!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') { levels = beginnerLevels; await showMessage(character.name, "Excellent! Basics: color, background, fonts, spacing. Let's make pretty styles!"); }
            else if (trackName === 'intermediate') { levels = intermediateLevels; await showMessage(character.name, "Welcome back! Advanced: flexbox, positioning, shadows. Let's build layouts!"); }
            else if (trackName === 'expert') { levels = expertLevels; await showMessage(character.name, "Expert level! Grid, transitions, variables, media queries. Let's master CSS!"); }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { document.documentElement.requestFullscreen(); }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'action=updateTheme&theme=' + newTheme, credentials: 'include' });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                await showMessage(character.name, "Press Ctrl+Enter to run. Use --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                const level = levels[currentLevel];
                clearCssOutput();
                runCss(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearCssOutput();
                runCss(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) { currentLevel = savedLevel - 1; }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basics: color, background, fonts, spacing (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Flexbox, positioning, shadows (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Grid, transitions, variables (lessons 25-36)';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv5);
            
            const menuDiv6 = document.createElement('div');
            menuDiv6.className = 'output-line choice';
            menuDiv6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv6);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit");
        }
        init();
    </script>
