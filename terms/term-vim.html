    <script>
    
        
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const vimOutput = document.getElementById('vim-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=vim');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'vim', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addVimLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'vim-error-line' : 'vim-output-line';
            line.textContent = text;
            vimOutput.appendChild(line);
            vimOutput.scrollTop = vimOutput.scrollHeight;
        }
        
        function clearVimOutput() {
            vimOutput.innerHTML = '';
        }
        
        async function showCharacterMessage(text, showName = true) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        if (showName) {
                            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        } else {
                            line.innerHTML = '<span class="character-name">' + character.name + '</span> ' + currentText;
                        }
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        const character = {
            name: "Vim Vince",
            greeting: "Greetings! I'm Vim Vince - your guide to the most powerful text editor! Vim is modal - different modes for different tasks. Steep learning curve, but SO worth it!",

            },

            },
            {

                content: "Replace 'hello' with 'hi':\nType :s/hello/hi/",

        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            
            const speakerSpan = document.createElement('div');
            speakerSpan.className = 'speaker';
            speakerSpan.textContent = speaker + ':';
            div.appendChild(speakerSpan);
            
            const textSpan = document.createElement('div');
            textSpan.className = 'text ' + className;
            div.appendChild(textSpan);
            history.appendChild(div);
            
            // Type out the text
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textSpan.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            
            if (level.type === 'exact') {
                return user === answer;
            } else if (level.type === 'contains') {
                return user.includes(answer);
            } else if (level.type === 'starts') {
                return user.startsWith(answer);
            }
            return false;
        }
        
        function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            showMessage(character.name, level.intro);
            showMessage(character.name, level.content);
            showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                showMessage(character.name, "CONGRATULATIONS! Vim levels complete! You're a Vim ninja - edit at the speed of thought!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                showMessage(character.name, "Excellent! Basics: navigation, insert, delete. I'll make you a Vim master!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                showMessage(character.name, "Welcome back! Visual mode, search, replace, macros - Vim's power features!");
            }
            
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'action=updateTheme&theme=' + newTheme,
                        credentials: 'include'
                    });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                // Check special commands
                if (userAnswer === '--beginner') {
                    startTrack('beginner');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--intermediate') {
                    startTrack('intermediate');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--fullscreen') {
                    toggleFullscreen();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--darkmode') {
                    toggleDarkMode();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--exit') {
                    window.location.href = '../index.html';
                    return;
                }
                if (userAnswer === '--start' || userAnswer === '--restart') {
                    startGame();
                    input.value = '';
                    return;
                }
                
                const level = levels[currentLevel];
                clearVimOutput();
                addVimLine('> ' + userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    showMessage(character.name, level.success, 'success');
                    showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                // Check special commands
                if (userAnswer === '--beginner') {
                    startTrack('beginner');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--intermediate') {
                    startTrack('intermediate');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--fullscreen') {
                    toggleFullscreen();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--darkmode') {
                    toggleDarkMode();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--exit') {
                    window.location.href = '../index.html';
                    return;
                }
                if (userAnswer === '--start' || userAnswer === '--restart') {
                    startGame();
                    input.value = '';
                    return;
                }
                
                const level = levels[currentLevel];
                clearVimOutput();
                addVimLine('> ' + userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    showMessage(character.name, level.success, 'success');
                    showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        // Initialize
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            await showMessage(character.name, character.greeting, '', true);
            
            // Add menu options
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Navigation & basic editing (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Visual mode, search & macros (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit", '', true);
        }
        init();
    </script>
</body>
</html>
