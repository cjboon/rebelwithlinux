    <script>
    
        
        const input = document.getElementById('command-input');

        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=curl');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'curl', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addCurlLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'curl-error-line' : 'curl-output-line';
            line.textContent = text;
            curlOutput.appendChild(line);
            curlOutput.scrollTop = curlOutput.scrollHeight;
        }
        
        function clearCurlOutput() {
            curlOutput.innerHTML = '';
        }
        
        async function runCurl(cmd) {
            addCurlLine('$ ' + cmd);
            
            // Simulated curl responses
            const responses = {
                'curl httpbin.org/get': '{\n  "args": {},\n  "headers": {\n    "Host": "httpbin.org"\n  },\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/get"\n}',
                'curl https://httpbin.org/get': '{\n  "args": {},\n  "headers": {\n    "Host": "httpbin.org"\n  },\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/get"\n}',
                'curl -i httpbin.org/get': 'HTTP/1.1 200 OK\ndate: Mon, 09 Mar 2026 22:00:00 GMT\ncontent-type: application/json\n{\n  "args": {},\n  "headers": {\n    "Host": "httpbin.org"\n  },\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/get"\n}',
                'curl -I httpbin.org/get': 'HTTP/1.1 200 OK\ndate: Mon, 09 Mar 2026 22:00:00 GMT\ncontent-type: application/json',
                'curl -X POST httpbin.org/post': '{\n  "args": {},\n  "data": "",\n  "files": {},\n  "form": {},\n  "headers": {\n    "Content-Length": "0"\n  },\n  "json": null,\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/post"\n}',
                'curl -d "name=Alice" httpbin.org/post': '{\n  "args": {},\n  "data": "name=Alice",\n  "files": {},\n  "form": {},\n  "headers": {\n    "Content-Length": "11",\n    "Content-Type": "application/x-www-form-urlencoded"\n  },\n  "json": null,\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/post"\n}',
                'curl -H "Content-Type: application/json" httpbin.org/post': '{\n  "args": {},\n  "data": "",\n  "files": {},\n  "form": {},\n  "headers": {\n    "Content-Length": "0",\n    "Content-Type": "application/json"\n  },\n  "json": null,\n  "origin": "203.0.113.42",\n  "url": "https://httpbin.org/post"\n}',
                'curl -A "Mozilla/5.0" httpbin.org/headers': '{\n  "headers": {\n    "Accept": "*/*",\n    "Host": "httpbin.org",\n    "User-Agent": "Mozilla/5.0"\n  }\n}',
                'curl -v httpbin.org/get': '* Trying 203.0.113.42:80...\n* Connected to httpbin.org (203.0.113.42) port 80\n> GET /get HTTP/1.1\n> Host: httpbin.org\n> User-Agent: curl/8.0\n> Accept: */*\n< HTTP/1.1 200 OK\n< content-type: application/json\n{\n  "args": {},\n  "headers": {\n    "Host": "httpbin.org"\n  }\n}',
                'curl -o output.txt httpbin.org/bytes/100': '  % Total    % Received  % Xfer  100  100      0     0 --:--:-- --:--:-- --:--:-- --:--:--\nSaved to bytes.txt',
                'curl -u user:pass httpbin.org/basic-auth/user/pass': '{\n  "authenticated": true,\n  "user": "user"\n}',
                'curl -b "session=abc123" httpbin.org/cookies': '{\n  "cookies": {\n    "session": "abc123"\n  }\n}',
                'curl -c cookies.txt httpbin.org/cookies/set/session/abc123': '{\n  "cookies": {\n    "session": "abc123"\n  }\n}'
            };
            
            // Check if command matches any response
            let matched = false;
            for (const [key, value] of Object.entries(responses)) {
                if (cmd.toLowerCase().includes(key.toLowerCase())) {
                    addCurlLine(value);
                    matched = true;
                    break;
                }
            }
            
            if (!matched) {
                // Generic responses based on patterns
                if (cmd.toLowerCase().includes('curl') && cmd.toLowerCase().includes('get')) {
                    addCurlLine('{\n  "args": {},\n  "origin": "203.0.113.42"\n}');
                } else if (cmd.toLowerCase().includes('curl') && (cmd.toLowerCase().includes('post') || cmd.toLowerCase().includes('-d') || cmd.toLowerCase().includes('--data'))) {
                    addCurlLine('{\n  "data": "...",\n  "origin": "203.0.113.42"\n}');
                } else if (cmd.toLowerCase().includes('curl')) {
                    addCurlLine('Command executed successfully (simulated response)');
                } else {
                    addCurlLine('Not a curl command. Start with: curl', 'error');
                }
            }
        }

                hint: "Type: curl -X PUT",
                answer: "curl -X PUT",
                success: "PUT sent! -X can set any method: PUT, DELETE, PATCH. REST APIs use them all!",
                type: "contains"
            },
            {
                id: 10,
                title: "Delete Requests",
                intro: "Use -X DELETE to send a DELETE request - removes resources!",
                content: "Send DELETE request:\ncurl -X DELETE httpbin.org/delete",
                hint: "Type: curl -X DELETE",
                answer: "curl -X DELETE",
                success: "DELETE sent! The full CRUD: GET, POST, PUT, DELETE. You can now do ANYTHING with APIs!",
                type: "contains"
            },
            {
                id: 11,
                title: "Insecure HTTPS",
                intro: "Use -k or --insecure to skip SSL verification. NEVER in production, sometimes needed for testing!",
                content: "Skip SSL verify:\ncurl -k https://self-signed.badssl.com/",
                hint: "Type: curl -k",
                answer: "curl -k",
                success: "Insecure mode! Skips SSL verification. Use only for testing with self-signed certs!",
                type: "contains"
            },
            {
                id: 12,
                title: "Intermediate Finale",
                intro: "Final challenge! POST JSON with auth and cookies - the full API request!",
                content: "POST with auth + JSON:\ncurl -u user:pass -H \"Content-Type: application/json\" -d '{\"name\":\"Test\"}' httpbin.org/post",
                hint: "Type: curl -u user:pass -H \"Content-Type: application/json\"",
                answer: "curl -u",
                success: "INTERMEDIATE COMPLETE! You can now: POST/PUT/DELETE, send JSON, add headers, auth, cookies. You're an API MASTER!",
                type: "starts"
            }
        ];
        
        let levels = beginnerLevels;
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            
            if (level.type === 'exact') {
                return user === answer;
            } else if (level.type === 'contains') {
                return user.includes(answer);
            } else if (level.type === 'starts') {
                return user.startsWith(answer);
            }
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel + 1);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "CONGRATULATIONS! You've completed all curl levels! You're now an HTTP/API master - ready to build amazing web services!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                await showMessage(character.name, "Excellent! We'll start from the basics - GET requests, headers, downloading. I'll make you an HTTP hero!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                await showMessage(character.name, "Welcome back! POST, JSON, authentication, cookies - these are the skills that make real API developers!");
            }
            
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'action=updateTheme&theme=' + newTheme,
                        credentials: 'include'
                    });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') {
                    startTrack('beginner');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--intermediate') {
                    startTrack('intermediate');
                    input.value = '';
                    return;
                }
                if (userAnswer === '--fullscreen') {
                    toggleFullscreen();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--darkmode') {
                    toggleDarkMode();
                    input.value = '';
                    return;
                }
                if (userAnswer === '--exit') {
                    window.location.href = '../index.html';
                    return;
                }
                
                await showMessage(character.name, "Press Ctrl+Enter to run curl commands. Use --beginner, --intermediate, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearCurlOutput();
                await runCurl(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                
                const level = levels[currentLevel];
                clearCurlOutput();
                await runCurl(userAnswer);
                
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite! " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        // Initialize
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            await showMessage(character.name, character.greeting, '', true);
            
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Basic GET requests & options (lessons 1-12)';
            history.appendChild(menuDiv);
            
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - POST, headers, authentication (lessons 13-24)';
            history.appendChild(menuDiv2);
            
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv3);
            
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv4);
            
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv5);
            
            await showMessage(character.name, "Choose your path - click above or type --beginner, --intermediate, --fullscreen, --darkmode, or --exit", '', true);
        }
        init();
    </script>
