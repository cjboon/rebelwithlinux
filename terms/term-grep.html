        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) {
                    userId = data.email;
                    userTheme = data.theme || 'dark';
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=grep');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        return Math.max(...data.map(p => p.lesson_id));
                    }
                }
            } catch (e) {}
            return null;
        }
        
        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'grep', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function addBashLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'bash-error-line' : 'bash-output-line';
            line.textContent = text;
            bashOutput.appendChild(line);
            bashOutput.scrollTop = bashOutput.scrollHeight;
        }
        
        function clearBashOutput() {
            bashOutput.innerHTML = '';
        }
        
        async function runBashCode(cmd) {
            addBashLine('$ ' + cmd);
            try {
                const response = await fetch('/cgi-bin/bash_exec.py', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'code=' + encodeURIComponent(cmd)
                });
                const data = await response.json();
                if (data.error) {
                    addBashLine(data.output, 'error');
                } else {
                    if (data.output) {
                        data.output.split('\n').forEach(line => addBashLine(line));
                    } else {
                        addBashLine('(no output)', 'output');
                    }
                }
            } catch (e) {
                addBashLine('Error: ' + e.message, 'error');
            }
        }

                hint: "Type: grep -o \"error\" | wc",
                answer: "grep -o \"error\" | wc",
                success: "Precise counting! -o extracts each match, wc -l counts lines. More accurate than -c for multiple matches per line!",
                type: "contains"
            },
            {
                id: 31,
                title: "Inverse with -L (files-without-match)",
                intro: "grep -L shows files that DON'T contain the pattern - the opposite of -l!",
                content: "Find files without pattern:\ngrep -rL \"Copyright\" src/",
                hint: "Type: grep -rL",
                answer: "grep -rL",
                success: "Files without match! -L inverts -l. Great for finding files missing headers, imports, or configuration!",
                type: "contains"
            },
            {
                id: 32,
                title: "Label with -H and -h",
                intro: "-H always prints filename, -h never prints it. Control filename display!",
                content: "Force filename display:\ngrep -H \"pattern\" file.txt",
                hint: "Type: grep -H",
                answer: "grep -H",
                success: "Filename forced! -H is default for multiple files, -h suppresses it. Useful in scripts!",
                type: "contains"
            },
            {
                id: 33,
                title: "Binary Files with -I",
                intro: "-I (capital i) ignores binary files completely - don't treat them as text at all!",
                content: "Skip binary files:\ngrep -rI \"secret\" /var/log",
                hint: "Type: grep -rI",
                answer: "grep -rI",
                success: "Binary ignored! -I treats binary files as if they don't exist. -a would show them, -I ignores them. Clean searches!",
                type: "contains"
            },
            {
                id: 34,
                title: "Line Buffering with -line-buffered",
                intro: "Use --line-buffered for grep in pipelines to ensure immediate output!",
                content: "Buffered grep:\nping host | grep --line-buffered \"bytes from\"",
                hint: "Type: grep --line-buffered",
                answer: "grep --line-buffered",
                success: "Line buffered! Useful for monitoring commands that don't flush often. ping | grep --line-buffered shows real-time!",
                type: "contains"
            },
            {
                id: 35,
                title: "Word Regex with -w",
                intro: "-w matches whole words only. 'cat' won't match 'category' or 'catastrophe'!",
                content: "Whole word match:\ngrep -rw \"for\" code.py",
                hint: "Type: grep -rw",
                answer: "grep -rw",
                success: "Whole words! -w ensures complete word match. -i would add case insensitivity. Precise searching!",
                type: "contains"
            },
            {
                id: 36,
                title: "Expert Finale - Master Search",
                intro: "You've mastered grep! Let's combine EVERYTHING - Perl regex, null delimiters, color, and batch operations!",
                content: "The ultimate grep command:\ngrep -rP --color=auto -l \"\\b\\w+@\\w+\\.\\w+\\b\" --include=\"*.txt\" . | xargs -0 sed -i 's/@/ [at] /g'",
                hint: "Type: grep -rP --color",
                answer: "grep -rP",
                success: "EXPERT COMPLETE! You've mastered grep from basic search to Perl regex, null delimiters, xargs pipelines! You're a TRUE search master! Go forth and find what you seek, Grep Gary believes in you!",
                type: "starts"
            }
        ];
        
        let levels = beginnerLevels;
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                await showMessage(character.name, "Excellent choice! We'll start from the basics - perfect for beginners! Let's begin your grep journey!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                await showMessage(character.name, "Welcome back! You've got the basics - now let's dive into extended regex and advanced searching!");
            } else if (trackName === 'expert') {
                levels = expertLevels;
                await showMessage(character.name, "Welcome to EXPERT mode! Perl regex, null delimiters, xargs pipelines - time to become a true search master!");
            }
            currentLevel = 0;
            showLevel();
        }
        
        window.startTrack = startTrack;
        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        window.toggleDarkMode = async function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (userId) {
                try {
                    await fetch('/api/auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'action=updateTheme&theme=' + newTheme,
                        credentials: 'include'
                    });
                } catch (e) {}
            }
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };
        
        async function showMessage(speaker, text, className = '') {
            const div = document.createElement('div');
            div.className = 'message';
            history.appendChild(div);
            const speakerDiv = document.createElement('div');
            speakerDiv.className = 'speaker';
            speakerDiv.textContent = speaker + ':';
            div.appendChild(speakerDiv);
            const textDiv = document.createElement('div');
            textDiv.className = 'text ' + className;
            div.appendChild(textDiv);
            await new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        textDiv.textContent = text.substring(0, i + 1);
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function showLevelTitle(title) {
            const div = document.createElement('div');
            div.className = 'level-title';
            div.textContent = `Level ${currentLevel + 1}: ${title}`;
            history.appendChild(div);
        }
        
        function checkAnswer(userAnswer, level) {
            const answer = level.answer.toLowerCase();
            const user = userAnswer.toLowerCase().trim();
            if (level.type === 'exact') {
                return user === answer;
            } else if (level.type === 'contains') {
                return user.includes(answer);
            } else if (level.type === 'starts') {
                return user.startsWith(answer);
            }
            return false;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            showLevelTitle(level.title);
            await showMessage(character.name, level.intro);
            await showMessage(character.name, level.content);
            await showMessage(character.name, `Hint: ${level.hint}`, 'hint');
        }
        
        async function advanceLevel() {
            currentLevel++;
            saveProgress(currentLevel);
            if (currentLevel >= levels.length) {
                await showMessage(character.name, "Congratulations! You've completed all levels! You're now a grep master. Go forth and find what you seek!");
                input.disabled = true;
                return;
            }
            showLevel();
        }
        
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                if (userAnswer === '--beginner') { startTrack('beginner'); input.value = ''; return; }
                if (userAnswer === '--intermediate') { startTrack('intermediate'); input.value = ''; return; }
                if (userAnswer === '--expert') { startTrack('expert'); input.value = ''; return; }
                if (userAnswer === '--fullscreen') { toggleFullscreen(); input.value = ''; return; }
                if (userAnswer === '--darkmode') { toggleDarkMode(); input.value = ''; return; }
                if (userAnswer === '--exit') { window.location.href = '../index.html'; return; }
                await showMessage(character.name, "Press Ctrl+Enter to run grep commands. Use --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit", 'hint');
                input.value = '';
                return;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                const level = levels[currentLevel];
                clearBashOutput();
                await runBashCode(userAnswer);
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite right. " + level.hint, 'fail');
                }
                input.value = '';
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', async function() {
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                const level = levels[currentLevel];
                clearBashOutput();
                await runBashCode(userAnswer);
                if (checkAnswer(userAnswer, level)) {
                    await showMessage(character.name, level.success, 'success');
                    await showMessage(character.name, character.getEncouragement());
                    setTimeout(advanceLevel, 1500);
                } else {
                    await showMessage(character.name, "Not quite right. " + level.hint, 'fail');
                }
                input.value = '';
            });
        }
        
        (async function init() {
            await checkLogin();
            if (userId) {
                savedLevel = await loadProgress();
                if (savedLevel > 0 && savedLevel <= levels.length) {
                    currentLevel = savedLevel - 1;
                }
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
            }
            await showMessage(character.name, character.greeting);
            const menuDiv = document.createElement('div');
            menuDiv.className = 'output-line choice';
            menuDiv.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Learn the basics (lessons 1-12)';
            history.appendChild(menuDiv);
            const menuDiv2 = document.createElement('div');
            menuDiv2.className = 'output-line choice';
            menuDiv2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - Extended regex and advanced searching (lessons 13-24)';
            history.appendChild(menuDiv2);
            const menuDiv3 = document.createElement('div');
            menuDiv3.className = 'output-line choice';
            menuDiv3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Perl regex and master techniques (lessons 25-36)';
            history.appendChild(menuDiv3);
            const menuDiv4 = document.createElement('div');
            menuDiv4.className = 'output-line choice';
            menuDiv4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menuDiv4);
            const menuDiv5 = document.createElement('div');
            menuDiv5.className = 'output-line choice';
            menuDiv5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menuDiv5);
            const menuDiv6 = document.createElement('div');
            menuDiv6.className = 'output-line choice';
            menuDiv6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menuDiv6);
            await showMessage(character.name, "Type --beginner, --intermediate, or --expert to start! Or click the options above. Use --fullscreen, --darkmode, or --exit anytime!");
        })();
    </script>
