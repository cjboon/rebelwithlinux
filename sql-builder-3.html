<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Builder 3 - Expert Database</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #ff6b6b;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: #161b22;
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-value.score {
            color: #ff6b6b;
        }
        
        .game-container {
            background: #161b22;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            border: 1px solid #30363d;
            display: none;
        }
        
        .game-container.active {
            display: block;
        }
        
        .level-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #30363d;
            transition: all 0.3s ease;
        }
        
        .level-dot.completed {
            background: #3fb950;
        }
        
        .level-dot.current {
            background: #58a6ff;
            box-shadow: 0 0 10px #58a6ff;
        }
        
        .progress-info {
            text-align: center;
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .definition-box {
            background: #0d1117;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        
        .command-name {
            font-size: 18px;
            color: #ff6b6b;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .definition-text {
            color: #c9d1d9;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .hint-text {
            color: #8b949e;
            font-size: 13px;
            font-style: italic;
        }
        
        .drop-zone {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            min-height: 60px;
            padding: 15px;
            background: #0d1117;
            border-radius: 8px;
            border: 2px dashed #30363d;
        }
        
        .letter-slot {
            width: 45px;
            height: 45px;
            border: 2px solid #30363d;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: #21262d;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .letter-slot:hover {
            border-color: #58a6ff;
        }
        
        .letter-slot.filled {
            background: #da3633;
            color: white;
            border-color: #ff6b6b;
        }
        
        .letter-slot.drag-over {
            background: #1f6feb;
            border-color: #58a6ff;
            transform: scale(1.1);
        }
        
        .letter-pool {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            min-height: 50px;
        }
        
        .letter-tile {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff6b6b 0%, #d63031 100%);
            background-color: #ff6b6b;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #0d1117;
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-drag: element;
            box-sizing: border-box;
        }
        
        .letter-tile:active {
            cursor: grabbing;
        }
        
        .letter-tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }
        
        .letter-tile.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2ea043;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
        }
        
        .btn-secondary:hover {
            background: #484f58;
            transform: translateY(-2px);
        }
        
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.correct {
            background: rgba(63, 185, 80, 0.2);
            color: #3fb950;
            border: 1px solid #3fb950;
        }
        
        .message.incorrect {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
            border: 1px solid #f85149;
        }
        
        .complete-screen {
            text-align: center;
            padding: 60px 20px;
        }
        
        .complete-screen .trophy {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .complete-screen h2 {
            font-size: 28px;
            color: #3fb950;
            margin-bottom: 10px;
        }
        
        .complete-screen p {
            color: #8b949e;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        @media (max-width: 600px) {
            .stats-bar {
                gap: 15px;
                padding: 10px 20px;
            }
            
            .letter-slot, .letter-tile {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
            
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💾 SQL BUILDER 3</h1>
        <p>Expert Database Commands</p>
    </div>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-label">Level</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value score" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Hints</div>
            <div class="stat-value" id="hints">3</div>
        </div>
    </div>
    
    <div class="game-container active" id="gameContainer">
        <div class="level-indicator" id="levelIndicator"></div>
        
        <div class="progress-info" id="progressInfo">Command 1 of 18</div>
        
        <div class="definition-box">
            <div class="command-name" id="commandName">SQL COMMAND</div>
            <div class="definition-text" id="definitionText">
                Loading definition...
            </div>
            <div class="hint-text" id="hintText"></div>
        </div>
        
        <div class="drop-zone" id="dropZone">
            <!-- Letter slots will be generated here -->
        </div>
        
        <div class="letter-pool" id="letterPool">
            <!-- Letter tiles will be generated here -->
        </div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="shuffleLetters()">🔀 Shuffle</button>
            <button class="btn btn-secondary" onclick="useHint()">💡 Hint</button>
            <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✓ Check Answer</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <div class="game-container complete-screen" id="completeScreen">
        <div class="trophy">👑</div>
        <h2>SQL EXPERT!</h2>
        <p>You've mastered all three SQL Builder games!</p>
        <p>Final Score: <strong id="finalScore">0</strong></p>
        <p>Total Commands Learned: <strong>51</strong></p>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
            <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
            <button class="btn btn-secondary" onclick="window.location.href='sql-builder.html'">← Back to Start</button>
        </div>
    </div>

    <script>
        const commands = [
            {
                name: "primary",
                definition: "A constraint that uniquely identifies each record in a table. Cannot be null.",
                example: "PRIMARY KEY (id)",
                hint: "Unique identifier"
            },
            {
                name: "foreign",
                definition: "A constraint that links a table to another table via a common column.",
                example: "FOREIGN KEY (user_id) REFERENCES users(id)",
                hint: "Links tables together"
            },
            {
                name: "unique",
                definition: "Ensures all values in a column are different. Unlike primary key, table can have multiple.",
                example: "UNIQUE (email)",
                hint: "No duplicate values"
            },
            {
                name: "index",
                definition: "Creates an index on a column to speed up data retrieval. Used for optimization.",
                example: "CREATE INDEX idx_name ON users(name)",
                hint: "Speed up queries"
            },
            {
                name: "default",
                definition: "Sets a default value for a column when no value is specified.",
                example: "status VARCHAR DEFAULT 'active'",
                hint: "Default value"
            },
            {
                name: "not",
                definition: "Negates a condition. Used with NULL, EXISTS, and other operators.",
                example: "WHERE name IS NOT NULL",
                hint: "Negation"
            },
            {
                name: "and",
                definition: "Combines multiple conditions where ALL must be true.",
                example: "WHERE age > 18 AND country = 'USA'",
                hint: "All conditions true"
            },
            {
                name: "or",
                definition: "Combines multiple conditions where ANY can be true.",
                example: "WHERE country = 'USA' OR country = 'UK'",
                hint: "Any condition true"
            },
            {
                name: "case",
                definition: "Provides IF-THEN-ELSE logic in SQL queries. Used for conditional expressions.",
                example: "CASE WHEN age > 18 THEN 'adult' ELSE 'minor' END",
                hint: "If-then-else in SQL"
            },
            {
                name: "when",
                definition: "Used within CASE to define conditions.",
                example: "CASE WHEN score > 90 THEN 'A'",
                hint: "CASE condition"
            },
            {
                name: "then",
                definition: "Used within CASE to specify the result when a condition is true.",
                example: "THEN 'Excellent'",
                hint: "CASE result"
            },
            {
                name: "else",
                definition: "Used in CASE as the default result when no conditions match.",
                example: "ELSE 'Unknown'",
                hint: "Default CASE result"
            },
            {
                name: "end",
                definition: "Used to terminate CASE expressions and other control structures.",
                example: "END AS category",
                hint: "Terminates CASE"
            },
            {
                name: "values",
                definition: "Specifies the values to insert into a table in an INSERT statement.",
                example: "INSERT INTO users VALUES (1, 'John')",
                hint: "Insert data values"
            },
            {
                name: "table",
                definition: "Represents a collection of rows and columns in a database.",
                example: "CREATE TABLE users (...)",
                hint: "Database table"
            },
            {
                name: "database",
                definition: "A structured collection of data stored electronically.",
                example: "CREATE DATABASE myapp",
                hint: "Data storage"
            },
            {
                name: "commit",
                definition: "Saves all pending transactions permanently to the database.",
                example: "COMMIT",
                hint: "Save transaction"
            },
            {
                name: "rollback",
                definition: "Undoes all changes in the current transaction.",
                example: "ROLLBACK",
                hint: "Undo transaction"
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let streak = 0;
        let hints = 3;
        let currentAnswer = "";
        let placedLetters = [];
        let draggedLetter = null;

        function init() {
            currentLevel = 0;
            score = 0;
            streak = 0;
            hints = 3;
            updateStats();
            loadLevel(currentLevel);
            renderLevelIndicator();
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (/^[a-z]$/.test(key)) {
                    const poolTiles = document.querySelectorAll('.letter-tile');
                    for (let tile of poolTiles) {
                        if (tile.textContent === key) {
                            const originalIndex = parseInt(tile.dataset.originalIndex);
                            clickToPlace(key, originalIndex);
                            break;
                        }
                    }
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    for (let i = placedLetters.length - 1; i >= 0; i--) {
                        if (placedLetters[i] !== null) {
                            removeLetter(i);
                            break;
                        }
                    }
                } else if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
        }

        function renderLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = commands.map((_, i) => 
                `<div class="level-dot ${i < currentLevel ? 'completed' : i === currentLevel ? 'current' : ''}"></div>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('hints').textContent = hints;
        }

        function loadLevel(level) {
            if (level >= commands.length) {
                showComplete();
                return;
            }

            const cmd = commands[level];
            currentAnswer = cmd.name;
            placedLetters = new Array(currentAnswer.length).fill(null);
            
            document.getElementById('commandName').textContent = `COMMAND ${level + 1}: ${cmd.name.toUpperCase()}`;
            document.getElementById('definitionText').textContent = cmd.definition;
            document.getElementById('hintText').textContent = `Example: ${cmd.example}`;
            document.getElementById('progressInfo').textContent = `Command ${level + 1} of ${commands.length}`;
            document.getElementById('message').className = 'message';
            document.getElementById('checkBtn').disabled = false;
            
            renderLetterSlots();
            renderLetterPool();
            renderLevelIndicator();
            updateStats();
        }

        function renderLetterSlots() {
            const dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '';
            
            for (let i = 0; i < currentAnswer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.dataset.index = i;
                
                if (placedLetters[i]) {
                    slot.textContent = placedLetters[i];
                    slot.classList.add('filled');
                    slot.draggable = true;
                }
                
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('dragleave', handleDragLeave);
                slot.addEventListener('drop', handleDrop);
                slot.addEventListener('click', () => removeLetter(i));
                
                dropZone.appendChild(slot);
            }
        }

        function renderLetterPool() {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            
            const letters = currentAnswer.split('').map((letter, i) => ({ letter, index: i }));
            letters.sort(() => Math.random() - 0.5);
            
            const placedIndices = placedLetters.map((letter, i) => letter !== null ? i : -1).filter(i => i !== -1);
            
            letters.forEach((item) => {
                if (placedIndices.includes(item.index)) {
                    return;
                }
                
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = item.letter;
                tile.draggable = true;
                tile.dataset.letter = item.letter;
                tile.dataset.originalIndex = item.index;
                
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('click', () => clickToPlace(item.letter, item.index));
                
                pool.appendChild(tile);
            });
        }
        
        function clickToPlace(letter, originalIndex) {
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                placedLetters[emptyIndex] = letter;
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function handleDragStart(e) {
            draggedLetter = e.target.dataset.letter;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            
            const canvas = document.createElement('canvas');
            canvas.width = 45;
            canvas.height = 45;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(0, 0, 45, 45);
            ctx.fillStyle = '#0d1117';
            ctx.font = 'bold 20px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.target.textContent, 22, 22);
            
            e.dataTransfer.setDragImage(canvas, 22, 22);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.letter-slot').forEach(slot => {
                slot.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.target.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.target.closest('.letter-slot');
            if (!slot) return;
            
            slot.classList.remove('drag-over');
            const slotIndex = parseInt(slot.dataset.index);
            
            const prevIndex = placedLetters.indexOf(draggedLetter);
            if (prevIndex !== -1) {
                placedLetters[prevIndex] = null;
            }
            
            placedLetters[slotIndex] = draggedLetter;
            
            renderLetterSlots();
            renderLetterPool();
            
            if (!placedLetters.includes(null)) {
                setTimeout(checkAnswer, 300);
            }
        }

        function removeLetter(index) {
            if (placedLetters[index]) {
                placedLetters[index] = null;
                renderLetterSlots();
                renderLetterPool();
            }
        }

        function shuffleLetters() {
            renderLetterPool();
        }

        function useHint() {
            if (hints <= 0) return;
            
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                hints--;
                placedLetters[emptyIndex] = currentAnswer[emptyIndex];
                updateStats();
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function checkAnswer() {
            const userAnswer = placedLetters.join('');
            const message = document.getElementById('message');
            const checkBtn = document.getElementById('checkBtn');
            
            if (userAnswer.toLowerCase() === currentAnswer.toLowerCase()) {
                const points = 10 + (streak * 2);
                score += points;
                streak++;
                
                message.textContent = `✓ Correct! +${points} points! Streak: ${streak}`;
                message.className = 'message show correct';
                checkBtn.disabled = true;
                
                setTimeout(() => {
                    currentLevel++;
                    loadLevel(currentLevel);
                }, 1500);
            } else {
                streak = 0;
                message.textContent = '✗ Not quite! Try again.';
                message.className = 'message show incorrect';
                updateStats();
            }
        }

        function showComplete() {
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('completeScreen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
        }

        function restartGame() {
            document.getElementById('completeScreen').classList.remove('active');
            document.getElementById('gameContainer').classList.add('active');
            init();
        }

        // Initialize the game
        init();
    </script>
</body>
</html>
