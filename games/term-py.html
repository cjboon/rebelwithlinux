            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        
        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { 
                    userId = data.email;
                    userTheme = data.theme || 'dark';
                    return true; 
                }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=python');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'python', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }

        async function initPyodide() {
            try {
                addPythonLine('Loading Python...', 'system');
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);
                pyodideReady = true;
                addPythonLine('Python ready!', 'system');
            } catch (e) {
                addPythonLine('Failed to load Python: ' + e.message, 'error');
            }
        }
        initPyodide();
        
        function addPythonLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'python-error-line' : 'python-output-line';
            line.textContent = text;
            pythonOutput.appendChild(line);
            pythonOutput.scrollTop = pythonOutput.scrollHeight;
        }
        
        function clearPythonOutput() {
            pythonOutput.innerHTML = '';
        }
        
        async function runPythonCode(cmd) {
            if (!pyodide || !pyodideReady) {
                addPythonLine('Python is still loading, please wait...', 'error');
                return;
            }
            
            try {
                await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);
                await pyodide.runPythonAsync(cmd);
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                if (stdout && stdout.trim()) {
                    const lines = stdout.trim().split('\n');
                    lines.forEach(line => addPythonLine(line));
                } else if (!stdout.trim() && cmd.includes('=')) {
                    // For variable assignments, show the variable value
                    const varName = cmd.split('=')[0].trim();
                    if (varName) {
                        try {
                            const val = pyodide.runPython(varName);
                            addPythonLine(varName + ' = ' + String(val));
                        } catch(e) {}
                    }
                }
            } catch (err) {
                addPythonLine(err.message, 'error');
            }
        }

        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = 'output-line ' + className;
            line.textContent = text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function showCharacterMessage(text, showName = true) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        if (showName) {
                            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        } else {
                            line.innerHTML = '<span class="character-name">' + character.name + '</span> ' + currentText;
                        }
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        function addUserInput(text) {
            const line = document.createElement('div');
            line.className = 'output-line user-input';
            line.textContent = '> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function checkAnswer(userAnswer) {
            const level = levels[currentLevel];
            let isCorrect = false;
            
            if (level.type === 'exact') {
                isCorrect = userAnswer.trim() === level.answer;
            } else if (level.type === 'starts') {
                isCorrect = userAnswer.trim().startsWith(level.answer);
            }
            
            return isCorrect;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('  Level ' + level.id + ': ' + level.title, 'lesson-number');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(level.intro);
            addLine('');
            
            const contentLine = document.createElement('div');
            contentLine.className = 'output-line command-output';
            contentLine.textContent = level.content;
            history.appendChild(contentLine);
            output.scrollTop = output.scrollHeight;
            
            addLine('');
            await showCharacterMessage("Go ahead, kid - try typing the code! " + level.hint, false);
            
            updateBreadcrumb();
        }
        
        async function showSuccess() {
            const level = levels[currentLevel];
            
            addLine('');
            await showCharacterMessage(level.success);
            
            addLine('');
            const encour = document.createElement('div');
            encour.className = 'output-line encouragement';
            encour.textContent = '>>> ' + character.getEncouragement() + ' <<<';
            history.appendChild(encour);
            
            addLine('');
        }
        
        async function startGame() {
            history.innerHTML = '';
            clearPythonOutput();
            currentLevel = 0;
            
            addLine('');
            addLine('╔═══════════════════════════════════════╗', 'lesson-number');
            addLine('║   PYTHON TUTOR with Professor Python  ║', 'lesson-number');
            addLine('╚═══════════════════════════════════════╝', 'lesson-number');
            addLine('');
            
            await showCharacterMessage(character.greeting);
            
            addLine('');
            addLine('Choose your path, kid:', 'lesson-number');
            addLine('');
            
            const menu1 = document.createElement('div');
            menu1.className = 'output-line choice';
            menu1.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Start with the basics (lessons 1-12)';
            history.appendChild(menu1);
            
            const menu2 = document.createElement('div');
            menu2.className = 'output-line choice';
            menu2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - For those who know the basics (lessons 13-24)';
            history.appendChild(menu2);
            
            const menu3 = document.createElement('div');
            menu3.className = 'output-line choice';
            menu3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Advanced topics (lessons 25-36)';
            history.appendChild(menu3);
            
            const menu4 = document.createElement('div');
            menu4.className = 'output-line choice';
            menu4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menu4);
            
            const menu5 = document.createElement('div');
            menu5.className = 'output-line choice';
            menu5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menu5);
            
            const menu6 = document.createElement('div');
            menu6.className = 'output-line choice';
            menu6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menu6);
            
            output.scrollTop = output.scrollHeight;
            addLine('');
            await showCharacterMessage("Click on a choice or type --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit!");
        }
        
        function addCharacterMessage(text) {
            const line = document.createElement('div');
            line.className = 'output-line';
            line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function updateBreadcrumb() {
            breadcrumb.innerHTML = '<span class="breadcrumb-item" data-cmd="--start">--start</span> > ' + track + ' > Level ' + (currentLevel + 1);
        }
        
        async function startTrack(trackName) {
            track = trackName;
            clearPythonOutput();
            if (trackName === 'beginner') {
                levels = beginnerLevels;
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
            } else {
                levels = expertLevels;
            }
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            if (trackName === 'beginner') {
                addCharacterMessage("Excellent choice! We're starting from scratch - perfect for beginners! I'll be right here with you every step of the way. Let's begin your coding journey!");
                addLine('');
                addCharacterMessage("First, let's make sure you know how to print text. In programming, we use print() to show things on the screen.");
            } else if (trackName === 'intermediate') {
                addCharacterMessage("Welcome back, kid! You've got the basics down - now let's take it to the next level! We'll dive into dictionaries, classes, file handling, and more.");
                addLine('');
                addCharacterMessage("Let's start with dictionaries - they're like lists but even more powerful!");
            } else {
                addCharacterMessage("Welcome to EXPERT mode, kid! You've mastered the fundamentals - now let's learn the advanced techniques that real Python developers use every day!");
                addLine('');
                addCharacterMessage("Let's start with decorators - one of Python's most powerful features!");
            }
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await showLevel();
        }
        
        async function handleCommand(cmd) {
            cmd = cmd.trim();
            if (!cmd) return;
            
            addUserInput(cmd);
            
            // Run Python code in the bottom pane
            addPythonLine('>>> ' + cmd);
            await runPythonCode(cmd);
            
            if (cmd === '--start' || cmd === '--restart') {
                startGame();
                return;
            }
            
            if (cmd === '--beginner') {
                await startTrack('beginner');
                return;
            }
            
            if (cmd === '--intermediate') {
                await startTrack('intermediate');
                return;
            }
            
            if (cmd === '--expert') {
                await startTrack('expert');
                return;
            }
            
            if (cmd === '--fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
                return;
            }
            
            if (cmd === '--darkmode') {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = newTheme === 'dark';
                if (userId) {
                    try {
                        await fetch('/api/auth.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'action=updateTheme&theme=' + newTheme,
                            credentials: 'include'
                        });
                    } catch (e) {}
                }
                addCharacterMessage("Theme switched to " + newTheme + " mode!");
                return;
            }
            
            if (cmd === '--exit') {
                window.location.href = '../index.html';
                return;
            }
            
            if (cmd === '--help') {
                addCharacterMessage("Type --start to return to the main menu!");
                addCharacterMessage("Type --beginner for beginner lessons (1-12)");
                addCharacterMessage("Type --intermediate for intermediate lessons (13-24)");
                addCharacterMessage("Type --expert for expert lessons (25-36)");
                addCharacterMessage("Type --fullscreen to toggle fullscreen mode");
                addCharacterMessage("Type --darkmode to toggle dark/light mode");
                addCharacterMessage("Type --exit to go back to homepage");
                addCharacterMessage("Type --level to see your current level");
                addCharacterMessage("Type --hint if you're stuck");
                return;
            }
            
            if (cmd === '--level') {
                addLine('Current level: ' + (currentLevel + 1) + ' - ' + levels[currentLevel].title);
                return;
            }
            
            if (cmd === '--skip') {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    if (track === 'beginner') {
                        addCharacterMessage("You finished all the beginner levels! Type --intermediate to continue!");
                    } else if (track === 'intermediate') {
                        addCharacterMessage("You finished all the intermediate levels! Type --expert to continue!");
                    } else {
                        addCharacterMessage("You finished all the expert levels! You're a master Python developer! Type --beginner to start over!");
                    }
                    return;
                }
                showLevel();
                return;
            }
            
            if (cmd === '--hint') {
                addCharacterMessage("No worries! The hint is: " + levels[currentLevel].hint);
                return;
            }
            
            if (checkAnswer(cmd)) {
                await showSuccess();
                saveProgress(currentLevel + 2);
                currentLevel++;
                
                if (currentLevel >= levels.length) {
                    addLine('');
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    if (track === 'beginner') {
                        addCharacterMessage("CONGRATULATIONS! You completed all 12 beginner levels! Type --intermediate to continue your journey, or --start to play again!");
                    } else if (track === 'intermediate') {
                        addCharacterMessage("KID! You did it! You completed all 12 intermediate levels! Type --expert to continue your journey to mastery!");
                    } else {
                        addCharacterMessage("MASTER! You've done it! You completed all 12 expert levels! You are now a REAL Python developer! You learned decorators, generators, async, threading, and more! Type --beginner to start over! I'm SO incredibly proud of you!");
                    }
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    addLine('');
                } else {
                    setTimeout(() => showLevel(), 1500);
                }
            } else {
                addCharacterMessage("Hmm, that's not quite right, kid. Try again! Remember - just type what I showed you. You've got this!");
            }
        }
        
        input.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const cmd = input.value;
                input.value = '';
                handleCommand(cmd);
            });
        }
        
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            startGame();
        }
        init();
