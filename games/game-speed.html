    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: #1a1a1a;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; color: #f1fa8c; }
        .subtitle { margin-bottom: 20px; color: #888888; }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            background: #333;
            padding: 12px 24px;
            border-radius: 8px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: bold; color: #f1fa8c; }
        
        .game-container {
            background: #222;
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            border: 2px solid #444;

        .difficulty-select {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .difficulty-select select {
            background: #333;
            color: #ccc;
            border: 2px solid #444;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .word-display {
            background: #0d0d0d;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .current-word {
            font-size: 32px;
            font-weight: bold;
            color: #f1fa8c;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .hint {
            font-size: 14px;
            color: #666;
        }
        
        .input-area {
            margin-bottom: 20px;
        }
        
        .input-area input {
            width: 100%;
            padding: 15px 20px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            border: 2px solid #333;
            border-radius: 8px;
            color: #f1fa8c;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #f1fa8c;
        }
        
        .input-area input.correct {
            border-color: #00ff00;
            color: #00ff00;
        }
        
        .input-area input.wrong {
            border-color: #ff4444;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .timer-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .timer-fill {
            height: 100%;
            background: #f1fa8c;
            transition: width 0.1s linear;
        }
        
        .timer-fill.warning { background: #ffaa00; }
        .timer-fill.danger { background: #ff4444; }
        
        .feedback {
            text-align: center;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
        
        .feedback.show { display: block; }
        .feedback.correct { background: #1a4d1a; color: #00ff00; }
        
        .start-screen, .game-screen { width: 100%; }
        .game-screen { display: none; }
        .game-screen.active { display: block; }
        
        .next-btn {
            background: #f1fa8c;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        
        .next-btn.show { display: inline-block; }
        
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #f1fa8c; }
        
        .streak-display {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        
        .results {
            text-align: center;
            padding: 20px;
        }
        
        .results h2 {
            color: #f1fa8c;
            margin-bottom: 20px;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .result-item {
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }
        
        .result-label { font-size: 12px; color: #888; }
        .result-value { font-size: 24px; color: #f1fa8c; }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.4rem; }
            .stats-bar {
                gap: 15px;
                padding: 8px 12px;
            }
            .stat-value { font-size: 18px; }
            .game-container { padding: 15px; }
            .word-display { padding: 20px; }
            .current-word { font-size: 24px; }
            .input-area input {
                padding: 12px;
                font-size: 18px;
            }
            .mobile-submit-btn {
                display: block !important;
                background: #f1fa8c;
                color: #000;
                border: none;
                padding: 12px;
                font-family: 'Courier New', monospace;
                font-size: 16px;
                font-weight: bold;
                border-radius: 8px;
                cursor: pointer;
                width: 100%;
                margin-top: 10px;
            }
        }
        
        .mobile-submit-btn { display: none; }
    </style>
</head>
<body>
    <a href="../index.html#games" class="back-link">← Back to Games</a>
    
    <h1>⚡ SPEED TYPING</h1>
    <p class="subtitle">Type Linux commands fast!</p>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Time</div>
            <div class="stat-value" id="timer">60</div>
        </div>
    </div>
    
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <div class="difficulty-select">
                <select id="difficulty">
                    <option value="easy">Easy - 60 seconds</option>
                    <option value="medium" selected>Medium - 45 seconds</option>
                    <option value="hard">Hard - 30 seconds</option>
                </select>
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #888;">
                Type the Linux command shown as fast as you can!<br>
                Earn bonus points for speed and streaks.
            </p>
            <div style="text-align: center;">
                <button class="next-btn show" onclick="startGame()">START GAME</button>
            </div>
        </div>
        
        <div class="game-screen" id="gameScreen">
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            
            <div class="word-display">
                <div class="current-word" id="currentWord">ls -la</div>
                <div class="hint" id="hint">List all files with details</div>
            </div>
            
            <div class="input-area">
                <input type="text" id="commandInput" placeholder="Type here..." autocomplete="off" spellcheck="false">
                <button class="mobile-submit-btn" id="submitBtn">Submit</button>
            </div>
            
            <div class="feedback" id="feedback"></div>
            
            <div style="text-align: center;">
                <button class="next-btn" id="newGameBtn" onclick="startGame()">PLAY AGAIN</button>
            </div>
        </div>
        
        <div class="results" id="results" style="display: none;">
            <h2>⏰ TIME'S UP!</h2>
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">Commands Typed</div>
                    <div class="result-value" id="finalWords">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Accuracy</div>
                    <div class="result-value" id="finalAccuracy">0%</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Best Streak</div>
                    <div class="result-value" id="finalStreak">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Final Score</div>
                    <div class="result-value" id="finalScore">0</div>
                </div>
            </div>
            <button class="next-btn show" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>
    
    <script>
        const words = [
            { word: 'ls', hint: 'List directory contents' },
            { word: 'ls -l', hint: 'Long format listing' },
            { word: 'ls -a', hint: 'Show hidden files' },
            { word: 'ls -la', hint: 'Hidden + long format' },
            { word: 'cd', hint: 'Change directory' },
            { word: 'pwd', hint: 'Print working directory' },
            { word: 'mkdir', hint: 'Create directory' },
            { word: 'rm', hint: 'Remove files' },
            { word: 'rm -r', hint: 'Remove directories' },
            { word: 'cp', hint: 'Copy files' },
            { word: 'mv', hint: 'Move/rename files' },
            { word: 'cat', hint: 'Display file contents' },
            { word: 'head', hint: 'Show first lines' },
            { word: 'tail', hint: 'Show last lines' },
            { word: 'grep', hint: 'Search for text' },
            { word: 'chmod', hint: 'Change permissions' },
            { word: 'chown', hint: 'Change owner' },
            { word: 'tar', hint: 'Archive files' },
            { word: 'curl', hint: 'Fetch URLs' },
            { word: 'wget', hint: 'Download files' },
            { word: 'find', hint: 'Find files' },
            { word: 'ps', hint: 'List processes' },
            { word: 'top', hint: 'Show processes' },
            { word: 'kill', hint: 'Terminate process' },
            { word: 'df', hint: 'Disk usage' },
            { word: 'du', hint: 'Directory size' },
            { word: 'free', hint: 'Memory usage' },
            { word: 'whoami', hint: 'Current user' },
            { word: 'passwd', hint: 'Change password' },
            { word: 'ssh', hint: 'Remote login' },
            { word: 'scp', hint: 'Secure copy' },
            { word: 'rsync', hint: 'Sync files' },
            { word: 'wget -r', hint: 'Recursive download' },
            { word: 'ls -lh', hint: 'Human-readable sizes' },
            { word: 'tail -f', hint: 'Follow log file' },
            { word: 'grep -r', hint: 'Recursive search' },
            { word: 'chmod +x', hint: 'Make executable' },
            { word: 'tar -xvf', hint: 'Extract archive' },
            { word: 'tar -cvf', hint: 'Create archive' },
            { word: 'awk', hint: 'Text processor' },
            { word: 'sed', hint: 'Stream editor' },
            { word: 'sort', hint: 'Sort lines' },
            { word: 'uniq', hint: 'Remove duplicates' },
            { word: 'wc', hint: 'Word count' },
            { word: 'cut', hint: 'Extract columns' },
            { word: 'tr', hint: 'Translate chars' },
            { word: 'netstat', hint: 'Network stats' },
            { word: 'ping', hint: 'Test connection' },
            { word: 'ifconfig', hint: 'Network config' },
            { word: 'route', hint: 'Routing table' }
        ];
        
        let currentWord = {};
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let totalTyped = 0;
        let correctTyped = 0;
        let timeLeft = 60;
        let timerInterval;
        let maxTime = 60;
        
        function startGame() {
            const difficulty = document.getElementById('difficulty').value;
            maxTime = difficulty === 'easy' ? 60 : difficulty === 'medium' ? 45 : 30;
            timeLeft = maxTime;
            
            score = 0;
            streak = 0;
            bestStreak = 0;
            totalTyped = 0;
            correctTyped = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('results').style.display = 'none';
            
            newWord();
            updateStats();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            document.getElementById('commandInput').value = '';
            document.getElementById('commandInput').focus();
        }
        
        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('currentWord').textContent = currentWord.word;
            document.getElementById('hint').textContent = currentWord.hint;
            document.getElementById('commandInput').value = '';
            document.getElementById('commandInput').className = '';
        }
        
        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            
            const percent = (timeLeft / maxTime) * 100;
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = percent + '%';
            
            timerFill.className = 'timer-fill';
            if (percent <= 25) timerFill.classList.add('danger');
            else if (percent <= 50) timerFill.classList.add('warning');
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        function endGame() {
            clearInterval(timerInterval);
            
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('results').style.display = 'block';
            
            const accuracy = totalTyped > 0 ? Math.round((correctTyped / totalTyped) * 100) : 0;
            document.getElementById('finalWords').textContent = correctTyped;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('finalStreak').textContent = bestStreak;
            document.getElementById('finalScore').textContent = score;
        }
        
        function checkAnswer() {
            const input = document.getElementById('commandInput');
            const value = input.value.trim();
            
            if (!value) return;
            
            totalTyped++;
            
            if (value === currentWord.word) {
                correctTyped++;
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                
                const timeBonus = timeLeft > 20 ? 15 : timeLeft > 10 ? 10 : 5;
                const streakBonus = streak * 5;
                score += 10 + timeBonus + streakBonus;
                
                input.classList.add('correct');
                setTimeout(() => {
                    input.classList.remove('correct');
                    newWord();
                }, 200);
            } else {
                streak = 0;
                input.classList.add('wrong');
                setTimeout(() => input.classList.remove('wrong'), 300);
            }
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('timer').textContent = timeLeft;
        }
        
        document.getElementById('commandInput').addEventListener('input', checkAnswer);
        document.getElementById('commandInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkAnswer();
            }
        });
        
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                checkAnswer();
            });
        }
    </script>
</body>
</html>
