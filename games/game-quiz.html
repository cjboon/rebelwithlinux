<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta http-equiv="onion-location" content="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion/games/game-quiz.html" />
    <meta charset="UTF-8">
    <meta name="author" content="cjboon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Trivia - Linux & FOSS | REBEL WITH LINUX</title>
    <link rel="stylesheet" href="../style.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (!savedTheme || savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: #1a1a1a;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; color: #8be9fd; }
        .subtitle { margin-bottom: 20px; color: #888888; }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            background: #333;
            padding: 12px 24px;
            border-radius: 8px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: bold; color: #8be9fd; }
        
        .game-container {
            background: #222;
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            border: 2px solid #444;
        }
        
        .category-select {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .category-select select {
            background: #333;
            color: #ccc;
            border: 2px solid #444;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .question-box {
            background: #0d0d0d;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .question-number {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 18px;
            color: #8be9fd;
            line-height: 1.5;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-btn {
            background: #333;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px 20px;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .option-btn:hover {
            background: #444;
            border-color: #8be9fd;
        }
        
        .option-btn.correct {
            background: #1a4d3a;
            border-color: #00ff00;
            color: #00ff00;
        }
        
        .option-btn.wrong {
            background: #4d1a2a;
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .option-btn.disabled {
            pointer-events: none;
        }
        
        .feedback {
            text-align: center;
            padding: 20px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .feedback.show { display: block; }
        .feedback.correct { background: #1a4d3a; color: #00ff00; }
        .feedback.wrong { background: #4d1a2a; color: #ff4444; }
        
        .explanation {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .explanation.show { display: block; }
        
        .next-btn {
            background: #8be9fd;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        
        .next-btn.show { display: inline-block; }
        
        .start-screen, .game-screen, .end-screen { width: 100%; }
        .game-screen, .end-screen { display: none; }
        .game-screen.active { display: block; }
        
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #8be9fd; }
        
        .end-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .end-stat {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .end-stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        
        .end-stat-value {
            font-size: 32px;
            color: #8be9fd;
            font-weight: bold;
        }
        
        .final-message {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #8be9fd;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.4rem; }
            .stats-bar {
                gap: 15px;
                padding: 8px 12px;
            }
            .stat-value { font-size: 18px; }
            .game-container { padding: 15px; }
            .question-box { padding: 15px; }
            .question-text { font-size: 16px; }
            .end-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="../index.html#games" class="back-link">← Back to Games</a>
    
    <h1>❓ QUIZ TRIVIA</h1>
    <p class="subtitle">Test your Linux & FOSS knowledge!</p>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Correct</div>
            <div class="stat-value" id="correct">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Question</div>
            <div class="stat-value" id="questionNum">1/10</div>
        </div>
    </div>
    
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <div class="category-select">
                <select id="category">
                    <option value="linux">Linux Basics</option>
                    <option value="foss">FOSS History</option>
                    <option value="privacy">Privacy & Security</option>
                    <option value="mixed" selected>Mixed</option>
                </select>
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #888;">
                Answer 10 questions about Linux, open source, and digital privacy.<br>
                Each correct answer: 10 points
            </p>
            <div style="text-align: center;">
                <button class="next-btn show" onclick="startGame()">START QUIZ</button>
            </div>
        </div>
        
        <div class="game-screen" id="gameScreen">
            <div class="question-box">
                <div class="question-number" id="questionNumber">Question 1 of 10</div>
                <div class="question-text" id="questionText"></div>
            </div>
            
            <div class="options-list" id="optionsList"></div>
            
            <div class="feedback" id="feedback"></div>
            <div class="explanation" id="explanation"></div>
            
            <div style="text-align: center;">
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION →</button>
            </div>
        </div>
        
        <div class="end-screen" id="endScreen">
            <div class="final-message" id="finalMessage"></div>
            <div class="end-stats">
                <div class="end-stat">
                    <div class="end-stat-label">Final Score</div>
                    <div class="end-stat-value" id="finalScore">0</div>
                </div>
                <div class="end-stat">
                    <div class="end-stat-label">Correct Answers</div>
                    <div class="end-stat-value" id="finalCorrect">0/10</div>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="next-btn show" onclick="startGame()">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    
    <script>
        const allQuestions = {
            linux: [
                {
                    question: "What does 'ls' stand for in Linux?",
                    options: ["List", "Load", "Log", "Link"],
                    correct: 0,
                    explanation: "ls is short for 'list' - it lists directory contents."
                },
                {
                    question: "Which directory contains the Linux kernel source code?",
                    options: ["/bin", "/usr/src", "/etc", "/home"],
                    correct: 1,
                    explanation: "/usr/src typically contains kernel source and headers."
                },
                {
                    question: "What does 'sudo' stand for?",
                    options: ["Super User Do", "Switch User Do", "Standard User Do", "Single User Do"],
                    correct: 0,
                    explanation: "sudo stands for 'superuser do' - it runs commands with elevated privileges."
                },
                {
                    question: "Which file contains the list of users on a Linux system?",
                    options: ["/etc/passwd", "/etc/users", "/etc/shadow", "/etc/group"],
                    correct: 0,
                    explanation: "/etc/passwd contains user account information (not passwords)."
                },
                {
                    question: "What is the default root directory on Linux?",
                    options: ["/root", "/home", "/", "/var"],
                    correct: 2,
                    explanation: "The root directory (/) is the top-level directory on Linux."
                },
                {
                    question: "Which command is used to change file permissions?",
                    options: ["chown", "chmod", "chmodify", "chattr"],
                    correct: 1,
                    explanation: "chmod (change mode) modifies file read/write/execute permissions."
                },
                {
                    question: "What does PID stand for?",
                    options: ["Program ID", "Process ID", "Priority ID", "Parent ID"],
                    correct: 1,
                    explanation: "PID stands for Process ID - a unique number assigned to each running process."
                },
                {
                    question: "Which shell is the default on most Linux distributions?",
                    options: ["zsh", "fish", "bash", "sh"],
                    correct: 2,
                    explanation: "Bash (Bourne Again SHell) is the default shell on most Linux systems."
                },
                {
                    question: "What does 'rm -rf' do?",
                    options: ["Read memory", "Remove recursively with force", "Rename files", "Repair filesystem"],
                    correct: 1,
                    explanation: "rm -rf forcibly removes directories and their contents recursively."
                },
                {
                    question: "Which init system do modern Debian/Ubuntu use?",
                    options: ["systemd", "SysVinit", "OpenRC", "Upstart"],
                    correct: 0,
                    explanation: "systemd is the default init system for most modern Debian-based distributions."
                },
                {
                    question: "What is the Linux mascot called?",
                    options: ["Gnu", "Tux", "Pingu", "Linux"],
                    correct: 1,
                    explanation: "Tux is the Linux penguin mascot, designed by Larry Ewing."
                },
                {
                    question: "Which command shows running processes?",
                    options: ["ls", "dir", "ps", "cat"],
                    correct: 2,
                    explanation: "ps (process status) shows currently running processes."
                }
            ],
            foss: [
                {
                    question: "Who created Linux?",
                    options: ["Richard Stallman", "Linus Torvalds", "Dennis Ritchie", "Ken Thompson"],
                    correct: 1,
                    explanation: "Linus Torvalds created Linux in 1991 as a hobby project."
                },
                {
                    question: "What does FOSS stand for?",
                    options: ["Free Open Source Software", "Fast Online Security System", "File Open Source Standard", "Functional Operating System"],
                    correct: 0,
                    explanation: "FOSS stands for Free and Open Source Software."
                },
                {
                    question: "What is the GPL license?",
                    options: ["General Public License", "GNU Programming Language", "Global Privacy License", "Group Permission List"],
                    correct: 0,
                    explanation: "GPL (General Public License) is the most popular open source license."
                },
                {
                    question: "Which company started the Apache web server project?",
                    options: ["Microsoft", "IBM", "NCSA", "Google"],
                    correct: 2,
                    explanation: "Apache started as an NCSA HTTPd fork, developed by a group of webmasters."
                },
                {
                    question: "What year was Git created?",
                    options: ["2005", "2008", "2010", "2012"],
                    correct: 0,
                    explanation: "Git was created by Linus Torvalds in 2005 for Linux kernel development."
                },
                {
                    question: "What is the most used database in the world (as of 2024)?",
                    options: ["Oracle", "PostgreSQL", "MySQL/MariaDB", "SQLite"],
                    correct: 2,
                    explanation: "MySQL (and its fork MariaDB) is the most widely used database."
                },
                {
                    question: "Who founded the Free Software Foundation?",
                    options: ["Linus Torvalds", "Bill Gates", "Richard Stallman", "Steve Jobs"],
                    correct: 2,
                    explanation: "Richard Stallman founded the FSF in 1985 to promote free software."
                },
                {
                    question: "What is the meaning of 'free' in 'free software'?",
                    options: ["Zero cost", "Freedom", "Limited use", "Trial"],
                    correct: 1,
                    explanation: "'Free software' refers to freedom, not price (free as in speech, not beer)."
                },
                {
                    question: "Which programming language was created by Guido van Rossum?",
                    options: ["Ruby", "JavaScript", "Python", "Perl"],
                    correct: 2,
                    explanation: "Python was created by Guido van Rossum in 1991."
                },
                {
                    question: "What does OSI stand for in 'Open Source Initiative'?",
                    options: ["Open System Interconnect", "Open Source Initiative", "Operating System Interface", "Online Security Index"],
                    correct: 1,
                    explanation: "OSI is the Open Source Initiative, which defines open source."
                }
            ],
            privacy: [
                {
                    question: "What does VPN stand for?",
                    options: ["Virtual Private Network", "Very Private Network", "Visual Privacy Data", "Verified Public Domain"],
                    correct: 0,
                    explanation: "VPN stands for Virtual Private Network - it encrypts your internet traffic."
                },
                {
                    question: "Which is considered more secure: HTTP or HTTPS?",
                    options: ["HTTP", "HTTPS", "Same security", "Depends on browser"],
                    correct: 1,
                    explanation: "HTTPS is HTTP with TLS/SSL encryption, making it secure."
                },
                {
                    question: "What is end-to-end encryption?",
                    options: ["Password protection", "Only sender/recipient can read", "Two-factor auth", "Encrypted backups"],
                    correct: 1,
                    explanation: "E2EE ensures only the sender and recipient can read the message."
                },
                {
                    question: "Which protocol does Tor use for anonymity?",
                    options: ["HTTP", "SMTP", "Onion routing", "VPN"],
                    correct: 2,
                    explanation: "Tor uses onion routing to anonymize internet traffic through multiple relays."
                },
                {
                    question: "What is a privacy-focused Linux distribution?",
                    options: ["Ubuntu", "Tails", "Mint", "Fedora"],
                    correct: 1,
                    explanation: "Tails (The Amnesic Incognito Live System) is designed for privacy and anonymity."
                },
                {
                    question: "What does 2FA stand for?",
                    options: ["Two-Factor Authentication", "Two-Firewall Access", "Two-File Archive", "Trusted File Access"],
                    correct: 0,
                    explanation: "2FA adds a second layer of security beyond just a password."
                },
                {
                    question: "What is the dark web?",
                    options: ["Illegal websites only", "Encrypted networks not indexed by search engines", "A separate internet", "Hacker websites"],
                    correct: 1,
                    explanation: "The dark web uses special software (like Tor) and isn't indexed by regular search engines."
                },
                {
                    question: "What is metadata?",
                    options: ["Encrypted data", "Data about data", "Hidden files", "Compressed files"],
                    correct: 1,
                    explanation: "Metadata describes other data - like who, when, where of a file or communication."
                },
                {
                    question: "Which is a secure messaging app with E2EE?",
                    options: ["Telegram (default)", "WhatsApp (default)", "SMS", "Facebook Messenger"],
                    correct: 1,
                    explanation: "WhatsApp uses Signal Protocol for E2EE by default. Signal also has it."
                },
                {
                    question: "What is the purpose of a firewall?",
                    options: ["Speed up internet", "Block/allow network traffic", "Encrypt files", "Store passwords"],
                    correct: 1,
                    explanation: "Firewalls monitor and control incoming/outgoing network traffic based on security rules."
                }
            ]
        };
        
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        
        function startGame() {
            const category = document.getElementById('category').value;
            
            if (category === 'mixed') {
                questions = [];
                ['linux', 'foss', 'privacy'].forEach(cat => {
                    const catQuestions = shuffle([...allQuestions[cat]]);
                    questions.push(...catQuestions.slice(0, 4));
                });
                questions = shuffle(questions).slice(0, 10);
            } else {
                questions = shuffle([...allQuestions[category]]).slice(0, 10);
            }
            
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            
            showQuestion();
            updateStats();
        }
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function showQuestion() {
            const q = questions[currentIndex];
            
            document.getElementById('questionNumber').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = q.question;
            
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(i);
                optionsList.appendChild(btn);
            });
            
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('explanation').className = 'explanation';
            document.getElementById('nextBtn').className = 'next-btn';
        }
        
        function checkAnswer(selected) {
            const q = questions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === selected && i !== q.correct) btn.classList.add('wrong');
            });
            
            const feedback = document.getElementById('feedback');
            if (selected === q.correct) {
                score += 10;
                correctCount++;
                feedback.textContent = '✓ CORRECT!';
                feedback.className = 'feedback show correct';
            } else {
                feedback.textContent = '✗ WRONG!';
                feedback.className = 'feedback show wrong';
            }
            
            document.getElementById('explanation').innerHTML = `<strong>Explanation:</strong> ${q.explanation}`;
            document.getElementById('explanation').className = 'explanation show';
            document.getElementById('nextBtn').className = 'next-btn show';
            
            updateStats();
        }
        
        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= questions.length) {
                endGame();
                return;
            }
            
            showQuestion();
            updateStats();
        }
        
        function endGame() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('endScreen').style.display = 'block';
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCorrect').textContent = `${correctCount}/${questions.length}`;
            
            let message = '';
            if (correctCount === 10) message = '🏆 PERFECT SCORE!';
            else if (correctCount >= 8) message = '🌟 Excellent!';
            else if (correctCount >= 6) message = '👍 Good job!';
            else if (correctCount >= 4) message = '📚 Keep learning!';
            else message = '💪 Try again!';
            
            document.getElementById('finalMessage').textContent = message;
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('questionNum').textContent = `${currentIndex + 1}/${questions.length}`;
        }
    </script>
</body>
</html>
