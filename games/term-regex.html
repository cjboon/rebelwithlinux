<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background: var(--term-bg);
            color: var(--term-text);
            font-family: 'Courier New', monospace;
            font-size: 15px;
        }
        
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        .terminal-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .left-pane {
            border-right: 2px solid var(--term-border);
        }
        
        .terminal-header {
            background: var(--term-header-bg);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .dot-red { background: var(--term-dot-red); }
        .dot-yellow { background: var(--term-dot-yellow); }
        .dot-green { background: var(--term-dot-green); }
        
        .terminal-title {
            margin-left: 1rem;
            color: var(--term-text);
            font-size: 0.85rem;
        }
        
        .pane-label {
            background: var(--term-header-bg);
            padding: 0.5rem 1rem;
            color: var(--term-text);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background: var(--term-bg);
        }
        
        .input-label {
            color: var(--term-text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        #command-input {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: var(--term-text);
            font-family: 'Courier New', monospace;
            font-size: 15px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        
        #command-input::placeholder {
            color: var(--term-text-muted);
        }
        
        .hint {
            color: var(--term-text-muted);
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
        
        .output-area {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            background: var(--term-bg);
            font-family: 'Courier New', monospace;
            font-size: 15px;
        }
        
        .output-line {
            margin-bottom: 0.3rem;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.4;
            color: var(--term-text);
        }
        
        .character-name {
            color: var(--term-text-light);
            font-weight: bold;
        }
        
        .user-input {
            color: var(--term-text-muted);
        }
        
        .lesson-number {
            color: var(--term-text-muted);
            font-weight: bold;
        }
        
        .command-output {
            color: var(--term-text);
            margin-left: 1rem;
        }
        
        .encouragement {
            color: var(--term-text-muted);
            font-style: italic;
        }
        
        .choices {
            margin-top: 0.5rem;
            margin-left: 1rem;
        }
        
        .choice {
            color: var(--term-text-muted);
            cursor: pointer;
            margin-bottom: 0.25rem;
        }
        
        .choice:hover {
            text-decoration: underline;
        }
        
        .regex-output-area {
            flex: 1;
            border-top: 2px solid var(--term-border);
            padding: 0.5rem;
            background: var(--term-input-bg);
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 100px;
        }
        
        .regex-output-line {
            color: var(--term-text-light);
            margin-bottom: 2px;
        }
        
        .regex-error-line {
            color: #ff6b6b;
            margin-bottom: 2px;
        }
        
        .regex-success-line {
            color: #6bff6b;
            margin-bottom: 2px;
        }
        
        .test-case {
            padding: 0.5rem;
            margin: 0.25rem 0;
            border-radius: 3px;
        }
        
        .test-case.pass {
            background: #1a3d1a;
            border-left: 3px solid #6bff6b;
        }
        
        .test-case.fail {
            background: #3d1a1a;
            border-left: 3px solid #ff6b6b;
        }
        
        .test-string {
            color: var(--term-text-muted);
        }
        
        .test-match {
            background: var(--term-bg);
            padding: 2px 4px;
            border-radius: 2px;
        }
        
        .match-highlight {
            background: #4a4a2d;
            color: #ffff00;
            padding: 1px 3px;
            border-radius: 2px;
        }
        
        .regex-prompt {
            color: var(--term-text-muted);
        }
        
        /* Light mode overrides */
        [data-theme="light"] body { background: var(--term-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] .terminal-header { background: var(--term-header-bg-light); }
        [data-theme="light"] .terminal-title, [data-theme="light"] .pane-label { color: var(--term-text-dark); }
        [data-theme="light"] .pane-label { background: var(--term-header-bg-light); }
        [data-theme="light"] .input-area, [data-theme="light"] .output-area, [data-theme="light"] .regex-output-area { background: var(--term-input-bg-light); color: var(--term-text-dark); }
        [data-theme="light"] #command-input { color: var(--term-text-dark); }
        [data-theme="light"] .input-label { color: var(--term-text-muted); }
        [data-theme="light"] .left-pane { border-right: 2px solid var(--term-border-light); }
        [data-theme="light"] .hint, [data-theme="light"] .regex-output-line { color: var(--term-text-muted); }
        [data-theme="light"] .regex-prompt { color: var(--term-text-dark); }
        [data-theme="light"] .match-highlight { background: #ffff00; color: #000000; }
        [data-theme="light"] .character-name { color: var(--term-text-dark); }
        [data-theme="light"] .user-input { color: var(--term-text-muted); }
        [data-theme="light"] .lesson-number { color: var(--term-text-dark); }
        [data-theme="light"] .command-output { color: var(--term-text-muted); }
        [data-theme="light"] .encouragement { color: var(--term-text-muted); }
        [data-theme="light"] .choice { color: var(--term-text-muted); }
        [data-theme="light"] .output-line { color: var(--term-text-dark); }
        [data-theme="light"] .regex-error-line { color: #dc322f; }
        [data-theme="light"] .regex-success-line { color: #859900; }
        [data-theme="light"] .test-string { color: var(--term-text-muted); }
        [data-theme="light"] .test-case.pass { background: #e8f5e9; border-left-color: #859900; }
        [data-theme="light"] .test-case.fail { background: #ffebee; border-left-color: #dc322f; }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
            }
            .terminal-pane {
                flex: none;
                height: 50vh;
            }
            .right-pane {
                border-bottom: 2px solid var(--term-border);
            }
            .left-pane {
                border-right: none;
                border-top: 2px solid var(--term-border);
            }
            body { font-size: 14px; }
            .terminal-header { padding: 8px; }
            .terminal-title { font-size: 12px; }
            textarea {
                min-height: 60px !important;
                font-size: 14px !important;
            }
            .mobile-run-btn { display: block !important; }
        }
        
        .mobile-run-btn {
            display: none;
            background: #2d5016;
            color: #98c379;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            border-radius: 4px;
        }
    </style>

<body>
    <div class="container">
        <div class="terminal-pane left-pane">
            <div class="terminal-header">
                <span class="terminal-dot dot-red"></span>
                <span class="terminal-dot dot-yellow"></span>
                <span class="terminal-dot dot-green"></span>
                <span class="terminal-title">Regex Tutor</span>
            </div>
            <div class="input-area" style="flex: 1;">
                <div class="input-label">&gt;&gt; Type your regex pattern:</div>
                <textarea id="command-input" placeholder="e.g., \d+" autofocus spellcheck="false" style="flex: 1;"></textarea>
                <button class="mobile-run-btn" id="runBtn">Test Regex</button>
                <div class="hint">Enter for new line, Ctrl+Enter to test</div>
            </div>
            <div class="regex-output-area" id="regex-output">
                <div class="regex-output-line" style="color: #586e75;">Regex test results will appear here...</div>
            </div>
        </div>
        <div class="terminal-pane right-pane">
            <div class="pane-label">Conversation</div>
            <div class="output-area" id="output">
                <div id="history"></div>
            </div>
        </div>
    </div>
    
    <script>
    
        
        const input = document.getElementById('command-input');
        const history = document.getElementById('history');
        const output = document.getElementById('output');
        const regexOutput = document.getElementById('regex-output');
        
        let currentLevel = 0;
        let userId = null;
        let savedLevel = 0;
        let userTheme = 'dark';
        let levels = [];

        window.toggleFullscreen = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        };
        
        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = newTheme === 'dark';
        };

        async function checkLogin() {
            try {
                const response = await fetch('/api/auth.php?action=check');
                const data = await response.json();
                if (data.authenticated) { userId = data.email; userTheme = data.theme || 'dark'; return true; }
            } catch (e) {}
            return false;
        }

        async function loadProgress() {
            if (!userId) return null;
            try {
                const response = await fetch('/api/progress.php?course=regex');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) return Math.max(...data.map(p => p.lesson_id));
                }
            } catch (e) {}
            return null;
        }

        async function saveProgress(level) {
            if (!userId) return;
            try {
                await fetch('/api/progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course: 'regex', lesson_id: level, completed: true, quiz_score: 0 })
                });
            } catch (e) {}
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function highlightMatches(text, regex) {
            try {
                const re = new RegExp(regex, 'g');
                return text.replace(re, '<span class="match-highlight">$&</span>');
            } catch {
                return escapeHtml(text);
            }
        }
        
        function addRegexLine(text, type = 'output', isHtml = false) {
            const line = document.createElement('div');
            line.className = type === 'error' ? 'regex-error-line' : (type === 'success' ? 'regex-success-line' : 'regex-output-line');
            if (isHtml) {
                line.innerHTML = text;
            } else {
                line.textContent = text;
            }
            regexOutput.appendChild(line);
            regexOutput.scrollTop = regexOutput.scrollHeight;
        }
        
        function clearRegexOutput() {
            regexOutput.innerHTML = '';
        }
        
        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = className ? `output-line ${className}` : 'output-line';
            line.textContent = text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        function addUserInput(text) {
            const line = document.createElement('div');
            line.className = 'output-line user-input';
            line.textContent = '> ' + text;
            history.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }
        
        async function showLevel() {
            const level = levels[currentLevel];
            
            addLine('');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('  Level ' + level.id + ': ' + level.title, 'lesson-number');
            addLine('═══════════════════════════════════════', 'lesson-number');
            addLine('');
            
            await addCharacterMessage(level.intro);
            addLine('');
            
            const contentLine = document.createElement('div');
            contentLine.className = 'output-line command-output';
            contentLine.textContent = level.content;
            history.appendChild(contentLine);
            output.scrollTop = output.scrollHeight;
            
            addLine('');
            await addCharacterMessage("Go ahead - try typing the regex! " + level.hint);
        }
        
        async function showSuccess() {
            const level = levels[currentLevel];
            
            addLine('');
            await addCharacterMessage(level.success);
            
            addLine('');
            const encour = document.createElement('div');
            encour.className = 'output-line encouragement';
            encour.textContent = '⚓ ' + character.getEncouragement() + ' ⚓';
            history.appendChild(encour);
            
            addLine('');
        }
        
        function runRegex(pattern, testCases) {
            addRegexLine('Pattern: /' + pattern + '/');
            
            if (!pattern) {
                addRegexLine('Enter a regex pattern', 'output');
                return;
            }
            
            let regex;
            try {
                regex = new RegExp(pattern);
            } catch (e) {
                addRegexLine('Invalid regex: ' + e.message, 'error');
                return;
            }
            
            let allPassed = true;
            
            testCases.forEach((tc, idx) => {
                const re = new RegExp(pattern, tc.flags || '');
                const match = re.exec(tc.test);
                const passed = tc.shouldMatch ? (match !== null) : (match === null);
                
                const caseDiv = document.createElement('div');
                caseDiv.className = 'test-case ' + (passed ? 'pass' : 'fail');
                
                if (passed) {
                    if (match) {
                        const highlighted = highlightMatches(tc.test, pattern);
                        caseDiv.innerHTML = '<span class="test-string">Test ' + (idx + 1) + ': "</span>' + highlighted + '" <span class="regex-success-line">✓ MATCH</span>';
                    } else {
                        caseDiv.innerHTML = '<span class="test-string">Test ' + (idx + 1) + ': "' + escapeHtml(tc.test) + '"</span> <span class="regex-success-line">✓ NO MATCH (expected)</span>';
                    }
                } else {
                    if (tc.shouldMatch) {
                        caseDiv.innerHTML = '<span class="test-string">Test ' + (idx + 1) + ': "' + escapeHtml(tc.test) + '"</span> <span class="regex-error-line">✗ Expected match</span>';
                    } else {
                        caseDiv.innerHTML = '<span class="test-string">Test ' + (idx + 1) + ': "' + escapeHtml(tc.test) + '"</span> <span class="regex-error-line">✗ Expected no match</span>';
                    }
                    allPassed = false;
                }
                
                regexOutput.appendChild(caseDiv);
            });
            
            return allPassed;
        }
        
        const character = {
            name: "Regex Reginald",
            greeting: "Greetings, young pattern matcher! I'm Regex Reginald, and I'm here to teach you the art of pattern matching! Regular expressions are incredibly powerful - they let you find, extract, and validate text with surgical precision!",
            encourage: ["Brilliant work!", "Pattern perfection!", "Magnificent matching!", "You've got the hang of it!", "Superb syntax!", "Marvelous mastery!"],
            getEncouragement: function() {
                return this.encourage[Math.floor(Math.random() * this.encourage.length)];
            }
        };
        
        function checkAnswer(userAnswer, level) {
            if (level.type === 'exact') {
                return userAnswer.trim() === level.answer;
            } else if (level.type === 'starts') {
                return userAnswer.trim().startsWith(level.answer);
            }
            return false;
        }
        
        const beginnerLevels = [
            {
                id: 1,
                title: "Literal Characters",
                intro: "Welcome, apprentice! Let's start with the basics. Most characters in regex match themselves literally. It's like saying 'find this exact text'!",
                content: "Match the word 'hello':\nPattern: hello\n\nThis will match 'hello' anywhere in the text.",
                hint: "Type: hello",
                answer: "hello",
                testCases: [
                    { test: "hello world", shouldMatch: true },
                    { test: "say hello", shouldMatch: true },
                    { test: "hellO there", shouldMatch: false }
                ],
                success: "Splendid! You matched 'hello' literally. Remember, regex is case-sensitive by default. Let's move on to something more interesting!",
                type: "exact"
            },
            {
                id: 2,
                title: "The Dot (.) Wildcard",
                intro: "The dot is a powerful wildcard - it matches ANY single character! Think of it as a placeholder for any character.",
                content: "Match any 3-letter word starting with 'c':\nPattern: c..\n\nThe dots represent any two characters.",
                hint: "Type: c..",
                answer: "c..",
                testCases: [
                    { test: "cat", shouldMatch: true },
                    { test: "cow", shouldMatch: true },
                    { test: "cart", shouldMatch: true },
                    { test: "at", shouldMatch: false }
                ],
                success: "Marvelous! The dot matched 'at' in 'cat' and 'ow' in 'cow'. The dot is incredibly useful for flexible matching!",
                type: "exact"
            },
            {
                id: 3,
                title: "Character Classes [...]",
                intro: "Square brackets let you define a set of characters to match. It's like saying 'match any of these characters'!",
                content: "Match any vowel:\nPattern: [aeiou]\n\nThis matches a, e, i, o, or u.",
                hint: "Type: [aeiou]",
                answer: "[aeiou]",
                testCases: [
                    { test: "cat", shouldMatch: true },
                    { test: "dog", shouldMatch: true },
                    { test: "gym", shouldMatch: false },
                    { test: "apple", shouldMatch: true }
                ],
                success: "Wonderful! [aeiou] matches any vowel. You can also use ranges like [a-z] for all lowercase letters!",
                type: "exact"
            },
            {
                id: 4,
                title: "Negated Character Classes [^...]",
                intro: "Put a caret ^ inside brackets to match anything EXCEPT the listed characters. Very handy for 'match everything except X'!",
                content: "Match anything that's NOT a vowel:\nPattern: [^aeiou]\n\nThis matches consonants, numbers, symbols, etc.",
                hint: "Type: [^aeiou]",
                answer: "[^aeiou]",
                testCases: [
                    { test: "b", shouldMatch: true },
                    { test: "z", shouldMatch: true },
                    { test: "a", shouldMatch: false },
                    { test: "5", shouldMatch: true }
                ],
                success: "Fantastic! [^aeiou] matches anything that isn't a vowel. This is super useful for excluding specific characters!",
                type: "exact"
            },
            {
                id: 5,
                title: "Shorthand: \\d and \\w",
                intro: "Regex has handy shortcuts! \\d matches any digit (0-9), and \\w matches any word character (letters, digits, underscore).",
                content: "Match any digit:\nPattern: \\d\n\nThis is shorthand for [0-9].",
                hint: "Type: \\d",
                answer: "\\d",
                testCases: [
                    { test: "abc123", shouldMatch: true },
                    { test: "year 2024", shouldMatch: true },
                    { test: "no numbers", shouldMatch: false }
                ],
                success: "Excellent! \\d matched the digits. Other shorthands: \\w (word chars), \\s (whitespace), \\D (non-digits), \\W (non-word), \\S (non-whitespace)!",
                type: "exact"
            },
            {
                id: 6,
                title: "Quantifier: Star (*)",
                intro: "The star (*) means 'match zero or more' of the preceding element. Very powerful for flexible matching!",
                content: "Match 'co' followed by any letters:\nPattern: co.*\n\n.* means any character, zero or more times.",
                hint: "Type: co.*",
                answer: "co.*",
                testCases: [
                    { test: "code", shouldMatch: true },
                    { test: "coffee", shouldMatch: true },
                    { test: "co", shouldMatch: true },
                    { test: "cocoa", shouldMatch: true },
                    { test: "cat", shouldMatch: false }
                ],
                success: "Brilliant! co.* matched 'co', 'code', 'coffee', and 'cocoa'. The star is incredibly useful for 'starts with' patterns!",
                type: "exact"
            },
            {
                id: 7,
                title: "Quantifier: Plus (+)",
                intro: "The plus (+) means 'match one or more' - unlike star, it requires at least one match.",
                content: "Match one or more digits:\nPattern: \\d+\n\nThis requires at least one digit.",
                hint: "Type: \\d+",
                answer: "\\d+",
                testCases: [
                    { test: "abc123", shouldMatch: true },
                    { test: "no", shouldMatch: false },
                    { test: "a1b2", shouldMatch: true }
                ],
                success: "Perfect! \\d+ needs at least one digit, while \\d* could match zero. Choose based on whether you need at least one!",
                type: "exact"
            },
            {
                id: 8,
                title: "Quantifier: Question Mark (?)",
                intro: "The question mark (?) makes the preceding character optional - zero or one match.",
                content: "Match 'color' or 'colour':\nPattern: colou?r\n\nThe u? makes the 'u' optional.",
                hint: "Type: colou?r",
                answer: "colou?r",
                testCases: [
                    { test: "color", shouldMatch: true },
                    { test: "colour", shouldMatch: true },
                    { test: "colr", shouldMatch: false }
                ],
                success: "Splendid! colou?r matches both spellings. The ? is perfect for optional characters like American/British spelling!",
                type: "exact"
            },
            {
                id: 9,
                title: "Anchors: ^ and $",
                intro: "Anchors don't match characters - they match positions! ^ matches start of string, $ matches end.",
                content: "Match strings that are only digits:\nPattern: ^\\d+$",
                hint: "Type: ^\\d+$",
                answer: "^\\d+$",
                testCases: [
                    { test: "12345", shouldMatch: true },
                    { test: "123a", shouldMatch: false },
                    { test: "abc", shouldMatch: false },
                    { test: "42", shouldMatch: true }
                ],
                success: "Magnificent! ^\\d+$ means 'start, one or more digits, end' - the whole string must be digits!",
                type: "exact"
            },
            {
                id: 10,
                title: "Groups: ()",

                content: "Match repeated letters:\nPattern: (\\w)\\1\n\n\\1 is a backreference to the first group!",
                hint: "Type: (\\w)\\1",
                answer: "(\\w)\\1",
                testCases: [
                    { test: "book", shouldMatch: true },

            {

            {

                hint: "Type: ^\\w+@\\w+\\.\\w+$",
                answer: "^\\w+@\\w+\\.",
                testCases: [

                success: "PHENOMENAL! You've done it! You can now match email addresses, URLs, phone numbers, and countless other patterns! Regex is an incredibly powerful tool, and you've mastered the fundamentals! Keep practicing, and soon you'll be a regex master!",

            }
        ];
        
        const intermediateLevels = [
            {
                id: 13,
                title: "Quantifier Ranges {n,m}",
                intro: "Welcome to intermediate level! Now let's get precise with quantities. {n,m} matches between n and m times.",
                content: "Match 2-4 digits:\nPattern: \\d{2,4}\n\nMatches 2, 3, or 4 digits.",

                answer: "\\d{2,4}",
                testCases: [

                    { test: "12345", shouldMatch: true },
                    { test: "1", shouldMatch: false }

                success: "Excellent! {2,4} means 2 to 4 times. {3} means exactly 3 times. {2,} means 2 or more. Very precise control!",
                type: "exact"
            },
            {
                id: 14,
                title: "Word Boundaries",
                intro: "Word boundaries match the position between a word and non-word character. Very useful for matching whole words!",

                answer: "\\bcat\\b",
                testCases: [
                    { test: "cat", shouldMatch: true },
                    { test: "catastrophe", shouldMatch: false },
                    { test: "wildcat", shouldMatch: false },
                    { test: "the cat sat", shouldMatch: true }
                ],
                success: "\\b matches word boundaries - the edge of a word. This ensures you match whole words, not parts of longer words!",
                type: "exact"
            },
            {
                id: 15,
                title: "Capturing Groups",
                intro: "Groups () not only group, but CAPTURE the matched text. Access them with \\1, \\2, etc. or $1, $2 in replacements!",
                content: "Match repeated words:\nPattern: \\b(\\w+)\\s+\\1\\b",
                hint: "Type: \\b(\\w+)\\s+\\1\\b",
                answer: "\\b(\\w+)\\s+\\1\\b",
                testCases: [
                    { test: "the the", shouldMatch: true },
                    { test: "hello hello", shouldMatch: true },
                    { test: "hello world", shouldMatch: false },
                    { test: "the cat", shouldMatch: false }
                ],
                success: "Brilliant! \\1 refers back to what the first group matched. This finds repeated words! You can have multiple groups and backreferences!",
                type: "exact"
            },
            {
                id: 16,
                title: "Non-Capturing Groups",
                intro: "Sometimes you want to group without capturing. Use (?:pattern) for non-capturing groups.",
                content: "Non-capturing group:\nPattern: (?:https?://)",
                hint: "Type: (?:https?://)",
                answer: "(?:https?://)",
                testCases: [
                    { test: "https://", shouldMatch: true },
                    { test: "http://", shouldMatch: true },
                    { test: "ftp://", shouldMatch: false }
                ],
                success: "(?:...) groups without capturing. Useful when you need grouping but don't want to mess up backreference numbers!",
                type: "exact"
            },
            {
                id: 17,
                title: "Lookahead Assertions",
                intro: "Lookaheads check what comes NEXT without consuming it. (?=pattern) is positive lookahead.",
                content: "Match 'cat' followed by 's':\nPattern: cat(?=s)",
                hint: "Type: cat(?=s)",
                answer: "cat(?=s)",
                testCases: [
                    { test: "cats", shouldMatch: true },
                    { test: "cat", shouldMatch: false },
                    { test: "category", shouldMatch: false },
                    { test: "catastrophe", shouldMatch: false }
                ],
                success: "cat(?=s) matches 'cat' ONLY when followed by 's', but doesn't include 's' in the match! Powerful selective matching!",
                type: "exact"
            },
            {
                id: 18,
                title: "Negative Lookahead",
                intro: "(?!pattern) matches only when NOT followed by the pattern. Very handy for exclusions!",
                content: "Match 'cat' not followed by 's':\nPattern: cat(?!s)",
                hint: "Type: cat(?!s)",
                answer: "cat(?!s)",
                testCases: [
                    { test: "cat", shouldMatch: true },
                    { test: "category", shouldMatch: true },
                    { test: "cats", shouldMatch: false },
                    { test: "catastrophe", shouldMatch: true }
                ],
                success: "cat(?!s) matches 'cat' when NOT followed by 's'. This is incredibly useful for 'match X but not when Y follows'!",
                type: "exact"
            },
            {
                id: 19,
                title: "Lookbehind",
                intro: "Lookbehind checks what comes BEFORE. (?<=pattern) is positive lookbehind.",
                content: "Match price symbol:\nPattern: (?<=€)\\d+",
                hint: "Type: (?<=€)\\d+",
                answer: "(?<=€)\\d+",
                testCases: [
                    { test: "€100", shouldMatch: true },
                    { test: "100", shouldMatch: false },
                    { test: "€50", shouldMatch: true },
                    { test: "$100", shouldMatch: false }
                ],
                success: "This matches digits that follow €! Note: lookbehind is supported in JavaScript but some engines don't support it.",
                type: "exact"
            },
            {
                id: 20,
                title: "Flags: Case Insensitive",
                intro: "The i flag makes matching case-insensitive. No more [Aa] nonsense!",
                content: "Case insensitive match:\nPattern: /hello/i",
                hint: "Type: /hello/i",
                answer: "/hello/i",
                testCases: [
                    { test: "HELLO", shouldMatch: true, flags: 'i' },
                    { test: "Hello", shouldMatch: true, flags: 'i' },
                    { test: "hello", shouldMatch: true, flags: 'i' },
                    { test: "world", shouldMatch: false, flags: 'i' }
                ],
                success: "The i flag makes everything match regardless of case! Much cleaner than [Hh][eE][lL][lO][oO]!",
                type: "exact"
            },
            {
                id: 21,
                title: "Flags: Global and Multiline",
                intro: "g flag finds ALL matches, not just the first. m flag makes ^ and $ match line starts/ends.",
                content: "Global multiline match:\nPattern: /^\\w+/gm",
                hint: "Type: /^\\w+/gm",
                answer: "^\\w+",
                testCases: [
                    { test: "hello\\nworld", shouldMatch: true, flags: 'gm' },
                    { test: "first\\nsecond", shouldMatch: true, flags: 'gm' },
                    { test: "test", shouldMatch: true, flags: 'gm' }
                ],
                success: "g finds all matches, m makes ^/$ match each line. Combined with \\A and \\z for string start/end!",
                type: "starts"
            },
            {
                id: 22,
                title: "Character Class Shorthands",
                intro: "Let's review all the shorthand character classes for completeness!",
                content: "Match non-word chars:\nPattern: \\W",
                hint: "Type: \\W",
                answer: "\\W",
                testCases: [
                    { test: "hello!", shouldMatch: true },
                    { test: "hello", shouldMatch: false },
                    { test: "a@b", shouldMatch: true },
                    { test: "abc123", shouldMatch: false }
                ],
                success: "\\W matches anything that's NOT [a-zA-Z0-9_]. Other shorthands: \\D (non-digit), \\S (non-whitespace). You know them all now!",
                type: "exact"
            },
            {
                id: 23,
                title: "Escaping Special Characters",
                intro: "Need to match special characters literally? Escape them with backslash!",
                content: "Match a literal dot:\nPattern: \\.",
                hint: "Type: \\.",
                answer: "\\.",
                testCases: [
                    { test: "hello.world", shouldMatch: true },
                    { test: "hello world", shouldMatch: false },
                    { test: "file.txt", shouldMatch: true },
                    { test: "comma,separated", shouldMatch: true }
                ],
                success: "Escape special chars with \\: . * + ? ^ $ { } [ ] | ( ) \\ . Need to match a backslash? Use \\\\!",
                type: "exact"
            },
            {
                id: 24,
                title: "Intermediate Finale",
                intro: "Outstanding, apprentice! Let's combine lookahead, groups, and quantifiers for the ultimate pattern!",
                content: "Match password requirements:\nPattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d).{8,}$",
                hint: "Type: ^(?=.*[a-z])",
                answer: "^(?=.*[a-z])",
                testCases: [
                    { test: "Password1", shouldMatch: true },
                    { test: "password", shouldMatch: false },
                    { test: "PASSWORD", shouldMatch: false },
                    { test: "Pass1", shouldMatch: false }
                ],
                success: "PHENOMENAL! This checks: lowercase, uppercase, digit, 8+ chars! Lookaheads, character classes, quantifiers - YOU MASTERED THEM ALL! Intermediate complete! Expert level awaits!",
                type: "starts"
            }
        ];
        
        async function startGame() {
            history.innerHTML = '';
            currentLevel = 0;
            levels = beginnerLevels;
            
            const isLoggedIn = await checkLogin();
            if (isLoggedIn) {
                savedLevel = await loadProgress();
                if (savedLevel > 0) {
                    currentLevel = savedLevel - 1;
                }
            }
            
            addLine('');
            addLine('╔═══════════════════════════════════════╗', 'lesson-number');
            addLine('║   REGEX TUTOR with Regex Reginald  ║', 'lesson-number');
            addLine('╚═══════════════════════════════════════╝', 'lesson-number');
            addLine('');
            
            await addCharacterMessage(character.greeting);
            
            addLine('');
            addLine('Choose your path:', 'lesson-number');
            addLine('');
            
            const menu1 = document.createElement('div');
            menu1.className = 'output-line choice';
            menu1.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'beginner\')">--beginner</span> - Start with the basics (lessons 1-12)';
            history.appendChild(menu1);
            
            const menu2 = document.createElement('div');
            menu2.className = 'output-line choice';
            menu2.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'intermediate\')">--intermediate</span> - For those who know the basics (lessons 13-24)';
            history.appendChild(menu2);
            
            const menu3 = document.createElement('div');
            menu3.className = 'output-line choice';
            menu3.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="startTrack(\'expert\')">--expert</span> - Advanced regex (lessons 25-36)';
            history.appendChild(menu3);
            
            const menu4 = document.createElement('div');
            menu4.className = 'output-line choice';
            menu4.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleFullscreen()">--fullscreen</span> - Toggle fullscreen mode';
            history.appendChild(menu4);
            
            const menu5 = document.createElement('div');
            menu5.className = 'output-line choice';
            menu5.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="toggleDarkMode()">--darkmode</span> - Toggle dark/light mode';
            history.appendChild(menu5);
            
            const menu6 = document.createElement('div');
            menu6.className = 'output-line choice';
            menu6.innerHTML = '<span class="command-output" style="cursor:pointer;" onclick="window.location.href=\'../index.html\'">--exit</span> - Back to homepage';
            history.appendChild(menu6);
            
            addLine('');
            await addCharacterMessage("Click on a choice or type --beginner, --intermediate, --expert, --fullscreen, --darkmode, or --exit!");
        }
        
        async function startTrack(trackName) {
            if (trackName === 'beginner') {
                levels = beginnerLevels;
                await addCharacterMessage("Excellent choice! We'll start from the beginning - perfect for learning the fundamentals!");
            } else if (trackName === 'intermediate') {
                levels = intermediateLevels;
                await addCharacterMessage("Welcome back! You've mastered the basics - now let's explore advanced pattern matching with lookaheads, groups, and more!");
            } else if (trackName === 'expert') {
                levels = expertLevels;
                await addCharacterMessage("Welcome to EXPERT level! You'll tackle Unicode, HTML, URLs, credit cards, and the ultimate domain validator!");
            }
            
            currentLevel = 0;
            addLine('');
            await showLevel();
        }
        
        async function addCharacterMessage(text) {
            const line = document.createElement('div');
            line.className = 'output-line';
            history.appendChild(line);
            
            await new Promise(resolve => {
                let i = 0;
                let currentText = '';
                
                function type() {
                    if (i < text.length) {
                        currentText += text.charAt(i);
                        line.innerHTML = '<span class="character-name">' + character.name + ':</span> ' + currentText;
                        i++;
                        output.scrollTop = output.scrollHeight;
                        setTimeout(type, 15);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
        
        async function handleCommand(cmd) {
            cmd = cmd.trim();
            if (!cmd) return;
            
            // Make sure levels is set
            if (!levels || levels.length === 0) {
                levels = beginnerLevels;
            }
            
            addUserInput(cmd);
            
            const level = levels[currentLevel];
            
            // Check special commands first
            if (cmd.toLowerCase() === '--start' || cmd.toLowerCase() === '--restart') {
                startGame();
                return;
            }
            
            if (cmd.toLowerCase() === '--beginner') {
                await startTrack('beginner');
                return;
            }
            
            if (cmd.toLowerCase() === '--intermediate') {
                await startTrack('intermediate');
                return;
            }
            
            if (cmd.toLowerCase() === '--expert') {
                await startTrack('expert');
                return;
            }
            
            if (cmd.toLowerCase() === '--fullscreen') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
                return;
            }
            
            if (cmd.toLowerCase() === '--darkmode') {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                if (userId) {
                    try {
                        await fetch('/api/auth.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'action=updateTheme&theme=' + newTheme,
                            credentials: 'include'
                        });
                    } catch (e) {}
                }
                await addCharacterMessage("Theme switched to " + newTheme + " mode!");
                return;
            }
            
            if (cmd.toLowerCase() === '--exit') {
                window.location.href = '../index.html';
                return;
            }
            
            if (cmd.toLowerCase() === '--help') {
                await addCharacterMessage("Type --start to return to the main menu!");
                await addCharacterMessage("Type --beginner for beginner lessons (1-12)");
                await addCharacterMessage("Type --intermediate for intermediate lessons (13-24)");
                await addCharacterMessage("Type --expert for expert lessons (25-36)");
                await addCharacterMessage("Type --fullscreen to toggle fullscreen mode");
                await addCharacterMessage("Type --darkmode to toggle dark/light mode");
                await addCharacterMessage("Type --exit to go back to homepage");
                await addCharacterMessage("Type --level to see your current level");
                await addCharacterMessage("Type --hint if you're stuck");
                return;
            }
            
            if (cmd.toLowerCase() === '--level') {
                addLine('Current level: ' + (currentLevel + 1) + ' - ' + levels[currentLevel].title);
                return;
            }
            
            if (cmd.toLowerCase() === '--skip') {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    await addCharacterMessage("You finished all the levels! You're a regex master now! Type --start to practice again!");
                    return;
                }
                await showLevel();
                return;
            }
            
            if (cmd.toLowerCase() === '--hint') {
                await addCharacterMessage("No worries! The hint is: " + levels[currentLevel].hint);
                return;
            }
            
            // Run regex tests
            const passed = runRegex(cmd, level.testCases);
            const answerCorrect = checkAnswer(cmd, level);
            console.log('Command:', cmd, 'passed:', passed, 'answerCorrect:', answerCorrect);
            
            if (passed || answerCorrect) {
                await showSuccess();
                saveProgress(currentLevel + 2);
                currentLevel++;
                
                if (currentLevel >= levels.length) {
                    addLine('');
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    if (levels === beginnerLevels) {
                        await addCharacterMessage("CONGRATULATIONS! You completed all 12 beginner regex lessons! I'm so incredibly proud of you! Type --intermediate to continue your journey!");
                    } else if (levels === intermediateLevels) {
                        await addCharacterMessage("CONGRATULATIONS! You completed all 12 intermediate regex lessons! You're amazing! You've mastered the art of pattern matching! Type --beginner to start over!");
                    }
                    addLine('═══════════════════════════════════════', 'lesson-number');
                    addLine('');
                } else {
                    setTimeout(() => showLevel(), 1500);
                }
            } else {
                await addCharacterMessage("Hmm, that's not quite right. Try adjusting your pattern to match all the test cases. Remember - green means pass, red means fail!");
            }
        }
        
        input.addEventListener('keydown', function(e) {
            console.log('Key pressed:', e.key);
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const cmd = input.value;
                console.log('Submitting command:', cmd);
                input.value = '';
                handleCommand(cmd);
            }
        });
        
        const runBtn = document.getElementById('runBtn');
        if (runBtn) {
            runBtn.addEventListener('click', function() {
                const cmd = input.value;
                console.log('Submitting command:', cmd);
                input.value = '';
                handleCommand(cmd);
            });
        }
        
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        async function init() {
            await checkLogin();
            savedLevel = await loadProgress();
            if (savedLevel > 0) {
                currentLevel = savedLevel - 1;
            }
            if (userId) {
                document.documentElement.setAttribute('data-theme', userTheme);
                localStorage.setItem('theme', userTheme);
                const toggle = document.getElementById('themeToggle');
                if (toggle) toggle.checked = userTheme === 'dark';
            }
            startGame();
        }
        init();
    </script>
