    <script>
        (function() {

            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').style.display = 'inline-block';
            document.getElementById('themeBtn').textContent = theme === 'dark' ? 'Light' : 'Dark';
            if (theme === 'dark') {
                document.getElementById('themeBtn').style.color = '#e0e0e0';
            }
            
            document.getElementById('themeBtn').addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.textContent = next === 'dark' ? 'Light' : 'Dark';
                this.style.color = next === 'dark' ? '#e0e0e0' : '#000000';
            });

            var isLoggedIn = localStorage.getItem('auth') === 'true';
            if (isLoggedIn) {
                document.getElementById('accountBtn').style.display = 'inline-block';
            } else {
                document.getElementById('loginBtn').style.display = 'inline-block';
            }
        })();
    </script>

    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

            { q: "What is compression in GPG?", a: ["ZIP, ZLIB, BZIP2", "RSA encryption", "Key derivation", "Hashing"], correct: 0 },
            { q: "What is the default compression?", a: ["ZLIB", "ZIP", "BZIP2", "None"], correct: 0 },
            { q: "What command specifies compression?", a: ["--compress-keys", "--compression-algo", "--compress", "--zip-algo"], correct: 0 },
            { q: "What is an integrity check in GPG?", a: ["Protected by modification detection", "Password check", "Key verification", "Signature check"], correct: 0 }
        ];
        const hardQuestions = [
            { q: "What is the mathematical trapdoor in RSA?", a: ["Factoring large numbers", "Discrete logarithm", "Hash collision", "Elliptic curve"], correct: 0 },
            { q: "What key size provides ~128-bit security?", a: ["3072-bit RSA", "2048-bit RSA", "1024-bit RSA", "4096-bit RSA"], correct: 0 },
            { q: "What is the生日攻击?", a: ["Collision probability after ~2^n/2 attempts", "Birthday encryption", "Random attack", "Password attack"], correct: 0 },
            { q: "What is forward secrecy?", a: ["Compromised key doesn't expose past sessions", "Future key compromise", "Past key compromise", "No key compromise"], correct: 0 },
            { q: "How does GPG provide forward secrecy?", a: ["Ephemeral session keys", "Permanent keys", "Key rotation", "Hash chains"], correct: 0 },
            { q: "What is DH key exchange?", a: ["Generate shared secret over insecure channel", "Encrypt with hash", "Sign key", "Derive password"], correct: 0 },
            { q: "What is ECIES?", a: ["Elliptic Curve Integrated Encryption Scheme", "Extended Internet Encryption Standard", "Elliptical Curve Information Exchange", "External Certificate Import"], correct: 0 },
            { q: "What does --show-session-key reveal?", a: ["Displays session key for debugging", "Exposes private key", "Shows all keys", "Reveals password"], correct: 0 },
            { q: "What is the crypt(3) function?", a: ["Password hashing function", "Encryption function", "Key derivation", "Hash algorithm"], correct: 0 },
            { q: "What are S2K functions in GPG?", a: ["String-to-Key key derivation", "Secret Key Knowledge", "Symmetric Key Operation", "Standard Key Output"], correct: 0 },
            { q: "What is the Simple S2K?", a: ["Hash password repeatedly", "Single hash", "No hashing", "Random salt"], correct: 0 },
            { q: "What is Salted S2K?", a: ["Uses random salt + iteration", "Fast hash only", "No salt", "Single iteration"], correct: 0 },
            { q: "What is Iterated Salted S2K?", a: ["Multiple rounds of hashing", "Single hash", "No salt", "Random salt only"], correct: 0 },
            { q: "What does --s2k-digest-algo specify?", a: ["Hash for key derivation", "Message hash", "Signature hash", "Compression hash"], correct: 0 },
            { q: "What is a AEAD encryption mode?", a: ["Authenticated Encryption with Associated Data", "Advanced Encryption Algorithm", "Alternative Encryption", "Asymmetric Encryption"], correct: 0 },
            { q: "What is EAX mode in GPG?", a: ["Encrypt-Then-MAC with CCM", "Password mode", "Stream mode", "Block mode"], correct: 0 },
            { q: "What is OCB mode?", a: ["Offset Codebook mode", "One-Key CBC", "Output Block Cipher", "Ordered Cipher Block"], correct: 0 },
            { q: "What is MDC in OpenPGP?", a: ["Modification Detection Code", "Message Digest Code", "MAC Digest", "Key Check"], correct: 0 },
            { q: "What does a MDC protect against?", a: ["Ciphertext tampering", "Password guessing", "Key recovery", "Signature forgery"], correct: 0 },
            { q: "What is the purpose of SEIPD?", a: ["Symmetrically Encrypted with Integrity Protection", "Session Encryption", "Public Key", "Signature Encapsulation"], correct: 0 },
            { q: "What is a literal data packet?", a: ["Contains actual file data", "Encrypted metadata", "Signature packet", "Key packet"], correct: 0 },
            { q: "What is the new format packet?", a: ["OpenPGP RFC 4880 packet", "Old format", "Compressed format", "Signature only"], correct: 0 },
            { q: "What is the trust signature packet?", a: ["Certifies key trust level", "Key expiration", "Signature trust", "Owner trust"], correct: 0 },
            { q: "What is a notation data signature?", a: ["User-defined metadata in signature", "Signature timestamp", "Key fingerprint", "Hash value"], correct: 0 },
            { q: "What does --attribute-policy do?", a: ["Controls attribute usage", "Sets attributes", "Removes attributes", "Encrypts attributes"], correct: 0 },
            { q: "What is the primary UID?", a: ["Main user ID designation", "First UID only", "Verified UID", "Encrypted UID"], correct: 0 },
            { q: "What command makes UID primary?", a: ["gpg --edit-key uid primary", "gpg --set-primary", "gpg --make-primary", "gpg --primary-uid"], correct: 0 },
            { q: "What is key invalidation?", a: ["Permanent key revocation", "Temporary hold", "Expiration extension", "Trust change"], correct: 0 },
            { q: "What is a designated revoker?", a: ["Can revoke on owner's behalf", "Main revoker", "Backup revoker", "Keyserver revoker"], correct: 0 },
            { q: "What command designates revoker?", a: ["gpg --edit-key addrevoker", "gpg --set-revoker", "gpg --add-revoke", "gpg --revoker add"], correct: 0 }
        ];
        let currentQuestions=[],currentQuestionIndex=0,score=0,streak=0,maxStreak=0,difficulty='easy',currentLevel=1,consecutiveCorrect=0,totalAnswered=0;
        function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        function shuffleAnswers(q){let a=[...q.a],c=a[q.correct],s=shuffle(a);return{...q,a:s,correct:s.indexOf(c)}}
        function initTest(){difficulty='easy';currentLevel=1;consecutiveCorrect=0;currentQuestions=shuffle([...easyQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0;score=0;streak=0;maxStreak=0;totalAnswered=0;document.getElementById('resultScreen').classList.remove('active');document.getElementById('quiz').style.display='block';renderQuestion()}
        function renderQuestion(){let c=document.getElementById('questionsContainer');c.innerHTML='';let q=currentQuestions[currentQuestionIndex],d=document.createElement('div');d.className='question-container active';d.innerHTML=`<div class="question-text">${q.q}</div><div class="answers-grid">${q.a.map((a,i)=>`<button class="answer-btn" onclick="selectAnswer(${i})"> ${a}</button>`).join('')}</div>`;c.appendChild(d);updateUI()}
        function updateUI(){let t=currentQuestions.length,p=(currentQuestionIndex/t)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('questionNum').textContent=currentQuestionIndex+1;document.getElementById('streakNum').textContent=streak;document.getElementById('scoreNum').textContent=score;document.getElementById('levelNum').textContent=currentLevel}
        function selectAnswer(i){let q=currentQuestions[currentQuestionIndex],b=document.querySelectorAll('.answer-btn');b.forEach((btn,j)=>{btn.disabled=true;if(j===q.correct)btn.classList.add('correct')});totalAnswered++;if(i===q.correct){streak++;if(streak>maxStreak)maxStreak=streak;consecutiveCorrect++;score+=difficulty==='easy'?10:difficulty==='medium'?20:30;if(currentLevel===1&&consecutiveCorrect>=7){currentLevel=2;difficulty='medium';consecutiveCorrect=0;currentQuestions=shuffle([...mediumQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0}else if(currentLevel===2&&consecutiveCorrect>=7){currentLevel=3;difficulty='hard';consecutiveCorrect=0;currentQuestions=shuffle([...hardQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0}else currentQuestionIndex++;setTimeout(()=>{currentQuestionIndex<currentQuestions.length?renderQuestion():showResult()},1200)}else{b[i].classList.add('incorrect');streak=0;consecutiveCorrect=0;currentQuestionIndex++;setTimeout(()=>{currentQuestionIndex<currentQuestions.length?renderQuestion():showResult()},2000);return}}
        function showResult(){document.getElementById('questionsContainer').innerHTML='';let p=score>=100;document.getElementById('resultScreen').classList.add('active');document.getElementById('resultIcon').textContent=p?'✓':'✗';document.getElementById('resultText').textContent=p?'PASS':'FAIL';document.getElementById('resultText').className='result-text '+(p?'pass':'fail');document.getElementById('resultScore').textContent=`Score: ${score}`;document.getElementById('resultDetails').innerHTML=`Questions answered: ${totalAnswered}<br>Best streak: ${maxStreak}<br>Highest level reached: ${currentLevel}`;document.getElementById('progressFill').style.width='100%'}
        function restartTest(){initTest()}
        document.addEventListener('DOMContentLoaded', function() { initTest(); });
