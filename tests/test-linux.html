            { q: "What is 'HPA'?", a: ["Horizontal Pod Autoscaler", "High Performance", "Host Port Access", "HTTP Proxy"], correct: 0 },
            { q: "What does 'kubectl exec' do?", a: ["Execute command in container", "Exit container", "Export container", "Execute pod"], correct: 0 },
            { q: "What is 'kubectl port-forward'?", a: ["Forward local port to pod", "Export ports", "Map ports", "Open ports"], correct: 0 },
            { q: "What is Terraform?", a: ["Infrastructure as Code", "Terminate infra", "Test formation", "Transfer form"], correct: 0 },
            { q: "What is a Terraform provider?", a: ["Manages API interactions", "Provides resources", "Supplies config", "Offers services"], correct: 0 },
            { q: "What does 'terraform plan' do?", a: ["Shows planned changes", "Creates plan", "Executes plan", "Deletes plan"], correct: 0 },
            { q: "What is 'ansible-vault'?", a: ["Encrypts sensitive data", "Creates vault", "Manages vault", "Opens vault"], correct: 0 },
            { q: "What does 'ansible-playbook' run?", a: ["Ansible playbook", "Ansible plan", "Ansible script", "Ansible config"], correct: 0 },
            { q: "What is a CI/CD pipeline?", a: ["Continuous Integration/Deployment", "Continuous Input", "Code Integration", "Container Integration"], correct: 0 },
            { q: "What does 'docker build' do?", a: ["Creates image from Dockerfile", "Builds container", "Builds volume", "Builds network"], correct: 0 },
            { q: "What is a multi-stage Dockerfile?", a: ["Builds with multiple steps", "Multiple containers", "Multiple images", "Multiple volumes"], correct: 0 },
            { q: "What does 'docker-compose' do?", a: ["Defines multi-container apps", "Composes images", "Composes volumes", "Composes networks"], correct: 0 },
            { q: "What is a Kubernetes Secret?", a: ["Sensitive data storage", "Secret pod", "Hidden data", "Encrypted data"], correct: 0 },
            { q: "What is WireGuard?", a: ["Modern VPN solution", "Wire guard", "Guard wire", "Network guard"], correct: 0 },
            { q: "What does 'fail2ban' do?", a: ["Blocks malicious IPs", "Bans processes", "Tests ban", "Creates ban"], correct: 0 },
            { q: "What is 'auditd'?", a: ["Linux audit daemon", "Audio daemon", "Auto daemon", "Alert daemon"], correct: 0 },
            { q: "What does 'aureport' show?", a: ["Audit reports", "Audio reports", "Auto reports", "Alert reports"], correct: 0 },
            { q: "What is 'tripwire'?", a: ["File integrity monitor", "Trip wire", "Data monitor", "System monitor"], correct: 0 },
            { q: "What is 'lynis'?", a: ["Security auditing tool", "Linux system", "System scanner", "Security scanner"], correct: 0 }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let difficulty = 'easy';
        let currentLevel = 1;
        let consecutiveCorrect = 0;
        let totalAnswered = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function shuffleAnswers(question) {
            const answers = [...question.a];
            const correctAnswer = answers[question.correct];
            const shuffled = shuffle(answers);
            const newCorrectIndex = shuffled.indexOf(correctAnswer);
            return { ...question, a: shuffled, correct: newCorrectIndex };
        }

        function initTest() {
            difficulty = 'easy';
            currentLevel = 1;
            consecutiveCorrect = 0;
            currentQuestions = shuffle([...easyQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            totalAnswered = 0;
            
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quiz').style.display = 'block';
            
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            const q = currentQuestions[currentQuestionIndex];
            
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container active';
            
            let answersHtml = q.a.map((answer, index) => 
                `<button class="answer-btn" onclick="selectAnswer(${index})">${answer}</button>`
            ).join('');
            
            qDiv.innerHTML = `
                <div class="question-text">${q.q}</div>
                <div class="answers-grid">${answersHtml}</div>
            `;
            
            container.appendChild(qDiv);
            
            updateUI();
        }

        function updateUI() {
            const total = currentQuestions.length;
            const progress = ((currentQuestionIndex) / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('streakNum').textContent = streak;
            document.getElementById('scoreNum').textContent = score;
            document.getElementById('levelNum').textContent = currentLevel;
        }

        function selectAnswer(index) {
            const q = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answer-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) {
                    btn.classList.add('correct');
                }
            });
            
            totalAnswered++;
            
            if (index === q.correct) {
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                consecutiveCorrect++;
                score += difficulty === 'easy' ? 10 : difficulty === 'medium' ? 20 : 30;
                
                if (currentLevel === 1 && consecutiveCorrect >= 7) {
                    currentLevel = 2;
                    difficulty = 'medium';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...mediumQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else if (currentLevel === 2 && consecutiveCorrect >= 7) {
                    currentLevel = 3;
                    difficulty = 'hard';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...hardQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else {
                    currentQuestionIndex++;
                }
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 1200);
            } else {
                buttons[index].classList.add('incorrect');
                streak = 0;
                consecutiveCorrect = 0;
                currentQuestionIndex++;
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 2000);
                return;
            }
        }

        function showResult() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('active');
            
            const pass = score >= 100;
            document.getElementById('resultIcon').textContent = pass ? '✓' : '✗';
            document.getElementById('resultText').textContent = pass ? 'PASS' : 'FAIL';
            document.getElementById('resultText').className = 'result-text ' + (pass ? 'pass' : 'fail');
            document.getElementById('resultScore').textContent = `Score: ${score}`;
            document.getElementById('resultDetails').innerHTML = `
                Questions answered: ${totalAnswered}<br>
                Best streak: ${maxStreak}<br>
                Highest level reached: ${currentLevel}
            `;
            
            document.getElementById('progressFill').style.width = '100%';
        }

        function restartTest() {
            initTest();
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').checked = true;
            }
            initTest();
        });
    </script>
