    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').style.display = 'inline-block';
            document.getElementById('themeBtn').textContent = theme === 'dark' ? 'Light' : 'Dark';
            if (theme === 'dark') {
                document.getElementById('themeBtn').style.color = '#e0e0e0';
            }
            
            document.getElementById('themeBtn').addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.textContent = next === 'dark' ? 'Light' : 'Dark';
                this.style.color = next === 'dark' ? '#e0e0e0' : '#000000';
            });

            var isLoggedIn = localStorage.getItem('auth') === 'true';
            if (isLoggedIn) {
                document.getElementById('accountBtn').style.display = 'inline-block';
            } else {
                document.getElementById('loginBtn').style.display = 'inline-block';
            }
        })();
    </script>

    <div id="loginModal" class="auth-modal">
        <div class="auth-box">
            <button class="close-auth" onclick="closeLoginModal()">×</button>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('login')">Login</button>

    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

            { q: "What does 'gJ' do?", a: ["Join without spaces", "Join lines", "Go to line", "Global join"], correct: 0 },
            { q: "How do you move to matching parenthesis?", a: ["%", "(", ")", "match"], correct: 0 },
            { q: "What does 'Ctrl+o' do in normal mode?", a: ["Jump to previous location", "Open line", "Outdent", "Overwrite"], correct: 0 },
            { q: "What does 'Ctrl+i' do in normal mode?", a: ["Jump to next location", "Indent", "Insert", "Import"], correct: 0 },
            { q: "How do you change case of character?", a: ["~", "gu", "gU", "case"], correct: 0 },
            { q: "What does 'guw' do?", a: ["Lowercase word", "Uppercase word", "Delete word", "Copy word"], correct: 0 },
            { q: "What does 'gUw' do?", a: ["Uppercase word", "Lowercase word", "Delete word", "Copy word"], correct: 0 },
            { q: "How do you mark a location with letter 'a'?", a: ["ma", "a", "mark a", "'a"], correct: 0 },
            { q: "How do you jump to mark 'a'?", a: ["'a", "ma", "go a", "jump a"], correct: 0 },
            { q: "How do you jump to exact position of mark 'a'?", a: ["`a", "'a", "gm a", "goto a"], correct: 0 },
            { q: "What is the purpose of Vim plugins?", a: ["Extend functionality", "Speed up Vim", "Add colors", "Manage buffers"], correct: 0 },
            { q: "What is the most popular plugin manager?", a: ["vim-plug", "Vundle", "Pathogen", "dein"], correct: 0 },
            { q: "Where are plugins typically stored?", a: [".vim/pack", ".vim/plugin", ".vim/autoload", ".vim/bundle"], correct: 0 },
            { q: "What is the purpose of 'netrw'?", a: ["File explorer", "Network wrapper", "File transfer", "Remote editing"], correct: 0 },
            { q: "How do you open file explorer in Vim?", a: [":Explore", ":E", ":Lex", "both :E and :Lex"], correct: 0 },
            { q: "What is Vim's leader key?", a: ["\\ (backslash)", ":", ";", "space"], correct: 0 },
            { q: "How do you see all current mappings?", a: [":map", ":mapping", "showmap", "maps"], correct: 0 },
            { q: "What does 'gf' command do?", a: ["Go to file under cursor", "Global find", "Go forward", "Go to function"], correct: 0 },
            { q: "What does 'Ctrl+^' do in Vim?", a: ["Switch to alternate file", "Go up one level", "Go to definition", "Center screen"], correct: 0 },
            { q: "How do you execute shell command from Vim?", a: [":!command", ":shell", "sh command", "!command"], correct: 0 }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let difficulty = 'easy';
        let currentLevel = 1;
        let consecutiveCorrect = 0;
        let totalAnswered = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function shuffleAnswers(question) {
            const answers = [...question.a];
            const correctAnswer = answers[question.correct];
            const shuffled = shuffle(answers);
            const newCorrectIndex = shuffled.indexOf(correctAnswer);
            return { ...question, a: shuffled, correct: newCorrectIndex };
        }

        function initTest() {
            difficulty = 'easy';
            currentLevel = 1;
            consecutiveCorrect = 0;
            currentQuestions = shuffle([...easyQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            totalAnswered = 0;
            
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quiz').style.display = 'block';
            
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            const q = currentQuestions[currentQuestionIndex];
            
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container active';
            
            let answersHtml = q.a.map((answer, index) => 
                `<button class="answer-btn" onclick="selectAnswer(${index})">${answer}</button>`
            ).join('');
            
            qDiv.innerHTML = `
                <div class="question-text">${q.q}</div>
                <div class="answers-grid">${answersHtml}</div>
            `;
            
            container.appendChild(qDiv);
            
            updateUI();
        }

        function updateUI() {
            const total = currentQuestions.length;
            const progress = ((currentQuestionIndex) / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('streakNum').textContent = streak;
            document.getElementById('scoreNum').textContent = score;
            document.getElementById('levelNum').textContent = currentLevel;
        }

        function selectAnswer(index) {
            const q = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answer-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) {
                    btn.classList.add('correct');
                }
            });
            
            totalAnswered++;
            
            if (index === q.correct) {
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                consecutiveCorrect++;
                score += difficulty === 'easy' ? 10 : difficulty === 'medium' ? 20 : 30;
                
                if (currentLevel === 1 && consecutiveCorrect >= 7) {
                    currentLevel = 2;
                    difficulty = 'medium';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...mediumQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else if (currentLevel === 2 && consecutiveCorrect >= 7) {
                    currentLevel = 3;
                    difficulty = 'hard';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...hardQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else {
                    currentQuestionIndex++;
                }
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 1200);
            } else {
                buttons[index].classList.add('incorrect');
                streak = 0;
                consecutiveCorrect = 0;
                currentQuestionIndex++;
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 2000);
                return;
            }
        }

        function showResult() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('active');
            
            const pass = score >= 100;
            document.getElementById('resultIcon').textContent = pass ? '✓' : '✗';
            document.getElementById('resultText').textContent = pass ? 'PASS' : 'FAIL';
            document.getElementById('resultText').className = 'result-text ' + (pass ? 'pass' : 'fail');
            document.getElementById('resultScore').textContent = `Score: ${score}`;
            document.getElementById('resultDetails').innerHTML = `
                Questions answered: ${totalAnswered}<br>
                Best streak: ${maxStreak}<br>
                Highest level reached: ${currentLevel}
            `;
            
            document.getElementById('progressFill').style.width = '100%';
        }

        function restartTest() {
            initTest();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initTest();
        });
    </script>
