    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').style.display = 'inline-block';
            document.getElementById('themeBtn').textContent = theme === 'dark' ? 'Light' : 'Dark';
            if (theme === 'dark') {
                document.getElementById('themeBtn').style.color = '#e0e0e0';
            }
            
            document.getElementById('themeBtn').addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.textContent = next === 'dark' ? 'Light' : 'Dark';
                this.style.color = next === 'dark' ? '#e0e0e0' : '#000000';
            });

            var isLoggedIn = localStorage.getItem('auth') === 'true';
            if (isLoggedIn) {
                document.getElementById('accountBtn').style.display = 'inline-block';
            } else {
                document.getElementById('loginBtn').style.display = 'inline-block';
            }
        })();
    </script>

    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

            { q: "What isCryptoNote?", a: ["Protocol specification", "Encryption method", "Wallet type", "Mining algo"], correct: 0 },
            { q: "What command shows peer list?", a: ["peers", "show_peers", "connection", "net"], correct: 0 },
            { q: "What is the daemon RPC port for testnet?", a: ["28081", "18081", "38081", "48081"], correct: 0 },
            { q: "What is Seraphis?", a: ["Next-gen privacy protocol", "Mining algo", "Wallet backup", "Node software"], correct: 0 }
        ];

        const hardQuestions = [
            { q: "What is the asymptotic complexity of verification?", a: ["O(n) per input", "O(log n)", "O(n²)", "O(1)"], correct: 0 },
            { q: "What is the MLSAG formula?", a: ["Multilayer Spontaneous Anonymous Group", "Multi Layer Security", "Mining Link Signature", "Master Local Signing"], correct: 0 },

            { q: "What is the ecdhInfo used for?", a: ["Transaction amount derivation", "Address encryption", "Key exchange", "Signature"], correct: 0 },
            { q: "What is the stealth address generation?", a: ["Public key + random scalar", "Hash of private key", "Random number", "Deterministic"], correct: 0 },
            { q: "What is the MLSAG verification complexity?", a: ["O(n×m)", "O(n+m)", "O(n)", "O(1)"], correct: 0 },
            { q: "What is the commitment mask?", a: ["Blinding factor for amount", "Random byte", "Transaction ID", "Signature component"], correct: 0 },
            { q: "What is Bulletproofs+?", a: ["Compressed range proof", "Signature scheme", "Encryption", "Key exchange"], correct: 0 },
            { q: "What is the hash used in ring signatures?", a: ["Keccak", "SHA-256", "SHA-3", "BLAKE2b"], correct: 0 },
            { q: "What is the base point for Ed25519?", a: ["Generator point", "Hash of 9", "Curve constant", "Random point"], correct: 0 },

            { q: "What is the range proof size with Bulletproofs?", a: ["~2.5KB", "10KB", "50KB", "100KB"], correct: 0 },
            { q: "What is the tx_extra field used for?", a: ["Additional data", "Signatures only", "Fees", "Timestamps"], correct: 0 },
            { q: "What is the MLSAG requirement?", a: ["All ring members share same public key", "Unique keys", "Sequential keys", "No requirement"], correct: 0 },
            { q: "What is slip-0014?", a: ["HD wallet derivation path", "Encryption standard", "Address format", "Key hierarchy"], correct: 0 },
            { q: "What is the stealth address math?", a: ["Hs(rA)G + B", "r × A", "Hash(A)", "A + B"], correct: 0 },
            { q: "What is the one-time key formula?", a: ["P + Hs(rA)G", "P × r", "rP", "Hash(P)"], correct: 0 },
            { q: "What is the view key derivation?", a: ["aG", "a × B", "Hs(a)", "Hash(aG)"], correct: 0 },
            { q: "What is the spend key derivation?", a: ["sG", "s × G", "Hs(s)", "Hash(sG)"], correct: 0 },
            { q: "What is the MLSAG signature tuple?", a: ["({L,R},I,z)", "(c,s)", "(P,k)", "(x,L)"], correct: 0 },
            { q: "What is the amount commitment?", a: ["C = aG + bH", "C = a × b", "C = Hash(a)", "C = a + b"], correct: 0 },
            { q: "What is the Borromean property?", a: ["Linkable across rings", "Unlinkable", "Aggregatable", "Linear"], correct: 0 },
            { q: "What is the fee calculation formula?", a: ["base_fee × size", "Fixed", "Dynamic", "Priority-based"], correct: 0 },
            { q: "What is the RCTTypeFull?", a: ["Full ringct with proofs", "Simple", "Bulletproof", "No"], correct: 0 }
        ];

        let currentQuestions = [], currentQuestionIndex = 0, score = 0, streak = 0, maxStreak = 0, difficulty = 'easy', currentLevel = 1, consecutiveCorrect = 0, totalAnswered = 0, userId = null;
        async function checkLogin(){try{const r=await fetch('../api/auth.php?action=check');const d=await r.json();if(d.authenticated){userId=d.email;return true}}catch(e){}return false}
        async function saveProgress(testScore){if(!userId)return;try{await fetch('../api/progress.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({course:'test-monero',lesson_id:1,completed:true,quiz_score:testScore})})}catch(e){}}

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function shuffleAnswers(question) {
            const answers = [...question.a];
            const correctAnswer = answers[question.correct];
            const shuffled = shuffle(answers);
            const newCorrectIndex = shuffled.indexOf(correctAnswer);
            return { ...question, a: shuffled, correct: newCorrectIndex };
        }

        function initTest() {
            difficulty = 'easy';
            currentLevel = 1;
            consecutiveCorrect = 0;
            currentQuestions = shuffle([...easyQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            totalAnswered = 0;
            
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quiz').style.display = 'block';
            
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            const q = currentQuestions[currentQuestionIndex];
            
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container active';
            
            let answersHtml = q.a.map((answer, index) => 
                `<button class="answer-btn" onclick="selectAnswer(${index})"> ${answer}</button>`
            ).join('');
            
            qDiv.innerHTML = `
                <div class="question-text">${q.q}</div>
                <div class="answers-grid">${answersHtml}</div>
            `;
            
            container.appendChild(qDiv);
            
            updateUI();
        }

        function updateUI() {
            const total = currentQuestions.length;
            const progress = ((currentQuestionIndex) / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('streakNum').textContent = streak;
            document.getElementById('scoreNum').textContent = score;
            document.getElementById('levelNum').textContent = currentLevel;
        }

        function selectAnswer(index) {
            const q = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answer-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) {
                    btn.classList.add('correct');
                }
            });
            
            totalAnswered++;
            
            if (index === q.correct) {
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                consecutiveCorrect++;
                score += difficulty === 'easy' ? 10 : difficulty === 'medium' ? 20 : 30;
                
                if (currentLevel === 1 && consecutiveCorrect >= 7) {
                    currentLevel = 2;
                    difficulty = 'medium';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...mediumQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else if (currentLevel === 2 && consecutiveCorrect >= 7) {
                    currentLevel = 3;
                    difficulty = 'hard';
                    consecutiveCorrect = 0;
                    currentQuestions = shuffle([...hardQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
                    currentQuestionIndex = 0;
                } else {
                    currentQuestionIndex++;
                }
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 1200);
            } else {
                buttons[index].classList.add('incorrect');
                streak = 0;
                consecutiveCorrect = 0;
                currentQuestionIndex++;
                
                setTimeout(() => {
                    if (currentQuestionIndex < currentQuestions.length) {
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 2000);
                return;
            }
        }

        function showResult() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('active');
            
            const pass = score >= 100;
            if (pass) { saveProgress(score); }
            document.getElementById('resultIcon').textContent = pass ? '✓' : '✗';
            document.getElementById('resultText').textContent = pass ? 'PASS' : 'FAIL';
            document.getElementById('resultText').className = 'result-text ' + (pass ? 'pass' : 'fail');
            document.getElementById('resultScore').textContent = `Score: ${score}`;
            document.getElementById('resultDetails').innerHTML = `
                Questions answered: ${totalAnswered}<br>
                Best streak: ${maxStreak}<br>
                Highest level reached: ${currentLevel}
            `;
            
            document.getElementById('progressFill').style.width = '100%';
        }

        function restartTest() {
            initTest();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initTest();
            checkLogin();
        });
    </script>
