<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta http-equiv="onion-location" content="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion/tests/test-git.html" />
    <meta charset="UTF-8">
    <meta name="author" content="cjboon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Test - REBEL WITH LINUX</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="../style.css">
    <script src="../nav.js" defer></script>
    <script src="../achievements.js" defer></script>
    <style>
        .test-container { padding: 32px 32px; background: var(--white); max-width: 800px; margin: 0 auto; min-height: 80vh; }
        .test-header { text-align: center; margin-bottom: 20px; }
        .test-header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 2rem; margin-bottom: 4px; }
        .test-header p { font-family: 'IBM Plex Mono', monospace; color: var(--charcoal); }
        .progress-bar { width: 100%; height: 8px; background: var(--light-gray); border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--charcoal); transition: width 0.3s ease; }
        .question-container { display: none; }
        .question-container.active { display: block; }
        .question-text { font-family: 'IBM Plex Mono', monospace; font-size: 1.25rem; margin-bottom: 24px; line-height: 1.6; }
        .answers-grid { display: flex; flex-direction: column; gap: 12px; }
        .answer-btn { padding: 16px 20px; border: 2px solid var(--charcoal); background: transparent; color: var(--charcoal); font-family: 'IBM Plex Mono', monospace; font-size: 1rem; text-align: left; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; }
        .answer-btn:hover { background: var(--light-gray); }
        .answer-btn.correct { background: #22c55e !important; border-color: #22c55e !important; color: white !important; }
        .answer-btn.incorrect { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }
        .answer-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .result-screen { display: none; text-align: center; padding: 60px 20px; }
        .result-screen.active { display: block; }
        .result-icon { font-size: 5rem; margin-bottom: 24px; }
        .result-text { font-family: 'IBM Plex Mono', monospace; font-size: 2.5rem; margin-bottom: 16px; }
        .result-text.pass { color: #22c55e; }
        .result-text.fail { color: #ef4444; }
        .result-score { font-family: 'IBM Plex Mono', monospace; font-size: 1.25rem; color: var(--charcoal); margin-bottom: 32px; }
        .result-details { font-family: 'IBM Plex Mono', monospace; color: var(--charcoal); margin-bottom: 32px; }
        .retry-btn { padding: 16px 32px; background: var(--charcoal); color: var(--white); font-family: 'IBM Plex Mono', monospace; font-size: 1rem; border: none; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; }
        .retry-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .stats-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; font-family: 'IBM Plex Mono', monospace; color: var(--charcoal); }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; }
        nav { display: flex; align-items: center; padding: 8px 16px; background: var(--white); gap: 8px; }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .nav-title { font-size: 1.1rem; font-weight: 700; white-space: nowrap; color: var(--charcoal); text-decoration: none; display: inline-block; cursor: pointer; }
        .theme-toggle-label { cursor: pointer; font-size: 1.25rem; }
        .theme-toggle-icon.sun { display: none; }
        :root:has(#themeToggle:checked) .theme-toggle-icon:not(.sun) { display: none; }
        :root:has(#themeToggle:checked) .theme-toggle-icon.sun { display: inline; }
        [data-theme="dark"] .theme-toggle-icon:not(.sun) { display: none; }
        [data-theme="dark"] .theme-toggle-icon.sun { display: inline; }
    </style>
</head>
<body>
    <nav>
        <input type="checkbox" id="themeToggle" class="theme-toggle-checkbox" onchange="document.documentElement.setAttribute('data-theme', this.checked ? 'dark' : 'light'); localStorage.setItem('theme', this.checked ? 'dark' : 'light');">
        <div class="nav-left">
            <a href="../index.html" class="nav-title" aria-label="Go to home">REBEL WITH LINUX</a>
            <label for="themeToggle" class="theme-toggle-label" aria-label="Toggle dark mode"><span class="theme-toggle-icon">🌙</span><span class="theme-toggle-icon sun">☀️</span></label>
        </div>
    </nav>
    <div class="test-container">
        <div class="test-header"><h1>// GIT TEST</h1><p>Prove your Git mastery</p></div>
        <div id="quiz">
            <div class="stats-row">
                <div class="stat-item"><div class="stat-value" id="questionNum">1</div><div class="stat-label">Question</div></div>
                <div class="stat-item"><div class="stat-value" id="streakNum">0</div><div class="stat-label">Streak</div></div>
                <div class="stat-item"><div class="stat-value" id="scoreNum">0</div><div class="stat-label">Score</div></div>
                <div class="stat-item"><div class="stat-value" id="levelNum">1</div><div class="stat-label">Level</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
            <div id="questionsContainer"></div>
            <div class="result-screen" id="resultScreen">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-text" id="resultText"></div>
                <div class="result-score" id="resultScore"></div>
                <div class="result-details" id="resultDetails"></div>
                <button class="retry-btn" onclick="restartTest()">Try Again</button>
            </div>
        </div>
    </div>
    <script>
        const easyQuestions = [
            { q: "What does 'git init' do?", a: ["Creates new repository", "Clones repository", "Adds files", "Commits files"], correct: 0 },
            { q: "What does 'git clone' do?", a: ["Copies remote repo locally", "Creates new repo", "Adds remote", "Remotes files"], correct: 0 },
            { q: "What does 'git add' do?", a: ["Stages changes", "Commits changes", "Pushes changes", "Creates branch"], correct: 0 },
            { q: "What does 'git commit' do?", a: ["Saves staged changes", "Uploads changes", "Downloads changes", "Merges branches"], correct: 0 },
            { q: "What does 'git push' do?", a: ["Uploads to remote", "Downloads from remote", "Creates branch", "Merges changes"], correct: 0 },
            { q: "What does 'git pull' do?", a: ["Fetches and merges remote", "Uploads to remote", "Creates branch", "Shows history"], correct: 0 },
            { q: "What does 'git status' show?", a: ["Working tree status", "Commit history", "Branches", "Remote info"], correct: 0 },
            { q: "What does 'git log' show?", a: ["Commit history", "Working tree status", "File differences", "Branches"], correct: 0 },
            { q: "What does 'git diff' show?", a: ["Changes between commits", "Commit history", "File list", "Branches"], correct: 0 },
            { q: "What does 'git branch' do?", a: ["Lists branches", "Creates branches", "Deletes branches", "Switches branches"], correct: 0 },
            { q: "What does 'git checkout' do?", a: ["Switches branches", "Creates branches", "Deletes branches", "Merges branches"], correct: 0 },
            { q: "What is a commit in Git?", a: ["Snapshot of changes", "Branch pointer", "Remote repository", "Working directory"], correct: 0 },
            { q: "What does 'git fetch' do?", a: ["Downloads remote refs", "Merges changes", "Pushes changes", "Creates branches"], correct: 0 },
            { q: "What is a repository?", a: ["Project folder with Git history", "Remote server", "Single file", "Branch collection"], correct: 0 },
            { q: "What does 'git add .' do?", a: ["Stages all changes", "Commits all changes", "Shows all changes", "Removes all changes"], correct: 0 },
            { q: "What is staging area?", a: ["Prep area before commit", "Remote server", "Backup folder", "Git config"], correct: 0 },
            { q: "What does 'git reset' do?", a: ["Unstages changes", "Removes commits", "Creates branches", "Deletes files"], correct: 0 },
            { q: "What is HEAD in Git?", a: ["Current branch/commit", "First commit", "Remote name", "Branch list"], correct: 0 },
            { q: "What does 'git remote -v' show?", a: ["Remote URLs", "Remote branches", "Commit history", "File list"], correct: 0 },
            { q: "How do you create a new branch?", a: ["git branch name", "git new branch", "git create branch", "git add branch"], correct: 0 },
            { q: "What does 'git merge' do?", a: ["Combines branches", "Creates branch", "Deletes branch", "Switches branch"], correct: 0 },
            { q: "What is a merge conflict?", a: ["Same line edited differently", "File deleted", "Branch missing", "Commit missing"], correct: 0 },
            { q: "What does 'git stash' do?", a: ["Temporarily saves changes", "Removes changes", "Commits changes", "Pushes changes"], correct: 0 },
            { q: "What does 'git stash pop' do?", a: ["Restores saved changes", "Lists stash", "Deletes stash", "Creates stash"], correct: 0 },
            { q: "What is .gitignore?", a: ["Files to ignore", "Git config", "Commit message", "Branch rules"], correct: 0 }
        ];
        const mediumQuestions = [
            { q: "What does 'git rebase' do?", a: ["Reapplies commits on new base", "Merges branches", "Creates branch", "Deletes commits"], correct: 0 },
            { q: "What is a pull request?", a: ["Request to merge changes", "Download changes", "Upload changes", "Delete branch"], correct: 0 },
            { q: "What does 'git reset --hard' do?", a: ["Discards all changes", "Keeps staged changes", "Unstages changes", "Shows changes"], correct: 0 },
            { q: "What does 'git cherry-pick' do?", a: ["Applies specific commit", "Removes commit", "Lists commits", "Merges branches"], correct: 0 },
            { q: "What is a detached HEAD?", a: ["HEAD pointing to commit directly", "No commits yet", "Branch deleted", "Remote only"], correct: 0 },
            { q: "What does 'git reflog' show?", a: ["Reference logs", "File changes", "Branch list", "Commit list"], correct: 0 },
            { q: "What is 'git amend' used for?", a: ["Modify last commit", "Add files", "Create branch", "Merge branches"], correct: 0 },
            { q: "What does 'git stash list' show?", a: ["All stashed changes", "All branches", "All commits", "All remotes"], correct: 0 },
            { q: "What is 'git bisect'?", a: ["Binary search for bugs", "Compare files", "Merge branches", "List commits"], correct: 0 },
            { q: "What does 'git tag' do?", a: ["Marks specific commit", "Lists branches", "Shows history", "Creates branch"], correct: 0 },
            { q: "What is a remote branch?", a: ["Branch on remote repo", "Local branch", "Deleted branch", "New branch"], correct: 0 },
            { q: "What does 'git clean -fd' do?", a: ["Removes untracked files", "Removes staged files", "Removes commits", "Removes branches"], correct: 0 },
            { q: "What is 'git blame'?", a: ["Shows who changed what", "Creates blame", "Removes blame", "Lists blame"], correct: 0 },
            { q: "What does 'git show' display?", a: ["Commit details", "File list", "Branch info", "Remote info"], correct: 0 },
            { q: "What is 'git worktree'?", a: ["Multiple working directories", "Work on tree", "Tree structure", "Branch tree"], correct: 0 },
            { q: "What does 'git fetch --all' do?", a: ["Fetch all remotes", "Fetch all branches", "Fetch and merge", "Fetch and rebase"], correct: 0 },
            { q: "What is a fast-forward merge?", a: ["Merge without new commit", "Quick merge", "Branch merge", "Remote merge"], correct: 0 },
            { q: "What does 'git revert' do?", a: ["Creates new commit undoing changes", "Removes commit", "Unstages commit", "Lists commit"], correct: 0 },
            { q: "What is 'git gc'?", a: ["Garbage collection", "Git copy", "Git check", "Git clean"], correct: 0 },
            { q: "What does 'git log --oneline' show?", a: ["Compact commit history", "Full history", "File changes", "Branch info"], correct: 0 }
        ];
        const hardQuestions = [
            { q: "What is 'git filter-branch'?", a: ["Rewrite commit history", "Filter commits", "Branch filter", "Clean filter"], correct: 0 },
            { q: "What does 'git update-ref' do?", a: ["Update ref safely", "Update remote", "Update index", "Update HEAD"], correct: 0 },
            { q: "What is 'git notes'?", a: ["Add metadata to commits", "Git comments", "Git annotations", "Git tags"], correct: 0 },
            { q: "What does 'git replace' do?", a: ["Replace objects", "Replace commit", "Replace branch", "Replace tag"], correct: 0 },
            { q: "What is a bare repository?", a: ["No working directory", "Empty repo", "Clean repo", "New repo"], correct: 0 },
            { q: "What does 'git bundle' do?", a: ["Create transportable archive", "Package repo", "Backup repo", "Clone repo"], correct: 0 },
            { q: "What is 'git worktree' used for?", a: ["Multiple branches simultaneously", "Tree comparison", "File work", "Directory work"], correct: 0 },
            { q: "What does 'git for-each-ref' do?", a: ["Iterate refs", "For each branch", "For each tag", "For each remote"], correct: 0 },
            { q: "What is 'git refspec'?", a: ["Ref mapping syntax", "Spec files", "Reference spec", "Remote spec"], correct: 0 },
            { q: "What does 'git credential helper' do?", a: ["Cache credentials", "Store passwords", "Encrypt credentials", "Manage auth"], correct: 0 },
            { q: "What is 'git rerere'?", a: ["Reuse recorded resolution", "Re-merge", "Rerun error", "Reset error"], correct: 0 },
            { q: "What does 'git show-ref' show?", a: ["References", "Show commit", "Show files", "Show branches"], correct: 0 },
            { q: "What is a 'git submodule'?", a: ["Repository within repo", "Sub branch", "Sub commit", "Sub remote"], correct: 0 },
            { q: "What does 'git subtree' do?", a: ["Manage repo nesting", "Create subtree", "Merge subtree", "Split subtree"], correct: 0 },
            { q: "What is 'git add -p'?", a: ["Patch staging", "Partial add", "All add", "Force add"], correct: 0 }
        ];
        let currentQuestions=[],currentQuestionIndex=0,score=0,streak=0,maxStreak=0,difficulty='easy',currentLevel=1,consecutiveCorrect=0,totalAnswered=0;
        function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        function shuffleAnswers(q){let a=[...q.a],c=a[q.correct],s=shuffle(a);return{...q,a:s,correct:s.indexOf(c)}}
        function initTest(){difficulty='easy';currentLevel=1;consecutiveCorrect=0;currentQuestions=shuffle([...easyQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0;score=0;streak=0;maxStreak=0;totalAnswered=0;document.getElementById('resultScreen').classList.remove('active');document.getElementById('quiz').style.display='block';renderQuestion()}
        function renderQuestion(){let c=document.getElementById('questionsContainer');c.innerHTML='';let q=currentQuestions[currentQuestionIndex],d=document.createElement('div');d.className='question-container active';d.innerHTML=`<div class="question-text">${q.q}</div><div class="answers-grid">${q.a.map((a,i)=>`<button class="answer-btn" onclick="selectAnswer(${i})">${a}</button>`).join('')}</div>`;c.appendChild(d);updateUI()}
        function updateUI(){let t=currentQuestions.length,p=(currentQuestionIndex/t)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('questionNum').textContent=currentQuestionIndex+1;document.getElementById('streakNum').textContent=streak;document.getElementById('scoreNum').textContent=score;document.getElementById('levelNum').textContent=currentLevel}
        function selectAnswer(i){let q=currentQuestions[currentQuestionIndex],b=document.querySelectorAll('.answer-btn');b.forEach((btn,j)=>{btn.disabled=true;if(j===q.correct)btn.classList.add('correct')});totalAnswered++;if(i===q.correct){streak++;if(streak>maxStreak)maxStreak=streak;consecutiveCorrect++;score+=difficulty==='easy'?10:difficulty==='medium'?20:30;if(currentLevel===1&&consecutiveCorrect>=7){currentLevel=2;difficulty='medium';consecutiveCorrect=0;currentQuestions=shuffle([...mediumQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0}else if(currentLevel===2&&consecutiveCorrect>=7){currentLevel=3;difficulty='hard';consecutiveCorrect=0;currentQuestions=shuffle([...hardQuestions]).slice(0,20).map(q=>shuffleAnswers(q));currentQuestionIndex=0}else currentQuestionIndex++;setTimeout(()=>{currentQuestionIndex<currentQuestions.length?renderQuestion():showResult()},1200)}else{buttons[i]?.classList.add('incorrect');streak=0;consecutiveCorrect=0;currentQuestionIndex++;setTimeout(()=>{currentQuestionIndex<currentQuestions.length?renderQuestion():showResult()},2000);return}}
        function showResult(){document.getElementById('questionsContainer').innerHTML='';let p=score>=100;document.getElementById('resultScreen').classList.add('active');document.getElementById('resultIcon').textContent=p?'✓':'✗';document.getElementById('resultText').textContent=p?'PASS':'FAIL';document.getElementById('resultText').className='result-text '+(p?'pass':'fail');document.getElementById('resultScore').textContent=`Score: ${score}`;document.getElementById('resultDetails').innerHTML=`Questions answered: ${totalAnswered}<br>Best streak: ${maxStreak}<br>Highest level reached: ${currentLevel}`;document.getElementById('progressFill').style.width='100%'}
        function restartTest(){initTest()}
        function handleThemeChange(isDark){let t=isDark?'dark':'light';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
        document.addEventListener('DOMContentLoaded',function(){let s=localStorage.getItem('theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeToggle').checked=true}initTest()});
    </script>
</body>
</html>
