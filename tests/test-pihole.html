    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const csrfRes = await fetch('../api/auth.php?action=csrf');
                const csrfData = await csrfRes.json();
                formData.append('csrf_token', csrfData.token);
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../sections/account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let difficulty = 'easy';
        let currentLevel = 1;
        let consecutiveCorrect = 0;
        let totalAnswered = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function shuffleAnswers(question) {
            const answers = [...question.a];
            const correctAnswer = answers[question.correct];
            const shuffled = shuffle(answers);
            const newCorrectIndex = shuffled.indexOf(correctAnswer);
            return { ...question, a: shuffled, correct: newCorrectIndex };
        }

        function initTest() {
            difficulty = 'easy';
            currentLevel = 1;
            consecutiveCorrect = 0;
            currentQuestions = shuffle([...easyQuestions]).slice(0, 20).map(q => shuffleAnswers(q));
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            totalAnswered = 0;
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quiz').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            const q = currentQuestions[currentQuestionIndex];
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container active';
            let answersHtml = q.a.map((answer, index) => 
                `<button class="answer-btn" onclick="selectAnswer(${index})">${answer}</button>`
            ).join('');
            qDiv.innerHTML = `<div class="question-text">${q.q}</div><div class="answers-grid">${answersHtml}</div>`;
            container.appendChild(qDiv);
            updateStats();
        }

        function selectAnswer(index) {
            const q = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);
            if (index === q.correct) {
                buttons[index].classList.add('correct');
                score += 10 + (streak * 2);
                streak++;
                consecutiveCorrect++;
                if (streak > maxStreak) maxStreak = streak;
            } else {
                buttons[index].classList.add('incorrect');
                buttons[q.correct].classList.add('correct');
                streak = 0;
                consecutiveCorrect = 0;
            }
            totalAnswered++;
            if (consecutiveCorrect >= 3 && difficulty === 'easy') {
                difficulty = 'medium';
                currentLevel = 2;
                consecutiveCorrect = 0;
                loadNextDifficulty();
            } else if (consecutiveCorrect >= 3 && difficulty === 'medium') {
                difficulty = 'hard';
                currentLevel = 3;
                consecutiveCorrect = 0;
                loadNextDifficulty();
            }
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex >= currentQuestions.length) {
                    showResults();
                } else {
                    renderQuestion();
                }
            }, 1500);
        }

        function loadNextDifficulty() {
            let newQuestions;
            if (difficulty === 'medium') {
                newQuestions = shuffle([...mediumQuestions]).slice(0, 15).map(q => shuffleAnswers(q));
            } else if (difficulty === 'hard') {
                newQuestions = shuffle([...hardQuestions]).slice(0, 15).map(q => shuffleAnswers(q));
            }
            currentQuestions = [...currentQuestions, ...newQuestions];
        }

        function updateStats() {
            document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
            document.getElementById('streakNum').textContent = streak;
            document.getElementById('scoreNum').textContent = score;
            document.getElementById('levelNum').textContent = currentLevel;
            const progress = (currentQuestionIndex / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('resultScreen').classList.add('active');
            const percentage = (score / (currentQuestions.length * 10)) * 100;
            const passed = percentage >= 50;
            document.getElementById('resultIcon').textContent = passed ? '🏆' : '📚';
            document.getElementById('resultText').textContent = passed ? 'PASSED!' : 'KEEP LEARNING';
            document.getElementById('resultText').className = 'result-text ' + (passed ? 'pass' : 'fail');
            document.getElementById('resultScore').textContent = `Score: ${score} | Max Streak: ${maxStreak}`;
            document.getElementById('resultDetails').textContent = passed ? 'You have mastered Pi-hole!' : 'Review the Pi-hole guide and try again.';
        }

        function restartTest() {
            initTest();
        }

        initTest();
