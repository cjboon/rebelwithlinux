    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--ivory);
            color: var(--black);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #f0db4f;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: var(--charcoal);
            font-size: 14px;
        }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: var(--white);
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid var(--charcoal);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--charcoal);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--black);
        }
        
        .stat-value.score {
            color: #f0db4f;
        }
        
        .game-container {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--charcoal);
            display: none;
        }
        
        .game-container.active {
            display: block;
        }
        
        .level-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--charcoal);
            transition: all 0.3s ease;
        }
        
        .level-dot.completed {
            background: var(--charcoal);
        }
        
        .level-dot.current {
            background: var(--black);
            box-shadow: 0 0 10px var(--black);
        }
        
        .progress-info {
            text-align: center;
            color: var(--charcoal);
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .definition-box {
            background: var(--ivory);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--charcoal);
        }
        
        .command-name {
            font-size: 18px;
            color: #f0db4f;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .definition-text {
            color: var(--black);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .hint-text {
            color: var(--charcoal);
            font-size: 13px;
            font-style: italic;
        }
        
        .drop-zone {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            min-height: 60px;
            padding: 15px;
            background: var(--ivory);
            border-radius: 8px;
            border: 2px dashed var(--charcoal);
        }
        
        .letter-slot {
            width: 45px;
            height: 45px;
            border: 2px solid var(--charcoal);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: var(--white);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .letter-slot:hover {
            border-color: var(--black);
        }
        
        .letter-slot.filled {
            background: #388bfd;
            color: white;
            border-color: var(--black);
        }
        
        .letter-slot.drag-over {
            background: var(--black);
            border-color: var(--black);
            transform: scale(1.1);
        }
        
        .letter-pool {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            min-height: 50px;
        }
        
        .letter-tile {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f0db4f 0%, #d4b800 100%);
            background-color: #f0db4f;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--ivory);
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-drag: element;
            box-sizing: border-box;
        }
        
        .letter-tile:active {
            cursor: grabbing;
        }
        
        .letter-tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(240, 219, 79, 0.3);
        }
        
        .letter-tile.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2ea043;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--charcoal);
            color: var(--black);
        }
        
        .btn-secondary:hover {
            background: var(--charcoal);
            transform: translateY(-2px);
        }
        
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.correct {
            background: rgba(63, 185, 80, 0.2);
            color: var(--charcoal);
            border: 1px solid var(--charcoal);
        }
        
        .message.incorrect {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
            border: 1px solid #f85149;
        }
        
        .complete-screen {
            text-align: center;
            padding: 60px 20px;
        }
        
        .complete-screen .trophy {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .complete-screen h2 {
            font-size: 28px;
            color: var(--charcoal);
            margin-bottom: 10px;
        }
        
        .complete-screen p {
            color: var(--charcoal);
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        @media (max-width: 600px) {
            .stats-bar {
                gap: 15px;
                padding: 10px 20px;
            }
            
            .letter-slot, .letter-tile {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
            
            .actions {
                flex-direction: column;
            }
        }
        
        /* Mobile optimizations */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header { padding: 15px; margin-bottom: 15px; }
            .header h1 { font-size: 20px; }
            .header p { font-size: 12px; }
            .stats-bar {
                flex-wrap: wrap;
                gap: 15px;
                padding: 10px 15px;
            }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 10px; }
            .game-container { padding: 15px; }
            .level-indicator { gap: 5px; }
            .level-dot { width: 20px; height: 20px; }
            .challenge-text { font-size: 14px; padding: 10px; }
            .preview-area { padding: 10px; }
            .preview-frame { min-height: 150px; }
            .code-input { 
                font-size: 14px; 
                padding: 10px;
            }
            .submit-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
            .modal-content { padding: 20px; margin: 10px; }
            .modal-content h2 { font-size: 18px; }
        }
        
        @media (max-width: 400px) {
            .header h1 { font-size: 16px; }
            .stats-bar { gap: 10px; }
            .stat-value { font-size: 16px; }
            .preview-frame { min-height: 100px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📜 JAVASCRIPT BUILDER 3</h1>
        <p>Expert Methods & Utilities</p>
    </div>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-label">Level</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value score" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Hints</div>
            <div class="stat-value" id="hints">3</div>
        </div>
    </div>
    
    <div class="game-container active" id="gameContainer">
        <div class="level-indicator" id="levelIndicator"></div>
        
        <div class="progress-info" id="progressInfo">Method 1 of 18</div>
        
        <div class="definition-box">
            <div class="command-name" id="commandName">METHOD DEFINITION</div>
            <div class="definition-text" id="definitionText">
                Loading definition...
            </div>
            <div class="hint-text" id="hintText"></div>
        </div>
        
        <div class="drop-zone" id="dropZone">
            <!-- Letter slots will be generated here -->
        </div>
        
        <div class="letter-pool" id="letterPool">
            <!-- Letter tiles will be generated here -->
        </div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="shuffleLetters()">🔀 Shuffle</button>
            <button class="btn btn-secondary" onclick="useHint()">💡 Hint</button>
            <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✓ Check Answer</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <div class="game-container complete-screen" id="completeScreen">
        <div class="trophy">👑</div>
        <h2>JAVASCRIPT EXPERT!</h2>
        <p>You've mastered all three JavaScript Builder games!</p>
        <p>Final Score: <strong id="finalScore">0</strong></p>
        <p>Total Methods Learned: <strong>51</strong></p>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
            <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
            <button class="btn btn-secondary" onclick="window.location.href='builder-javascript.html'">← Back to Start</button>
        </div>
    </div>

    <script>
        const commands = [
            {
                name: "parseInt",
                definition: "Parses a string argument and returns an integer of the specified radix.",
                example: "parseInt('42')",
                hint: "String to integer"
            },
            {
                name: "parseFloat",
                definition: "Parses a string argument and returns a floating point number.",
                example: "parseFloat('3.14')",
                hint: "String to decimal"
            },
            {
                name: "isNaN",
                definition: "Determines whether a value is NaN (Not-a-Number).",
                example: "isNaN('hello')",
                hint: "Check if not a number"
            },
            {
                name: "isFinite",
                definition: "Determines whether a value is a finite number.",
                example: "isFinite(42)",
                hint: "Check if finite"
            },
            {
                name: "toFixed",
                definition: "Formats a number using fixed-point notation, returning a string.",
                example: "num.toFixed(2)",
                hint: "Round to decimals"
            },
            {
                name: "toString",
                definition: "Returns a string representing the specified object.",
                example: "num.toString()",
                hint: "Convert to string"
            },
            {
                name: "JSON.stringify",
                definition: "Converts a JavaScript object or value to a JSON string.",
                example: "JSON.stringify(obj)",
                hint: "Object to JSON string"
            },
            {
                name: "JSON.parse",
                definition: "Parses a JSON string, constructing the JavaScript value.",
                example: "JSON.parse(str)",
                hint: "JSON string to object"
            },
            {
                name: "Object.keys",
                definition: "Returns an array of a given object's own enumerable property names.",
                example: "Object.keys(obj)",
                hint: "Get all keys"
            },
            {
                name: "Object.values",
                definition: "Returns an array of a given object's own enumerable property values.",
                example: "Object.values(obj)",
                hint: "Get all values"
            },
            {
                name: "Object.entries",
                definition: "Returns an array of a given object's own enumerable string-keyed key-value pairs.",
                example: "Object.entries(obj)",
                hint: "Get key-value pairs"
            },
            {
                name: "assign",
                definition: "Copies the values of all enumerable own properties from one or more source objects to a target object.",
                example: "Object.assign({}, obj)",
                hint: "Copy object properties"
            },
            {
                name: "Date",
                definition: "Creates a JavaScript Date instance representing a specific moment in time.",
                example: "new Date()",
                hint: "Current date/time"
            },
            {
                name: "getFullYear",
                definition: "Returns the year of the specified date according to local time.",
                example: "date.getFullYear()",
                hint: "Get the year"
            },
            {
                name: "getMonth",
                definition: "Returns the month (0-11) in the specified date according to local time.",
                example: "date.getMonth()",
                hint: "Get month (0-11)"
            },
            {
                name: "getDate",
                definition: "Returns the day of the month (1-31) for the specified date.",
                example: "date.getDate()",
                hint: "Get day of month"
            },
            {
                name: "typeof",
                definition: "Returns a string indicating the type of the unevaluated operand.",
                example: "typeof 'hello'",
                hint: "Check data type"
            },
            {
                name: "instanceof",
                definition: "Tests whether the prototype property of a constructor appears in the prototype chain of an object.",
                example: "arr instanceof Array",
                hint: "Check object type"
            },
            {
                name: "hasOwnProperty",
                definition: "Returns a boolean indicating whether the object has the specified property as its own property.",
                example: "obj.hasOwnProperty('key')",
                hint: "Check if property exists"
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let streak = 0;
        let hints = 3;
        let currentAnswer = "";
        let placedLetters = [];
        let draggedLetter = null;

        function init() {
            currentLevel = 0;
            score = 0;
            streak = 0;
            hints = 3;
            updateStats();
            loadLevel(currentLevel);
            renderLevelIndicator();
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (/^[a-zA-Z]$/.test(key)) {
                    const poolTiles = document.querySelectorAll('.letter-tile');
                    for (let tile of poolTiles) {
                        if (tile.textContent.toLowerCase() === key) {
                            const originalIndex = parseInt(tile.dataset.originalIndex);
                            clickToPlace(tile.textContent.toLowerCase(), originalIndex);
                            break;
                        }
                    }
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    for (let i = placedLetters.length - 1; i >= 0; i--) {
                        if (placedLetters[i] !== null) {
                            removeLetter(i);
                            break;
                        }
                    }
                } else if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
        }

        function renderLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = commands.map((_, i) => 
                `<div class="level-dot ${i < currentLevel ? 'completed' : i === currentLevel ? 'current' : ''}"></div>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('hints').textContent = hints;
        }

        function loadLevel(level) {
            if (level >= commands.length) {
                showComplete();
                return;
            }

            const cmd = commands[level];
            currentAnswer = cmd.name;
            placedLetters = new Array(currentAnswer.length).fill(null);
            
            document.getElementById('commandName').textContent = `METHOD ${level + 1}: ${cmd.name.toUpperCase()}`;
            document.getElementById('definitionText').textContent = cmd.definition;
            document.getElementById('hintText').textContent = `Example: ${cmd.example}`;
            document.getElementById('progressInfo').textContent = `Method ${level + 1} of ${commands.length}`;
            document.getElementById('message').className = 'message';
            document.getElementById('checkBtn').disabled = false;
            
            renderLetterSlots();
            renderLetterPool();
            renderLevelIndicator();
            updateStats();
        }

        function renderLetterSlots() {
            const dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '';
            
            for (let i = 0; i < currentAnswer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.dataset.index = i;
                
                if (placedLetters[i]) {
                    slot.textContent = placedLetters[i];
                    slot.classList.add('filled');
                    slot.draggable = true;
                }
                
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('dragleave', handleDragLeave);
                slot.addEventListener('drop', handleDrop);
                slot.addEventListener('click', () => removeLetter(i));
                
                dropZone.appendChild(slot);
            }
        }

        function renderLetterPool() {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            
            const letters = currentAnswer.split('').map((letter, i) => ({ letter, index: i }));
            letters.sort(() => Math.random() - 0.5);
            
            const placedIndices = placedLetters.map((letter, i) => letter !== null ? i : -1).filter(i => i !== -1);
            
            letters.forEach((item) => {
                if (placedIndices.includes(item.index)) {
                    return;
                }
                
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = item.letter;
                tile.draggable = true;
                tile.dataset.letter = item.letter;
                tile.dataset.originalIndex = item.index;
                
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('click', () => clickToPlace(item.letter, item.index));
                
                pool.appendChild(tile);
            });
        }
        
        function clickToPlace(letter, originalIndex) {
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                placedLetters[emptyIndex] = letter;
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function handleDragStart(e) {
            draggedLetter = e.target.dataset.letter;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            
            const canvas = document.createElement('canvas');
            canvas.width = 45;
            canvas.height = 45;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f0db4f';
            ctx.fillRect(0, 0, 45, 45);
            ctx.fillStyle = 'var(--ivory)';
            ctx.font = 'bold 20px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.target.textContent, 22, 22);
            
            e.dataTransfer.setDragImage(canvas, 22, 22);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.letter-slot').forEach(slot => {
                slot.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.target.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.target.closest('.letter-slot');
            if (!slot) return;
            
            slot.classList.remove('drag-over');
            const slotIndex = parseInt(slot.dataset.index);
            
            const prevIndex = placedLetters.indexOf(draggedLetter);
            if (prevIndex !== -1) {
                placedLetters[prevIndex] = null;
            }
            
            placedLetters[slotIndex] = draggedLetter;
            
            renderLetterSlots();
            renderLetterPool();
            
            if (!placedLetters.includes(null)) {
                setTimeout(checkAnswer, 300);
            }
        }

        function removeLetter(index) {
            if (placedLetters[index]) {
                placedLetters[index] = null;
                renderLetterSlots();
                renderLetterPool();
            }
        }

        function shuffleLetters() {
            renderLetterPool();
        }

        function useHint() {
            if (hints <= 0) return;
            
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                hints--;
                placedLetters[emptyIndex] = currentAnswer[emptyIndex];
                updateStats();
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function checkAnswer() {
            const userAnswer = placedLetters.join('');
            const message = document.getElementById('message');
            const checkBtn = document.getElementById('checkBtn');
            
            if (userAnswer.toLowerCase() === currentAnswer.toLowerCase()) {
                const points = 10 + (streak * 2);
                score += points;
                streak++;
                
                message.textContent = `✓ Correct! +${points} points! Streak: ${streak}`;
                message.className = 'message show correct';
                checkBtn.disabled = true;
                
                setTimeout(() => {
                    currentLevel++;
                    loadLevel(currentLevel);
                }, 1500);
            } else {
                streak = 0;
                message.textContent = '✗ Not quite! Try again.';
                message.className = 'message show incorrect';
                updateStats();
            }
        }

        function showComplete() {
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('completeScreen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
        }

        function restartGame() {
            document.getElementById('completeScreen').classList.remove('active');
            document.getElementById('gameContainer').classList.add('active');
            init();
        }

        // Initialize the game

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        init();
    </script>
</body>
