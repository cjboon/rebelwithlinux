<html lang="en">
<head>
    <meta http-equiv="onion-location" content="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion/builders/builder-html.html" />
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Builder - Learn HTML Tags</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--white);
            color: var(--black);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        
        .header h1 {
            font-size: 28px;
            color: #e34c26;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .header p { color: var(--charcoal); font-size: 14px; }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: var(--beige);
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid var(--charcoal);
        }
        
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .stat-value.score { color: #e34c26; }
        
        .game-container {
            background: var(--beige);
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--charcoal);
            display: none;
        }
        
        .game-container.active { display: block; }
        
        .level-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .level-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--charcoal); }
        .level-dot.completed { background: #e34c26; }
        .level-dot.current { background: #58a6ff; }
        
        .question-box {
            background: var(--white);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #e34c26;
        }
        
        .question-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .question-text { font-size: 16px; color: var(--black); line-height: 1.6; }
        .hint-text { margin-top: 12px; font-size: 13px; color: #d29922; font-style: italic; }
        
        .answer-area {
            background: var(--white);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 80px;
            border: 2px dashed var(--charcoal);
        }
        
        .answer-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        
        .letter-slots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 50px; align-items: center; }
        
        .letter-slot {
            width: 46px;
            height: 46px;
            background: var(--white);
            border: 2px dashed var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--black);
        }
        
        .letter-slot.filled { border-style: solid; border-color: #e34c26; }
        .letter-slot.correct { border-color: #3fb950; background: rgba(63, 185, 80, 0.1); }
        .letter-slot.incorrect { border-color: #f85149; background: rgba(248, 81, 73, 0.1); }
        
        .letter-pool { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 20px; background: var(--white); border-radius: 8px; min-height: 80px; }
        
        .letter-tile {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #e34c26, #c73e1d);
            background-color: #e34c26;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: var(--white);
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-drag: element;
            box-sizing: border-box;
        }
        
        .letter-tile:active { cursor: grabbing; }
        .letter-tile:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(227, 76, 38, 0.3); }
        .letter-tile.dragging { opacity: 0.5; }
        
        .actions { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: var(--charcoal); color: var(--black); border: 1px solid var(--charcoal); }
        .btn-secondary:hover { background: var(--charcoal); }
        
        .feedback { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .feedback.success { display: block; background: rgba(38, 77, 228, 0.1); border: 1px solid #264de4; color: #264de4; }
        .feedback.error { display: block; background: rgba(248, 81, 73, 0.1); border: 1px solid #f85149; color: #f85149; }
        
        .completion-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .completion-modal.active { display: flex; }
        
        .modal-content {
            background: var(--beige);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--charcoal);
            max-width: 400px;
        }
        
        .modal-content h2 { color: #e34c26; margin-bottom: 20px; }
        .modal-content p { color: var(--charcoal); margin-bottom: 25px; }
        
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        
        .progress-info { margin-top: 20px; text-align: center; color: var(--charcoal); font-size: 13px; }
        
        /* Mobile optimizations */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header { padding: 15px; margin-bottom: 15px; }
            .header h1 { font-size: 20px; }
            .header p { font-size: 12px; }
            .stats-bar {
                flex-wrap: wrap;
                gap: 15px;
                padding: 10px 15px;
            }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 10px; }
            .game-container { padding: 15px; }
            .level-indicator { gap: 5px; }
            .level-dot { width: 20px; height: 20px; }
            .challenge-text { font-size: 14px; padding: 10px; }
            .preview-area { padding: 10px; }
            .preview-frame { min-height: 150px; }
            .code-input { 
                font-size: 14px; 
                padding: 10px;
            }
            .submit-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
            .modal-content { padding: 20px; margin: 10px; }
            .modal-content h2 { font-size: 18px; }
        }
        
        @media (max-width: 400px) {
            .header h1 { font-size: 16px; }
            .stats-bar { gap: 10px; }
            .stat-value { font-size: 16px; }
            .preview-frame { min-height: 100px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏷️ HTML BUILDER</h1>
        <p>Drag & drop to learn HTML tags</p>
    </div>
    
    <div class="stats-bar">
        <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="levelNum">1</div></div>
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value score" id="score">0</div></div>
        <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
    </div>
    
    <div class="game-container active" id="gameContainer">
        <div class="level-indicator" id="levelIndicator"></div>
        
        <div class="question-box">
            <div class="question-label">Challenge</div>
            <div class="question-text" id="questionText"></div>
            <div class="hint-text" id="hintText"></div>
        </div>
        
        <div class="answer-area">
            <div class="answer-label">Your Answer</div>
            <div class="letter-slots" id="letterSlots"></div>
        </div>
        
        <div class="letter-pool" id="letterPool"></div>
        <div class="feedback" id="feedback"></div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="clearAnswer()">Clear</button>
            <button class="btn btn-primary" onclick="checkAnswer()">Submit</button>
        </div>
        
        <div class="progress-info">Question <span id="currentQ">1</span> of <span id="totalQ">10</span></div>
    </div>
    
    <div class="completion-modal" id="completionModal">
        <div class="modal-content">
            <h2>🎉 Level Complete!</h2>
            <p>You scored <span id="finalScore">0</span> points!</p>
            <button class="btn btn-primary" onclick="nextLevel()">Next Level</button>
        </div>
    </div>
    
    <a href="builder-main.html" class="back-link">&lt;&lt; back to builder games</a>

    <script>
        const levels = [{ questions: [
            { answer: "p", hint: "Paragraph tag", code: "Text container" },
            { answer: "h1", hint: "Heading level 1", code: "Main title" },
            { answer: "h2", hint: "Heading level 2", code: "Section title" },
            { answer: "a", hint: "Anchor/link", code: "Clickable link" },
            { answer: "img", hint: "Image tag", code: "Embed picture" },
            { answer: "br", hint: "Line break", code: "New line" },
            { answer: "ul", hint: "Unordered list", code: "Bullet list" },
            { answer: "ol", hint: "Ordered list", code: "Numbered list" },
            { answer: "li", hint: "List item", code: "List entry" },
            { answer: "div", hint: "Division/block", code: "Container" }
        ]}];
        
        let currentLevel = 0, currentQuestion = 0, score = 0, streak = 0, placedLetters = [], draggedLetter = null, draggedOriginalIndex = null;
        
        function initLevel() {
            const level = levels[currentLevel];
            document.getElementById('levelNum').textContent = currentLevel + 1;
            document.getElementById('totalQ').textContent = level.questions.length;
            renderLevelIndicator();
            loadQuestion();
        }
        
        function renderLevelIndicator() {
            const level = levels[currentLevel];
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = '';
            for (let i = 0; i < level.questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'level-dot';
                if (i < currentQuestion) dot.classList.add('completed');
                if (i === currentQuestion) dot.classList.add('current');
                indicator.appendChild(dot);
            }
        }
        
        function loadQuestion() {
            const q = levels[currentLevel].questions[currentQuestion];
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.code;
            document.getElementById('hintText').textContent = q.hint;
            document.getElementById('feedback').className = 'feedback';
            placedLetters = new Array(q.answer.length).fill(null);
            renderLetterSlots();
            renderLetterPool();
            renderLevelIndicator();
        }
        
        function renderLetterSlots() {
            const slotsContainer = document.getElementById('letterSlots');
            slotsContainer.innerHTML = '';
            placedLetters.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = 'letter-slot' + (item ? ' filled' : '');
                slot.textContent = item ? item.letter : '';
                slot.dataset.index = index;
                if (item) slot.addEventListener('click', () => removeLetter(index));
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('dragleave', handleDragLeave);
                slot.addEventListener('drop', handleDrop);
                slotsContainer.appendChild(slot);
            });
        }
        
        function renderLetterPool() {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            const answer = levels[currentLevel].questions[currentQuestion].answer;
            
            const letters = answer.split('').map((letter, i) => ({ letter, index: i }));
            letters.sort(() => Math.random() - 0.5);
            
            const placedIndices = placedLetters.map(l => l !== null ? l.index : -1).filter(i => i !== -1);
            
            letters.forEach((item) => {
                if (placedIndices.includes(item.index)) {
                    return;
                }
                
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = item.letter;
                tile.dataset.letter = item.letter;
                tile.dataset.originalIndex = item.index;
                tile.draggable = true;
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('click', () => clickToPlace(item.letter, item.index));
                pool.appendChild(tile);
            });
        }
        
        function clickToPlace(letter, originalIndex) {
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                placedLetters[emptyIndex] = { letter: letter, index: originalIndex };
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }
        
        function handleDragStart(e) {
            draggedLetter = e.target.dataset.letter;
            draggedOriginalIndex = parseInt(e.target.dataset.originalIndex);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            const canvas = document.createElement('canvas');
            canvas.width = 46; canvas.height = 46;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e34c26';
            ctx.fillRect(0, 0, 46, 46);
            ctx.fillStyle = 'var(--white)';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.target.textContent, 23, 23);
            e.dataTransfer.setDragImage(canvas, 23, 23);
        }
        
        function handleDragEnd(e) { e.target.classList.remove('dragging'); }
        function handleDragOver(e) { e.preventDefault(); e.target.classList.add('drag-over'); }
        function handleDragLeave(e) { e.target.classList.remove('drag-over'); }
        
        function handleDrop(e) {
            e.preventDefault();
            const slotIndex = parseInt(e.target.dataset.index);
            if (placedLetters[slotIndex]) return;
            placedLetters[slotIndex] = { letter: draggedLetter, index: draggedOriginalIndex };
            renderLetterSlots();
            renderLetterPool();
            if (!placedLetters.includes(null)) setTimeout(checkAnswer, 300);
        }
        
        function removeLetter(index) { placedLetters[index] = null; renderLetterSlots(); renderLetterPool(); }
        function clearAnswer() { placedLetters = new Array(placedLetters.length).fill(null); renderLetterSlots(); renderLetterPool(); }
        
        function checkAnswer() {
            const q = levels[currentLevel].questions[currentQuestion];
            const userAnswer = placedLetters.map(l => l ? l.letter : '').join('');
            const slots = document.querySelectorAll('.letter-slot');
            
            if (userAnswer === q.answer) {
                score += 10 + (streak * 2);
                streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                slots.forEach(slot => slot.classList.add('correct'));
                document.getElementById('feedback').className = 'feedback success';
                document.getElementById('feedback').textContent = '✓ Correct!';
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion >= levels[currentLevel].questions.length) showCompletion();
                    else loadQuestion();
                }, 1000);
            } else {
                streak = 0;
                document.getElementById('streak').textContent = streak;
                slots.forEach(slot => slot.classList.add('incorrect'));
                document.getElementById('feedback').className = 'feedback error';
                document.getElementById('feedback').textContent = '✗ Try again!';
            }
        }
        
        function showCompletion() { document.getElementById('finalScore').textContent = score; document.getElementById('completionModal').classList.add('active'); }
        function nextLevel() { document.getElementById('completionModal').classList.remove('active'); window.location.href = 'builder-html-2.html'; }
        
        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            if (key === 'backspace') {
                for (let i = placedLetters.length - 1; i >= 0; i--) {
                    if (placedLetters[i] !== null) {
                        placedLetters[i] = null;
                        renderLetterSlots();
                        renderLetterPool();
                        break;
                    }
                }
            } else if (key.length === 1 && /[a-z0-9_-]/.test(key)) {
                // Find first empty slot
                const emptyIndex = placedLetters.indexOf(null);
                if (emptyIndex !== -1) {
                    // Find the letter in the pool
                    const poolItems = document.querySelectorAll('.letter-tile');
                    for (let item of poolItems) {
                        if (item.textContent.toLowerCase() === key) {
                            placedLetters[emptyIndex] = { letter: item.textContent, index: parseInt(item.dataset.originalIndex) };
                            renderLetterSlots();
                            renderLetterPool();
                            if (!placedLetters.includes(null)) setTimeout(checkAnswer, 300);
                            break;
                        }
                    }
                }
            }
        });

        initLevel();

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
    <noscript>
        <style>
            :root { --ivory:#1a1a1a; --white:#1a1a1a; --black:#e0e0e0; --charcoal:#c0c0c0; --beige:#3a3a3a; }
        </style>
    </noscript>
</body>
</html>
