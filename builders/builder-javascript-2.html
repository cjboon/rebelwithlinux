    <script>
        const commands = [
            {
                name: "push",
                definition: "Adds one or more elements to the end of an array and returns the new length.",
                example: "arr.push('newItem')",
                hint: "Add to end of array"
            },
            {
                name: "pop",
                definition: "Removes the last element from an array and returns that element.",
                example: "arr.pop()",
                hint: "Remove from end"
            },
            {
                name: "shift",
                definition: "Removes the first element from an array and returns that element.",
                example: "arr.shift()",
                hint: "Remove from start"
            },
            {
                name: "unshift",
                definition: "Adds one or more elements to the beginning of an array and returns the new length.",
                example: "arr.unshift('first')",
                hint: "Add to start"
            },
            {
                name: "map",
                definition: "Creates a new array with the results of calling a function on every element.",
                example: "arr.map(x => x * 2)",
                hint: "Transform each element"
            },
            {
                name: "filter",
                definition: "Creates a new array with elements that pass a test.",
                example: "arr.filter(x => x > 5)",
                hint: "Keep matching elements"
            },
            {
                name: "reduce",
                definition: "Reduces an array to a single value by running a function on each element.",
                example: "arr.reduce((a,b) => a+b)",
                hint: "Sum up to one value"
            },
            {
                name: "find",
                definition: "Returns the first element that passes a test function.",
                example: "arr.find(x => x > 10)",
                hint: "Find first match"
            },
            {
                name: "some",
                definition: "Tests whether at least one element passes a test. Returns true or false.",
                example: "arr.some(x => x > 0)",
                hint: "Check if any match"
            },
            {
                name: "every",
                definition: "Tests whether all elements pass a test. Returns true or false.",
                example: "arr.every(x => x > 0)",
                hint: "Check if all match"
            },
            {
                name: "includes",
                definition: "Checks if an array contains a certain element, returning true or false.",
                example: "arr.includes('item')",
                hint: "Check if present"
            },
            {
                name: "indexOf",
                definition: "Returns the first index at which a given element can be found. Returns -1 if not found.",
                example: "arr.indexOf('item')",
                hint: "Find position"
            },
            {
                name: "slice",
                definition: "Returns a shallow copy of a portion of an array into a new array.",
                example: "arr.slice(1, 3)",
                hint: "Extract portion"
            },
            {
                name: "splice",
                definition: "Changes an array by removing, replacing, or adding elements in place.",
                example: "arr.splice(1, 0, 'new')",
                hint: "Add/remove elements"
            },
            {
                name: "concat",
                definition: "Merges two or more arrays into a new array.",
                example: "arr1.concat(arr2)",
                hint: "Join arrays"
            },
            {
                name: "split",
                definition: "Splits a string into an array of substrings based on a separator.",
                example: "str.split(',')",
                hint: "String to array"
            },
            {
                name: "join",
                definition: "Joins all elements of an array into a string with a specified separator.",
                example: "arr.join('-')",
                hint: "Array to string"
            },
            {
                name: "trim",
                definition: "Removes whitespace from both ends of a string.",
                example: "str.trim()",
                hint: "Remove whitespace"
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let streak = 0;
        let hints = 3;
        let currentAnswer = "";
        let placedLetters = [];
        let draggedLetter = null;

        function init() {
            currentLevel = 0;
            score = 0;
            streak = 0;
            hints = 3;
            updateStats();
            loadLevel(currentLevel);
            renderLevelIndicator();
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (/^[a-zA-Z]$/.test(key)) {
                    const poolTiles = document.querySelectorAll('.letter-tile');
                    for (let tile of poolTiles) {
                        if (tile.textContent.toLowerCase() === key) {
                            const originalIndex = parseInt(tile.dataset.originalIndex);
                            clickToPlace(tile.textContent.toLowerCase(), originalIndex);
                            break;
                        }
                    }
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    for (let i = placedLetters.length - 1; i >= 0; i--) {
                        if (placedLetters[i] !== null) {
                            removeLetter(i);
                            break;
                        }
                    }
                } else if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
        }

        function renderLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = commands.map((_, i) => 
                `<div class="level-dot ${i < currentLevel ? 'completed' : i === currentLevel ? 'current' : ''}"></div>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('hints').textContent = hints;
        }

        function loadLevel(level) {
            if (level >= commands.length) {
                showComplete();
                return;
            }

            const cmd = commands[level];
            currentAnswer = cmd.name;
            placedLetters = new Array(currentAnswer.length).fill(null);
            
            document.getElementById('commandName').textContent = `METHOD ${level + 1}: ${cmd.name.toUpperCase()}`;
            document.getElementById('definitionText').textContent = cmd.definition;
            document.getElementById('hintText').textContent = `Example: ${cmd.example}`;
            document.getElementById('progressInfo').textContent = `Method ${level + 1} of ${commands.length}`;
            document.getElementById('message').className = 'message';
            document.getElementById('checkBtn').disabled = false;
            
            renderLetterSlots();
            renderLetterPool();
            renderLevelIndicator();
            updateStats();
        }

        function renderLetterSlots() {
            const dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '';
            
            for (let i = 0; i < currentAnswer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.dataset.index = i;
                
                if (placedLetters[i]) {
                    slot.textContent = placedLetters[i];
                    slot.classList.add('filled');
                    slot.draggable = true;
                }
                
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('dragleave', handleDragLeave);
                slot.addEventListener('drop', handleDrop);
                slot.addEventListener('click', () => removeLetter(i));
                
                dropZone.appendChild(slot);
            }
        }

        function renderLetterPool() {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            
            const letters = currentAnswer.split('').map((letter, i) => ({ letter, index: i }));
            letters.sort(() => Math.random() - 0.5);
            
            const placedIndices = placedLetters.map((letter, i) => letter !== null ? i : -1).filter(i => i !== -1);
            
            letters.forEach((item) => {
                if (placedIndices.includes(item.index)) {
                    return;
                }
                
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = item.letter;
                tile.draggable = true;
                tile.dataset.letter = item.letter;
                tile.dataset.originalIndex = item.index;
                
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                tile.addEventListener('click', () => clickToPlace(item.letter, item.index));
                
                pool.appendChild(tile);
            });
        }
        
        function clickToPlace(letter, originalIndex) {
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                placedLetters[emptyIndex] = letter;
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function handleDragStart(e) {
            draggedLetter = e.target.dataset.letter;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            
            const canvas = document.createElement('canvas');
            canvas.width = 45;
            canvas.height = 45;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f0db4f';
            ctx.fillRect(0, 0, 45, 45);
            ctx.fillStyle = 'var(--ivory)';
            ctx.font = 'bold 20px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.target.textContent, 22, 22);
            
            e.dataTransfer.setDragImage(canvas, 22, 22);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.letter-slot').forEach(slot => {
                slot.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.target.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.target.closest('.letter-slot');
            if (!slot) return;
            
            slot.classList.remove('drag-over');
            const slotIndex = parseInt(slot.dataset.index);
            
            const prevIndex = placedLetters.indexOf(draggedLetter);
            if (prevIndex !== -1) {
                placedLetters[prevIndex] = null;
            }
            
            placedLetters[slotIndex] = draggedLetter;
            
            renderLetterSlots();
            renderLetterPool();
            
            if (!placedLetters.includes(null)) {
                setTimeout(checkAnswer, 300);
            }
        }

        function removeLetter(index) {
            if (placedLetters[index]) {
                placedLetters[index] = null;
                renderLetterSlots();
                renderLetterPool();
            }
        }

        function shuffleLetters() {
            renderLetterPool();
        }

        function useHint() {
            if (hints <= 0) return;
            
            const emptyIndex = placedLetters.findIndex(l => l === null);
            if (emptyIndex !== -1) {
                hints--;
                placedLetters[emptyIndex] = currentAnswer[emptyIndex];
                updateStats();
                renderLetterSlots();
                renderLetterPool();
                
                if (!placedLetters.includes(null)) {
                    setTimeout(checkAnswer, 300);
                }
            }
        }

        function checkAnswer() {
            const userAnswer = placedLetters.join('');
            const message = document.getElementById('message');
            const checkBtn = document.getElementById('checkBtn');
            
            if (userAnswer.toLowerCase() === currentAnswer.toLowerCase()) {
                const points = 10 + (streak * 2);
                score += points;
                streak++;
                
                message.textContent = `✓ Correct! +${points} points! Streak: ${streak}`;
                message.className = 'message show correct';
                checkBtn.disabled = true;
                
                setTimeout(() => {
                    currentLevel++;
                    loadLevel(currentLevel);
                }, 1500);
            } else {
                streak = 0;
                message.textContent = '✗ Not quite! Try again.';
                message.className = 'message show incorrect';
                updateStats();
            }
        }

        function showComplete() {
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('completeScreen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
        }

        function restartGame() {
            document.getElementById('completeScreen').classList.remove('active');
            document.getElementById('gameContainer').classList.add('active');
            init();
        }

        // Initialize the game

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        init();
    </script>
