<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="onion-location" content="http://2wziokw2zpmrawplzbkowhrr6plc7wfebsdgrrnerbpebvhyhmqnxgad.onion/builders/builder-php-2.html" />
    <meta charset="UTF-8">
    <meta name="author" content="cjboon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Builder 2 - Functions & Arrays</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--white); color: var(--black); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { font-size: 28px; color: #777bb4; margin-bottom: 8px; letter-spacing: 2px; }
        .header p { color: var(--charcoal); font-size: 14px; }
        .stats-bar { display: flex; gap: 30px; margin-bottom: 30px; background: var(--beige); padding: 15px 30px; border-radius: 8px; border: 1px solid var(--charcoal); }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .stat-value.score { color: #f7c700; }
        .game-container { background: var(--beige); border-radius: 12px; padding: 30px; max-width: 800px; width: 100%; border: 1px solid var(--charcoal); display: none; }
        .game-container.active { display: block; }
        .level-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .level-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--charcoal); }
        .level-dot.completed { background: #f7c700; }
        .level-dot.current { background: #58a6ff; }
        .question-box { background: var(--white); border-radius: 8px; padding: 20px; margin-bottom: 25px; border-left: 4px solid #777bb4; }
        .question-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .question-text { font-size: 16px; color: var(--black); line-height: 1.6; }
        .hint-text { margin-top: 12px; font-size: 13px; color: #d29922; font-style: italic; }
        .answer-area { background: var(--white); border-radius: 8px; padding: 20px; margin-bottom: 25px; min-height: 80px; border: 2px dashed var(--charcoal); }
        .answer-label { font-size: 11px; color: var(--charcoal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .letter-slots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 50px; align-items: center; }
        .letter-slot { width: 46px; height: 46px; background: var(--white); border: 2px dashed var(--charcoal); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: var(--black); }
        .letter-slot.filled { border-style: solid; border-color: #f7c700; }
        .letter-slot.correct { border-color: #3fb950; background: rgba(63, 185, 80, 0.1); }
        .letter-slot.incorrect { border-color: #f85149; background: rgba(248, 81, 73, 0.1); }
        .letter-pool { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 20px; background: var(--white); border-radius: 8px; min-height: 80px; }
        .letter-tile { width: 46px; height: 46px; background: linear-gradient(135deg, #777bb4, #5a5aa8); border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: white; cursor: grab; transition: all 0.2s ease; user-select: none; -webkit-user-drag: element; box-sizing: border-box; }
        .letter-tile:active { cursor: grabbing; }
        .letter-tile:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(119, 123, 180, 0.3); }
        .letter-tile.dragging { opacity: 0.5; }
        .actions { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; border: none; }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: var(--charcoal); color: var(--black); border: 1px solid var(--charcoal); }
        .feedback { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .feedback.success { display: block; background: rgba(38, 77, 228, 0.1); border: 1px solid #264de4; color: #264de4; }
        .feedback.error { display: block; background: rgba(248, 81, 73, 0.1); border: 1px solid #f85149; color: #f85149; }
        .completion-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 1000; }
        .completion-modal.active { display: flex; }
        .modal-content { background: var(--beige); padding: 40px; border-radius: 12px; text-align: center; border: 1px solid var(--charcoal); max-width: 400px; }
        .modal-content h2 { color: #f7c700; margin-bottom: 20px; }
        .modal-content p { color: var(--charcoal); margin-bottom: 25px; }
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .progress-info { margin-top: 20px; text-align: center; color: var(--charcoal); font-size: 13px; }
        @media (max-width: 600px) { body { padding: 10px; } .header { padding: 15px; margin-bottom: 15px; } .header h1 { font-size: 20px; } .stats-bar { flex-wrap: wrap; gap: 15px; padding: 10px 15px; } .stat-value { font-size: 18px; } .game-container { padding: 15px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐘 PHP BUILDER 2</h1>
        <p>Drag & drop to learn PHP functions & arrays</p>
    </div>
    <div class="stats-bar">
        <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="levelNum">1</div></div>
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value score" id="score">0</div></div>
        <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
    </div>
    <div class="game-container active" id="gameContainer">
        <div class="level-indicator" id="levelIndicator"></div>
        <div class="question-box">
            <div class="question-label">Challenge</div>
            <div class="question-text" id="questionText"></div>
            <div class="hint-text" id="hintText"></div>
        </div>
        <div class="answer-area">
            <div class="answer-label">Your Answer</div>
            <div class="letter-slots" id="letterSlots"></div>
        </div>
        <div class="letter-pool" id="letterPool"></div>
        <div class="feedback" id="feedback"></div>
        <div class="actions">
            <button class="btn btn-secondary" onclick="clearAnswer()">Clear</button>
            <button class="btn btn-primary" onclick="checkAnswer()">Submit</button>
        </div>
        <div class="progress-info">Question <span id="currentQ">1</span> of <span id="totalQ">10</span></div>
    </div>
    <div class="completion-modal" id="completionModal">
        <div class="modal-content">
            <h2>🎉 Level Complete!</h2>
            <p>You scored <span id="finalScore">0</span> points!</p>
            <button class="btn btn-primary" onclick="nextLevel()">Next Level</button>
        </div>
    </div>
    <a href="builder-main.html" class="back-link">&lt;&lt; back to builder games</a>
    <script>
        const levels = [{ questions: [
            { answer: "function", hint: "Define a function", code: "Create reusable code block" },
            { answer: "array", hint: "Create an array", code: "List of items" },
            { answer: "count", hint: "Count array elements", code: "Get array length" },
            { answer: "sort", hint: "Sort array", code: "Order elements" },
            { answer: "return", hint: "Return from function", code: "Send back value" },
            { name: "foreach", hint: "Loop through array", code: "Iterate array" },
            { answer: "empty", hint: "Check if empty", code: "Is variable empty?" },
            { answer: "isset", hint: "Check if set", code: "Variable exists?" },
            { answer: "unset", hint: "Remove variable", code: "Delete variable" },
            { answer: "include", hint: "Include file", code: "Add external file" }
        ]}];
        let currentLevel = 0, currentQuestion = 0, score = 0, streak = 0, placedLetters = [], draggedLetter = null, draggedOriginalIndex = null;
        function initLevel() {
            const level = levels[currentLevel];
            document.getElementById('levelNum').textContent = currentLevel + 1;
            document.getElementById('totalQ').textContent = level.questions.length;
            renderLevelIndicator();
            loadQuestion();
        }
        function renderLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = '';
            for (let i = 0; i < levels.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'level-dot' + (i < currentLevel ? ' completed' : '') + (i === currentLevel ? ' current' : '');
                indicator.appendChild(dot);
            }
        }
        function loadQuestion() {
            const q = levels[currentLevel].questions[currentQuestion];
            document.getElementById('questionText').textContent = q.code;
            document.getElementById('hintText').textContent = q.hint;
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
            placedLetters = [];
            renderLetterSlots();
            renderLetterPool();
        }
        function renderLetterSlots() {
            const slotsContainer = document.getElementById('letterSlots');
            slotsContainer.innerHTML = '';
            const answer = levels[currentLevel].questions[currentQuestion].answer;
            for (let i = 0; i < answer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot' + (placedLetters[i] ? ' filled' : '');
                slot.textContent = placedLetters[i] || '';
                slot.dataset.index = i;
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', handleDrop);
                slotsContainer.appendChild(slot);
            }
        }
        function renderLetterPool() {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            const answer = levels[currentLevel].questions[currentQuestion].answer;
            const letters = answer.split('').sort(() => Math.random() - 0.5);
            const extraLetters = 'aeioucdfghjklmnpqrstvwxyz'.split('').sort(() => Math.random() - 0.5).slice(0, 4);
            const allLetters = [...letters, ...extraLetters].sort(() => Math.random() - 0.5);
            allLetters.forEach((char, idx) => {
                if (!answer.includes(char) || answer.split(char).length - 1 > answer.split('').filter(l => l === char).length) {
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    tile.textContent = char;
                    tile.dataset.originalIndex = idx;
                    tile.draggable = true;
                    tile.addEventListener('dragstart', handleDragStart);
                    tile.addEventListener('dragend', handleDragEnd);
                    pool.appendChild(tile);
                } else {
                    const existingInAnswer = answer.split('').filter(l => l === char).length;
                    const placedInAnswer = placedLetters.filter(l => l === char).length;
                    if (placedInAnswer < existingInAnswer) {
                        const tile = document.createElement('div');
                        tile.className = 'letter-tile';
                        tile.textContent = char;
                        tile.dataset.originalIndex = idx;
                        tile.draggable = true;
                        tile.addEventListener('dragstart', handleDragStart);
                        tile.addEventListener('dragend', handleDragEnd);
                        pool.appendChild(tile);
                    }
                }
            });
        }
        function handleDragStart(e) {
            draggedLetter = e.target.textContent;
            draggedOriginalIndex = parseInt(e.target.dataset.originalIndex);
            e.target.classList.add('dragging');
        }
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedLetter = null;
            draggedOriginalIndex = null;
        }
        function handleDrop(e) {
            e.preventDefault();
            const slotIndex = parseInt(e.target.dataset.index);
            if (!isNaN(slotIndex)) {
                if (placedLetters[slotIndex]) {
                    const pool = document.getElementById('letterPool');
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    tile.textContent = placedLetters[slotIndex];
                    tile.dataset.originalIndex = Date.now();
                    tile.draggable = true;
                    tile.addEventListener('dragstart', handleDragStart);
                    tile.addEventListener('dragend', handleDragEnd);
                    pool.appendChild(tile);
                }
                placedLetters[slotIndex] = draggedLetter;
                renderLetterSlots();
                renderLetterPool();
            }
        }
        function clearAnswer() {
            const pool = document.getElementById('letterPool');
            placedLetters.forEach((char, idx) => {
                if (char) {
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    tile.textContent = char;
                    tile.dataset.originalIndex = Date.now() + idx;
                    tile.draggable = true;
                    tile.addEventListener('dragstart', handleDragStart);
                    tile.addEventListener('dragend', handleDragEnd);
                    pool.appendChild(tile);
                }
            });
            placedLetters = [];
            renderLetterSlots();
            renderLetterPool();
        }
        function checkAnswer() {
            const answer = levels[currentLevel].questions[currentQuestion].answer;
            const userAnswer = placedLetters.join('');
            const feedback = document.getElementById('feedback');
            if (userAnswer === answer) {
                score += 10 + streak * 2;
                streak++;
                feedback.className = 'feedback success';
                feedback.textContent = '✓ Correct! +' + (10 + streak * 2) + ' points';
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion >= levels[currentLevel].questions.length) {
                        showCompletion();
                    } else {
                        loadQuestion();
                    }
                }, 1000);
            } else {
                streak = 0;
                feedback.className = 'feedback error';
                feedback.textContent = '✗ Try again!';
                document.getElementById('streak').textContent = streak;
            }
        }
        function showCompletion() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('completionModal').classList.add('active');
        }
        function nextLevel() {
            currentLevel++;
            currentQuestion = 0;
            if (currentLevel >= levels.length) {
                currentLevel = 0;
            }
            document.getElementById('completionModal').classList.remove('active');
            document.getElementById('score').textContent = score;
            initLevel();
        }
        document.addEventListener('DOMContentLoaded', initLevel);
    </script>
</body>
</html>
