    <div id="loginModal" class="auth-modal">
        <div class="auth-box">

                <button type="submit" style="width:100%;padding:12px;background:var(--black);color:var(--white);border:none;font-family:'IBM Plex Mono',monospace;cursor:pointer;">Register</button>
            </form>
        </div>
    </div>

    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

                <div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Score</div></div>

    <div class="back-link"><a href="hangman-main.html">&lt;&lt; back to hangman games</a></div>
    <script>
        const commands = {
            easy: [
                { command: 'wg', definition: 'WireGuard command-line tool' },
                { command: 'peer', definition: 'Remote VPN client or server in WireGuard' },
                { command: 'key', definition: 'Cryptographic key used in WireGuard' },
                { command: 'vpn', definition: 'Virtual Private Network - encrypted tunnel' },
                { command: 'udp', definition: 'Protocol WireGuard uses (User Datagram Protocol)' },
                { command: 'port', definition: 'Network port number for connections' },
                { command: 'dns', definition: 'Domain Name System server configuration' },
                { command: 'ip', definition: 'Internet Protocol address' },
                { command: 'nat', definition: 'Network Address Translation' },
                { command: 'mtu', definition: 'Maximum Transmission Unit - packet size' },
                { command: 'ping', definition: 'Test connectivity to peer' },
                { command: 'route', definition: 'Network route configuration' }
            ],
            medium: [
                { command: 'endpoint', definition: 'Remote peer address and port in config' },
                { command: 'allowedips', definition: 'Networks to route through the VPN tunnel' },
                { command: 'persistentkeepalive', definition: 'Keeps NAT mappings alive for peer' },
                { command: 'privatekey', definition: 'Secret key kept locally, never shared' },
                { command: 'publickey', definition: 'Shared key for peer authentication' },
                { command: 'presharedkey', definition: 'Additional shared key for post-quantum security' },
                { command: 'listenport', definition: 'Port for incoming peer connections' },
                { command: 'chacha20', definition: 'Encryption cipher used by WireGuard' },
                { command: 'poly1305', definition: 'Message authentication code algorithm' },
                { command: 'curve25519', definition: 'Key exchange algorithm used by WireGuard' },
                { command: 'wg-quick', definition: 'Wrapper script for easier WireGuard management' },
                { command: 'wg0', definition: 'Common default WireGuard interface name' },
                { command: 'socat', definition: 'Transfer WireGuard socket between processes' },
                { command: 'FwMark', definition: 'Firewall mark for routing packets' }
            ],
            hard: [
                { command: 'noiseprotocol', definition: 'Key exchange protocol based on Noise' },
                { command: 'kernelmodule', definition: 'In-kernel WireGuard implementation (Linux 5.6+)' },
                { command: 'userspace', definition: 'Userspace implementation of WireGuard' },
                { command: 'PacketDrop', definition: 'WireGuard action to drop packets silently' },
                { command: 'replacepeers', definition: 'Config option to replace existing peer list' },
                { command: 'Table', definition: 'Routing table configuration directive' },
                { command: 'SaveConfig', definition: 'Save runtime config back to file' },
                { command: 'PostUp', definition: 'Command executed after interface comes up' },
                { command: 'PreDown', definition: 'Command executed before interface goes down' },
                { command: 'ip link', definition: 'Create WireGuard network interface' },
                { command: 'wg set', definition: 'Modify WireGuard interface configuration' },
                { command: 'wg show', definition: 'Display current WireGuard status' },
                { command: 'wg genkey', definition: 'Generate WireGuard private key' },
                { command: 'wg pubkey', definition: 'Generate public key from private key' }
            ]
        };
        let difficultyLevels = ['easy', 'medium', 'hard'];
        let currentDifficulty = 'easy';
        let difficultyStreak = 0;
        let minStreakForAdvance = 5;
        let currentWord = '';
        let guessedLetters = [];
        let wrongCount = 0;
        let score = 0;
        let streak = 0;
        let maxWrong = 8;
        let isDead = false;
        let twitchTimeout = null;
        let deathTime = 0;
        let limbsLimp = false;
        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');
        const definitionEl = document.getElementById('definition');
        const wordDisplayEl = document.getElementById('wordDisplay');
        const guessInput = document.getElementById('guessInput');
        const guessedCharsEl = document.getElementById('guessedChars');
        const wrongCountEl = document.getElementById('wrongCount');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const messageBox = document.getElementById('messageBox');
        function init() { newGame(); }
        function newGame() {
            const currentCommands = commands[currentDifficulty];
            const cmd = currentCommands[Math.floor(Math.random() * currentCommands.length)];
            currentWord = cmd.command.toLowerCase();
            guessedLetters = [];
            wrongCount = 0;
            score = Math.max(0, score);
            messageBox.style.display = 'none';
            messageBox.className = 'message';
            guessInput.value = '';
            isDead = false;
            deathTime = 0;
            limbsLimp = false;
            if (twitchTimeout) { clearTimeout(twitchTimeout); twitchTimeout = null; }
            updateDifficultyDisplay();
            drawHangman();
            updateDisplay();
            guessInput.focus();
        }
        function updateDifficultyDisplay() {
            const display = document.getElementById('difficultyDisplay');
            if (display) { display.textContent = 'Difficulty: ' + currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1); }
        }
        function drawHangman() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const startColor = isDark ? '#000' : '#fff';
            let faceFillColor = startColor;
            let eyeMouthColor = isDark ? '#fff' : '#000';
            let droopAmount = 0;
            if (isDead) {
                deathTime += 16;
                const maxTime = 60000;
                const progress = Math.min(deathTime / maxTime, 1);
                const r = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const g = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const b = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                faceFillColor = `rgb(${r},${g},${b})`;
                droopAmount = Math.sin(deathTime / 500) * 2;
            }
            ctx.fillStyle = faceFillColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = isDark ? '#fff' : '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(50, 380); ctx.lineTo(250, 380);
            ctx.moveTo(100, 380); ctx.lineTo(100, 50);
            ctx.moveTo(100, 50); ctx.lineTo(220, 50);
            ctx.moveTo(220, 50); ctx.lineTo(220, 90);
            ctx.stroke();
            if (wrongCount >= 1) {
                ctx.beginPath(); ctx.arc(220, 115 + droopAmount, 30, 0, Math.PI * 2); ctx.fillStyle = faceFillColor; ctx.fill(); ctx.stroke();
            }
            if (wrongCount >= 2) {
                ctx.beginPath(); ctx.moveTo(220, 145 + droopAmount); ctx.lineTo(220, 230); ctx.stroke();
            }
            if (wrongCount >= 3) {
                ctx.beginPath(); ctx.moveTo(220, 160 + droopAmount); ctx.lineTo(190, 200); ctx.stroke();
            }
            if (wrongCount >= 4) {
                ctx.beginPath(); ctx.moveTo(220, 160 + droopAmount); ctx.lineTo(250, 200); ctx.stroke();
            }
            if (wrongCount >= 5) {
                ctx.beginPath(); ctx.moveTo(220, 230); ctx.lineTo(190, 280); ctx.stroke();
            }
            if (wrongCount >= 6) {
                ctx.beginPath(); ctx.moveTo(220, 230); ctx.lineTo(250, 280); ctx.stroke();
            }
            if (wrongCount >= 7) {
                ctx.beginPath(); ctx.fillStyle = isDark ? '#fff' : '#000';
                ctx.arc(210, 105 + droopAmount, 3, 0, Math.PI * 2); ctx.arc(230, 105 + droopAmount, 3, 0, Math.PI * 2); ctx.fill();
            }
            if (wrongCount >= 8) {
                ctx.beginPath();
                ctx.strokeStyle = isDark ? '#fff' : '#000';
                ctx.moveTo(210, 125 + droopAmount); ctx.lineTo(230, 125 + droopAmount);
                ctx.stroke();
            }
            if (!isDead) {
                ctx.fillStyle = isDark ? '#fff' : '#000';
                ctx.font = '20px Courier New';
                ctx.textAlign = 'center';
            }
        }
        function updateDisplay() {
            definitionEl.textContent = commands[currentDifficulty].find(c => c.command.toLowerCase() === currentWord)?.definition || '';
            wordDisplayEl.innerHTML = '';
            for (let i = 0; i < currentWord.length; i++) {
                const letter = currentWord[i];
                const slot = document.createElement('span');
                slot.className = 'letter-slot';
                if (guessedLetters.includes(letter)) {
                    slot.textContent = letter;
                    slot.classList.add('correct');
                } else {
                    slot.textContent = '_';
                }
                wordDisplayEl.appendChild(slot);
            }
            guessedCharsEl.innerHTML = '';
            guessedLetters.forEach(letter => {
                const char = document.createElement('span');
                char.className = 'guessed-char';
                char.textContent = letter;
                guessedCharsEl.appendChild(char);
            });
            wrongCountEl.textContent = wrongCount;
            scoreEl.textContent = score;
            streakEl.textContent = streak;
            checkWin();
        }
        function checkWin() {
            const won = currentWord.split('').every(letter => guessedLetters.includes(letter));
            if (won) {
                messageBox.textContent = 'CORRECT! The word was: ' + currentWord.toUpperCase();
                messageBox.className = 'message win';
                messageBox.style.display = 'block';
                score += 10 + (streak * 2);
                streak++;
                difficultyStreak++;
                if (difficultyStreak >= minStreakForAdvance && currentDifficulty !== 'hard') {
                    currentDifficulty = difficultyLevels[difficultyLevels.indexOf(currentDifficulty) + 1];
                    difficultyStreak = 0;
                }
                setTimeout(newGame, 2000);
            } else if (wrongCount >= maxWrong) {
                isDead = true;
                drawHangman();
                messageBox.textContent = 'GAME OVER! The word was: ' + currentWord.toUpperCase();
                messageBox.className = 'message lose';
                messageBox.style.display = 'block';
                streak = 0;
                difficultyStreak = 0;
                currentDifficulty = 'easy';
                setTimeout(newGame, 3000);
            }
        }
        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const guess = guessInput.value.toLowerCase().trim();
                if (guess && guess.length === 1 && guess.match(/[a-z]/)) {
                    if (!guessedLetters.includes(guess)) {
                        guessedLetters.push(guess);
                        if (!currentWord.includes(guess)) {
                            wrongCount++;
                            streak = 0;
                            difficultyStreak = 0;
                        }
                        updateDisplay();
                        drawHangman();
                    }
                    guessInput.value = '';
                }
            }
        });
        init();
    </script>
