<body>
    <h1>HANGMAN: JAVASCRIPT</h1>
    <p class="subtitle">Guess the JavaScript keyword from its definition</p>
    <p class="difficulty" id="difficultyDisplay" style="color: var(--charcoal); margin-bottom: 10px;">Difficulty: Easy</p>
    
    <div class="game-container">
        <div class="hangman-area">
            <canvas id="hangmanCanvas" width="300" height="400"></canvas>
        </div>
        
        <div class="game-info">
            <div class="definition-box">
                <div class="definition-label">DEFINITION:</div>
                <div class="definition-text" id="definition"></div>
            </div>
            
            <div class="word-display" id="wordDisplay" style="display: flex; flex-wrap: nowrap; gap: 2px;"></div>
            
            <div class="input-area">
                <input type="text" class="guess-input" id="guessInput" placeholder="type a-z" autocomplete="off" autofocus>
            </div>
            
            <div class="guesses-label">GUESSED:</div>
            <div class="guessed-chars" id="guessedChars"></div>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="wrongCount">0</div>
                    <div class="stat-label">Wrong</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">Score</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Streak</div>
                </div>
            </div>
            
            <div class="message" id="messageBox" style="display: none;"></div>
        </div>
    </div>
    
    <div class="actions">
        <button class="btn btn-secondary" onclick="newGame()">New Word</button>
    </div>
    
    <div class="back-link">
        <a href="hangman-main.html">&lt;&lt; back to hangman games</a>
    </div>

    <script>
        const commands = {
            easy: [
                { command: 'if', definition: 'Conditional statement that executes code based on a condition' },
                { command: 'for', definition: 'Loop that runs a specified number of times' },
                { command: 'var', definition: 'Declares a variable with function scope' },
                { command: 'let', definition: 'Declares a variable with block scope' },
                { command: 'const', definition: 'Declares a constant that cannot be reassigned' },
                { command: 'log', definition: 'Outputs a message to the console' },
                { command: 'return', definition: 'Exits a function and returns a value' },
                { command: 'true', definition: 'Boolean value representing truth' },
                { command: 'false', definition: 'Boolean value representing falsity' },
                { command: 'null', definition: 'Represents intentional absence of value' },
                { command: 'this', definition: 'Refers to the current execution context' },
                { command: 'new', definition: 'Creates an instance of an object' },
                { command: 'try', definition: 'Block to test for errors' },
                { command: 'catch', definition: 'Block to handle errors' }
            ],
            medium: [
                { command: 'while', definition: 'Loop that repeats while a condition is true' },
                { command: 'break', definition: 'Exits a loop prematurely' },
                { command: 'continue', definition: 'Skips to the next iteration of a loop' },
                { command: 'switch', definition: 'Evaluates an expression and matches to cases' },
                { command: 'case', definition: 'Defines a match condition in a switch' },
                { command: 'default', definition: 'Default case in a switch statement' },
                { command: 'throw', definition: 'Throws an exception manually' },
                { command: 'async', definition: 'Declares an asynchronous function' },
                { command: 'await', definition: 'Pauses execution until a promise resolves' },
                { command: 'class', definition: 'Defines a blueprint for creating objects' },
                { command: 'super', definition: 'Calls parent class constructor or methods' },
                { command: 'export', definition: 'Makes code available to other modules' },
                { command: 'import', definition: 'Brings code from another module' },
                { command: 'typeof', definition: 'Returns the data type of a variable' },
                { command: 'delete', definition: 'Removes a property from an object' },
                { command: 'instanceof', definition: 'Tests if an object is an instance of a class' },
                { command: 'finally', definition: 'Code that always runs after try/catch' },
                { command: 'yield', definition: 'Pauses and resumes a generator function' },
                { command: 'static', definition: 'Defines a method on the class itself' },
                { command: 'get', definition: 'Defines a getter for a property' },
                { command: 'set', definition: 'Defines a setter for a property' }
            ],
            hard: [
                { command: 'function', definition: 'Defines a reusable block of code' },
                { command: 'extends', definition: 'Creates a class that inherits from another' },
                { command: 'arguments', definition: 'Array-like object of function arguments' },
                { command: 'prototype', definition: 'Object used for inheritance' },
                { command: 'constructor', definition: 'Method that initializes an object' },
                { command: 'call', definition: 'Invokes a function with specified this and arguments' },
                { command: 'apply', definition: 'Invokes a function with arguments as an array' },
                { command: 'bind', definition: 'Creates a new function with bound this and args' },
                { command: 'closure', definition: 'Function that accesses variables from outer scope' },
                { command: 'promise', definition: 'Represents eventual completion of async operation' },
                { command: 'resolve', definition: 'Resolves a promise successfully' },
                { command: 'reject', definition: 'Rejects a promise with an error' },
                { command: 'finally', definition: 'Executes after promise settles' },
                { command: 'reflect', definition: 'Built-in object for interceptable operations' },
                { command: 'proxy', definition: 'Object that defines custom behavior for operations' },
                { command: 'symbol', definition: 'Unique primitive value for object keys' },
                { command: 'iterator', definition: 'Object that provides next() method' },
                { command: 'generator', definition: 'Function that can pause and resume execution' },
                { command: 'eval', definition: 'Executes a string as code' },
                { command: 'with', definition: 'Extends scope chain temporarily' },
                { command: 'debugger', definition: 'Breaks execution for debugging' },
                { command: 'package', definition: 'ES module bundle metadata' },
                { command: 'export', definition: 'Exports values from a module' },
                { command: 'default', definition: 'Default export in a module' },
                { command: 'import', definition: 'Imports exported bindings' }
            ]
        };

        let difficultyLevels = ['easy', 'medium', 'hard'];
        let currentDifficulty = 'easy';
        let difficultyStreak = 0;
        let minStreakForAdvance = 5;

        let currentWord = '';
        let guessedLetters = [];
        let wrongCount = 0;
        let score = 0;
        let streak = 0;
        let maxWrong = 8;
        let isDead = false;
        let twitchTimeout = null;
        let deathTime = 0;
        let limbsLimp = false;

        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');
        const definitionEl = document.getElementById('definition');
        const wordDisplayEl = document.getElementById('wordDisplay');
        const guessInput = document.getElementById('guessInput');
        const guessedCharsEl = document.getElementById('guessedChars');
        const wrongCountEl = document.getElementById('wrongCount');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const messageBox = document.getElementById('messageBox');

        function init() {
            newGame();
        }

        function newGame() {
            const currentCommands = commands[currentDifficulty];
            const cmd = currentCommands[Math.floor(Math.random() * currentCommands.length)];
            currentWord = cmd.command.toLowerCase();
            guessedLetters = [];
            wrongCount = 0;
            score = Math.max(0, score);
            messageBox.style.display = 'none';
            messageBox.className = 'message';
            messageBox.innerHTML = '';
            guessInput.value = '';
            isDead = false;
            deathTime = 0;
            limbsLimp = false;
            if (twitchTimeout) {
                clearTimeout(twitchTimeout);
                twitchTimeout = null;
            }
            updateDifficultyDisplay();
            drawHangman();
            updateDisplay();
            guessInput.focus();
        }
        
        function updateDifficultyDisplay() {
            const display = document.getElementById('difficultyDisplay');
            if (display) {
                display.textContent = 'Difficulty: ' + currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
            }
        }

        function drawHangman() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const startColor = isDark ? '#000' : '#fff';
            let faceFillColor = startColor;
            let eyeMouthColor = isDark ? '#fff' : '#000';
            let droopAmount = 0;
            if (isDead) {
                deathTime += 16;
                const maxTime = 60000;
                const progress = Math.min(deathTime / maxTime, 1);
                // Face inverts
                const r = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const g = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const b = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                faceFillColor = `rgb(${r},${g},${b})`;
                // Eyes/mouth invert faster
                const emProgress = Math.min(deathTime / 20000, 1);
                const emR = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                const emG = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                const emB = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                eyeMouthColor = `rgb(${emR},${emG},${emB})`;
                if (deathTime > 45000) {
                    droopAmount = ((deathTime - 45000) / 15000) * 5;
                    if (droopAmount > 5) droopAmount = 5;
                }
            }
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.font = '16px Courier New';
            
            ctx.beginPath();
            ctx.moveTo(20, 380);
            ctx.lineTo(280, 380);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(60, 380);
            ctx.lineTo(60, 20);
            ctx.lineTo(180, 20);
            ctx.lineTo(180, 60);
            ctx.stroke();
            
            if (wrongCount >= 1) {
                ctx.beginPath();
                ctx.arc(180, 90, 30, 0, Math.PI * 2);
                ctx.fillStyle = faceFillColor;
                ctx.fill();
                ctx.stroke();
                
                if (wrongCount >= 5) {
                    const eyeOffsetX = droopAmount * 0.3;
                    const eyeOffsetY = droopAmount;
                    const eyeY = 85 + eyeOffsetY;
                    ctx.fillStyle = eyeMouthColor;
                    
                    ctx.beginPath();
                    ctx.arc(170 + eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(190 + eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(170 + eyeOffsetX, eyeY, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(190 + eyeOffsetX, eyeY, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    const mouthY = 105 + droopAmount;
                    ctx.beginPath();
                    if (limbsLimp) {
                        ctx.moveTo(165, mouthY);
                        ctx.lineTo(195, mouthY);
                    } else {
                        ctx.arc(180, mouthY, 15, 0, Math.PI);
                    }
                    ctx.strokeStyle = eyeMouthColor;
                    ctx.stroke();
                }
            }
            
            let bodyStartY = 120;
            let bodyEndY = 220;
            let armY = 160;
            
            if (wrongCount >= 2) {
                ctx.beginPath();
                ctx.moveTo(180, bodyStartY);
                ctx.lineTo(180, bodyEndY);
                ctx.stroke();
            }
            
            let armEndX = 130;
            let armEndX2 = 230;
            
            if (wrongCount >= 3) {
                ctx.beginPath();
                ctx.moveTo(180, armY);
                ctx.lineTo(armEndX, 140);
                ctx.stroke();
            }
            
            if (wrongCount >= 4) {
                ctx.beginPath();
                ctx.moveTo(180, armY);
                ctx.lineTo(armEndX2, 140);
                ctx.stroke();
            }
            
            let legY = 260;
            let legEndX = 140;
            let legEndX2 = 220;
            
            if (wrongCount >= 6) {
                ctx.beginPath();
                ctx.moveTo(180, bodyEndY);
                ctx.lineTo(legEndX, legY);
                ctx.stroke();
            }
            
            if (wrongCount >= 7) {
                ctx.beginPath();
                ctx.moveTo(180, bodyEndY);
                ctx.lineTo(legEndX2, legY);
                ctx.stroke();
            }
            
            if (wrongCount >= 5 && wrongCount < 8) {
                if (!twitchTimeout && !limbsLimp) {
                    twitchTimeout = setTimeout(() => {
                        limbsLimp = true;
                        drawHangman();
                    }, 5000);
                }
            }
            
            ctx.font = '14px Courier New';
            ctx.fillStyle = '#666';
            ctx.fillText('x: ' + wrongCount, 250, 30);
        }

        function updateDisplay() {
            const currentCommands = commands[currentDifficulty];
            const cmd = currentCommands.find(c => c.command.toLowerCase() === currentWord);
            definitionEl.textContent = cmd ? cmd.definition : '';
            
            wordDisplayEl.innerHTML = '';
            for (let i = 0; i < currentWord.length; i++) {
                const letter = currentWord[i];
                const span = document.createElement('span');
                span.className = 'letter-slot';
                
                if (letter === ' ') {
                    span.textContent = '\u00A0\u00A0';
                } else if (guessedLetters.includes(letter)) {
                    span.textContent = letter;
                    if (currentWord.includes(letter)) {
                        span.classList.add('correct');
                    } else {
                        span.classList.add('wrong');
                    }
                } else {
                    span.textContent = '_';
                }
                wordDisplayEl.appendChild(span);
            }
            
            guessedCharsEl.innerHTML = '';
            guessedLetters.forEach(letter => {
                const span = document.createElement('span');
                span.className = 'guessed-char';
                span.textContent = letter;
                if (currentWord.includes(letter)) {
                    span.classList.add('correct');
                } else {
                    span.classList.add('wrong');
                }
                guessedCharsEl.appendChild(span);
            });
            
            wrongCountEl.textContent = wrongCount;
            scoreEl.textContent = score;
            streakEl.textContent = streak;
            
            checkGameState();
        }

        function showMessage(type, text) {
            messageBox.className = 'message ' + type;
            messageBox.innerHTML = `<div>${text}</div><button id="playAgainBtn" tabindex="-1" onclick="newGame()">Play Again</button>`;
            messageBox.style.display = 'block';
            
            if (window.innerWidth > 500) {
                document.getElementById('playAgainBtn').focus();
            }
        }
        
        function checkGameState() {
            const allGuessed = currentWord.split('').every(l => l === ' ' || guessedLetters.includes(l));
            
            if (allGuessed && !isDead) {
                const bonus = (maxWrong - wrongCount) * 10;
                score += 10 + bonus + (streak * 5);
                streak++;
                
                if (streak >= minStreakForAdvance) {
                    const currentIndex = difficultyLevels.indexOf(currentDifficulty);
                    if (currentIndex < difficultyLevels.length - 1) {
                        currentDifficulty = difficultyLevels[currentIndex + 1];
                        streak = 0;
                        difficultyStreak = 0;
                    }
                }
                
                showMessage('win', 'You won! +' + (10 + bonus) + ' points');
            }
            
            if (wrongCount >= maxWrong && !isDead) {
                isDead = true;
                streak = 0;
                
                showMessage('lose', 'Game Over! The word was: ' + currentWord);
                
                const slots = document.querySelectorAll('.letter-slot');
                slots.forEach(slot => {
                    if (slot.textContent === '_') {
                        slot.classList.add('wrong');
                    }
                });
                
                limbsLimp = false;
                drawHangman();
            }
        }

        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const guess = guessInput.value.toLowerCase().trim();
                
                if (guess.length === 1 && /[a-z0-9_\- ]/.test(guess)) {
                    if (!guessedLetters.includes(guess)) {
                        guessedLetters.push(guess);
                        if (!currentWord.includes(guess)) {
                            wrongCount++;
                        }
                    }
                    guessInput.value = '';
                    updateDisplay();
                    drawHangman();
                } else if (guess.length > 1) {
                    if (guess === currentWord) {
                        currentWord.split('').forEach(l => {
                            if (l !== ' ' && !guessedLetters.includes(l)) {
                                guessedLetters.push(l);
                            }
                        });
                        updateDisplay();
                        drawHangman();
                    } else {
                        wrongCount++;
                        guessInput.value = '';
                        updateDisplay();
                        drawHangman();
                    }
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!guessInput.matches(':focus')) {
                const key = e.key.toLowerCase();
                if (key.length === 1 && /[a-z0-9_\- ]/.test(key)) {
                    guessInput.focus();
                }
            }
        });

        // Mobile: also listen for input changes
        guessInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            if (value.length > 0) {
                const lastChar = value[value.length - 1];
                if (/[a-z0-9_\- ]/.test(lastChar)) {
                    // Check if already guessed
                    if (!guessedLetters.includes(lastChar)) {
                        guessedLetters.push(lastChar);
                        if (!currentWord.includes(lastChar)) {
                            wrongCount++;
                        }
                        updateDisplay();
                    }
                    e.target.value = '';
                }
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (!savedTheme || savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        init();
    </script>
    <noscript>
        <style>
            :root { --ivory:#1a1a1a; --white:#1a1a1a; --black:#e0e0e0; --charcoal:#c0c0c0; --beige:#3a3a3a; }
        </style>
    </noscript>
</body>
</html>
