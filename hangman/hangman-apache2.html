    <script>
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            showAuthTab('login');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            
            try {
                const formData = new FormData();
                formData.append('action', 'login');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    successDiv.textContent = 'Login successful!';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('../api/auth.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('auth', 'true');
                    document.getElementById('loginSuccess').textContent = 'Registration successful! Logging in...';
                    document.getElementById('loginSuccess').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '../account.html';
                    }, 500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.add('show');
            }
        }

        if (window.location.hash === '#login') {
            openLoginModal();
        }
    </script>

    <script>
        const commands = {
            easy: [
                { command: 'apache', definition: 'Web server' },
                { command: 'httpd', definition: 'Daemon name' },
                { command: 'vhost', definition: 'Virtual host' },
                { command: 'port', definition: 'Listen port' },
                { command: 'index', definition: 'Default page' },
                { command: 'alias', definition: 'URL mapping' },
                { command: 'rewrite', definition: 'URL change' },
                { command: 'proxy', definition: 'Forwarding' },
                { command: 'ssl', definition: 'Encryption' },
                { command: 'cert', definition: 'Certificate' }
            ],
            medium: [
                { command: 'htaccess', definition: 'Dir config' },
                { command: 'htpasswd', definition: 'Auth file' },
                { command: 'modssl', definition: 'SSL module' },
                { command: 'worker', definition: 'MPM mode' },
                { command: 'prefork', definition: 'MPM mode' },
                { command: 'gzip', definition: 'Compression' },
                { command: 'headers', definition: 'HTTP headers' },
                { command: 'expires', definition: 'Cache control' },
                { command: 'deflate', definition: 'Compression' },
                { command: 'mime', definition: 'File types' }
            ],
            hard: [
                { command: 'modsec', definition: 'WAF module' },
                { command: 'balancer', definition: 'Load balance' },
                { command: 'proxyfcgi', definition: 'PHP handler' },
                { command: 'cgid', definition: 'CGI module' },
                { command: 'fcgi', definition: 'FastCGI' },
                { command: 'awstats', definition: 'Log analyzer' },
                { command: 'serverstatus', definition: 'Monitor page' },
                { command: 'serverinfo', definition: 'Info page' },
                { command: 'sslengine', definition: 'SSL on/off' },
                { command: 'include', definition: 'Config files' }
            ]
        };

        let difficultyLevels = ['easy', 'medium', 'hard'];
        let currentDifficulty = 'easy';
        let difficultyStreak = 0;
        let minStreakForAdvance = 5;

        let currentWord = '';
        let guessedLetters = [];
        let wrongCount = 0;
        let score = 0;
        let streak = 0;
        let maxWrong = 8;
        let isDead = false;
        let twitchTimeout = null;
        let deathTime = 0;
        let limbsLimp = false;

        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');
        const definitionEl = document.getElementById('definition');
        const wordDisplayEl = document.getElementById('wordDisplay');
        const guessInput = document.getElementById('guessInput');
        const guessedCharsEl = document.getElementById('guessedChars');
        const wrongCountEl = document.getElementById('wrongCount');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const messageBox = document.getElementById('messageBox');

        function init() {
            newGame();
        }

        function newGame() {
            const currentCommands = commands[currentDifficulty];
            const cmd = currentCommands[Math.floor(Math.random() * currentCommands.length)];
            currentWord = cmd.command.toLowerCase();
            guessedLetters = [];
            wrongCount = 0;
            score = Math.max(0, score);
            messageBox.style.display = 'none';
            messageBox.className = 'message';
            guessInput.value = '';
            isDead = false;
            deathTime = 0;
            limbsLimp = false;
            if (twitchTimeout) {
                clearTimeout(twitchTimeout);
                twitchTimeout = null;
            }
            updateDifficultyDisplay();
            drawHangman();
            updateDisplay();
            guessInput.focus();
        }
        
        function updateDifficultyDisplay() {
            const display = document.getElementById('difficultyDisplay');
            if (display) {
                display.textContent = 'Difficulty: ' + currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
            }
        }

        function drawHangman() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const startColor = isDark ? '#000' : '#fff';
            let faceFillColor = startColor;
            let eyeMouthColor = isDark ? '#fff' : '#000';
            let droopAmount = 0;
            if (isDead) {
                deathTime += 16;
                const maxTime = 60000;
                const progress = Math.min(deathTime / maxTime, 1);
                // Face inverts (black→white in dark, white→black in light)
                const r = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const g = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                const b = Math.floor(startColor === '#fff' ? 255 - 255 * progress : 0 + 255 * progress);
                faceFillColor = `rgb(${r},${g},${b})`;
                // Eyes/mouth turn opposite faster (in 20 seconds instead of 60)
                const emProgress = Math.min(deathTime / 20000, 1);
                const emR = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                const emG = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                const emB = Math.floor(eyeMouthColor === '#fff' ? 255 - 255 * emProgress : 0 + 255 * emProgress);
                eyeMouthColor = `rgb(${emR},${emG},${emB})`;
                if (deathTime > 45000) {
                    droopAmount = ((deathTime - 45000) / 15000) * 5;
                    if (droopAmount > 5) droopAmount = 5;
                }
            }
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.font = '16px Courier New';
            
            // Base
            ctx.beginPath();
            ctx.moveTo(20, 380);
            ctx.lineTo(280, 380);
            ctx.stroke();
            
            // Pole
            ctx.beginPath();
            ctx.moveTo(60, 380);
            ctx.lineTo(60, 20);
            ctx.lineTo(180, 20);
            ctx.lineTo(180, 60);
            ctx.stroke();
            
            // Head
            if (wrongCount >= 1) {
                // Fill head with blue when dead, otherwise white
                if (wrongCount >= 8) {
                    ctx.fillStyle = faceFillColor;
                    ctx.beginPath();
                    ctx.arc(180, 100, 40, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.beginPath();
                ctx.arc(180, 100, 40, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                
                // Eyes change at different stages
                if (wrongCount >= 8) {
                    // X eyes at death
                    ctx.strokeStyle = eyeMouthColor;
                    ctx.beginPath();
                    ctx.moveTo(158, 82 + droopAmount); ctx.lineTo(172, 98 + droopAmount);
                    ctx.moveTo(172, 82 + droopAmount); ctx.lineTo(158, 98 + droopAmount);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(188, 82 + droopAmount); ctx.lineTo(202, 98 + droopAmount);
                    ctx.moveTo(202, 82 + droopAmount); ctx.lineTo(188, 98 + droopAmount);
                    ctx.stroke();
                    
                    // Upside-down half circle (frown) at death
                    ctx.fillStyle = eyeMouthColor;
                    ctx.beginPath();
                    ctx.arc(180, 125 + droopAmount, 10, Math.PI, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Normal eyes
                    ctx.fillStyle = eyeMouthColor;
                    ctx.beginPath();
                    ctx.arc(165, 90 + droopAmount, 5, 0, Math.PI * 2);
                    ctx.arc(195, 90 + droopAmount, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Mouth - smile to frown
                    ctx.strokeStyle = eyeMouthColor;
                    ctx.lineWidth = 2;
                    let progress = (wrongCount - 1) / 5;
                    let curveY = 115 + droopAmount;
                    let controlY = 135 - progress * 40 + droopAmount;
                    
                    ctx.beginPath();
                    ctx.moveTo(160, curveY);
                    ctx.quadraticCurveTo(180, controlY, 200, curveY);
                    ctx.stroke();
                }
            }
            
            // Body
            if (wrongCount >= 2) {
                ctx.strokeStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(180, 140);
                ctx.lineTo(180, 240);
                ctx.stroke();
            }
            
            // Left arm
            if (wrongCount >= 3) {
                ctx.strokeStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(180, 160);
                let armX = 140, armY = 200;
                if (wrongCount >= 8 && isDead && limbsLimp) {
                    // Arms hang straight down due to gravity
                    armX = 170;
                    armY = 240;
                } else if (wrongCount >= 8 && isDead && window.twitchLimb === 'leftArm') {
                    armX = 140 + (Math.random() - 0.5) * 15;
                    armY = 200 + (Math.random() - 0.5) * 15;
                }
                ctx.lineTo(armX, armY);
                ctx.stroke();
            }
            
            // Right arm
            if (wrongCount >= 4) {
                ctx.strokeStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(180, 160);
                let armX = 220, armY = 200;
                if (wrongCount >= 8 && isDead && limbsLimp) {
                    // Arms hang straight down due to gravity
                    armX = 190;
                    armY = 240;
                } else if (wrongCount >= 8 && isDead && window.twitchLimb === 'rightArm') {
                    armX = 220 + (Math.random() - 0.5) * 15;
                    armY = 200 + (Math.random() - 0.5) * 15;
                }
                ctx.lineTo(armX, armY);
                ctx.stroke();
            }
            
            // Left leg
            if (wrongCount >= 5) {
                ctx.strokeStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(180, 240);
                let legX = 140;
                if (wrongCount >= 8 && isDead && limbsLimp) {
                    // Legs hang straight down due to gravity
                    legX = 170;
                } else if (wrongCount >= 8 && isDead && window.twitchLimb === 'leftLeg') {
                    legX = 140 + (Math.random() - 0.5) * 20;
                }
                ctx.lineTo(legX, 300);
                ctx.stroke();
            }
            
            // Right leg
            if (wrongCount >= 6) {
                ctx.strokeStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(180, 240);
                let legX = 220;
                if (wrongCount >= 8 && isDead && limbsLimp) {
                    // Legs hang straight down due to gravity
                    legX = 190;
                } else if (wrongCount >= 8 && isDead && window.twitchLimb === 'rightLeg') {
                    legX = 220 + (Math.random() - 0.5) * 20;
                }
                ctx.lineTo(legX, 300);
                ctx.stroke();
            }
            
            // Death - start twitching and face color animation
            if (wrongCount >= 8 && !isDead) {
                isDead = true;
                window.twitchLimb = null;
                startTwitching();
            }
            
            // Continue animating face color when dead
            if (isDead) {
                requestAnimationFrame(drawHangman);
            }
        }
        
        function startTwitching() {
            const limbs = ['leftArm', 'rightArm', 'leftLeg', 'rightLeg'];
            
            // Stop twitching after 60 seconds - limbs go limp
            setTimeout(() => {
                limbsLimp = true;
                if (twitchTimeout) {
                    clearTimeout(twitchTimeout);
                    twitchTimeout = null;
                }
                window.twitchLimb = null;
                drawHangman();
            }, 60000);
            
            const twitch = () => {
                if (!isDead) return;
                
                // Pick a random limb
                window.twitchLimb = limbs[Math.floor(Math.random() * limbs.length)];
                drawHangman();
                
                // Reset after short delay
                setTimeout(() => {
                    window.twitchLimb = null;
                    drawHangman();
                }, 150);
                
                // Schedule next twitch
                const nextTwitch = 1000 + Math.random() * 1000;
                twitchTimeout = setTimeout(twitch, nextTwitch);
            };
            
            twitch();
        }

        function updateDisplay() {
            // Find definition from current difficulty level
            let def = '';
            const currentCommands = commands[currentDifficulty];
            const found = currentCommands.find(c => c.command.toLowerCase() === currentWord);
            definitionEl.textContent = found ? found.definition : '';
            
            const isWon = currentWord.split('').every(c => guessedLetters.includes(c));
            const isLost = wrongCount >= maxWrong;
            
            wordDisplayEl.innerHTML = '';
            for (const char of currentWord) {
                const slot = document.createElement('span');
                slot.className = 'letter-slot';
                if (guessedLetters.includes(char)) {
                    slot.textContent = char;
                    if (isWon) {
                        slot.classList.add('correct');
                    } else if (isLost) {
                        slot.classList.add('wrong');
                    }
                } else {
                    if (isLost) {
                        slot.textContent = char;
                        slot.classList.add('wrong');
                    } else {
                        slot.textContent = '_';
                    }
                }
                wordDisplayEl.appendChild(slot);
            }
            
            // Show guessed letters in order (left to right)
            guessedCharsEl.innerHTML = '';
            for (const char of guessedLetters) {
                const span = document.createElement('span');
                span.className = 'guessed-char';
                span.textContent = char;
                guessedCharsEl.appendChild(span);
            }
            
            wrongCountEl.textContent = wrongCount;
            scoreEl.textContent = score;
            streakEl.textContent = streak;
        }

        function makeGuess(letter) {
            const guess = letter.toLowerCase();
            
            if (!guess || guess.length !== 1 || !/[a-z ]/.test(guess)) return;
            if (guessedLetters.includes(guess)) return;
            
            guessedLetters.push(guess);
            
            if (!currentWord.includes(guess)) {
                wrongCount++;
                streak = 0;
            } else {
                const uniqueLetters = new Set(currentWord.split('')).size;
                const revealed = currentWord.split('').filter(c => guessedLetters.includes(c)).length;
                score += Math.floor(100 / uniqueLetters);
                streak++;
            }
            
            drawHangman();
            updateDisplay();
            checkWinLoss();
        }

        function checkWinLoss() {
            if (wrongCount >= maxWrong) {
                // Reset streak on loss
                difficultyStreak = 0;
                showMessage('lose', `Game over! The command was: ${currentWord}`);
            } else if (currentWord.split('').every(c => guessedLetters.includes(c))) {
                // Correct! Increase difficulty streak
                difficultyStreak++;
                
                // Check if we should advance difficulty
                let advanceMessage = '';
                if (difficultyStreak >= minStreakForAdvance) {
                    const currentIndex = difficultyLevels.indexOf(currentDifficulty);
                    if (currentIndex < difficultyLevels.length - 1) {
                        currentDifficulty = difficultyLevels[currentIndex + 1];
                        difficultyStreak = 0;
                        updateDifficultyDisplay();
                        advanceMessage = ` \n\nDifficulty increased to: ${currentDifficulty.toUpperCase()}!`;
                    }
                }
                
                showMessage('win', `Correct! The command was: ${currentWord}${advanceMessage}`);
            }
        }

        function showMessage(type, text) {
            messageBox.className = 'message ' + type;
            messageBox.innerHTML = `<div>${text}</div><button id="playAgainBtn" onclick="newGame()">Play Again</button>`;
            messageBox.style.display = 'block';
            document.getElementById('playAgainBtn').focus();
        }

        // Type letters directly without pressing Enter (desktop)
        guessInput.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key.length === 1 && /[a-z0-9_\- ]/.test(key)) {
                e.preventDefault();
                makeGuess(key);
            }
        });
        
        // Mobile: also listen for input changes
        guessInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            if (value.length > 0) {
                const lastChar = value[value.length - 1];
                if (/[a-z0-9_\- ]/.test(lastChar)) {
                    makeGuess(lastChar);
                    e.target.value = ''; // Clear after guess
                }
            }
        });
        
        // Also allow submitting with Enter key
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = guessInput.value.toLowerCase();
                if (value.length > 0 && /[a-z0-9_\- ]/.test(value[0])) {
                    makeGuess(value[0]);
                    guessInput.value = '';
                }
            }
        });


        init();
    </script>
