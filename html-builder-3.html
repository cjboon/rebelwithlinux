<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Builder Level 3 - Advanced</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #e34c26;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: #161b22;
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-value.score {
            color: #f0883e;
        }
        
        .game-container {
            background: #161b22;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            border: 1px solid #30363d;
            display: none;
        }
        
        .game-container.active {
            display: block;
        }
        
        .level-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #30363d;
        }
        
        .level-dot.completed {
            background: #f0883e;
        }
        
        .level-dot.current {
            background: #58a6ff;
        }
        
        .question-box {
            background: #21262d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #e34c26;
        }
        
        .question-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .question-text {
            font-size: 16px;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .hint-text {
            margin-top: 12px;
            font-size: 13px;
            color: #d29922;
            font-style: italic;
        }
        
        .answer-area {
            background: #0d1117;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            min-height: 80px;
            border: 2px dashed #30363d;
        }
        
        .answer-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .letter-slots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 50px;
            align-items: center;
        }
        
        .letter-slot {
            width: 46px;
            height: 46px;
            background: #21262d;
            border: 2px dashed #484f58;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #c9d1d9;
        }
        
        .letter-slot.filled {
            border-style: solid;
            border-color: #e34c26;
        }
        
        .letter-slot.correct {
            border-color: #f0883e;
            background: rgba(240, 136, 62, 0.1);
        }
        
        .letter-slot.incorrect {
            border-color: #f85149;
            background: rgba(248, 81, 73, 0.1);
        }
        
        .letter-pool {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background: #21262d;
            border-radius: 8px;
            min-height: 80px;
        }
        
        .letter-tile {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #e34c26, #c13a1a);
            background-color: #e34c26;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-drag: element;
            box-sizing: border-box;
        }
        
        .letter-tile:active {
            cursor: grabbing;
        }
        
        .letter-tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(227, 76, 38, 0.3);
        }
        
        .letter-tile.dragging {
            opacity: 0.5;
        }
        
        .letter-tile.used {
            visibility: hidden;
            pointer-events: none;
        }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2ea043;
        }
        
        .btn-secondary {
            background: #30363d;
            color: #c9d1d9;
            border: 1px solid #484f58;
        }
        
        .btn-secondary:hover {
            background: #484f58;
        }
        
        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .feedback.success {
            display: block;
            background: rgba(240, 136, 62, 0.1);
            border: 1px solid #f0883e;
            color: #f0883e;
        }
        
        .feedback.error {
            display: block;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            color: #f85149;
        }
        
        .completion-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .completion-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #30363d;
            max-width: 400px;
        }
        
        .modal-content h2 {
            color: #f0883e;
            margin-bottom: 20px;
        }
        
        .modal-content p {
            color: #8b949e;
            margin-bottom: 25px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .progress-info {
            margin-top: 20px;
            text-align: center;
            color: #8b949e;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏗️ HTML BUILDER L3</h1>
        <p>Semantic & Meta Tags</p>
    </div>
    
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-label">Level</div>
            <div class="stat-value" id="levelNum">3</div>
        </div>
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value score" id="score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
        </div>
    </div>
    
    <div class="game-container active" id="gameContainer">
        <div class="level-indicator" id="levelIndicator"></div>
        
        <div class="question-box">
            <div class="question-label">Challenge</div>
            <div class="question-text" id="questionText"></div>
            <div class="hint-text" id="hintText"></div>
        </div>
        
        <div class="answer-area">
            <div class="answer-label">Your Answer</div>
            <div class="letter-slots" id="letterSlots"></div>
        </div>
        
        <div class="letter-pool" id="letterPool"></div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="clearAnswer()">Clear</button>
            <button class="btn btn-primary" onclick="checkAnswer()">Submit</button>
        </div>
        
        <div class="progress-info">
            Question <span id="currentQ">1</span> of <span id="totalQ">10</span>
        </div>
    </div>
    
    <div class="completion-modal" id="completionModal">
        <div class="modal-content">
            <h2>🏆 HTML Master!</h2>
            <p>You scored <span id="finalScore">0</span> points!</p>
            <button class="btn btn-primary" onclick="goHome()">Back to Home</button>
        </div>
    </div>
    
    <a href="index.html" class="back-link">← Back to Home</a>

    <script>
        const levels = [
            {
                questions: [
                    { answer: "header", hint: "Header section", code: "Page header" },
                    { answer: "footer", hint: "Footer section", code: "Page footer" },
                    { answer: "nav", hint: "Navigation", code: "Menu links" },
                    { answer: "main", hint: "Main content", code: "Primary content" },
                    { answer: "section", hint: "Section block", code: "Content section" },
                    { answer: "article", hint: "Article content", code: "Blog post" },
                    { answer: "aside", hint: "Sidebar content", code: "Side panel" },
                    { answer: "meta", hint: "Meta data", code: "Page info" },
                    { answer: "link", hint: "Link resource", code: "External file" },
                    { answer: "script", hint: "JavaScript code", code: "Embed JS" }
                ]
            }
        ];
        
        let currentLevel = 0;
        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let placedLetters = [];
        let draggedLetter = null;
        
        function initLevel() {
            const level = levels[currentLevel];
            document.getElementById('levelNum').textContent = 3;
            document.getElementById('totalQ').textContent = level.questions.length;
            renderLevelIndicator();
            loadQuestion();
        }
        
        function renderLevelIndicator() {
            const level = levels[currentLevel];
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = '';
            for (let i = 0; i < level.questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'level-dot';
                if (i < currentQuestion) dot.classList.add('completed');
                if (i === currentQuestion) dot.classList.add('current');
                indicator.appendChild(dot);
            }
        }
        
        function loadQuestion() {
            const level = levels[currentLevel];
            const q = level.questions[currentQuestion];
            
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.code;
            document.getElementById('hintText').textContent = q.hint;
            document.getElementById('feedback').className = 'feedback';
            
            placedLetters = new Array(q.answer.length).fill(null);
            renderLetterSlots();
            renderLetterPool(q.answer);
            renderLevelIndicator();
        }
        
        function renderLetterSlots() {
            const slotsContainer = document.getElementById('letterSlots');
            slotsContainer.innerHTML = '';
            
            placedLetters.forEach((letter, index) => {
                const slot = document.createElement('div');
                slot.className = 'letter-slot' + (letter ? ' filled' : '');
                slot.textContent = letter || '';
                slot.dataset.index = index;
                
                if (letter) {
                    slot.addEventListener('click', () => removeLetter(index));
                }
                
                slot.addEventListener('dragover', handleDragOver);
                slot.addEventListener('dragleave', handleDragLeave);
                slot.addEventListener('drop', handleDrop);
                
                slotsContainer.appendChild(slot);
            });
        }
        
        function renderLetterPool(answer) {
            const pool = document.getElementById('letterPool');
            pool.innerHTML = '';
            
            const letters = answer.split('').sort(() => Math.random() - 0.5);
            
            letters.forEach((letter, index) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.textContent = letter;
                tile.dataset.letter = letter;
                tile.dataset.index = index;
                tile.draggable = true;
                
                tile.addEventListener('dragstart', handleDragStart);
                tile.addEventListener('dragend', handleDragEnd);
                
                pool.appendChild(tile);
            });
        }
        
        function handleDragStart(e) {
            draggedLetter = e.target.dataset.letter;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            
            const canvas = document.createElement('canvas');
            canvas.width = 46;
            canvas.height = 46;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e34c26';
            ctx.fillRect(0, 0, 46, 46);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.target.textContent, 23, 23);
            
            e.dataTransfer.setDragImage(canvas, 23, 23);
        }
        
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.target.classList.add('drag-over');
        }
        
        function handleDragLeave(e) {
            e.target.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            const slotIndex = parseInt(e.target.dataset.index);
            
            if (placedLetters[slotIndex]) return;
            
            placedLetters[slotIndex] = draggedLetter;
            
            renderLetterSlots();
            renderLetterPool(levels[currentLevel].questions[currentQuestion].answer);
            
            if (!placedLetters.includes(null)) {
                setTimeout(checkAnswer, 300);
            }
        }
        
        function removeLetter(index) {
            placedLetters[index] = null;
            renderLetterSlots();
            renderLetterPool(levels[currentLevel].questions[currentQuestion].answer);
        }
        
        function clearAnswer() {
            placedLetters = new Array(placedLetters.length).fill(null);
            renderLetterSlots();
            renderLetterPool(levels[currentLevel].questions[currentQuestion].answer);
        }
        
        function checkAnswer() {
            const level = levels[currentLevel];
            const q = level.questions[currentQuestion];
            const userAnswer = placedLetters.join('');
            
            const slots = document.querySelectorAll('.letter-slot');
            
            if (userAnswer === q.answer) {
                score += 10 + (streak * 2);
                streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                
                slots.forEach(slot => slot.classList.add('correct'));
                
                document.getElementById('feedback').className = 'feedback success';
                document.getElementById('feedback').textContent = '✓ Correct!';
                
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion >= level.questions.length) {
                        showCompletion();
                    } else {
                        loadQuestion();
                    }
                }, 1000);
            } else {
                streak = 0;
                document.getElementById('streak').textContent = streak;
                
                slots.forEach(slot => slot.classList.add('incorrect'));
                
                document.getElementById('feedback').className = 'feedback error';
                document.getElementById('feedback').textContent = '✗ Try again!';
            }
        }
        
        function showCompletion() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('completionModal').classList.add('active');
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        initLevel();
    </script>
</body>
</html>
